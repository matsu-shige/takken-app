<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="宅建">
<meta name="theme-color" content="#F3F4F6" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#191918" media="(prefers-color-scheme: dark)">
<title>宅建 過去問</title>
<style>
:root{
  --bg:#F3F4F6; --surface:#FFFFFF; --surface-subtle:#F7F7F5;
  --ink:#1F2937; --ink-mid:#4B5563; --ink-low:#9CA3AF;
  --line:#E5E7EB; --line-strong:#D1D5DB;
  --accent:#0078D4; --accent-strong:#005A9E; --accent-soft:#DEECF9; --accent-ink:#FFFFFF;
  --ok:#15803D; --ok-soft:#EAF6ED; --ng:#B91C1C; --ng-soft:#FDEDED;
  --radius:3px;
  --mono:'SF Mono','JetBrains Mono',Menlo,Consolas,'Courier New',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif;
}
:root[data-theme="dark"]{
  --bg:#191918; --surface:#212120; --surface-subtle:#282826;
  --ink:#ECEBE7; --ink-mid:#A8A6A0; --ink-low:#726F68;
  --line:#34322F; --line-strong:#45423D;
  --accent:#5CACFF; --accent-strong:#2E7FDB; --accent-soft:rgba(92,172,255,.14); --accent-ink:#FFFFFF;
  --ok:#4ABE79; --ok-soft:rgba(74,190,121,.12); --ng:#F0685F; --ng-soft:rgba(240,104,95,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:var(--bg); color:var(--ink); font-family:var(--sans);
  font-weight:400; line-height:1.65;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  overscroll-behavior:none;
  transition:background .15s ease,color .15s ease;
}
#app{max-width:680px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

header{
  display:flex;align-items:center;gap:14px;
  padding:20px 20px 16px;border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:5;background:var(--bg);
}
.eyebrow{font-family:var(--mono);font-size:10px;color:var(--ink-low);text-transform:uppercase;letter-spacing:.14em}
header h1{font-size:19px;font-weight:300;letter-spacing:.01em;margin:2px 0 0;color:var(--ink)}
header h1 b{font-weight:600;color:var(--accent-strong)}
header .spacer{flex:1}
.iconbtn{
  background:var(--surface);border:1px solid var(--line);color:var(--ink-mid);
  width:34px;height:34px;border-radius:var(--radius);cursor:pointer;
  font-family:var(--mono);font-size:12px;display:flex;align-items:center;justify-content:center;
}
.iconbtn:hover{border-color:var(--accent);color:var(--accent-strong)}
.iconbtn.on{border-color:var(--accent);color:var(--accent-strong);background:var(--accent-soft)}

.theme-toggle{display:flex;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;height:34px}
.theme-toggle button{background:var(--surface);border:none;color:var(--ink-low);font-family:var(--mono);
  font-size:10px;letter-spacing:.06em;padding:0 11px;cursor:pointer}
.theme-toggle button+button{border-left:1px solid var(--line)}
.theme-toggle button:hover{color:var(--ink-mid)}
.theme-toggle button.on{background:var(--accent-soft);color:var(--accent-strong);font-weight:600}

main{flex:1;padding:24px 20px 40px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h2{font-size:11px;font-weight:600;color:var(--ink-low);text-transform:uppercase;letter-spacing:.1em;margin:0 0 16px;font-family:var(--mono)}

/* ---- stats ---- */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.stat{background:var(--surface);padding:14px 10px;text-align:center}
.stat .n{font-family:var(--mono);font-size:22px;font-weight:600;letter-spacing:-.01em}
.stat .l{font-size:10px;color:var(--ink-low);margin-top:4px;letter-spacing:.04em}
.stat .n.ok{color:var(--ok)} .stat .n.ng{color:var(--ng)} .stat .n.accent{color:var(--accent-strong)}
.substat{font-family:var(--mono);font-size:11px;color:var(--ink-low);margin-top:12px}

/* ---- mode rows ---- */
.modebtn{
  width:100%;text-align:left;border:1px solid var(--line);border-radius:var(--radius);
  background:var(--surface);color:var(--ink);padding:16px 18px;cursor:pointer;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;transition:border-color .12s;
}
.modebtn:hover:not(:disabled){border-color:var(--accent)}
.modebtn:disabled{opacity:.4;cursor:default}
.modebtn .mark{font-family:var(--mono);font-size:11px;color:var(--ink-low);border:1px solid var(--line-strong);border-radius:var(--radius);width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex:none}
.modebtn .grow{flex:1}
.modebtn .ttl{font-size:14px;font-weight:500}
.modebtn .sub{font-family:var(--mono);font-size:11px;color:var(--ink-low);margin-top:3px}
.modebtn .cnt{font-family:var(--mono);font-size:12px;color:var(--accent-strong);border:1px solid var(--accent-soft);background:var(--accent-soft);padding:3px 9px;border-radius:var(--radius)}

/* ---- filters ---- */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  border:1px solid var(--line);background:var(--surface);color:var(--ink-mid);
  padding:6px 11px;border-radius:var(--radius);font-size:12px;cursor:pointer;user-select:none;font-family:var(--mono);
}
.chip.on{border-color:var(--accent);color:var(--accent-strong);background:var(--accent-soft)}
.clearlink{font-size:11px;color:var(--accent-strong);margin-top:10px;display:inline-block;cursor:pointer;font-family:var(--mono)}

/* ---- quiz ---- */
.qmeta{display:flex;gap:8px;align-items:center;font-family:var(--mono);font-size:11px;color:var(--ink-low);margin-bottom:14px}
.badge{border:1px solid var(--line);padding:2px 8px;border-radius:var(--radius)}
.qmeta .spacer{flex:1}
.progress{height:2px;background:var(--line);margin-bottom:20px}
.progress > i{display:block;height:100%;background:var(--accent);width:0%}

.stem-intro{font-size:15px;font-weight:400;margin-bottom:14px;white-space:pre-wrap;color:var(--ink)}
.stem-items{border:1px solid var(--line);border-radius:var(--radius);margin-bottom:18px;overflow:hidden}
.stem-item{display:flex;gap:12px;padding:12px 14px;background:var(--surface-subtle)}
.stem-item + .stem-item{border-top:1px solid var(--line)}
.stem-item .lbl{flex:none;width:22px;height:22px;border:1px solid var(--line-strong);border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:var(--ink-mid);background:var(--surface)}
.stem-item .tx{font-size:14px;white-space:pre-wrap;padding-top:1px}
.qtext{font-size:15px;font-weight:400;margin-bottom:18px;white-space:pre-wrap;color:var(--ink)}

.choice{
  display:flex;gap:14px;align-items:flex-start;width:100%;text-align:left;
  border:1px solid var(--line);border-left:3px solid var(--line);background:var(--surface);color:var(--ink);
  padding:13px 14px;margin-bottom:8px;cursor:pointer;font-size:14px;border-radius:0 var(--radius) var(--radius) 0;
}
.choice:hover:not(.locked){border-color:var(--accent);border-left-color:var(--accent)}
.choice .k{flex:none;width:20px;height:20px;border:1px solid var(--line-strong);border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:var(--ink-mid)}
.choice.locked{cursor:default}
.choice.correct{border-left-color:var(--ok);background:var(--ok-soft)}
.choice.correct .k{border-color:var(--ok);color:var(--ok)}
.choice.wrong{border-left-color:var(--ng);background:var(--ng-soft)}
.choice.wrong .k{border-color:var(--ng);color:var(--ng)}

.explain{border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin:14px 0;background:var(--surface-subtle);font-size:13px;white-space:pre-wrap;color:var(--ink-mid)}
.explain .verdict{font-family:var(--mono);font-weight:600;font-size:13px;margin-bottom:8px;letter-spacing:.02em}
.explain .verdict.ok{color:var(--ok)} .explain .verdict.ng{color:var(--ng)}

.primary{
  width:100%;border:1px solid var(--accent-strong);border-radius:var(--radius);padding:13px;
  font-size:14px;font-weight:500;background:var(--accent-strong);color:var(--accent-ink);cursor:pointer;margin-top:6px;font-family:var(--sans);
}
.primary:hover{background:var(--accent)}
.ghost{
  width:100%;border:1px solid var(--line);border-radius:var(--radius);padding:12px;font-size:13px;
  background:var(--surface);color:var(--ink-mid);cursor:pointer;margin-top:8px;font-family:var(--sans);
}
.ghost:hover{border-color:var(--ink-low);color:var(--ink)}

.muted{color:var(--ink-low)}
.center{text-align:center}
.big{font-family:var(--mono);font-size:36px;font-weight:600}

/* ---- modal ---- */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
.modal-bg.on{display:flex}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;width:100%;max-width:560px;max-height:88dvh;overflow:auto}
.modal h2{font-size:15px;font-weight:600;margin:0 0 4px;color:var(--ink)}
textarea{
  width:100%;min-height:180px;background:var(--surface-subtle);color:var(--ink);border:1px solid var(--line);
  border-radius:var(--radius);padding:12px;font-family:var(--mono);font-size:12px;resize:vertical;
}
.row{display:flex;gap:10px}
.row > *{flex:1;margin:0}
.hint{font-family:var(--mono);font-size:11px;color:var(--ink-low);margin:8px 0 14px;line-height:1.6}
a{color:var(--accent-strong)}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:var(--bg);
  padding:11px 18px;border-radius:var(--radius);opacity:0;transition:opacity .2s,transform .2s;z-index:60;font-size:13px}
.toast.on{opacity:1;transform:translateX(-50%) translateY(-4px)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="eyebrow">TAKKEN · 個人用</div>
      <h1><b>宅建</b> 過去問</h1>
    </div>
    <div class="spacer"></div>
    <div class="theme-toggle" id="themeToggle">
      <button data-t="light">LIGHT</button><button data-t="dark">DARK</button>
    </div>
    <button class="iconbtn" id="btnData" title="問題データ">DATA</button>
    <button class="iconbtn" id="btnReset" title="設定">CFG</button>
  </header>
  <main id="view"></main>
</div>

<div class="modal-bg" id="modal">
  <div class="modal" id="modalBody"></div>
</div>
<div class="toast" id="toast"></div>

お、Aに処分を許された財産はなく、Aは、営業を許されてはいないものとする。", "choices": ["AがBの同意を得ずに制限行為能力を理由として本件売買契約を取り消した場合、Bは、自己が本件売買契約の取消しに同意していないことを理由に、Aの当該取消しの意思表示を取り消すことができる。", "本件売買契約締結時にAが未成年者であることにつきCが善意無過失であった場合、Bは、Aの制限行為能力を理由として、本件売買契約を取り消すことはできない。", "本件売買契約につき、取消しがなされないままAが成年に達した場合、本件売買契約についてBが反対していたとしても、自らが取消権を有すると知ったAは、本件売買契約を追認することができ、追認後は本件売買契約を取り消すことはできなくなる。", "本件売買契約につき、Bが追認しないまま、Aが成年に達する前にBの同意を得ずに甲建物をDに売却した場合、BがDへの売却について追認していないときでも、Aは制限行為能力を理由として、本件売買契約を取り消すことはできなくなる。"], "answer": 2, "explain": ""}, {"id": "R5-09", "year": 2023, "field": "権利関係", "q": "Aを貸主、Bを借主として甲建物の賃貸借契約が令和５年７月１日に締結された場合の甲建物の修繕に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["甲建物の修繕が必要であることを、Aが知ったにもかかわらず、Aが相当の期間内に必要な修繕をしないときは、Bは甲建物の修繕をすることができる。", "甲建物の修繕が必要である場合において、BがAに修繕が必要である旨を通知したにもかかわらず、Aが必要な修繕を直ちにしないときは、Bは甲建物の修繕をすることができる。", "Bの責めに帰すべき事由によって甲建物の修繕が必要となった場合は、Aは甲建物を修繕する義務を負わない。", "甲建物の修繕が必要である場合において、急迫の事情があるときは、Bは甲建物の修繕をすることができる。"], "answer": 1, "explain": ""}, {"id": "R5-10", "year": 2023, "field": "権利関係", "q": "債務者Aが所有する甲土地には、債権者Bが一番抵当権（債権額1,000万円）、債権者Cが二番抵当権（債権額1,200万円）、債権者Dが三番抵当権（債権額2,000万円）をそれぞれ有しているが、BがDの利益のため、Aの承諾を得て抵当権の順位を放棄した。甲土地の競売に基づく売却代金が2,400万円であった場合、Bの受ける配当額として、民法の規定によれば、正しいものはどれか。", "choices": ["０円", "200万円", "400万円", "800万円"], "answer": 2, "explain": ""}, {"id": "R5-11", "year": 2023, "field": "権利関係", "q": "AがBとの間で、A所有の甲土地につき建物所有目的で期間を50年とする賃貸借契約（以下この問において「本件契約」という。）を締結する場合に関する次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。", "choices": ["本件契約に、当初の10年間は地代を減額しない旨の特約を定めた場合、その期間内は、BはAに対して地代の減額請求をすることはできない。", "本件契約が甲土地上で専ら賃貸アパート事業用の建物を所有する目的である場合、契約の更新や建物の築造による存続期間の延長がない旨を定めるためには、公正証書で合意しなければならない。", "本件契約に建物買取請求権を排除する旨の特約が定められていない場合、本件契約が終了したときは、その終了事由のいかんにかかわらず、BはAに対してBが甲土地上に所有している建物を時価で買い取るべきことを請求することができる。", "本件契約がBの居住のための建物を所有する目的であり契約の更新がない旨を定めていない契約であって、期間満了する場合において甲土地上に建物があり、Bが契約の更新を請求したとしても、Aが遅滞なく異議を述べ、その異議に更新を拒絶する正当な事由があると認められる場合は、本件契約は更新されない。"], "answer": 3, "explain": ""}, {"id": "R5-12", "year": 2023, "field": "権利関係", "q": "令和５年７月１日に締結された建物の賃貸借契約（定期建物賃貸借契約及び一時使用目的の建物の賃貸借契約を除く。）に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。", "choices": ["期間を１年未満とする建物の賃貸借契約は、期間を１年とするものとみなされる。", "当事者間において、一定の期間は建物の賃料を減額しない旨の特約がある場合、現行賃料が不相当になったなどの事情が生じたとしても、この特約は有効である。", "賃借人が建物の引渡しを受けている場合において、当該建物の賃貸人が当該建物を譲渡するに当たり、当該建物の譲渡人及び譲受人が、賃貸人たる地位を譲渡人に留保する旨及び当該建物の譲受人が譲渡人に賃貸する旨の合意をしたときは、賃貸人たる地位は譲受人に移転しない。", "現行賃料が定められた時から一定の期間が経過していなければ、賃料増額請求は、認められない。"], "answer": 2, "explain": ""}, {"id": "R5-13", "year": 2023, "field": "権利関係", "q": "建物の区分所有等に関する法律（以下この問において「法」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["集会においては、法で集会の決議につき特別の定数が定められている事項を除き、規約で別段の定めをすれば、あらかじめ通知した事項以外についても決議することができる。", "集会は、区分所有者の４分の３以上の同意があるときは、招集の手続を経ないで開くことができる。", "共用部分の保存行為は、規約に別段の定めがある場合を除いて、各共有者がすることができるため集会の決議を必要としない。", "一部共用部分に関する事項で区分所有者全員の利害に関係しないものについての区分所有者全員の規約は、当該一部共用部分を共用すべき区分所有者が８人である場合、３人が反対したときは変更することができない。"], "answer": 1, "explain": ""}, {"id": "R5-14", "year": 2023, "field": "権利関係", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。", "choices": ["建物が滅失したときは、表題部所有者又は所有権の登記名義人は、その滅失の日から１か月以内に、当該建物の滅失の登記を申請しなければならない。", "何人も、理由の有無にかかわらず、登記官に対し、手数料を納付して、登記簿の附属書類である申請書を閲覧することができる。", "共有物分割禁止の定めに係る権利の変更の登記の申請は、当該権利の共有者である全ての登記名義人が共同してしなければならない。", "区分建物の所有権の保存の登記は、表題部所有者から所有権を取得した者も、申請することができる。"], "answer": 1, "explain": ""}, {"id": "R5-15", "year": 2023, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。", "choices": ["市街化調整区域は、土地利用を整序し、又は環境を保全するための措置を講ずることなく放置すれば、将来における一体の都市としての整備に支障が生じるおそれがある区域とされている。", "高度利用地区は、土地の合理的かつ健全な高度利用と都市機能の更新とを図るため、都市計画に、建築物の高さの最低限度を定める地区とされている。", "特定用途制限地域は、用途地域が定められている土地の区域内において、都市計画に、制限すべき特定の建築物等の用途の概要を定める地域とされている。", "地区計画は、用途地域が定められている土地の区域のほか、一定の場合には、用途地域が定められていない土地の区域にも定めることができる。"], "answer": 3, "explain": ""}, {"id": "R5-16", "year": 2023, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。ただし、この問において条例による特別の定めはないものとし、「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["開発許可を申請しようとする者は、あらかじめ、開発行為に関係がある公共施設の管理者と協議し、その同意を得なければならない。", "開発許可を受けた者は、当該許可を受ける際に申請書に記載した事項を変更しようとする場合においては、都道府県知事に届け出なければならないが、当該変更が国土交通省令で定める軽微な変更に当たるときは、届け出なくてよい。", "開発許可を受けた者は、当該開発行為に関する工事が完了し、都道府県知事から検査済証を交付されたときは、遅滞なく、当該工事が完了した旨を公告しなければならない。", "市街化調整区域のうち開発許可を受けた開発区域以外の区域内において、自己の居住用の住宅を新築しようとする全ての者は、当該建築が開発行為を伴わない場合であれば、都道府県知事の許可を受けなくてよい。"], "answer": 0, "explain": ""}, {"id": "R5-17", "year": 2023, "field": "法令上の制限", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。", "choices": ["地方公共団体は、条例で、津波、高潮、出水等による危険の著しい区域を災害危険区域として指定し、当該区域内における住居の用に供する建築物の建築を禁止することができる。", "３階建て以上の建築物の避難階以外の階を、床面積の合計が1,500㎡を超える物品販売業の店舗の売場とする場合には、当該階から避難階又は地上に通ずる２以上の直通階段を設けなければならない。", "建築物が防火地域及び準防火地域にわたる場合、その全部について準防火地域内の建築物に関する規定を適用する。", "石綿等をあらかじめ添加した建築材料は、石綿等を飛散又は発散させるおそれがないものとして国土交通大臣が定めたもの又は国土交通大臣の認定を受けたものを除き、使用してはならない。"], "answer": 2, "explain": ""}, {"id": "R5-18", "year": 2023, "field": "法令上の制限", "q": "次の記述のうち、建築基準法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["法第53条第１項及び第２項の建蔽率制限に係る規定の適用については、準防火地域内にある準耐火建築物であり、かつ、街区の角にある敷地又はこれに準ずる敷地で特定行政庁が指定するものの内にある建築物にあっては同条第１項各号に定める数値に10分の２を加えたものをもって当該各号に定める数値とする。", "建築物又は敷地を造成するための擁壁は、道路内に、又は道路に突き出して建築し、又は築造してはならず、地盤面下に設ける建築物においても同様である。", "地方公共団体は、その敷地が袋路状道路にのみ接する建築物であって、延べ面積が150㎡を超えるものについては、一戸建ての住宅であっても、条例で、その敷地が接しなければならない道路の幅員、その敷地が道路に接する部分の長さその他その敷地又は建築物と道路との関係に関して必要な制限を付加することができる。", "冬至日において、法第56条の２第１項の規定による日影規制の対象区域内の土地に日影を生じさせるものであっても、対象区域外にある建築物であれば一律に、同項の規定は適用されない。"], "answer": 0, "explain": ""}, {"id": "R5-19", "year": 2023, "field": "法令上の制限", "q": "宅地造成等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["都道府県知事は、関係市町村長の意見を聴いて、宅地造成工事規制区域内で、宅地造成に伴う災害で相当数の居住者その他の者に危害を生ずるものの発生のおそれが大きい一団の造成宅地の区域であって、一定の基準に該当するものを、造成宅地防災区域として指定することができる。", "都道府県知事は、その地方の気候、風土又は地勢の特殊性により、宅地造成等規制法の規定のみによっては宅地造成に伴うがけ崩れ又は土砂の流出の防止の目的を達し難いと認める場合は、都道府県（地方自治法に基づく指定都市、中核市又は施行時特例市の区域にあっては、それぞれ指定都市、中核市又は施行時特例市）の規則で、宅地造成工事規制区域内において行われる宅地造成に関する工事の技術的基準を強化し、又は付加することができる。", "都道府県知事は、宅地造成工事規制区域内の宅地について、宅地造成に伴う災害を防止するために必要があると認める場合には、その宅地の所有者に対して、擁壁等の設置等の措置をとることを勧告することができる。", "宅地造成工事規制区域内の宅地において、雨水その他の地表水又は地下水を排除するための排水施設の除却工事を行おうとする場合は、一定の場合を除き、都道府県知事への届出が必要となる。"], "answer": 0, "explain": ""}, {"id": "R5-20", "year": 2023, "field": "法令上の制限", "q": "土地区画整理法に関する次の記述のうち、誤っているものはどれか。", "choices": ["換地計画において定められた清算金は、換地処分の公告があった日の翌日において確定する。", "現に施行されている土地区画整理事業の施行地区となっている区域については、その施行者の同意を得なければ、その施行者以外の者は、土地区画整理事業を施行することができない。", "施行者は、換地処分の公告があった場合において、施行地区内の土地及び建物について土地区画整理事業の施行により変動があったときは、遅滞なく、その変動に係る登記を申請し、又は嘱託しなければならない。", "土地区画整理組合は、仮換地を指定しようとする場合においては、あらかじめ、その指定について、土地区画整理審議会の同意を得なければならない。"], "answer": 3, "explain": ""}, {"id": "R5-21", "year": 2023, "field": "法令上の制限", "q": "農地に関する次の記述のうち、農地法（以下この問において「法」という。）の規定によれば、誤っているものはどれか。", "choices": ["相続により農地を取得する場合は、法第３条第１項の許可を要しないが、相続人に該当しない者が特定遺贈により農地を取得する場合は、同項の許可を受ける必要がある。", "自己の所有する面積４アールの農地を農作物の育成又は養畜の事業のための農業用施設に転用する場合は、法第４条第１項の許可を受ける必要はない。", "法第３条第１項又は法第５条第１項の許可が必要な農地の売買について、これらの許可を受けずに売買契約を締結しても、その所有権の移転の効力は生じない。", "社会福祉事業を行うことを目的として設立された法人（社会福祉法人）が、農地をその目的に係る業務の運営に必要な施設の用に供すると認められる場合、農地所有適格法人でなくても、農業委員会の許可を得て、農地の所有権を取得することができる。"], "answer": 1, "explain": ""}, {"id": "R5-22", "year": 2023, "field": "法令上の制限", "q": "土地を取得する場合における届出に関する次の記述のうち、正しいものはどれか。なお、この問において「事後届出」とは、国土利用計画法第23条の届出をいい、「重要土地等調査法」とは、重要施設周辺及び国境離島等における土地等の利用状況の調査及び利用の規制等に関する法律をいうものとする。", "choices": ["都市計画区域外において、国から一団の土地である6,000㎡と5,000㎡の土地を購入した者は、事後届出を行う必要はない。", "市街化区域を除く都市計画区域内において、Aが所有する7,000㎡の土地をBが相続により取得した場合、Bは事後届出を行う必要がある。", "市街化区域において、Cが所有する3,000㎡の土地をDが購入する契約を締結した場合、C及びDは事後届出を行わなければならない。", "重要土地等調査法の規定による特別注視区域内にある100㎡の規模の土地に関する所有権又はその取得を目的とする権利の移転をする契約を締結する場合には、当事者は、一定の事項を、あらかじめ、内閣総理大臣に届け出なければならない。"], "answer": 0, "explain": ""}, {"id": "R5-23", "year": 2023, "field": "税・その他", "q": "印紙税に関する次の記述のうち、正しいものはどれか。なお、以下の契約書はいずれも書面により作成されたものとする。", "choices": ["売主Aと買主Bが土地の譲渡契約書を３通作成し、A、B及び仲介人Cがそれぞれ１通ずつ保存する場合、当該契約書３通には印紙税が課される。", "一の契約書に土地の譲渡契約（譲渡金額5,000万円）と建物の建築請負契約（請負金額6,000万円）をそれぞれ区分して記載した場合、印紙税の課税標準となる当該契約書の記載金額は１億1,000万円である。", "「Dの所有する甲土地（時価2,000万円）をEに贈与する」旨を記載した贈与契約書を作成した場合、印紙税の課税標準となる当該契約書の記載金額は、2,000万円である。", "当初作成の「土地を１億円で譲渡する」旨を記載した土地譲渡契約書の契約金額を変更するために作成する契約書で、「当初の契約書の契約金額を1,000万円減額し、9,000万円とする」旨を記載した変更契約書について、印紙税の課税標準となる当該変更契約書の記載金額は、1,000万円である。"], "answer": 0, "explain": ""}, {"id": "R5-24", "year": 2023, "field": "税・その他", "q": "不動産取得税に関する次の記述のうち、正しいものはどれか。", "choices": ["不動産取得税の徴収については、特別徴収の方法によることができる。", "不動産取得税は、目的税である。", "不動産取得税は、不動産の取得に対し、当該不動産所在の市町村及び特別区において、当該不動産の取得者に課する。", "不動産取得税は、市町村及び特別区に対して、課することができない。"], "answer": 3, "explain": ""}, {"id": "R5-25", "year": 2023, "field": "税・その他", "q": "不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、正しいものはどれか。", "choices": ["原価法は、価格時点における対象不動産の収益価格を求め、この収益価格について減価修正を行って対象不動産の比準価格を求める手法である。", "原価法は、対象不動産が建物又は建物及びその敷地である場合には適用することができるが、対象不動産が土地のみである場合においては、いかなる場合も適用することができない。", "取引事例比較法における取引事例が、特殊事情のある事例である場合、その具体的な状況が判明し、事情補正できるものであっても採用することは許されない。", "取引事例比較法は、近隣地域若しくは同一需給圏内の類似地域等において対象不動産と類似の不動産の取引が行われている場合又は同一需給圏内の代替競争不動産の取引が行われている場合に有効である。"], "answer": 3, "explain": ""}, {"id": "R5-26", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業法第37条の規定により交付すべき書面に記載すべき事項を電磁的方法により提供すること（以下この問において「37条書面の電磁的方法による提供」という。）に関する次の記述のうち、正しいものはいくつあるか。\nア　宅地建物取引業者が自ら売主として締結する売買契約において、当該契約の相手方から宅地建物取引業法施行令第３条の４第１項に規定する承諾を得なければ、37条書面の電磁的方法による提供をすることができない。\nイ　宅地建物取引業者が媒介業者として関与する売買契約について、宅地建物取引業法施行令第３条の４第１項に規定する承諾を取得するための通知の中に宅地建物取引士を明示しておけば、37条書面の電磁的方法による提供において提供に係る宅地建物取引士を明示する必要はない。\nウ　宅地建物取引業者が自ら売主として締結する売買契約において、37条書面の電磁的方法による提供を行う場合、当該提供されたファイルへの記録を取引の相手方が出力することにより書面を作成できるものでなければならない。\nエ　宅地建物取引業者が媒介業者として関与する建物賃貸借契約について、37条書面の電磁的方法による提供を行う場合、当該提供するファイルに記録された記載事項について、改変が行われていないかどうかを確認することができる措置を講じなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R5-27", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業法第34条の２第１項第４号に規定する建物状況調査（以下この問において「建物状況調査」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["建物状況調査とは、建物の構造耐力上主要な部分又は雨水の浸入を防止する部分として国土交通省令で定めるものの状況の調査であって、経年変化その他の建物に生じる事象に関する知識及び能力を有する者として国土交通省令で定める者が実施するものをいう。", "宅地建物取引業者が建物状況調査を実施する者のあっせんを行う場合、建物状況調査を実施する者は建築士法第２条第１項に規定する建築士であって国土交通大臣が定める講習を修了した者でなければならない。", "既存住宅の売買の媒介を行う宅地建物取引業者が売主に対して建物状況調査を実施する者のあっせんを行った場合、宅地建物取引業者は売主から報酬とは別にあっせんに係る料金を受領することはできない。", "既存住宅の貸借の媒介を行う宅地建物取引業者は、宅地建物取引業法第37条の規定により交付すべき書面に建物の構造耐力上主要な部分等の状況について当事者の双方が確認した事項を記載しなければならない。"], "answer": 3, "explain": ""}, {"id": "R5-28", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業者Aの業務に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定に違反するものはいくつあるか。\nア　Aの従業員Bが、Cが所有する戸建住宅の買取りを目的とした訪問勧誘をCに対して行ったところ、Cから「契約の意思がないので今後勧誘に来ないでほしい」と言われたことから、後日、Aは、別の従業員Dに同じ目的で訪問勧誘を行わせて、当該勧誘を継続した。\nイ　Aの従業員Eは、Fが所有する戸建住宅の買取りを目的とした電話勧誘をFに対して行った際に、不実のことと認識しながら「今後５年以内にこの一帯は再開発されるので、急いで売却した方がよい。」と説明した。\nウ　Aの従業員Gは、Hが所有する戸建住宅の買取りを目的とした電話勧誘をHに対して行おうと考え、23時頃にHの自宅に電話をかけ、勧誘を行い、Hの私生活の平穏を害し、Hを困惑させた。\nエ　Aは、Jとの間でJが所有する戸建住宅を買い取る売買契約を締結し、法第37条の規定に基づく書面をJに交付したが、Aの宅地建物取引士に、当該書面に記名のみさせ、押印させることを省略した。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R5-29", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者A社の使用人であって、A社の宅地建物取引業を行う支店の代表者であるものが、道路交通法の規定に違反したことにより懲役の刑に処せられたとしても、A社の免許は取り消されることはない。", "宅地建物取引業者B社の取締役が、所得税法の規定に違反したことにより罰金の刑に処せられたとしても、B社の免許は取り消されることはない。", "宅地建物取引業者である個人Cが、宅地建物取引業法の規定に違反したことにより罰金の刑に処せられたとしても、Cの免許は取り消されることはない。", "宅地建物取引業者D社の非常勤の取締役が、刑法第222条（脅迫）の罪を犯したことにより罰金の刑に処せられたとしても、D社の免許は取り消されることはない。"], "answer": 1, "explain": ""}, {"id": "R5-30", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業者A（甲県知事免許）の営業保証金に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、Aは宅地建物取引業保証協会の社員ではないものとする。\nア　Aが免許を受けた日から６か月以内に甲県知事に営業保証金を供託した旨の届出を行わないとき、甲県知事はその届出をすべき旨の催告をしなければならず、当該催告が到達した日から１か月以内にAが届出を行わないときは、その免許を取り消すことができる。\nイ　Aは、営業保証金を供託したときは、その供託物受入れの記載のある供託書の写しを添付して、その旨を甲県知事に届け出なければならず、当該届出をした後でなければ、その事業を開始することができない。\nウ　Aは、営業保証金が還付され、甲県知事から営業保証金が政令で定める額に不足が生じた旨の通知を受け、その不足額を供託したときは、30日以内に甲県知事にその旨を届け出なければならない。\nエ　Aが免許失効に伴い営業保証金を取り戻す際、供託した営業保証金につき還付を受ける権利を有する者に対し、３か月を下らない一定期間内に申し出るべき旨を公告し、期間内にその申出がなかった場合でなければ、取り戻すことができない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 0, "explain": ""}, {"id": "R5-31", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。なお、この問において「建築確認」とは、建築基準法第６条第１項の確認をいうものとする。", "choices": ["宅地又は建物の売買に関する注文を受けたときは、遅滞なくその注文をした者に対して取引態様の別を明らかにしなければならないが、当該注文者が事前に取引態様の別を明示した広告を見てから注文してきた場合においては、取引態様の別を遅滞なく明らかにする必要はない。", "既存の住宅に関する広告を行うときは、法第34条の２第１項第４号に規定する建物状況調査を実施しているかどうかを明示しなければならない。", "これから建築工事を行う予定である建築確認申請中の建物については、当該建物の売買の媒介に関する広告をしてはならないが、貸借の媒介に関する広告はすることができる。", "販売する宅地又は建物の広告に関し、著しく事実に相違する表示をした場合、監督処分の対象となるだけでなく、懲役若しくは罰金に処せられ、又はこれを併科されることもある。"], "answer": 3, "explain": ""}, {"id": "R5-32", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業者が行う届出に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["宅地建物取引業者A（甲県知事免許）が、新たに宅地建物取引業を営む支店を甲県内に設置した場合、Aはその日から30日以内にその旨を甲県知事に届け出なければならない。", "宅地建物取引業者B（乙県知事免許）が、宅地建物取引業者ではないCとの合併により消滅した場合、Bを代表する役員であった者は、その日から30日以内にその旨を乙県知事に届け出なければならない。", "宅地建物取引業者D（丙県知事免許）が、本店における専任の宅地建物取引士Eの退職に伴い、新たに専任の宅地建物取引士Fを本店に置いた場合、Dはその日から30日以内にその旨を丙県知事に届け出なければならない。", "宅地建物取引業者G（丁県知事免許）が、その業務に関し展示会を丁県内で実施する場合、展示会を実施する場所において売買契約の締結（予約を含む。）又は売買契約の申込みの受付を行うときは、Gは展示会での業務を開始する日の５日前までに展示会を実施する場所について丁県知事に届け出なければならない。"], "answer": 3, "explain": ""}, {"id": "R5-33", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。", "choices": ["甲宅地を所有する宅地建物取引業者Aが、乙宅地を所有する宅地建物取引業者ではない個人Bと、甲宅地と乙宅地の交換契約を締結するに当たって、Bに対して、甲宅地に関する重要事項の説明を行う義務はあるが、乙宅地に関する重要事項の説明を行う義務はない。", "宅地の売買における当該宅地の引渡しの時期について、重要事項説明において説明しなければならない。", "宅地建物取引業者が売主となる宅地の売買に関し、売主が買主から受領しようとする金銭のうち、買主への所有権移転の登記以後に受領するものに対して、宅地建物取引業法施行規則第16条の４に定める保全措置を講ずるかどうかについて、重要事項説明書に記載する必要がある。", "重要事項説明書の電磁的方法による提供については、重要事項説明を受ける者から電磁的方法でよいと口頭で依頼があった場合、改めて電磁的方法で提供することについて承諾を得る必要はない。"], "answer": 0, "explain": ""}, {"id": "R5-34", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業者A（消費税課税事業者）は貸主Bから建物の貸借の媒介の依頼を受け、宅地建物取引業者C（消費税課税事業者）は借主Dから建物の貸借の媒介の依頼を受け、BとDとの間で、１か月分の借賃を12万円（消費税等相当額を含まない。）とする賃貸借契約（以下この問において「本件契約」という。）を成立させた場合における次の記述のうち、宅地建物取引業法の規定に違反するものはいくつあるか。\nア　本件契約が建物を住居として貸借する契約である場合に、Cは、媒介の依頼を受けるに当たってDから承諾を得ないまま、132,000円の報酬を受領した。\nイ　AはBから事前に特別な広告の依頼があったので、依頼に基づく大手新聞掲載広告料金に相当する額をBに請求し、受領した。\nウ　CはDに対し、賃貸借契約書の作成費を、Dから限度額まで受領した媒介報酬の他に請求して受領した。\nエ　本件契約が建物を事務所として貸借する契約である場合に、報酬として、AはBから132,000円を、CはDから132,000円をそれぞれ受領した。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R5-35", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではない買主Bから宅地の買受けの申込みを受けた場合における宅地建物取引業法第37条の２の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、正しいものはどれか。", "choices": ["Aは、仮設テント張りの案内所でBから買受けの申込みを受けた際、以後の取引について、その取引に係る書類に関してBから電磁的方法で提供をすることについての承諾を得た場合、クーリング・オフについて電磁的方法で告げることができる。", "Aが、仮設テント張りの案内所でBから買受けの申込みを受けた場合、Bは、クーリング・オフについて告げられた日から８日以内に電磁的方法により当該申込みの撤回を申し出れば、申込みの撤回を行うことができる。", "Aが、Aの事務所でBから買受けの申込みを受けた場合、Bは、申込みの日から８日以内に電磁的方法により当該申込みの撤回を申し出れば、申込みの撤回を行うことができる。", "Aが、売却の媒介を依頼している宅地建物取引業者Cの事務所でBから買受けの申込みを受けた場合、Bは、申込みの日から８日以内に書面により当該申込みの撤回を申し出ても、申込みの撤回を行うことができない。"], "answer": 3, "explain": ""}, {"id": "R5-36", "year": 2023, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業者Aが行う業務に関して宅地建物取引業法の規定に違反するものはいくつあるか。\nア　建物の貸借の媒介に際して、賃借の申込みをした者がその撤回を申し出たので、Aはかかった諸費用を差し引いて預り金を返還した。\nイ　Aは、売主としてマンションの売買契約を締結するに際して、買主が手付として必要な額を今すぐには用意できないと申し出たので、手付金の分割払いを買主に提案した。\nウ　Aは取引のあったつど、その年月日やその取引に係る宅地又は建物の所在及び面積その他必要な記載事項を帳簿に漏らさず記載し、必要に応じて紙面にその内容を表示できる状態で、電子媒体により帳簿の保存を行っている。\nエ　Aはアンケート調査を装ってその目的がマンションの売買の勧誘であることを告げずに個人宅を訪問し、マンションの売買の勧誘をした。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R5-37", "year": 2023, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者は、非常勤役員には従業者であることを証する証明書を携帯させる必要はない。", "宅地建物取引業者は、その事務所ごとに従業者名簿を備えなければならないが、取引の関係者から閲覧の請求があった場合であっても、宅地建物取引業法第45条に規定する秘密を守る義務を理由に、閲覧を拒むことができる。", "宅地建物取引業者の従業者は、宅地の買受けの申込みをした者から請求があった場合には、その者が宅地建物取引業者であっても、その者に従業者であることを証する証明書を提示する必要がある。", "宅地建物取引業者は、従業者名簿を最終の記載をした日から5年間保存しなければならない。"], "answer": 2, "explain": ""}, {"id": "R5-38", "year": 2023, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア　宅地建物取引業者Aが、自ら所有する複数の建物について、複数人に対し、反復継続して賃貸する行為は、宅地建物取引業に該当しない。\nイ　宅地建物取引士とは、宅地建物取引士資格試験に合格し、都道府県知事の登録を受けた者をいう。\nウ　建設業者Bが、建築請負工事の受注を目的として、業として宅地の売買の媒介を行う行為は、宅地建物取引業に該当しない。\nエ　宅地建物取引士は、宅地又は建物の取引に係る事務に必要な知識及び能力の維持向上に努めなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "explain": ""}, {"id": "R5-39", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではない個人Bとの間で宅地の売買契約を締結する場合における手付金の保全措置に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、当該契約に係る手付金は保全措置が必要なものとする。", "choices": ["Aは、Bから手付金を受領した後に、速やかに手付金の保全措置を講じなければならない。", "Aは、手付金の保全措置を保証保険契約を締結することにより講ずる場合、保険期間は保証保険契約が成立した時から宅地建物取引業者が受領した手付金に係る宅地の引渡しまでの期間とすればよい。", "Aは、手付金の保全措置を保証保険契約を締結することにより講ずる場合、保険事業者との間において保証保険契約を締結すればよく、保険証券をBに交付する必要はない。", "Aは、手付金の保全措置を保証委託契約を締結することにより講ずるときは、保証委託契約に基づいて銀行等が手付金の返還債務を連帯して保証することを約する書面のBへの交付に代えて、Bの承諾を得ることなく電磁的方法により講ずることができる。"], "answer": 1, "explain": ""}, {"id": "R5-40", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業者Aが、BからB所有の中古住宅の売却の依頼を受け、専任媒介契約（専属専任媒介契約ではないものとする。）を締結した場合に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["Aは、当該中古住宅について購入の申込みがあったときは、遅滞なく、その旨をBに報告しなければならないが、Bの希望条件を満たさない申込みだとAが判断した場合については報告する必要はない。", "Aは、法第34条の2第1項の規定に基づく書面の交付後、速やかに、Bに対し、法第34条の2第1項第4号に規定する建物状況調査を実施する者のあっせんの有無について確認しなければならない。", "Aは、当該中古住宅について法で規定されている事項を、契約締結の日から休業日数を含め7日以内に指定流通機構へ登録する義務がある。", "Aは、Bが他の宅地建物取引業者の媒介又は代理によって売買の契約を成立させたときの措置を法第34条の2第1項の規定に基づく書面に記載しなければならない。"], "answer": 3, "explain": ""}, {"id": "R5-41", "year": 2023, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["甲県知事は、宅地建物取引士に対して必要な報告を求めることができるが、その対象は、甲県知事登録の宅地建物取引士であって、適正な事務の遂行を確保するために必要な場合に限られる。", "宅地建物取引業者A（甲県知事免許）で専任の宅地建物取引士として従事しているB（甲県知事登録）が、勤務実態のない宅地建物取引業者C（乙県知事免許）において、自らが専任の宅地建物取引士である旨の表示がされていることを許した場合には、乙県知事は、Bに対し、必要な指示をすることができる。", "宅地建物取引士が不正の手段により宅地建物取引士証の交付を受けた場合においては、その登録をしている都道府県知事は、情状が特に重いときは、当該宅地建物取引士の登録を消除することができる。", "都道府県知事は、宅地建物取引士に対して登録消除処分を行ったときは、適切な方法で公告しなければならない。"], "answer": 1, "explain": ""}, {"id": "R5-42", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、誤っているものはいくつあるか。\nア　宅地建物取引士は、重要事項説明をする場合、取引の相手方から請求されなければ、宅地建物取引士証を相手方に提示する必要はない。\nイ　売主及び買主が宅地建物取引業者ではない場合、当該取引の媒介業者は、売主及び買主に重要事項説明書を交付し、説明を行わなければならない。\nウ　宅地の売買について売主となる宅地建物取引業者は、買主が宅地建物取引業者である場合、重要事項説明書を交付しなければならないが、説明を省略することはできる。\nエ　宅地建物取引業者である売主は、宅地建物取引業者ではない買主に対して、重要事項として代金並びにその支払時期及び方法を説明しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R5-43", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業者Aが媒介により宅地の売買契約を成立させた場合における宅地建物取引業法第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["Aは、買主が宅地建物取引業者であるときは、37条書面に移転登記の申請時期を記載しなくてもよい。", "Aは、37条書面を売買契約成立前に、各当事者に交付しなければならない。", "Aは、37条書面を作成したときは、専任の宅地建物取引士をして37条書面に記名させる必要がある。", "Aは、天災その他不可抗力による損害の負担に関する定めがあるときは、その内容を37条書面に記載しなければならない。"], "answer": 3, "explain": ""}, {"id": "R5-44", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業保証協会（以下この問において「保証協会」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["保証協会の社員は、自らが取り扱った宅地建物取引業に係る取引の相手方から当該取引に関する苦情について解決の申出が保証協会にあり、保証協会から関係する資料の提出を求められたときは、正当な理由がある場合でなければ、これを拒んではならない。", "保証協会は、社員がその一部の事務所を廃止したことに伴って弁済業務保証金分担金を当該社員に返還しようとするときは、弁済業務保証金の還付請求権者に対し、一定期間内に認証を受けるため申し出るべき旨の公告を行わなければならない。", "保証協会は、宅地建物取引業者の相手方から、社員である宅地建物取引業者の取り扱った宅地建物取引業に係る取引に関する損害の還付請求を受けたときは、直ちに弁済業務保証金から返還しなければならない。", "保証協会は、手付金等保管事業について国土交通大臣の承認を受けた場合、社員が自ら売主となって行う宅地又は建物の売買で、宅地の造成又は建築に関する工事の完了前における買主からの手付金等の受領について、当該事業の対象とすることができる。"], "answer": 0, "explain": ""}, {"id": "R5-45", "year": 2023, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではない買主Bに新築住宅を販売する場合に関する次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。", "choices": ["Aが信託会社又は金融機関の信託業務の兼営等に関する法律第1条第1項の認可を受けた金融機関であって、宅地建物取引業を営むものである場合、住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う義務を負わない。", "Aは、住宅販売瑕疵担保保証金の供託をする場合、当該住宅の売買契約を締結するまでに、Bに対し供託所の所在地等について、必ず書面を交付して説明しなければならず、買主の承諾を得ても書面の交付に代えて電磁的方法により提供することはできない。", "Aは、住宅販売瑕疵担保保証金の供託をする場合、当該住宅の最寄りの供託所へ住宅販売瑕疵担保保証金の供託をしなければならない。", "AB間の売買契約において、当該住宅の構造耐力上主要な部分に瑕疵があってもAが瑕疵担保責任を負わない旨の特約があった場合においても、Aは住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う義務を負う。"], "answer": 3, "explain": ""}, {"id": "R5-46", "year": 2023, "field": "免除科目", "q": "独立行政法人住宅金融支援機構（以下この問において「機構」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、子どもを育成する家庭又は高齢者の家庭（単身の世帯を含む。）に適した良好な居住性能及び居住環境を有する賃貸住宅の建設に必要な資金の貸付けを業務として行っている。", "機構は、証券化支援事業（買取型）において、新築住宅に対する貸付債権のみを買取りの対象としている。", "機構は、証券化支援事業（買取型）において、ＺＥＨ（ネット・ゼロ・エネルギーハウス）及び省エネルギー性、耐震性、バリアフリー性、耐久性・可変性に優れた住宅を取得する場合に、貸付金の利率を一定期間引き下げる制度を実施している。", "機構は、マンション管理組合や区分所有者に対するマンション共用部分の改良に必要な資金の貸付けを業務として行っている。"], "answer": 1, "explain": ""}, {"id": "R5-47", "year": 2023, "field": "免除科目", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法（不動産の表示に関する公正競争規約を含む。）の規定によれば、正しいものはどれか。", "choices": ["実際には取引する意思がない物件であっても実在するものであれば、当該物件を広告に掲載しても不当表示に問われることはない。", "直線距離で50ｍ以内に街道が存在する場合、物件名に当該街道の名称を用いることができる。", "物件の近隣に所在するスーパーマーケットを表示する場合は、物件からの自転車による所要時間を明示しておくことで、徒歩による所要時間を明示する必要がなくなる。", "一棟リノベーションマンションについては、一般消費者に対し、初めて購入の申込みの勧誘を行う場合であっても、「新発売」との表示を行うことはできない。"], "answer": 1, "explain": ""}, {"id": "R5-48", "year": 2023, "field": "免除科目", "q": "次の記述のうち、誤っているものはどれか。", "choices": ["令和3年度宅地建物取引業法の施行状況調査（令和4年9月公表）によれば、令和4年3月末における宅地建物取引業者の全事業者数は14万業者を超え、8年連続で増加した。", "令和5年地価公示（令和5年3月公表）によれば、令和4年1月以降の1年間の地価について、地方圏平均では、全用途平均、住宅地、商業地のいずれも2年連続で上昇し、工業地は6年連続で上昇した。", "建築着工統計調査報告（令和4年計。令和5年1月公表）によれば、令和4年の民間非居住建築物の着工床面積は、前年と比較すると、工場及び倉庫は増加したが、事務所及び店舗が減少したため、全体で減少となった。", "年次別法人企業統計調査（令和3年度。令和4年9月公表）によれば、令和3年度における不動産業の売上高営業利益率は11.1％と2年連続で前年度と比べ上昇し、売上高経常利益率も12.5％と2年連続で前年度と比べ上昇した。"], "answer": 0, "explain": ""}, {"id": "R5-49", "year": 2023, "field": "免除科目", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["自然堤防の後背湿地側の縁は、砂が緩く堆積していて、地下水位も浅いため、地震時に液状化被害が生じやすい地盤である。", "谷底低地に軟弱層が厚く堆積している所では、地震動が凝縮されて、震動が小さくなる。", "1923年の関東地震の際には、東京の谷底低地で多くの水道管や建物が被害を受けた。", "大都市の近郊の丘陵地では、丘を削り谷部に盛土し造成宅地が造られたが、盛土造成に際しては、地下水位を下げるため排水施設を設け、締め固める等の必要がある。"], "answer": 1, "explain": ""}, {"id": "R5-50", "year": 2023, "field": "免除科目", "q": "建物の構造と材料に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["鉄筋コンクリート構造は、地震や風の力を受けても、躯体の変形は比較的小さく、耐火性にも富んでいる。", "鉄筋コンクリート構造は、躯体の断面が大きく、材料の質量が大きいので、建物の自重が大きくなる。", "鉄筋コンクリート構造では、鉄筋とコンクリートを一体化するには、断面が円形の棒鋼である丸鋼の方が表面に突起をつけた棒鋼である異形棒鋼より、優れている。", "鉄筋コンクリート構造は、コンクリートが固まって所定の強度が得られるまでに日数がかかり、現場での施工も多いので、工事期間が長くなる。"], "answer": 2, "explain": ""}, {"id": "R6-01", "year": 2024, "field": "権利関係", "q": "法律行為に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["営業を許された未成年者が、その営業に関する意思表示をした時に意思能力を有しなかった場合は、その法律行為は無効である。", "公の秩序に反する法律行為であっても、当事者が納得して合意した場合には、その法律行為は有効である。", "詐欺による意思表示は取り消すことによって初めから無効であったとみなされるのに対し、強迫による意思表示は取り消すまでもなく無効である。", "他人が所有している土地を目的物にした売買契約は無効であるが、当該他人がその売買契約を追認した場合にはその売買契約は有効となる。"], "answer": 0, "explain": ""}, {"id": "R6-02", "year": 2024, "field": "権利関係", "q": "委任契約・準委任契約に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["売主が、売買契約の付随義務として、買主に対して、マンション専有部分内の防火戸の操作方法につき説明義務を負う場合、業務において密接な関係にある売主から委託を受け、売主と一体となって当該マンションの販売に関する一切の事務を行っていた宅地建物取引業者も、買主に対して、防火戸の操作方法について説明する信義則上の義務を負うことがある。", "受任者は、委任者の許諾を得たとき、又はやむを得ない事由があるときでなければ、復受任者を選任することができない。", "委任契約で本人が死亡しても代理権が消滅しない旨を合意して代理人に代理権を与えた場合、本人が死亡しても代理権は消滅しない。", "委任は、当事者の一方が仕事を完成することを相手方に約し、相手方がその仕事の結果に対しその報酬を支払うことを約さなければ、その効力を生じない。"], "answer": 3, "explain": ""}, {"id": "R6-03", "year": 2024, "field": "権利関係", "q": "甲土地につき、A、B、C、Dの4人がそれぞれ4分の1の共有持分を有していて、A、B、CのいずれもDの所在を知ることができない場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、Dの共有持分は、相続財産には属していないものとする。", "choices": ["甲土地に、その形状又は効用の著しい変更を伴う変更を加える場合には、共有者の過半数の同意が必要であり、本件ではA、B、C3人の同意が必要となる。", "甲土地の所有権の登記名義人となっている者が所有者ではないEである場合、持分に基づいてEに対して登記の抹消を求めるためには、所在が判明しているA、B、Cのうち2人の同意が必要である。", "A、B、C3人の同意があれば、甲土地を資材置場として賃借したいFとの間で期間を3年とする賃貸借契約を締結することができる。", "Aが裁判所に請求して、裁判所がDの持分をAに取得させる旨の決定をした場合、Dは、その決定から3年以内に限り、Aが取得したDの共有持分の時価相当額をAに対して支払うよう請求することができる。"], "answer": 2, "explain": ""}, {"id": "R6-04", "year": 2024, "field": "権利関係", "q": "Aを売主、Bを買主として甲土地の売買契約（以下この問において「本件契約」という。）が締結された直後にAが死亡し、CがAを単独相続した場合における次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["売買代金を受領したCが甲土地の引渡しを拒絶する意思を明確に表示したとしても、Bは、Cに対して相当の期間を定めた催告をしなければ、本件契約を解除することができない。", "Bが期日までに売買代金を支払わない場合であっても、本件契約の解除権はAの一身に専属した権利であるため、Cは本件契約を解除することはできない。", "Bは、売買代金が支払い済みだったとしても、甲土地の所有権登記を備えなければ、Cに対して甲土地の引渡しを請求することはできない。", "本件契約が、Aの詐欺により締結されたものである場合、BはCに対して、本件契約の取消しを主張することができる。"], "answer": 3, "explain": ""}, {"id": "R6-05", "year": 2024, "field": "権利関係", "q": "履行遅滞に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["不法行為の加害者は、不法行為に基づく損害賠償債務について、履行の請求を受けた時から遅滞の責任を負う。", "善意の受益者は、その不当利得返還債務について、履行の請求を受けた時から遅滞の責任を負う。", "請負人の報酬債権に対して、注文者がこれと同時履行の関係にある目的物の瑕疵修補に代わる損害賠償債権を自働債権とする相殺の意思表示をした場合、注文者は、請負人に対する相殺後の報酬残債務について、当該残債務の履行の請求を受けた時から遅滞の責任を負う。", "債務の履行について不確定期限があるときは、債務者は、その期限の到来したことを知った後に履行の請求を受けた時から遅滞の責任を負う。"], "answer": 1, "explain": ""}, {"id": "R6-06", "year": 2024, "field": "権利関係", "q": "Aの所有する甲土地にBを地上権者とする地上権（以下この問において「本件地上権」という。）が設定され、その旨の登記がされた後に、甲土地にCを抵当権者とする抵当権が設定され、その旨の登記がされた場合における次の記述のうち、民法の規定によれば、正しいものはいくつあるか。\nア　BがAとの売買契約に基づき、甲土地の所有権を取得したときは、本件地上権は消滅する。\nイ　Aが死亡してBがAを単独相続し、甲土地の所有権を取得したときは、本件地上権は消滅する。\nウ　BがAとの代物弁済契約に基づき、甲土地の所有権を取得したときは、本件地上権は消滅する。\nエ　BがAとの贈与契約に基づき、甲土地の所有権を取得したときは、本件地上権は消滅する。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 3, "explain": ""}, {"id": "R6-07", "year": 2024, "field": "権利関係", "q": "Aを貸主、Bを借主として甲建物の賃貸借契約（以下この問において「本件契約」という。）が締結され、Bが甲建物の引渡しを受けた場合における次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["CがBに対し甲建物をAから買受けたとの虚偽の話をしたので、これを信じたBが甲建物の占有を任意にCに移転した場合、AはCに対して、占有回収の訴えにより甲建物の返還を請求することはできない。", "Bが、Aの甲建物への立ち入りを建物入り口を閉ざして拒んだときは、Aは甲建物の間接占有が侵奪されたものとして、Bに対して、占有回収の訴えにより甲建物の返還を請求することができる。", "Bが死亡して、DがBを単独相続した場合、Dは相続開始を知るまでは、Bによる甲建物の占有を承継しない。", "AとBのいずれもが死亡した場合、本件契約は当然に終了する。"], "answer": 0, "explain": ""}, {"id": "R6-08", "year": 2024, "field": "権利関係", "q": "次の記述のうち、民法の条文として規定されていないものはどれか。", "choices": ["隔地者間の契約は、承諾の通知を発した時に成立する。", "無効な行為に基づく債務の履行として給付を受けた者は、相手方を原状に復させる義務を負う。", "代理人が自己又は第三者の利益を図る目的で代理権の範囲内の行為をした場合において、相手方がその目的を知り、又は知ることができたときは、その行為は、代理権を有しない者がした行為とみなす。", "未成年者が法律行為をするには、その法定代理人の同意を得なければならない。ただし、単に権利を得、又は義務を免れる法律行為については、この限りでない。"], "answer": 0, "explain": ""}, {"id": "R6-09", "year": 2024, "field": "権利関係", "q": "承諾に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["第三者が債務者との間で、債務者の債務につき免責的債務引受契約をする場合、債権者の承諾は不要である。", "第三者が債務者との間で、債務者の債務につき併存的債務引受契約をした場合、債権者が第三者に承諾をした時点で、その効力が生ずる。", "第三者が債権者との間で、債務者の債務につき併存的債務引受契約をした場合、債務者が第三者に承諾をした時点で、その効力が生ずる。", "賃借人が賃貸借契約の目的物を第三者に転貸する場合、賃貸人の承諾は不要である。"], "answer": 1, "explain": ""}, {"id": "R6-10", "year": 2024, "field": "権利関係", "q": "売買契約の目的物が品質に関して契約の内容に適合しない場合において、当該契約不適合が売主及び買主のいずれの責めにも帰することができない事由によるものであるとき、履行の追完請求権、代金の減額請求権、損害賠償請求権及び契約の解除権のうち、民法の規定によれば、買主が行使することができない権利のみを掲げたものとして正しいものは次の記述のうちどれか。なお、上記帰責性以外の点について、権利の行使を妨げる事情はないものとする。", "choices": ["履行の追完請求権、損害賠償請求権、契約の解除権", "代金の減額請求権、損害賠償請求権、契約の解除権", "履行の追完請求権、代金の減額請求権", "損害賠償請求権"], "answer": 3, "explain": ""}, {"id": "R6-11", "year": 2024, "field": "権利関係", "q": "建物の所有を目的とする土地の賃貸借契約（一時使用目的の借地契約を除く。）に関する次の記述のうち、借地借家法の規定によれば、正しいものはどれか。", "choices": ["専ら事業の用に供する建物（居住の用に供するものを除く。）の所有を目的とし、存続期間を20年として借地権を設定する場合、建物買取請求権の規定は適用されず、また、その契約は、公正証書による等書面によってしなければならない。", "居住の用に供する建物の所有を目的として借地権を設定する場合において、借地権を消滅させる目的で、その設定後30年を経過した日に借地権の目的である土地の上の建物を借地権設定者に相当の対価で譲渡する旨の特約を定めても、この特約は無効である。", "借地権を設定する場合において、存続期間を定めなかったときは、その期間は30年となる。", "当事者が借地権の設定後に最初に借地契約を更新する場合において、存続期間を定めなかったときは、その期間は更新の日から10年となる。"], "answer": 2, "explain": ""}, {"id": "R6-12", "year": 2024, "field": "権利関係", "q": "賃貸人Aと賃借人Bとが、居住目的で期間を3年として、借地借家法第38条の定期建物賃貸借契約（以下この問において「契約①」という。）を締結した場合と、定期建物賃貸借契約でも一時使用目的の賃貸借契約でもない普通建物賃貸借契約（以下この問において「契約②」という。）を締結した場合とに関する次の記述のうち、借地借家法の規定によれば、正しいものはどれか。", "choices": ["Bが建物の引渡しを受けた後にAが建物をCに売却して建物所有者がCに変わった場合、Bは、契約①の場合ではCに対して賃借人であることを主張できるが、契約②の場合ではCに対して賃借人であることを主張できない。", "契約期間中は賃料の改定を行わない旨の特約を契約において定めていても、契約期間中に賃料が不相当になったと考えるに至ったBは、契約①の場合も契約②の場合も、借地借家法第32条に基づく賃料減額請求をすることができる。", "Bが契約期間中に相続人なしで死亡した場合において、婚姻はしていないが事実上夫婦と同様の関係にあった同居者Dがあるときは、契約①の場合も契約②の場合も、Aに反対の意思表示をしないDは、建物の賃貸借契約に関し、Bの権利義務を承継する。", "契約①の場合、公正証書によって契約をするときに限り契約の更新がないことを有効に定めることができ、契約②の場合、書面で契約し、かつ、Aに正当な理由がない限り、Aは契約の更新を拒絶することができなくなる。"], "answer": 2, "explain": ""}, {"id": "R6-13", "year": 2024, "field": "権利関係", "q": "建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれか。", "choices": ["各共有者の共用部分の持分は、規約に別段の定めがない限り、共有者数で等分することとされている。", "規約及び集会の決議は、区分所有者の特定承継人に対しても、その効力を生ずる。", "管理者は、集会において、毎年1回一定の時期に、その事務に関する報告をしなければならない。", "集会の招集の通知は、区分所有者が管理者に対して通知を受けるべき場所を通知しなかったときは区分所有者の所有する専有部分が所在する場所にあててすれば足りる。この場合には、集会の招集の通知は、通常それが到達すべき時に到達したものとみなされる。"], "answer": 0, "explain": ""}, {"id": "R6-14", "year": 2024, "field": "権利関係", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。", "choices": ["買戻しの特約に関する登記がされている場合において、契約の日から10年を経過したときは、登記権利者は、単独で当該登記の抹消を申請することができる。", "不動産の収用による所有権の移転の登記は、起業者が単独で申請することができる。", "相続人ではない者に対する遺贈による所有権の移転の登記は、登記権利者が単独で申請することができる。", "登記名義人の住所についての変更の登記は、登記名義人が単独で申請することができる。"], "answer": 2, "explain": ""}, {"id": "R6-15", "year": 2024, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。", "choices": ["都市計画区域外においても、特に必要があるときは、都市施設に関する都市計画を定めることができる。", "準都市計画区域については、用途地域が定められている土地の区域であっても、市街地開発事業に関する都市計画を定めることができない。", "用途地域の一つである準住居地域は、道路の沿道としての地域の特性にふさわしい業務の利便の増進を図りつつ、これと調和した住居の環境を保護するために定める地域である。", "地区計画は、用途地域が定められている土地の区域についてのみ都市計画に定められるものであり、また、地区計画に関する都市計画を定めるに当たっては、地区整備計画を都市計画に定めなければならない。"], "answer": 3, "explain": ""}, {"id": "R6-16", "year": 2024, "field": "法令上の制限", "q": "都市計画法（以下この問において「法」という。）に関する次の記述のうち、正しいものはどれか。ただし、この問において条例による特別の定めはないものとし、「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["市街化区域内において行う、医療法に規定する病院を建築するための1,000㎡の開発行為については、法第29条に基づく都道府県知事の許可を得る必要がある。", "市街化区域内において行う、開発行為を伴わない建築物の建築で、当該建築物の床面積が1,000㎡以上のものについては、法第29条に基づく都道府県知事の許可を得る必要がある。", "市街化調整区域内において行う、都市計画事業の施行のための開発行為については、法第29条に基づく都道府県知事の許可を得る必要がある。", "法第29条に基づく許可を受けた者は、当該許可に係る土地についての一定の事項を開発登録簿に登録しなければならない。"], "answer": 0, "explain": ""}, {"id": "R6-17", "year": 2024, "field": "法令上の制限", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。なお、建築副主事の確認にあっては、建築基準法に定める大規模建築物以外の建築物に限るものとする。", "choices": ["高さ25mの建築物には、周囲の状況によって安全上支障がない場合を除き、有効に避雷設備を設けなければならない。", "特定行政庁は、建築基準法の規定に違反した建築物（国、都道府県又は建築主事を置く市町村の建築物を除く。）の所有者に対して、緊急の必要があり、仮に当該建築物の使用禁止又は使用制限の命令をする場合であっても、意見書の提出先等を記載した通知書の交付等の手続をとらなければならない。", "防火地域内に存在する共同住宅（その用途に供する部分の床面積の合計が300㎡）を増築する場合、その増築に係る部分の床面積の合計が10㎡以内であっても、建築主事、建築副主事又は指定確認検査機関の確認を受ける必要がある。", "劇場の用途に供する建築物を映画館（その用途に供する部分の床面積の合計が500㎡）に用途変更する場合、建築主事、建築副主事又は指定確認検査機関の確認を受ける必要はない。"], "answer": 1, "explain": ""}, {"id": "R6-18", "year": 2024, "field": "法令上の制限", "q": "次の記述のうち、建築基準法の規定によれば、正しいものはどれか。", "choices": ["客席部分の床面積の合計が300㎡の映画館については、第二種住居地域内において建築することはできないが、準住居地域内においては建築することができる。", "特定用途誘導地区内において、都市計画で建築物の高さの最高限度が定められていたとしても、特定行政庁が用途上又は構造上やむを得ないと認めて許可したものについては、当該最高限度を超えてよい。", "計画しようとする建築物の天空率が、道路斜線制限、隣地斜線制限又は北側斜線制限に適合する建築物の天空率未満であれば、これらの制限は適用されない。", "都市計画で建蔽率の限度が80％に指定されている区域かつ防火地域内にある耐火建築物について、建蔽率の限度を超えるためには、特定行政庁による許可を得る必要がある。"], "answer": 1, "explain": ""}, {"id": "R6-19", "year": 2024, "field": "法令上の制限", "q": "宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市及び中核市にあってはその長をいうものとし、地方自治法に基づく施行時特例市に係る経過措置については考慮しないものとする。", "choices": ["都道府県知事は、基礎調査のために他人の占有する土地に立ち入って測量又は調査を行う必要があるときは、その必要の限度において、当該土地に、自ら立ち入り、又はその命じた者若しくは委任した者に立ち入らせることができ、当該土地の占有者は、正当な理由がない限り、その立入りを拒み、又は妨げてはならない。", "都道府県知事は、宅地造成等工事規制区域内の土地について、宅地造成等に伴う災害を防止するために必要があると認める場合には、その土地の所有者に対して、擁壁等の設置等の措置をとることを勧告することができる。", "工事主は、宅地造成等工事規制区域において行われる宅地造成等に関する工事について、工事着手後2週間以内に、宅地造成等に関する工事の施行に係る土地の周辺地域の住民に対し、説明会の開催その他の当該宅地造成等に関する工事の内容を周知させるため必要な措置を講じなければならない。", "特定盛土等規制区域内において行われる特定盛土等又は土石の堆積に関する工事については、工事主は、当該工事に着手する日の30日前までに、主務省令で定めるところにより、当該工事の計画を都道府県知事に届け出なければならない。ただし、特定盛土等又は土石の堆積に伴う災害の発生のおそれがないと認められるものとして政令で定める工事については、この限りでない。"], "answer": 2, "explain": ""}, {"id": "R6-20", "year": 2024, "field": "法令上の制限", "q": "土地区画整理法に関する次の記述のうち、誤っているものはどれか。なお、この問において、同法第136条の3による大都市等の特例及び条例で定める事務処理の特例は考慮しないものとする。", "choices": ["仮換地が指定された場合においては、従前の宅地について権原に基づき使用し、又は収益することができる者は、仮換地の指定の効力発生の日から換地処分の公告がある日まで、仮換地又は仮換地について仮に使用し、若しくは収益することができる権利の目的となるべき宅地若しくはその部分について、従前の宅地について有する権利の内容である使用又は収益と同じ使用又は収益をすることができる。", "市町村施行の土地区画整理事業において、市町村は、換地処分をした場合においては、その旨を公告しなければならない。", "換地計画において定められた保留地は、換地処分の公告があった日の翌日において、施行者が取得する。", "施行者は、仮換地を指定した場合において、特別の事情があるときは、その仮換地について使用又は収益を開始することができる日を仮換地の指定の効力発生の日と別に定めることができる。"], "answer": 1, "explain": ""}, {"id": "R6-21", "year": 2024, "field": "法令上の制限", "q": "農地に関する次の記述のうち、農地法（以下この問において「法」という。）の規定によれば、誤っているものはどれか。", "choices": ["法第3条第1項の許可があったときは所有権が移転する旨の停止条件付売買契約を原因とする所有権移転の仮登記の申請を行う場合にも、農業委員会の許可が必要である。", "法第5条第1項の許可申請書の提出において、法ではその申請に係る権利の設定又は移転に関し民事調停法により調停が成立した場合など一定の場合を除き、当事者は連署した申請書を提出しなければならないとされている。", "法では、農地の賃貸借で期間の定めがあるものについては、一定の場合を除き、期間満了の1年前から6か月前までの間に更新拒絶の通知をしないと従前の賃貸借と同一の条件で更に賃貸借したものとみなされる。", "法では、農地の賃貸借の当事者は、当該賃貸借の合意による解約が民事調停法による農事調停によって行われる場合など一定の場合を除き、知事の許可を受けなければ、当該賃貸借について、解除、解約の申入れ、合意解約、更新拒絶の通知をしてはならないとされている。"], "answer": 0, "explain": ""}, {"id": "R6-22", "year": 2024, "field": "法令上の制限", "q": "国土利用計画法(以下この問において「法」という。)第23条の届出(以下この問において「事後届出」という。)及び法第27条の7の監視区域内の届出(以下この問において「事前届出」という。)に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市にあってはその長をいうものとする。", "choices": ["Aが所有する市街化区域以外の都市計画区域内の4,000㎡の土地について、宅地建物取引業者Bが地上権の設定を受ける契約を締結した場合、Bは事後届出を行わなければならない。", "宅地建物取引業者Cが所有する市街化区域内の3,000㎡の土地と宅地建物取引業者Dが所有する都市計画区域外に所在する12,000㎡の土地を金銭の授受を伴わずに交換する契約を締結した場合、C及びDはともに事後届出を行う必要はない。", "事前届出又は事後届出が必要な土地について、売買契約を締結したにもかかわらず所定の期間内に当該届出をしなかった者は都道府県知事からの勧告を受けることがあるが、罰則の適用を受けることはない。", "監視区域に指定された市街化区域内に所在する土地2,500㎡について売買契約を締結しようとする当事者は、契約締結の少なくとも6週間前までに事前届出を行わなければならない。"], "answer": 3, "explain": ""}, {"id": "R6-23", "year": 2024, "field": "税・その他", "q": "住宅借入金等を有する場合の所得税額の特別控除(以下この問において「住宅ローン控除」という。)に関する次の記述のうち、正しいものはどれか。なお、以下の居住用家屋は、令和5年に建築基準法第6条第1項の確認(建築確認)を受けたものとする。", "choices": ["令和6年中に居住用家屋を居住の用に供した場合において、その前年において居住用財産を譲渡した場合の軽減税率の特例の適用を受けているときであっても、令和6年分以後の所得税について住宅ローン控除の適用を受けることができる。", "令和6年中に居住用家屋を居住の用に供した場合において、その前年において居住用財産の買換え等の場合の譲渡損失の損益通算の適用を受けているときであっても、令和6年分以後の所得税について住宅ローン控除の適用を受けることができる。", "令和5年中に居住用家屋の敷地の用に供するための土地を取得した場合において、令和6年中に居住用家屋を新築して居住の用に供したときは、令和5年分の所得税について住宅ローン控除の適用を受けることができる。", "令和6年中に居住用家屋を居住の用に供した場合において、その居住用家屋の取得に係る住宅借入金等の償還期間等が契約において3年とされているときは、令和6年以後3年間の所得税について住宅ローン控除の適用を受けることができる。"], "answer": 1, "explain": ""}, {"id": "R6-24", "year": 2024, "field": "税・その他", "q": "不動産取得税に関する次の記述のうち、正しいものはどれか。", "choices": ["不動産取得税の課税標準は、不動産を取得した時における当該不動産の売買価格であるから、固定資産税の課税標準である固定資産の評価額とは異なるものである。", "不動産取得税の課税標準となるべき額が、土地の取得にあっては10万円、家屋の取得のうち建築に係るものにあっては1戸につき23万円、その他のものにあっては1戸につき12万円に満たない場合においては、不動産取得税が課されない。", "不動産取得税は、不動産の取得に対して課される税であるので、法人の合併により不動産を取得した場合においても、不動産取得税が課される。", "令和6年4月に個人が取得した住宅及び住宅用地に係る不動産取得税の税率は3%であるが、住宅以外の家屋及び土地に係る不動産取得税の税率は4%である。"], "answer": 1, "explain": ""}, {"id": "R6-25", "year": 2024, "field": "税・その他", "q": "不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、誤っているものはどれか。", "choices": ["同一需給圏とは、一般に対象不動産と代替関係が成立して、その価格の形成について相互に影響を及ぼすような関係にある他の不動産の存する圏域をいう。", "対象不動産について、依頼目的に応じ対象不動産に係る価格形成要因のうち地域要因又は個別的要因について想定上の条件を設定する場合がある。", "不動産の価格は、その不動産の効用が最高度に発揮される可能性に最も富む使用を前提として把握される価格を標準として形成されるが、これを適合の原則という。", "収益還元法は、対象不動産が将来生み出すであろうと期待される純収益の現在価値の総和を求めることにより対象不動産の試算価格を求める手法であり、賃貸用不動産又は賃貸以外の事業の用に供する不動産の価格を求める場合に特に有効である。"], "answer": 2, "explain": ""}, {"id": "R6-26", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。\nア　ガス配管設備等に関して、住宅の売買後においても宅地内のガスの配管設備等の所有権が家庭用プロパンガス販売会社にあるものとする場合には、その旨を説明しなければならない。\nイ　重要事項の説明を行う宅地建物取引士は専任の宅地建物取引士でなくてもよいが、書面に記名する宅地建物取引士は専任の宅地建物取引士でなければならない。\nウ　区分所有建物である事務所ビルの一室の売買の媒介を行う場合、当該1棟の建物及びその敷地の管理が委託されているときは、その委託を受けている者の氏名(法人にあっては、その商号又は名称)及び住所(法人にあっては、その主たる事務所の所在地)を説明しなければならない。\nエ　区分所有建物である中古マンションの一室の売買の媒介を行う場合、当該1棟の建物の計画的な維持修繕のための費用の積立てを行う旨の規約の定めがあるときは、その内容及び既に積み立てられている額について説明しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R6-27", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業者Aに関する次の記述のうち、正しいものはどれか。なお、Aは宅地建物取引業保証協会の社員ではないものとする。", "choices": ["Aが主たる事務所を移転したことにより、その最寄りの供託所が変更した場合において、金銭のみをもって営業保証金を供託しているときは、遅滞なく営業保証金を移転後の主たる事務所の最寄りの供託所に新たに供託しなければならない。", "Aの従業員が運転する車両で現地案内を受けた者が、Aの従業員の過失による交通事故でケガをした場合に取得する損害賠償請求権は、Aが供託した営業保証金の還付の対象債権となる。", "Aは、金銭と有価証券を併用して供託することができ、有価証券のみで供託する場合の当該有価証券の価額は、国債証券の場合はその額面金額の100分の90、地方債証券の場合はその額面金額の100分の80である。", "Aは甲県内にある主たる事務所とは別に、乙県内に新たに従たる事務所を設置したときは、営業保証金を主たる事務所の最寄りの供託所に供託しなければならない。"], "answer": 3, "explain": ""}, {"id": "R6-28", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業者A(消費税課税事業者)及び宅地建物取引業者B(消費税免税事業者)が受領した報酬に関するアからウの記述のうち、宅地建物取引業法の規定に違反しないものの組合せは1から4のうちどれか。なお、代理、媒介に当たり、広告の依頼は行われていないものとする。\nア　居住用建物(1か月の借賃12万円。消費税等相当額を含まない。)について、Aは貸主から代理を依頼され、Bは借主から媒介を依頼され、Aは貸主から6.7万円、Bは借主から6.5万円を報酬として受領した。なお、Bは、媒介の依頼を受けるに当たって、報酬について借主から特段の承諾を得ていない。\nイ　Bは、事業用建物について、貸主と借主双方から媒介を依頼され、借賃1か月分10万円(消費税等相当額を含まない。)、権利金90万円(権利設定の対価として支払われる金銭であって返還されないもので、消費税等相当額を含まない。)の賃貸借契約を成立させ、貸主と借主からそれぞれ5万円を報酬として受領した。\nウ　Aは、土地付建物について、売主と買主双方から媒介を依頼され、代金3,500万円(消費税等相当額を含み、土地代金は2,400万円である。)の売買契約を成立させ、売主と買主からそれぞれ110万円を報酬として受領したほか、売主の特別の依頼に基づき行った遠隔地への現地調査に要した実費の費用について、売主が事前に負担を承諾していたので、売主から9万円を受領した。", "choices": ["ア、イ", "イ、ウ", "ア、ウ", "ア、イ、ウ"], "answer": 1, "explain": ""}, {"id": "R6-29", "year": 2024, "field": "宅建業法", "q": "宅地建物取引士に関する次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引士資格試験に合格した者は、宅地又は建物の取引に関する実務の経験期間が2年に満たない場合であっても、試験に合格した日から1年以内に登録を受けようとするときには、都道府県知事が指定する講習を受講することにより、宅地建物取引士の登録を受けることができる。", "宅地建物取引士証は、更新を受けることなくその有効期間が経過した場合、その効力を失うが、当該宅地建物取引士証を都道府県知事に返納する必要はない。", "宅地建物取引士は、他人に自己の名義の使用を許し、当該他人がその名義で宅地建物取引士である旨の表示をしたときは、法第68条の規定に基づく処分の対象となるが、当該他人が宅地建物取引士の登録を受けた者であるときはこの限りでない。", "宅地建物取引業者は、その事務所唯一の専任の宅地建物取引士が宅地建物取引士証の有効期間の経過により効力を失い宅地建物取引士でなくなったときは、2週間以内に法第31条の3第1項の規定に適合させるため必要な措置を執らなければならない。"], "answer": 3, "explain": ""}, {"id": "R6-30", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではない個人Bとの間で宅地の売買契約を締結し、手付金を支払ったBが、宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフにより、当該売買契約を契約締結の日の翌日に解除しようとしている。この場合に関する次の記述のうち、誤っているものはどれか。", "choices": ["Aがクーリング・オフについて告げるときに交付すべき書面には、Aの商号又は名称及び住所並びに免許証番号の記載は必要であるが、Aの宅地建物取引士の記名は必要ない。", "Bが、自らの申出により、Bの勤務する会社の事務所において、宅地の買受けの申込み及びAとの売買契約の締結をした場合、Bは、クーリング・オフによる当該売買契約の解除を行うことができない。", "Bが、自らの申出により、喫茶店において、宅地の買受けの申込み及びAとの売買契約の締結をした場合、Bは、クーリング・オフによる当該売買契約の解除を行うことができる。", "Bは、自らの申出により、Bが融資を受ける銀行(宅地建物取引業者ではない。)において、宅地の買受けの申込み及びAとの売買契約の締結をした場合、クーリング・オフによる当該売買契約の解除を行うことができない。"], "answer": 3, "explain": ""}, {"id": "R6-31", "year": 2024, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはどれか。", "choices": ["国土交通大臣又は都道府県知事は、その免許を受けた宅地建物取引業者が法第65条第1項の規定による指示に従わない場合、その業務の全部又は一部の停止を命ずることができ、業務の停止の処分に違反した場合、免許を取り消さなければならない。", "国土交通大臣又は都道府県知事は、その免許を受けた宅地建物取引業者の事務所の所在地を確知できないときは、その事実を公告し、その公告の日から2週間を経過しても当該宅地建物取引業者から申出がないときは、免許を取り消すことができる。", "国土交通大臣又は都道府県知事は、法第66条の規定による免許の取消しの処分をしようとするときは、聴聞を行わなければならないが、当該聴聞は、公開することが相当と認められる場合を除き、公開されない。", "国土交通大臣又は都道府県知事は、法第66条の規定による免許の取消しの処分をしたときはその旨を公告しなければならないが、法第65条第2項の規定による業務の停止の処分をしたときはその旨の公告はしなくともよい。"], "answer": 0, "explain": ""}, {"id": "R6-32", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業者Aが、BからB所有の中古住宅の売却の依頼を受け、Bと専任媒介契約(専属専任媒介契約ではないものとする。)を締結した。この場合における次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはどれか。", "choices": ["Aは当該中古住宅の売買契約が成立しても、当該中古住宅の引渡しが完了していなければ、売買契約が成立した旨を指定流通機構に通知する必要はない。", "Bが宅地建物取引業者である場合は、当該契約が国土交通大臣が定める標準媒介契約約款に基づくものであるか否かの別を、法第34条の2第1項に規定する書面に記載する必要はない。", "Aに対して当該中古住宅について買受けの申込みがなかった場合でも、AはBに対して、当該契約に係る業務の処理状況を2週間に1回以上報告しなければならないが、その報告は必ずしも書面で行う必要はない。", "Bが当該中古住宅について、法第34条の2第1項第4号に規定する建物状況調査を実施する者のあっせんを希望しなかった場合は、Aは同項に規定する書面に同調査を実施する者のあっせんに関する事項を記載する必要はない。"], "answer": 2, "explain": ""}, {"id": "R6-33", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、誤っているものはどれか。", "choices": ["宅地の販売に関する広告をインターネットで行った場合において、当該宅地の売買契約が成立した後も継続して広告を掲載していた場合、当該広告を掲載し続けることは法第32条の規定に違反する。", "建物の所有者と賃貸借契約を締結し、当該建物を自らが貸主となって貸借(転貸)するための広告をする場合においては、自らが契約の当事者となって貸借を成立させる旨を当該広告に明示しなくても、法第34条の規定に違反しない。", "造成工事に必要とされる法令に基づく許可等の処分があった宅地について、工事完了前に当該宅地の販売に関する広告をするときは、法令に基づく許可等の処分があったことを明示すれば、取引態様の別について明示する必要はない。", "複数の区画がある分譲地の売買について、数回に分けて広告をする場合は、最初に行う広告だけではなく、次回以降の広告の都度取引態様の別を明示しなければならない。"], "answer": 2, "explain": ""}, {"id": "R6-34", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではない個人Bとの間で、土地付建物を4,000万円で売却する売買契約(所有権の登記は当該土地付建物の引渡し時に行うものとする。)を締結する場合における宅地建物取引業法(以下この問において「法」という。)第41条又は第41条の2の規定に基づく手付金等の保全措置(以下この問において「保全措置」という。)に関する次の記述のうち、誤っているものはどれか。", "choices": ["Aが、保全措置を講じずにBから手付金100万円を受領する場合、その旨を、法第35条の規定に基づく重要事項説明書に記載する必要があるが、法第37条の規定により交付する書面に記載する必要はない。", "当該建物が建築工事の完了後の建物である場合、AがBから手付金100万円を受領する際には保全措置は不要であるが、その後、当該土地付建物を引き渡す前に中間金400万円を受領するためには、手付金100万円と合わせて保全措置を講じた後でなければ、その中間金を受領することができない。", "当該建物が建築工事の完了前の建物である場合において、Aは、保全措置を講じずに、Bから手付金300万円を受領することができる。", "当該土地付建物の引渡し前に、BはAに対して2,000万円を中間金として支払う契約になっていたが、Aがその中間金について保全措置を講じていないときは、Bはこの中間金の支払いを拒むことができる。"], "answer": 2, "explain": ""}, {"id": "R6-35", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業者Aが宅地建物取引業法第37条の規定により交付すべき書面(以下この問において「37条書面」という。)に記載すべき事項を電磁的方法により提供すること(以下この問において「37条書面の電磁的方法による提供」という。)に関する次の記述のうち、正しいものはどれか。", "choices": ["Aが自ら売主として締結する宅地の売買契約において、37条書面の電磁的方法による提供を行う場合、当該契約の相手方に対し、あらかじめ、電磁的方法による提供に用いる電磁的方法の種類及び内容を宅地建物取引士に説明させなければならない。", "Aが媒介業者として関与する建物賃貸借契約において、37条書面の電磁的方法による提供を行う場合、その方法は37条書面の交付に係る宅地建物取引士が明示されるものでなければならない。", "Aが自ら売主として締結する宅地の売買契約において、契約の相手方から37条書面の電磁的方法による提供を行うことについて書面により承諾を得た場合は、その後に当該契約の相手方から書面で電磁的方法による提供を受けない旨の申出があったときでも、37条書面の電磁的方法による提供をすることができる。", "Aが媒介業者として関与する宅地の売買契約において、37条書面の電磁的方法による提供を行う場合であっても、提供後速やかに37条書面を交付しなければならない。"], "answer": 1, "explain": ""}, {"id": "R6-36", "year": 2024, "field": "宅建業法", "q": "営業保証金及び宅地建物取引業保証協会(以下この問において「保証協会」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["宅地建物取引業者で保証協会に加入しようとする者は、その加入しようとする日までに、政令で定める額の弁済業務保証金分担金を当該保証協会に納付しなければならない。", "保証協会の社員と宅地建物取引業に関し取引をした者(宅地建物取引業者に該当する者を除く。)は、その取引により生じた債権に関し、当該社員が社員ではないとしたならばその者が供託すべき営業保証金の額に相当する額の範囲内で弁済を受ける権利を有する。", "宅地建物取引業者は、保証協会の社員の地位を失ったときは、保証協会が弁済業務保証金の還付請求権者に対し、一定期間内に宅地建物取引業法第64条の8第2項の規定による認証を受けるため申し出るべき旨の公告をした後でなければ、弁済業務保証金分担金の返還を受けることができない。", "宅地建物取引業者は、一部の事務所を廃止し営業保証金を取り戻そうとする場合には、供託した営業保証金につき還付を請求する権利を有する者に対し、公告をすることなく営業保証金を取り戻すことができる。"], "answer": 3, "explain": ""}, {"id": "R6-37", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項説明に関する次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。\nア　建物の貸借の媒介を行う場合、水防法施行規則第11条第1号の規定により市町村の長が提供する水害ハザードマップに当該建物の位置が含まれているときは、その所在地を示して説明しなければならない。\nイ　既存住宅の売買を行う場合、宅地建物取引業法第34条の2第1項第4号に規定する建物状況調査の実施後、1年を経過していないものについては、建物状況調査の実施の有無、実施している場合の結果の概要について説明しなければならない。\nウ　宅地の売買を行う場合、宅地の造成に関する工事の完了前のものであるときは、完了時における当該宅地に接する道路の構造及び幅員を説明しなければならない。\nエ　建物の貸借の媒介を行う場合、私道に関する負担の有無や内容を事前に調査し、説明しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R6-38", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者Aが、免許の更新の申請をした場合において、従前の免許の有効期間の満了の日までに、その申請について処分がなされないときは、従前の免許は、有効期間の満了後その効力を失う。", "宅地建物取引業者Bが宅地建物取引業者Cに自己の名義をもって宅地建物取引業を営ませる行為は、Bが名義の使用を書面で指示している場合であれば、宅地建物取引業法に違反しない。", "宅地建物取引業者D（甲県知事免許）は、国土交通大臣に免許換えの申請をし、その免許を受けなければ、乙県所在の宅地の売買の媒介をすることはできない。", "宅地建物取引業者E（丙県知事免許）の免許の更新に当たって、丙県知事は宅地建物取引業法第3条の2に基づき条件を付すことができ、Eが免許の更新に当たって付された条件に違反したときは、丙県知事はEの免許を取り消すことができる。"], "answer": 3, "explain": ""}, {"id": "R6-39", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業法第50条第2項の届出をすべき場所に関する次の記述のうち、誤っているものはどれか。なお、これらの場所では、宅地若しくは建物の売買若しくは交換の契約（予約を含む。）若しくは宅地若しくは建物の売買、交換若しくは貸借の代理若しくは媒介の契約を締結し、又はこれらの契約の申込みを受けるものとする。", "choices": ["届出をすべき場所として、継続的に業務を行うことができる施設を有する場合で事務所以外のものが定められているが、当該場所には1名以上の成年者である専任の宅地建物取引士を置かなければならない。", "届出をすべき場所として、宅地建物取引業者が10区画以上の一団の宅地又は10戸以上の一団の建物の分譲（以下この問において「一団の宅地建物の分譲」という。）をする場合に設置する案内所が定められているが、当該案内所が土地に定着する建物内に設けられる場合、クーリング・オフ制度の適用が除外される。", "届出をすべき場所として、他の宅地建物取引業者が行う一団の宅地建物の分譲の代理又は媒介をする場合に設置する案内所が定められており、この場合は、代理又は媒介を行う宅地建物取引業者が届出をするが、売主業者自身も当該案内所で売買契約の申込みを受ける場合は、売主業者も届出をする。", "届出をすべき場所として、宅地建物取引業者が業務に関し展示会その他これに類する催しを実施する場所が定められているが、その催しを開始する10日前までに、実施場所を管轄する都道府県知事に届け出なければならず、免許を受けた国土交通大臣又は都道府県知事に届け出る必要はない。"], "answer": 3, "explain": ""}, {"id": "R6-40", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業者が媒介により既存建物の貸借の契約を成立させた場合、宅地建物取引業法第37条の規定により当該貸借の契約当事者に対して交付すべき書面に必ず記載しなければならない事項の組合せとして正しいものは次の1から4のうちどれか。\nア　当該建物に係る租税その他の公課の負担\nイ　敷金や共益費など借賃以外の金銭の授受に関する定めがあるときは、その額並びに当該金銭の授受の時期及び目的\nウ　損害賠償額の予定又は違約金に関する定めがあるときは、その内容\nエ　建物の構造耐力上主要な部分又は雨水の侵入を防止する部分として国土交通省令で定めるものの状況", "choices": ["ア、イ", "イ、ウ", "ウ、エ", "ア、エ"], "answer": 1, "explain": ""}, {"id": "R6-41", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。\nア　中古マンションの一室の売買の媒介を行う場合、抵当権が設定されていても、契約日までにその登記が抹消される予定であるときは、当該抵当権の内容について説明しなくてもよい。\nイ　宅地の貸借の媒介を行う場合、借地権の存続期間を50年とする賃貸借契約において、当該契約終了時における当該宅地の上の建物の取壊しに関する事項を定めようとするときは、その内容を説明しなければならない。\nウ　建物の貸借の媒介を行う場合、当該建物が住宅の品質確保の促進等に関する法律第5条第1項に規定する住宅性能評価を受けた新築住宅であるときは、その旨を説明しなければならない。\nエ　宅地の売買の媒介を行う場合、当該宅地が急傾斜地の崩壊による災害の防止に関する法律第3条の規定に基づく急傾斜地崩壊危険区域内にあることは説明しなければならないが、当該区域内における行為の制限の概要については説明しなくてもよい。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "explain": ""}, {"id": "R6-42", "year": 2024, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法の規定及び「宅地建物取引業者による人の死の告知に関するガイドライン」によれば、誤っているものはどれか。", "choices": ["宅地建物取引業者は、宅地建物取引業に係る契約の締結の勧誘をするに際し、宅地建物取引業者の相手方等に対し、利益を生ずることが確実であると誤解させるべき断定的判断を提供する行為をしてはならない。", "宅地建物取引業者は、宅地又は建物の売買の契約の締結の勧誘をするに際し、宅地建物取引業者の相手方等に対し、宅地又は建物の引渡しの時期について故意に不実のことを告げた場合であっても、契約が成立したときに宅地建物取引業法第37条の規定により交付すべき書面に当該事項を正確に記載すればよい。", "「宅地建物取引業者による人の死の告知に関するガイドライン」によれば、売買取引の対象となる居住用不動産において、自然死や日常生活の中での不慮の死が発生した場合であっても、過去に人が死亡し、長期間にわたって人知れず放置されたこと等に伴ういわゆる特殊清掃や大規模リフォーム等が行われていなければ、宅地建物取引業者は、原則として、買主に対してこれを告げなくてもよい。", "「宅地建物取引業者による人の死の告知に関するガイドライン」によれば、賃貸借取引の対象となる居住用不動産において、自然死や日常生活の中での不慮の死以外の死が発生した場合であっても、特段の事情がない限り、当該死が発覚してから概ね3年間を経過した後は、宅地建物取引業者は、原則として、借主に対してこれを告げなくてもよい。"], "answer": 1, "explain": ""}, {"id": "R6-43", "year": 2024, "field": "宅建業法", "q": "宅地建物取引士の登録及び宅地建物取引士証に関する次の記述のうち、誤っているものはどれか。", "choices": ["宅地建物取引士の登録を受けている者は、宅地建物取引士証の交付を受けていない場合でも、その住所に変更があれば、登録を受けている都道府県知事に変更の登録を申請しなければならない。", "宅地建物取引士は、宅地建物取引士の信用又は品位を害するような行為をしてはならず、この行為には宅地建物取引士としての職務に必ずしも直接関係しない行為や私的な行為も含まれる。", "宅地建物取引士は、取引の関係者から請求があったときは、宅地建物取引士証を提示しなければならないが、その際、個人情報保護の観点から宅地建物取引士証の住所欄にシールを貼った上で提示することが認められている。", "宅地建物取引士証に記載される宅地建物取引士の氏名については現姓を用いなければならず、旧姓を併記することは認められていない。"], "answer": 3, "explain": ""}, {"id": "R6-44", "year": 2024, "field": "宅建業法", "q": "宅地建物取引業者Aが宅地建物取引業法第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、宅地建物取引業法の規定に違反しないものはどれか。", "choices": ["Aは、建築工事完了前の建物の売買契約を媒介したときに、37条書面に記載する当該建物を特定するために必要な表示について、宅地建物取引業法第35条の規定に基づく重要事項の説明において使用した図書を交付することによって行った。", "Aは、貸主Bと借主Cとの間で締結された建物の賃貸借契約を媒介したときに、借賃の額、支払時期及び支払方法について定められていたが、BとCの承諾を得たので、37条書面に記載しなかった。", "Aは、宅地建物取引業者Dと宅地建物取引業者Eとの間で締結された宅地の売買契約を媒介したときに、37条書面に当該宅地の引渡しの時期を記載しなかった。", "Aが建物の売買契約を買主として締結した場合に、売主Fに承諾を得たので、37条書面をFに交付しなかった。"], "answer": 0, "explain": ""}, {"id": "R6-45", "year": 2024, "field": "宅建業法", "q": "特定住宅瑕疵担保責任の履行の確保等に関する法律に基づく住宅販売瑕疵担保保証金（以下この問において「保証金」という。）の供託又は住宅販売瑕疵担保責任保険契約（以下この問において「保険契約」という。）の締結に関する次の記述のうち、正しいものはどれか。", "choices": ["自ら売主として宅地建物取引業者ではない買主に引き渡した新築住宅の戸数が、基準日前10年間に10戸あるが、当該基準日前1年間は0戸である場合、当該売主である宅地建物取引業者は、当該基準日に係る保証金の供託又は保険契約の締結の状況について届出を行う必要はない。", "自ら売主として新築住宅を宅地建物取引業者ではない買主に引き渡した宅地建物取引業者は、基準日に係る保証金の供託及び保険契約の締結の状況について届出をしなければ、当該基準日の翌日から起算して50日を経過した日以後においては、新たに自ら売主となる新築住宅の売買契約を締結してはならない。", "保険契約は、新築住宅の引渡し時から有効でなければならないが、買主が当該住宅の引渡し時から10年以内に当該住宅を転売した場合、当該保険契約は解除される。", "自ら売主として宅地建物取引業者ではない買主に新築住宅を引き渡した宅地建物取引業者が、保証金を供託する場合、当該住宅の床面積が25m2以下であるときは、新築住宅の合計戸数の算定に当たって、3戸をもって1戸と数えることになる。"], "answer": 1, "explain": ""}, {"id": "R6-46", "year": 2024, "field": "免除科目", "q": "独立行政法人住宅金融支援機構（以下この問において「機構」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["証券化支援業務（買取型）において、機構による譲受けの対象となる住宅の購入に必要な資金の貸付けに係る金融機関の貸付債権には、当該住宅の購入に付随する当該住宅の改良に必要な資金は含まれない。", "機構は、地震に対する安全性の向上を主たる目的とする住宅の改良に必要な資金の貸付けを業務として行っている。", "機構は、民間金融機関による住宅資金の供給を支援するため、民間金融機関が貸し付けた住宅ローンについて、住宅融資保険を引き受けている。", "機構は、住宅のエネルギー消費性能（建築物のエネルギー消費性能の向上等に関する法律第2条第1項第2号に規定するエネルギー消費性能をいう。）の向上を主たる目的とする住宅の改良に必要な資金の貸付けを業務として行っている。"], "answer": 0, "explain": ""}, {"id": "R6-47", "year": 2024, "field": "免除科目", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法（不動産の表示に関する公正競争規約を含む。）の規定によれば、正しいものはどれか。", "choices": ["新築分譲住宅の予告広告（価格が確定していないため、直ちに取引することができない物件について、取引開始時期をあらかじめ告知する広告）を新聞折込チラシを用いて行った場合は、本広告を新聞折込チラシ以外の媒体を用いて行ってはならない。", "土地取引において、当該土地上に廃屋が存在するとき、実際の土地を見れば廃屋が存在することは明らかであるため、廃屋が存在する旨を明示する必要はない。", "交通の利便性について、電車、バス等の交通機関の所要時間を表示する場合は、朝の通勤ラッシュ時の所要時間ではなく、平常時の所要時間を明示しなければならない。", "居住の用に供されたことはないが建築後1年以上経過した一戸建て住宅について、新築である旨を表示することはできない。"], "answer": 3, "explain": ""}, {"id": "R6-48", "year": 2024, "field": "免除科目", "q": "次の記述のうち、正しいものはどれか。", "choices": ["令和6年地価公示（令和6年3月公表）によれば、令和5年1月以降の1年間の地価の動向は、三大都市圏・地方圏ともに、全用途平均・住宅地・商業地のいずれも3年連続で上昇した。", "令和4年度宅地建物取引業法の施行状況調査（令和5年10月公表）によれば、令和5年3月末における宅地建物取引士の総登録者数は、200万人を超えている。", "令和5年住宅・土地統計調査住宅数概数集計（速報集計）結果（令和6年4月公表）によれば、令和5年10月1日現在における賃貸・売却用及び二次的住宅（別荘など）を除く空き家は、900万戸に達している。", "建築着工統計（令和6年1月公表）によれば、令和5年の新設住宅着工戸数は90万戸を超え、3年連続で増加した。"], "answer": 0, "explain": ""}, {"id": "R6-49", "year": 2024, "field": "免除科目", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["30度以上の角度をなす斜面を背後に控える宅地は、崖面への保護対策を講じるか、擁壁を設けるなどの必要がある。", "高さ2m以下の擁壁であれば、水抜き孔を有しなくても、地震による被害が生じることはない。", "重力式擁壁は、擁壁の自重により、背面からの土圧に抵抗するコンクリート構造物である。", "工場跡地や埋立地などでは、重金属や揮発性有機化合物などによる土壌汚染が問題となることがある。"], "answer": 1, "explain": ""}, {"id": "R6-50", "year": 2024, "field": "免除科目", "q": "建物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["ラーメン構造は、柱を鉛直方向、梁を水平方向に配置し、接合部を強く固めた構造である。", "ブレース構造は、柱や梁などで構成された四角形の対角線上に部材を入れた構造である。", "ブレース構造は、骨組全てに用いることが多く、ラーメン構造など他の構造と併用することはない。", "壁式構造は、板状の壁と床を箱形に組み、建物とする構造で、原則として、柱や梁は用いない。"], "answer": 2, "explain": ""}, {"id": "R7-01", "year": 2025, "field": "権利関係", "q": "所有者AがBに甲土地を売却し、その後にBがCに甲土地を売却した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、この問において、Cは背信的悪意者ではないものとする。", "choices": ["甲土地の所有権登記がAの名義のままであったとしても、Bは、Cに甲土地を売却した後は、Aに対して自己に甲土地の所有権移転登記をするよう請求することはできない。", "Cは、甲土地の所有権移転登記を備えなければ、Aに対して自己が所有者であることを主張することができない。", "AB間の売買契約が、BC間の売買契約締結よりも前にAにより解除されていた場合、又は、BC間の売買契約締結後にAにより解除された場合のいずれの場合であっても、Cは、甲土地の所有権移転登記を備えれば、Aに対して自己の所有権を主張することができる。", "AB間の売買契約が、BC間の売買契約よりも前にBの強迫を理由として取り消されていた場合、又は、BC間の売買契約締結後にBの強迫を理由として取り消された場合のいずれの場合であっても、Cは、Bの強迫につき善意でかつ過失がなければ、Aに対して自己の所有権を主張することができる。"], "answer": 2, "explain": ""}, {"id": "R7-02", "year": 2025, "field": "権利関係", "q": "個人であるAが、①賃貸人Bと賃借人Cとの間の期間を２年とする居住用甲建物の賃貸借契約に基づくCの一切の債務の連帯保証契約をBと締結した場合、②売主Dと買主Eとの間の居住用乙建物の売買契約に基づく代金支払債務の保証契約をDと締結した場合、に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["①の連帯保証契約は書面によってしなければ無効であるのに対し、②の保証契約は書面によらず、口頭で契約を締結しても有効である。", "①のBがAに対して連帯保証債務の履行を請求してきた場合には、AはまずCに請求するように主張できるのに対し、②のDがAに対して保証債務の履行を請求してきた場合には、AはまずEに請求するように主張することはできない。", "①の連帯保証契約は保証の限度額である極度額を定めなければ無効であるのに対し、②の保証契約は極度額を定める必要はない。", "①も②もAが主たる債務者C及びEの委託を受けて保証した場合において、Aが債権者B及びDに対して主たる債務の履行状況に関する情報を提供するよう請求したときは、①のBは、これらの情報を、遅滞なく、Aに提供しなければならないのに対し、②のDは、守秘義務を理由にこれらの情報の提供を拒否することができる。"], "answer": 2, "explain": ""}, {"id": "R7-03", "year": 2025, "field": "権利関係", "q": "意思表示に関する次の記述のうち、民法の規定によれば、誤っているものはいくつあるか。\nア　表意者が真意でないことを知ってした意思表示は無効であるが、相手方がその意思表示が表意者の真意ではないことを知らなければ、知らないことにつき過失があっても、当該意思表示は有効となる。\nイ　相手方と通じてした虚偽の意思表示は無効であり、第三者がその虚偽表示につき善意であっても、過失があれば、当該第三者にその無効を対抗することができる。\nウ　意思表示は、当該意思表示に対応する意思を欠く錯誤に基づくものであって、その錯誤が法律行為の目的及び取引上の社会通念に照らして重要なものであるときは、無効であるが、その錯誤につき善意でかつ過失がない第三者には、その無効を対抗することができない。\nエ　詐欺による意思表示は取り消すことができるが、その詐欺につき善意でかつ過失がない取消し前の第三者には、その取消しを対抗することができない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R7-04", "year": 2025, "field": "権利関係", "q": "AがBから弁済の期限の定めなく金1,000万円を借り入れる金銭消費貸借契約（以下この問において「本件契約」という。）における次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["Aは、本件契約におけるAの債務を担保するために、Aが所有する不動産に対し、Bのために、抵当権を設定することはできるが、質権を設定することはできない。", "Aが本件契約に基づく債務の弁済を怠ったときに、BがAから預かっている動産を占有している場合には、Bは当該動産の返還時期が到来しても弁済を受けるまでその動産に関して留置権を行使することができる。", "Aが本件契約に基づく債務の弁済を怠った場合には、BはAの総財産に対して先取特権を行使することができる。", "Aが、期限が到来しているBの悪意による不法行為に基づく金1,000万円の損害賠償請求債権をBに対して有している場合、Aは本件契約に基づく返還債務をBに対する当該損害賠償請求債権で相殺することができる。"], "answer": 3, "explain": ""}, {"id": "R7-05", "year": 2025, "field": "権利関係", "q": "Aの子がBであり、Bの子がCであり、CがAの直系卑属である場合において、民法の規定によれば、次のアからエまでの記述のうち、Aが死亡した際にCがBを代襲してAの相続人となるときを全て掲げたものはどれか。\nア　Aが死亡する以前にBが死亡したとき\nイ　Bが相続に関するAの遺言書を偽造して相続権を失ったとき\nウ　BがAによって相続人から廃除されて相続権を失ったとき\nエ　Bが相続放棄をしたとき", "choices": ["ア、エ", "イ、ウ", "ア、ウ、エ", "ア、イ、ウ"], "answer": 3, "explain": ""}, {"id": "R7-06", "year": 2025, "field": "権利関係", "q": "Aが所有している甲土地についての物権変動に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Bが甲土地をAに無断でCに売却し、その後、BがAから甲土地を購入した場合、Cは、Bから甲土地を購入した時点に遡って甲土地の所有権を取得する。", "Dが甲土地につき、Aに無断でDへの虚偽の所有権の移転の登記をした上で、甲土地をEに売却してその旨の登記をした場合において、その後、AがFに甲土地を売却したときは、Fは、Eに対し、甲土地の所有権を主張することができる。", "Gが甲土地の所有権を時効取得した場合、Gはその後にAを単独相続したHに対して、登記を備えていなくても、甲土地の所有権を主張することができる。", "Aが甲土地上の立木の所有権を留保して甲土地をJに売却し、その後、JがKに甲土地及びその上の立木を売却した場合には、Aは、Kに対し、立木の所有権の留保につき登記又は明認方法を備えない限り、立木の所有権を主張することができない。"], "answer": 0, "explain": ""}, {"id": "R7-07", "year": 2025, "field": "権利関係", "q": "Aは自己の所有する甲建物を事務所としてBに賃貸し（以下この問において「本件契約」という。）、その後、本件契約の期間中に甲建物の屋根に雨漏りが生じたため、CがBから甲建物の屋根の修理を請け負い、Cによる修理が完了した。この場合における次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["BがCに修理代金を支払わないまま無資力となり、賃料を滞納して本件契約が解除されたことにより甲建物はAに明け渡された。この場合、CはAに対して、事務管理に基づいて修理費用相当額の支払を求めることはできない。", "BがCに修理代金を支払ったとしても、本件契約において、Aの負担に属するとされる甲建物の屋根の修理費用について直ちに償還請求することができる旨の特約がない限り、契約終了時でなければ、BはAに対して償還を求めることはできない。", "BがCに修理代金を支払わない場合、Cは、Bが占有する甲建物につき、当然に不動産工事の先取特権を行使することができる。", "BがCに修理代金を支払わないまま無資力となり、賃料を滞納して本件契約が解除されたことにより甲建物はAに明け渡された。本件契約において、BがAに権利金を支払わないことの代償として、甲建物の修理費用をBの負担とする旨の特約が存し、当該屋根の修理費用と権利金が相応していたときであっても、CはAに対して、不当利得に基づいて修理費用相当額の支払を求めることができる。"], "answer": 0, "explain": ""}, {"id": "R7-08", "year": 2025, "field": "権利関係", "q": "A、B及びCがそれぞれ3分の1の持分の割合で甲土地を共有している場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。なお、甲土地を分割しない旨の契約は存在しないものとする。", "choices": ["甲土地につき無権利のDが、自己への虚偽の所有権移転登記をした場合には、Aは、単独で、Dに対し、その所有権移転登記の抹消を求めることができる。", "Aが甲土地についての自己の持分を放棄した場合には、その持分は国庫に帰属する。", "Aが死亡し、E及びFが相続した場合には、B及びCは、Aの遺産についての遺産分割がされる前であっても、E及びFに対して共有物分割の訴えを提起することができる。", "AがB及びCに無断で甲土地を占有している場合であっても、Bは、Aに対し、当然には自己に甲土地を明け渡すように求めることができない。"], "answer": 1, "explain": ""}, {"id": "R7-09", "year": 2025, "field": "権利関係", "q": "連帯債務者の一人について生じた次の事由のうち、民法の規定によれば、他の連帯債務者に対して効力が生じないものとして正しいものはどれか。なお、この問において、連帯債務者の一人について生じた事由が他の連帯債務者に対して効力が生じる旨の別段の意思表示はないものとする。", "choices": ["債権者がした連帯債務者の一人に対する履行の請求", "連帯債務者の一人と債権者との間の混同", "連帯債務者の一人が債権者に対して債権を有する場合において、その連帯債務者がした相殺の援用", "連帯債務者の一人と債権者との間の更改"], "answer": 0, "explain": ""}, {"id": "R7-10", "year": 2025, "field": "権利関係", "q": "Aを売主、Bを買主とする甲土地の売買契約による甲土地の引渡し後に、目的物の品質に関して契約の内容に適合しない土壌汚染が見つかった場合の売主の担保の責任（以下この問において「契約不適合責任」という。）に基づく損害賠償に関する次の記述のうち、民法の規定、宅地建物取引業法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Bは、甲土地の引渡しの日から11年が経過した時点で甲土地の土壌汚染を発見し、発見した時点から1年以内にAに通知した。Aが当該土壌汚染があることを重大な過失なく知らなかった場合、Aが宅地建物取引業者であるか否かにかかわらず、Bは損害賠償を請求することはできない。", "甲土地の引渡しの日から3年以内に契約不適合の通知をしなければ売主は契約不適合責任を負わない旨の特約があり、Bが引渡しの日から4年が経過した時点で土壌汚染を発見して直ちにAに通知した。Aが当該土壌汚染があることを重大な過失なく知らなかった場合、Aが宅地建物取引業者であるか否かにかかわらず、Bは損害賠償を請求することはできない。", "甲土地の引渡しの日から1年以内に契約不適合の通知をしなければ売主は契約不適合責任を負わない旨の特約があり、Aは甲土地に土壌汚染があることを売買契約締結時点で知っていて告げていなかった。Bが引渡しの日から3年が経過した時点で当該土壌汚染を発見して直ちにAに通知した場合、Aが宅地建物取引業者であるか否かによって、Bが損害賠償を請求できるか否かの結論が異なる。", "売主は契約不適合責任を一切負わない旨の特約があり、Bは引渡しの日から1年が経過した時点で土壌汚染を発見して直ちにAに通知した。Aが当該土壌汚染があることを重大な過失なく知らなかった場合、Aが宅地建物取引業者であるか否かによって、Bが損害賠償を請求できるか否かの結論が異なる。"], "answer": 2, "explain": ""}, {"id": "R7-11", "year": 2025, "field": "権利関係", "q": "AがBとの間で、A所有の甲土地につき建物の所有を目的として一時使用目的ではない賃貸借契約（以下この問において「本件契約」という。）を締結する場合に関する次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。", "choices": ["甲土地にBが賃借権の登記をしなくても、Bの配偶者であるCを所有者として登記されている建物が甲土地上に存在する場合には、甲土地がAからDに売却されても、BはDに対して甲土地に賃借権を有していることを主張できる。", "本件契約の存続期間が50年であり、契約の更新及び建物の築造による存続期間の延長がない旨を定める場合、一定期間地代を減額せず、その期間は地代の減額請求ができない旨の特約を有効に定めることができる。", "本件契約が専らBの事業の用に供する建物の所有を目的とし、存続期間が50年である場合、契約の更新及び建物の築造による存続期間の延長がない旨、並びにBが借地借家法第13条の規定による建物の買取りの請求をしない旨の特約を書面で有効に定めることができる。", "本件契約が公正証書によって行われていれば、専らBの居住の用に供する建物の所有を目的とし、存続期間を20年と定めていても、Aは正当事由があれば、20年が経過した時点で遅滞なく異議を述べて更新を拒絶することができる。"], "answer": 2, "explain": ""}, {"id": "R7-12", "year": 2025, "field": "権利関係", "q": "Aを賃貸人、Bを賃借人とする甲建物の賃貸借契約（定期建物賃貸借契約及び一時使用目的の建物の賃貸借契約を除く。以下この問において「本件契約」という。）に関する次の記述のうち、民法及び借地借家法の規定によれば、正しいものはどれか。", "choices": ["本件契約が期間の定めがないものである場合において、A又はBから相手方に対して解約の申入れをしたときは、当該申入れの日から6か月を経過することによって、本件契約は終了する。", "本件契約が期間を2年とするものである場合において、A及びBのいずれも期間の満了の1年前から6か月前までの間に相手方に対して更新をしない旨の通知をしなかったときは、本件契約は、期間を2年として、従前の契約と同一の条件で更新されたものとみなされる。", "AB間において、造作買取請求権は行使しない旨の特約があった場合、この特約は有効である。", "本件契約が借地借家法第39条に規定する取壊し予定の建物の賃貸借であり、甲建物を取り壊すこととなる時に本件契約が終了する旨の特約を定める場合、本件契約は、公正証書によってしなければならない。"], "answer": 2, "explain": ""}, {"id": "R7-13", "year": 2025, "field": "権利関係", "q": "建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれか。", "choices": ["共用部分は、原則として区分所有者全員の共有に属するが、規約で別段の定めをすることを妨げず、管理者であっても、規約に特別の定めがあるときは、共用部分を所有することができる。", "共用部分の持分の割合について、各共有者の共用部分の持分は、規約で別段の定めをしない限り、その有する専有部分の床面積の割合による。", "集会の議事については、議長は、書面又は電磁的記録により、議事録を作成しなければならず、当該議事録には議事の経過の要領及びその結果を記載し、又は記録しなければならないとされているが、当該議事録が書面で作成されているときは、議長及び集会に出席した区分所有者全員がこれに署名しなければならない。", "区分所有者が、建物の保存に有害な行為その他建物の管理又は使用に関し区分所有者の共同の利益に反する行為をした場合又はその行為をするおそれがある場合には、他の区分所有者の全員又は管理組合法人は、区分所有者の共同の利益のため、その行為を停止し、その行為の結果を除去し、又はその行為を予防するため必要な措置を執ることを請求することができる。"], "answer": 2, "explain": ""}, {"id": "R7-14", "year": 2025, "field": "権利関係", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。", "choices": ["登記官は、一筆の土地の一部が別の地目となったときであっても、職権でその土地の分筆の登記をすることができない。", "登記事項証明書の交付の請求は、請求情報を電子情報処理組織を使用して登記所に提供する方法によりすることができる。", "権利に関する登記の申請は、法令に別段の定めがある場合を除き、登記権利者及び登記義務者が共同してしなければならない。", "建物の合併の登記は、表題部所有者又は所有権の登記名義人以外の者は、申請することができない。"], "answer": 0, "explain": ""}, {"id": "R7-15", "year": 2025, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。", "choices": ["風致地区は、都市の風致を維持するため定める地区であり、当該地区内における建築物の建築について、政令の定める基準に従い、地方公共団体の条例で、都市の風致を維持するため必要な規制をすることができる。", "特定街区は、市街地の整備改善を図るため街区の整備又は造成が行われる地区について、その街区内における建築物の容積率並びに建築物の高さの最高限度及び壁面の位置の制限を定める街区である。", "近隣商業地域は、近隣の住宅地の住民に対する日用品の供給を行うことを主たる内容とする商業その他の業務の利便を増進するため定める地域である。", "生産緑地地区は、農業の利便の増進を図りつつ、これと調和した低層住宅に係る良好な住居の環境を保護するため定める地区である。"], "answer": 3, "explain": ""}, {"id": "R7-16", "year": 2025, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。ただし、この問において条例による特別の定めはないものとし、「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["市街化調整区域のうち開発許可を受けた開発区域以外の区域において行う、学校教育法に規定する学校の新築については、都道府県知事の許可が不要である。", "開発行為とは、主として建築物の建築又は特定工作物の建設の用に供する目的で行う土地の区画形質の変更をいい、ゴルフコースの建設は開発行為にはあたらない。", "区域区分が定められていない都市計画区域において、商業施設の建築の用に供する目的で行う4,000㎡の開発行為は都道府県知事の許可が不要である。", "自己の居住の用に供する住宅の建築を目的として行う開発行為以外の開発行為にあっては、原則として開発区域内に建築基準法に規定する災害危険区域内の土地を含んではならない。"], "answer": 3, "explain": ""}, {"id": "R7-17", "year": 2025, "field": "法令上の制限", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。", "choices": ["建築主は、建築確認が必要な建築物を建築しようとする場合は、当該建築物の計画を建築基準法令の規定に適合させるだけでなく、建築基準法令の規定以外の宅地造成及び特定盛土等規制法などの建築基準関係規定にも適合するものであることについて確認を受ける必要がある。", "建築主は、2階建ての木造住宅を新築しようとする場合は、当該工事に着手する前に、その計画が建築基準関係規定に適合するものであることについて、確認を受け、確認済証の交付を受ける措置が必要となるが、当該住宅の大規模の修繕をしようとする場合には、当該措置は不要である。", "延べ面積が1,000㎡を超える木造建築物は、その外壁及び軒裏で延焼のおそれのある部分を防火構造としなければならない。", "高さ1m以下の階段の部分には、手すりを設けなくてもよい。"], "answer": 1, "explain": ""}, {"id": "R7-18", "year": 2025, "field": "法令上の制限", "q": "次の記述のうち、建築基準法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["都市再生特別地区内においては、建築物の容積率、建蔽率及び建築面積は当該地区に関する都市計画において定められた内容に適合するものでなければならないが、その高さは法第56条の高さの制限に関する規定に適合させる必要がある。", "2階建てかつ床面積1,000㎡の飲食店は、第一種低層住居専用地域、第二種低層住居専用地域、第一種中高層住居専用地域、工業専用地域及び田園住居地域に建築することができない。", "特定行政庁による認可を受けて公告された建築協定は、その後、当該協定の土地の所有者等の全員で合意したときに限り、その公告のあった日以後において当該建築協定区域内の土地の所有者等となった者に対しても効力が及ぶこととなる。", "建築物のエネルギー消費性能の向上のため必要な外壁等に関する工事を行う場合、公益性が高いことから特定行政庁の許可を受けることなく、法第52条の規定による容積率の限度を超えることができる。"], "answer": 1, "explain": ""}, {"id": "R7-19", "year": 2025, "field": "法令上の制限", "q": "宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市及び中核市にあってはその長をいうものとし、地方自治法に基づく施行時特例市に係る経過措置については考慮しないものとする。", "choices": ["工事主は、特定盛土等規制区域内において行われる特定盛土等又は土石の堆積に関する政令で定める規模の工事の許可の申請をするときは、あらかじめ、主務省令で定めるところにより、特定盛土等又は土石の堆積に関する工事の施行に係る土地の周辺地域の住民に対し、説明会の開催その他の当該特定盛土等又は土石の堆積に関する工事の内容を周知させるため必要な措置を講じなければならない。", "宅地造成等工事規制区域内の土地の工事主又は工事施行者は、宅地造成等に伴う災害が生じないよう、その土地を常時安全な状態に維持するように努めなければならない。", "都道府県知事は、宅地造成等工事規制区域内の土地について、宅地造成等に伴う災害の防止のために必要があると認める場合においては、その土地の所有者、管理者、占有者、工事主又は工事施行者に対して、擁壁等の設置等の必要な措置をとることを勧告することができる。", "宅地造成等工事規制区域内において行われる宅地造成等に関する工事の許可を受けた工事主は、当該許可に係る土地の見やすい場所に、主務省令で定めるところにより、氏名又は名称その他の主務省令で定める事項を記載した標識を掲げなければならない。"], "answer": 1, "explain": ""}, {"id": "R7-20", "year": 2025, "field": "法令上の制限", "q": "土地区画整理法に関する次の記述のうち、誤っているものはどれか。", "choices": ["個人施行者は、その者以外に換地計画に係る区域内の宅地を所有する者（当該宅地の所有権について施行者に対抗することができない者を除く。）がある場合においては、換地計画について認可を申請しようとするときは、これらの者の同意を得なければならない。", "国又は地方公共団体の所有する土地以外であって道路の用に供している土地については、土地区画整理事業の施行により当該道路に代わるべき道路が設置され、その結果、当該道路が廃止される場合等においては、換地計画において、当該土地について換地を定めないことができる。", "従前の宅地の所有者及びその宅地について使用収益権を有する者が、仮換地について使用又は収益を開始することができる日を別に定められたため、従前の宅地について使用し、又は収益することができなくなったことにより損失を受けた場合においては、施行者は、その損失を受けた者に対して、通常生ずべき損失を補償しなければならない。", "仮換地の指定があった日後、土地区画整理事業の施行による施行地区内の土地及び建物の変動に係る登記がされるまでの間は、登記の申請人が確定日付のある書類によりその指定前に登記原因が生じたことを証明した場合を除き、施行地区内の土地及び建物に関しては他の登記をすることができない。"], "answer": 3, "explain": ""}, {"id": "R7-21", "year": 2025, "field": "法令上の制限", "q": "農地に関する次の記述のうち、農地法（以下この問において「法」という。）の規定によれば、誤っているものはどれか。", "choices": ["市街化区域外にある農地の転用の申請に係る事業が住宅の用に供される土地の造成だけを目的としている場合、申請に係る農地の全てを住宅の用に供することが確実と認められないときには、法第4条第1項又は法第5条第1項の許可を受けることができない。", "仮設工作物を設置するため、市街化区域外にある農地の所有権を取得しようとする場合には、法第5条第1項の許可を受けることができない。", "農地の賃貸借は、その登記がなくても、農地の引渡しがあったときは、これをもってその後その農地について所有権を取得した第三者に対抗することができる。", "法人の代表者が、その法人の業務に関し、法第4条第1項又は法第5条第1項の規定に違反して農地の転用をした場合には、その代表者が罰せられるほか、その法人も300万円以下の罰金刑が科せられる。"], "answer": 3, "explain": ""}, {"id": "R7-22", "year": 2025, "field": "法令上の制限", "q": "国土利用計画法第23条の届出（以下この問において「事後届出」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["市街化区域内においてAが所有する面積3,500㎡の土地について、Bが2,000㎡、Cが1,500㎡とそれぞれ分割して購入した場合、B及びCはともに事後届出を行わなければならない。", "都市計画区域外においてDが所有する面積12,000㎡の土地について、Eが担保権の実行による競売を通じて所有権を取得した場合、Eは事後届出を行わなければならない。", "Fが、自ら所有する市街化調整区域内の7,000㎡の土地について、宅地建物取引業者Gと売買契約を締結した場合には、Gは契約を締結した日から1か月以内に事後届出を行う必要がある。", "市街化区域内に所在する一団の土地である甲土地（面積1,200㎡）と乙土地（面積1,300㎡）について、甲土地については売買によって所有権を取得し、乙土地については対価の授受を伴わず賃借権の設定を受けたHは、事後届出を行う必要はない。"], "answer": 3, "explain": ""}, {"id": "R7-23", "year": 2025, "field": "税・その他", "q": "土地の売買による所有権の移転登記等に係る登録免許税の税率の軽減措置に関する次の記述のうち、正しいものはどれか。", "choices": ["この税率の軽減措置は、地目が雑種地となっている土地の売買による所有権の移転登記についても適用される。", "この税率の軽減措置の適用対象となる土地は、その価額が1,000万円未満のものに限られる。", "この税率の軽減措置は、法人が土地の売買による所有権の移転登記を受ける場合には適用されない。", "この税率の軽減措置の適用対象となる土地は、その面積が1,000㎡未満のものに限られる。"], "answer": 0, "explain": ""}, {"id": "R7-24", "year": 2025, "field": "税・その他", "q": "固定資産税に関する次の記述のうち、正しいものはどれか。", "choices": ["住宅用地のうち小規模住宅用地（200㎡以下）に対して課する固定資産税の課税標準は、当該小規模住宅用地に係る固定資産税の課税標準となるべき価格の3分の1の額である。", "市町村長は、納税義務者等の求めに応じ、法令で定めるところにより固定資産課税台帳を閲覧に供しなければならない。ただし、当該部分に記載されている住所が明らかにされることにより人の生命又は身体に危害を及ぼすおそれがある場合、当該住所を削除する等の措置を講じたもの又はその写しを閲覧に供することができる。", "市町村は、土地、家屋又は償却資産に対して課する固定資産税額が、土地にあっては30万円、家屋にあっては20万円、償却資産にあっては150万円に満たない場合においては、原則として固定資産税を課することができない。", "固定資産税は、固定資産の所有者として、登記簿又は土地補充課税台帳若しくは家屋補充課税台帳に所有者として登記又は登録されている者に対して課されるため、所有者として登記又は登録されている個人が賦課期日前に死亡している場合、固定資産課税台帳に新たな所有者が登録されていなければ何人に対しても固定資産税を課することはできない。"], "answer": 1, "explain": ""}, {"id": "R7-25", "year": 2025, "field": "税・その他", "q": "不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、誤っているものはどれか。", "choices": ["価格形成要因のうち個別的要因とは、一般経済社会における不動産のあり方及びその価格の水準に影響を与える要因をいい、自然的要因、社会的要因、経済的要因及び行政的要因に大別される。", "収益還元法は、賃貸用不動産又は賃貸以外の事業の用に供する不動産の価格を求める場合に特に有効な手段であり、自用の不動産であっても賃貸を想定することにより適用される。", "原価法における減価修正の方法としては、耐用年数に基づく方法と、観察減価法の2つの方法があり、これらは併用するものとする。", "対象建築物に関する工事が完了していない場合でも、当該工事の完了を前提として鑑定評価を行うことがある。"], "answer": 0, "explain": ""}, {"id": "R7-26", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者A（消費税課税事業者）及び宅地建物取引業者B（消費税課税事業者）が受領した報酬に関するアからウの記述のうち、宅地建物取引業法の規定によれば、誤っているものを全て掲げたものは1から4のうちどれか。なお、代理、媒介に当たり、広告の依頼は行われていないものとする。\nア　Aが単独で貸主と借主の双方から店舗用建物の貸借の媒介の依頼を受け、1か月の借賃24万円（消費税等相当額を含まない。）、権利金1,400万円（権利設定の対価として支払われるもので、返還されないものをいい、消費税等相当額を含まない。）の賃貸借契約を成立させ、依頼者の双方からそれぞれ52万8,000円を報酬として受領したことは、宅地建物取引業法に違反する。\nイ　現に長期間にわたって居住の用、事業の用その他の用途に供されておらず、かつ将来にわたり居住の用、事業の用その他の用途に供される見込みがない宅地（1か月の借賃5万円。消費税等相当額を含まない。）について、Aは貸主から代理を依頼され、Bは借主から代理を依頼され、賃貸借契約が成立したので、Aは貸主から4万円を、Bは、代理の依頼を受けるに当たって、報酬が借賃の1.1か月分を超えることについて借主から承諾を得たうえで、借主から7万円を報酬として受領したことは、宅地建物取引業法に違反しない。\nウ　Aは売主から媒介の依頼を、Bは買主から媒介の依頼を、それぞれ受けて、代金200万円（消費税等相当額を含み、土地代金は90万円である。）の土地付建物の売買契約を成立させた場合に、依頼者と宅地建物取引業者との間であらかじめ報酬の額を定めていなかったときは、売主はAに対して少なくとも10万4,500円、買主はBに対して少なくとも10万4,500円を支払わなければならない。", "choices": ["ア、イ", "イ、ウ", "ア、ウ", "ア、イ、ウ"], "answer": 3, "explain": ""}, {"id": "R7-27", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明及び重要事項説明書の交付に関する次の記述のうち、正しいものはどれか。ただし、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["宅地建物取引業者は、区分所有建物の売買の媒介を行う場合に、当該一棟の建物及びその敷地の管理が法人に委託されているときは、その委託を受けている法人の商号又は名称及び主たる事務所の所在地を説明しなければならない。", "宅地建物取引業者は、自身が売主となる場合に、重要事項説明書の交付に当たり、専任の宅地建物取引士をして当該書面に記名させなければならず、また、買主にも当該書面に記名させなければならない。", "宅地建物取引業者は、重要事項を説明する際には、宅地建物取引業者の事務所において行わなければならない。", "宅地建物取引業者は、自身が売主となる場合であっても、買主に対して、天災その他不可抗力による損害の負担に関する定めがあるときは、その内容を説明しなければならない。"], "answer": 0, "explain": ""}, {"id": "R7-28", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者の業務に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはいくつあるか。\nア　自ら売主として販売する宅地又は建物の広告に取引態様の別を明示しなかった場合は、罰則の対象とはならないが監督処分の対象となり、宅地又は建物の規模について著しく事実に相違する表示をした場合は、罰則の対象にも監督処分の対象にもなる。\nイ　自ら売主として土地付建物の売買契約を締結しようとする場合、当該土地上に建てようとする建物が建築確認申請前であっても、広告することはできるが、建築確認を受けるまで、契約を締結することはできない。\nウ　宅地建物取引業者は、自ら売主として、宅地建物取引業者である買主との間で、自ら所有しない造成前の宅地の売買契約を締結するためには、法第41条の規定による手付金等の保全措置を講じ、かつ、売主である宅地建物取引業者が当該宅地を取得する契約を締結しなければならない。\nエ　宅地建物取引業者は、宅地の売買の専属専任媒介契約を締結した場合、当該媒介契約締結の日から5日以内（休業日を除く。）に、当該宅地について指定流通機構に所定の事項を登録しなければならない。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 1, "explain": ""}, {"id": "R7-29", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者Aが宅地建物取引業法第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["Aが媒介により事業用宅地の賃貸借契約を成立させた場合、37条書面を交付しなければならないが、契約の当事者Bが宅地建物取引業者であるときは、交付する必要はない。", "Aが自ら売主としてCと既存の建物の売買契約を締結した場合、建物の構造耐力上主要な部分等の状況について当事者の双方が確認した事項を37条書面に記載しなければならない。", "AがDを売主としEを買主とする宅地の売買契約を媒介した場合、天災その他不可抗力による損害の負担に関する定めがないときは、定めがない旨を37条書面に記載しなければならない。", "Aが自ら売主としてFと建物の売買契約を締結した場合、代金についての金銭の貸借のあっせんに関する定めがある場合における当該あっせんに係る金銭の貸借が成立しないときの措置については、37条書面に記載する必要はない。"], "answer": 1, "explain": ""}, {"id": "R7-30", "year": 2025, "field": "宅建業法", "q": "いずれも宅地建物取引業者であるA社、B社及びC社（以下この問において「売主ら」という。）が、分譲マンションを共同で建築、販売することとなり、建築確認を受けた後、工事完了前にその一室を5,000万円で宅地建物取引業者ではない個人である買主に売却しようとする場合に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）に違反するものはいくつあるか。\nア　売主らは、共同する全社が各個に重要事項説明を実施すると、かえって買主を混乱させると考え、買主の了解を得た上で、A社1社を幹事社とし、A社の宅地建物取引士が単独で重要事項説明書に記名のうえ、買主に交付し説明を行った。\nイ　売主らは、A社の事務所において買主から買受けの申込みを受け、売買契約を締結したが、売主らは当該売買契約には法第37条の2の規定に基づくいわゆるクーリング・オフの適用はないと判断し、クーリング・オフについて買主に告げる書面の交付は行わなかった。\nウ　売主らは、当該物件については、重要事項説明の時点では共用部分に関する規約が案であるので、買主の了解を得た上で、契約締結後に決定した規約を交付することとし、重要事項説明書への記載は省略した。\nエ　売主らは買主から手付金500万円を受領することとしたが、手付金の保全措置を講じる必要はないと判断し、手付金保全措置の概要について重要事項説明書への記載は省略した。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R7-31", "year": 2025, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法により禁止されている行為が含まれているものはいくつあるか。\nア　宅地建物取引士が、マンション販売の勧誘を電話で行うにあたり、まず、契約締結について勧誘する目的である旨を告げたうえで、自分の名前は名乗らず、自身の勤務する宅地建物取引業者の名称及び免許番号を伝えたうえで勧誘を行った。\nイ　宅地建物取引業者が、賃貸マンションの媒介で入居申込者から申込みを受け付けたところ、当該マンションのオーナーからの審査回答待ちとなった。その後、入居申込者が、申込みを撤回したい旨電話で伝えたところ、当該宅地建物取引業者の従業員から声を荒げ「撤回をするなら、とりあえず事務所まで来てくれないと困る」と怒鳴られ、面会を強要された。申込者はその言動に不安を覚えたため、事務所に赴いて、申込みの撤回を申し出たところ、申込みの撤回が了承された。\nウ　宅地建物取引業者が、一時的にアルバイトを雇って、マンション販売の広告チラシの配布を行わせることとしたほか、契約書の作成業務も補助的に行わせるため、従業者証明書をその者に発行し、それらの業務を行わせた。ただし、そのアルバイトはマンション販売の広告チラシの配布の際には、従業者証明書を携帯していなかった。\nエ　マンションの販売の勧誘における説明において、宅地建物取引士は、日当たりのよいマンションの購入希望者に対して、「マンション南側の月極駐車場は出来たばかりであり、将来にわたりそこにマンションなどの高層の建物が建つ予定は全くない」と説明し、購入希望者から購入申込みを受け付けた。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "explain": ""}, {"id": "R7-32", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではないBとの間でマンション（代金4,000万円）の売買契約を締結した場合に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定に違反しないものはどれか。", "choices": ["Aは、建築工事完了前のマンションの売買契約を締結する際にBから手付金200万円を受領し、さらに建築工事中に200万円を中間金として受領した後、当該手付金と中間金について法第41条に定める保全措置を講じた。", "Aは、建築工事完了後のマンションの売買契約を締結する際に、法第41条の2に定める保全措置を講じることなくBから手付金400万円を受領した。", "Aは、建築工事完了前のマンションの売買契約を締結する際にBから手付金500万円を受領したが、Bに債務不履行がないにもかかわらず当該手付金500万円を返還して、契約を一方的に解除した。", "Aは、建築工事完了後のマンションの売買契約を締結する際に、当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の予定額を1,000万円とする特約を定めた。"], "answer": 1, "explain": ""}, {"id": "R7-33", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者Aが行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはいくつあるか。なお、この問において「37条書面」とは、同法第37条の規定により交付すべき書面をいうものとする。\nア　建物の賃貸借の媒介をするAは、当該建物の引渡しの時期について、重要事項説明書に記載して説明する必要はないが、37条書面には記載しなければならない。\nイ　Aは、自ら売主として建物を売却する場合、重要事項説明書に記載しなければならない契約の解除に関する事項については、契約に定めがなくても37条書面に全て記載しなければならない。\nウ　Aは、売主を代理して、抵当権が登記されている建物を売却する場合、買主に交付する37条書面だけでなく、売主に交付する37条書面についても、当該抵当権の内容を記載しなければならない。\nエ　建物の賃貸借の媒介をするAは、37条書面を交付するに当たり、宅地建物取引士をして、その内容を説明させなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R7-34", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア　A社の政令で定める使用人Bは、刑法第234条（威力業務妨害）の罪により、懲役2年、執行猶予2年の刑に処せられた後、A社を退任し、新たにC社の政令で定める使用人に就任した。Bの執行猶予期間が満了していない場合に、C社が免許を申請しても、免許を受けることができない。\nイ　D社は、不正の手段により免許を取得したことによる免許の取消処分に係る聴聞の期日及び場所が公示された日から当該処分がなされるまでの間に、宅地建物取引業法第11条の規定による廃業の届出をした。そ
