ain": ""}, {"id": "R2-36", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業保証協会（以下この問において「保証協会」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["保証協会の社員との宅地建物取引業に関する取引により生じた債権を有する者は、当該社員が納付した弁済業務保証金分担金の額に相当する額の範囲内で弁済を受ける権利を有する。", "保証協会の社員と宅地建物取引業に関し取引をした者が、その取引により生じた債権に関し、弁済業務保証金について弁済を受ける権利を実行するときは、当該保証協会の認証を受けるとともに、当該保証協会に対し還付請求をしなければならない。", "保証協会は、弁済業務保証金の還付があったときは、当該還付に係る社員又は社員であった者に対し、当該還付額に相当する額の還付充当金をその主たる事務所の最寄りの供託所に供託すべきことを通知しなければならない。", "保証協会は、弁済業務保証金の還付があったときは、当該還付額に相当する額の弁済業務保証金を供託しなければならない。"], "answer": 3, "explain": ""}, {"id": "R2-37", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として宅地の売買契約を締結した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、この問において「37条書面」とは、同法第37条の規定に基づき交付すべき書面をいうものとする。\nア　Aは、専任の宅地建物取引士をして、37条書面の内容を当該契約の買主に説明させなければならない。\nイ　Aは、供託所等に関する事項を37条書面に記載しなければならない。\nウ　Aは、買主が宅地建物取引業者であっても、37条書面を遅滞なく交付しなければならない。\nエ　Aは、買主が宅地建物取引業者であるときは、当該宅地の引渡しの時期及び移転登記の申請の時期を37条書面に記載しなくてもよい。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "explain": ""}, {"id": "R2-38", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者Aが、BからB所有の甲住宅の売却に係る媒介の依頼を受けて締結する一般媒介契約に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["Aは、法第34条の2第1項の規定に基づき交付すべき書面に、宅地建物取引士をして記名押印させなければならない。", "Aは、甲住宅の価額について意見を述べる場合、Bに対してその根拠を口頭ではなく書面で明示しなければならない。", "Aは、当該媒介契約を締結した場合、指定流通機構に甲住宅の所在等を登録しなければならない。", "Aは、媒介契約の有効期間及び解除に関する事項を、法第34条の2第1項の規定に基づき交付すべき書面に記載しなければならない。"], "answer": 3, "explain": ""}, {"id": "R2-39", "year": 2020, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者は、従業者名簿の閲覧の請求があったときは、取引の関係者か否かを問わず、請求した者の閲覧に供しなければならない。", "宅地建物取引業者は、その業務に従事させる者に従業者証明書を携帯させなければならず、その者が宅地建物取引士であり、宅地建物取引士証を携帯していても、従業者証明書を携帯させなければならない。", "宅地建物取引業者は、その事務所ごとに従業者名簿を備えなければならないが、退職した従業者に関する事項は、個人情報保護の観点から従業者名簿から消去しなければならない。", "宅地建物取引業者は、その業務に従事させる者に従業者証明書を携帯させなければならないが、その者が非常勤の役員や単に一時的に事務の補助をする者である場合には携帯させなくてもよい。"], "answer": 1, "explain": ""}, {"id": "R2-40", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではないBとの間で宅地の売買契約を締結した場合における、宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、Bがクーリング・オフにより契約の解除を行うことができるものはいくつあるか。\nア　Bが喫茶店で当該宅地の買受けの申込みをした場合において、Bが、Aからクーリング・オフについて書面で告げられた日の翌日から起算して8日目にクーリング・オフによる契約の解除の書面を発送し、10日目にAに到達したとき。\nイ　Bが喫茶店で当該宅地の買受けの申込みをした場合において、クーリング・オフによる契約の解除ができる期間内に、Aが契約の履行に着手したとき。\nウ　Bが喫茶店で当該宅地の買受けの申込みをした場合において、AとBとの間でクーリング・オフによる契約の解除をしない旨の合意をしたとき。\nエ　Aの事務所ではないがAが継続的に業務を行うことができる施設があり宅地建物取引業法第31条の3第1項の規定により専任の宅地建物取引士が置かれている場所で、Bが買受けの申込みをし、2日後に喫茶店で売買契約を締結したとき。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "explain": ""}, {"id": "R2-41", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。", "choices": ["重要事項説明書には、代表者の記名押印があれば宅地建物取引士の記名押印は必要がない。", "重要事項説明書に記名押印する宅地建物取引士は専任の宅地建物取引士でなければならないが、実際に重要事項の説明を行う者は専任の宅地建物取引士でなくてもよい。", "宅地建物取引士証を亡失した宅地建物取引士は、その再交付を申請していても、宅地建物取引士証の再交付を受けるまでは重要事項の説明を行うことができない。", "重要事項の説明は、宅地建物取引業者の事務所において行わなければならない。"], "answer": 2, "explain": ""}, {"id": "R2-42", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として締結する売買契約に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）及び民法の規定によれば、誤っているものはどれか。", "choices": ["Aが宅地建物取引業者ではないBとの間で締結する宅地の売買契約において、当該宅地の種類又は品質に関して契約の内容に適合しない場合におけるその不適合を担保すべき責任を負う期間をBがその不適合を知った時から2年とする特約を定めた場合、この特約は有効である。", "Aが宅地建物取引業者ではないCとの間で建築工事の完了前に締結する建物（代金5,000万円）の売買契約においては、Aは、手付金200万円を受領した後、法第41条に定める手付金等の保全措置を講じなければ、当該建物の引渡し前に中間金300万円を受領することができない。", "Aが宅地建物取引業者Dとの間で造成工事の完了後に締結する宅地（代金3,000万円）の売買契約においては、Aは、法第41条の2に定める手付金等の保全措置を講じないで、当該宅地の引渡し前に手付金800万円を受領することができる。", "Aが宅地建物取引業者ではないEとの間で締結する建物の売買契約において、Aは当該建物の種類又は品質に関して契約の内容に適合しない場合におけるその不適合を担保すべき責任を一切負わないとする特約を定めた場合、この特約は無効となり、Aが当該責任を負う期間は当該建物の引渡日から2年となる。"], "answer": 0, "explain": "※公式発表により、選択肢1又は4のいずれも正解として扱われる問題です。"}, {"id": "R2-43", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["免許を受けようとするA社の取締役が刑法第204条（傷害）の罪により懲役1年執行猶予2年の刑に処せられた場合、刑の執行猶予の言渡しを取り消されることなく猶予期間を満了し、その日から5年を経過しなければ、A社は免許を受けることができない。", "宅地建物取引業者である個人Bが死亡した場合、その相続人Cは、Bが締結した契約に基づく取引を結了する目的の範囲内において宅地建物取引業者とみなされ、Bが売主として締結していた売買契約の目的物を買主に引き渡すことができる。", "宅地建物取引業者D社について破産手続開始の決定があった場合、D社を代表する役員は廃業を届け出なければならない。また、廃業が届け出られた日にかかわらず、破産手続開始の決定の日をもって免許の効力が失われる。", "免許を受けようとするE社の取締役について、破産手続開始の決定があった場合、復権を得た日から5年を経過しなければ、E社は免許を受けることができない。"], "answer": 1, "explain": ""}, {"id": "R2-44", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、誤っているものはどれか。なお、特に断りのない限り、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["昭和55年に新築の工事に着手し完成した建物の売買の媒介を行う場合、当該建物が地方公共団体による耐震診断を受けたものであるときは、その内容を説明しなければならない。", "貸借の媒介を行う場合、敷金その他いかなる名義をもって授受されるかを問わず、契約終了時において精算することとされている金銭の精算に関する事項を説明しなければならない。", "自らを委託者とする宅地又は建物に係る信託の受益権の売主となる場合、取引の相手方が宅地建物取引業者であっても、重要事項説明書を交付して説明をしなければならない。", "区分所有建物の売買の媒介を行う場合、一棟の建物の計画的な維持修繕のための費用の積立てを行う旨の規約の定めがあるときは、その内容を説明しなければならないが、既に積み立てられている額について説明する必要はない。"], "answer": 3, "explain": ""}, {"id": "R2-45", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者A（甲県知事免許）が、自ら売主として宅地建物取引業者ではない買主Bに新築住宅を販売する場合における次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。", "choices": ["Aが媒介を依頼した宅地建物取引業者又はBが住宅販売瑕疵担保責任保険契約の締結をしていれば、Aは住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う必要はない。", "Aが住宅販売瑕疵担保保証金の供託をし、その額が、基準日において、販売新築住宅の合計戸数を基礎として算定する基準額を超えることとなった場合、甲県知事の承認を受けた上で、その超過額を取り戻すことができる。", "新築住宅をBに引き渡したAは、基準日ごとに基準日から50日以内に、当該基準日に係る住宅販売瑕疵担保保証金の供託及び住宅販売瑕疵担保責任保険契約の締結の状況について、甲県知事に届け出なければならない。", "Bが宅地建物取引業者である場合であっても、Aは、Bに引き渡した新築住宅について、住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う義務を負う。"], "answer": 1, "explain": ""}, {"id": "R2-46", "year": 2020, "field": "免除科目", "q": "独立行政法人住宅金融支援機構（以下この問において「機構」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、証券化支援事業（買取型）において、金融機関から買い取った住宅ローン債権を担保としてMBS（資産担保証券）を発行している。", "機構は、災害により住宅が滅失した場合におけるその住宅に代わるべき住宅の建設又は購入に係る貸付金については、元金据置期間を設けることができない。", "機構は、証券化支援事業（買取型）において、賃貸住宅の建設又は購入に必要な資金の貸付けに係る金融機関の貸付債権については譲受けの対象としていない。", "機構は、貸付けを受けた者とあらかじめ契約を締結して、その者が死亡した場合に支払われる生命保険の保険金を当該貸付けに係る債務の弁済に充当する団体信用生命保険を業務として行っている。"], "answer": 1, "explain": ""}, {"id": "R2-47", "year": 2020, "field": "免除科目", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法（不動産の表示に関する公正競争規約を含む。）の規定によれば、正しいものはどれか。", "choices": ["路地状部分（敷地延長部分）のみで道路に接する土地であって、その路地状部分の面積が当該土地面積のおおむね30%以上を占める場合には、路地状部分を含む旨及び路地状部分の割合又は面積を明示しなければならない。", "新築住宅を販売するに当たり、当該物件から最寄駅まで実際に歩いたときの所要時間が15分であれば、物件から最寄駅までの道路距離にかかわらず、広告中に「最寄駅まで徒歩15分」と表示することができる。", "新築分譲住宅を販売するに当たり、予告広告である旨及び契約又は予約の申込みには応じられない旨を明瞭に表示すれば、当該物件が建築確認を受けていなくても広告表示をすることができる。", "新築分譲マンションを販売するに当たり、住戸により管理費の額が異なる場合であって、すべての住戸の管理費を示すことが広告スペースの関係で困難なときは、全住戸の管理費の平均額を表示すればよい。"], "answer": 0, "explain": ""}, {"id": "R2-48", "year": 2020, "field": "免除科目", "q": "次の記述のうち、正しいものはどれか。", "choices": ["令和2年地価公示（令和2年3月公表）によれば、平成31年1月以降の1年間の地価変動は、全国平均では、住宅地については下落であったが、商業地については上昇であった。", "令和2年版土地白書（令和2年6月公表）によれば、土地取引について、売買による所有権の移転登記の件数でその動向をみると、令和元年の全国の土地取引件数は約131万件となり、前年に比べて大きく増加した。", "建築着工統計（令和2年1月公表）によれば、平成31年1月から令和元年12月までの持家及び分譲住宅の新設住宅着工戸数は前年に比べて増加したが、貸家の新設住宅着工戸数は減少した。", "平成30年度法人企業統計調査（令和元年9月公表）によれば、不動産業の売上高経常利益率は、平成26年度から平成30年度までの5年間は、いずれも5%以下となっている。"], "answer": 2, "explain": ""}, {"id": "R2-49", "year": 2020, "field": "免除科目", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["都市の中小河川の氾濫の原因の一つは、急速な都市化、宅地化に伴い、降雨時に雨水が短時間に大量に流れ込むようになったことである。", "中小河川に係る防災の観点から、宅地選定に当たっては、その地点だけでなく、周辺の地形と防災施設に十分注意することが必要である。", "地盤の液状化については、宅地の地盤条件について調べるとともに、過去の地形についても古地図などで確認することが必要である。", "地形や地質的な条件については、宅地に適しているか調査する必要があるが、周辺住民の意見は聴かなくてよい。"], "answer": 3, "explain": ""}, {"id": "R2-50", "year": 2020, "field": "免除科目", "q": "建築物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["建物の構成は、大きく基礎構造と上部構造からなっており、基礎構造は地業と基礎盤から構成されている。", "基礎の種類には、基礎の底面が建物を支持する地盤に直接接する直接基礎と、建物を支持する地盤が深い場合に使用する杭基礎（杭地業）がある。", "直接基礎の種類には、形状により、柱の下に設ける独立基礎、壁体等の下に設けるべた基礎、建物の底部全体に設ける布基礎（連続基礎）等がある。", "上部構造は、重力、風力、地震力等の荷重に耐える役目を負う主要構造と、屋根、壁、床等の仕上げ部分等から構成されている。"], "answer": 2, "explain": ""}, {"id": "R1-01", "year": 2019, "field": "権利関係", "q": "Aは、Aが所有している甲土地をBに売却した。この場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["甲土地を何らの権原なく不法占有しているCがいる場合、BがCに対して甲土地の所有権を主張して明渡請求をするには、甲土地の所有権移転登記を備えなければならない。", "Bが甲土地の所有権移転登記を備えていない場合には、Aから建物所有目的で甲土地を賃借して甲土地上にD名義の登記ある建物を有するDに対して、Bは自らが甲土地の所有者であることを主張することができない。", "Bが甲土地の所有権移転登記を備えないまま甲土地をEに売却した場合、Eは、甲土地の所有権移転登記なくして、Aに対して甲土地の所有権を主張することができる。", "Bが甲土地の所有権移転登記を備えた後に甲土地につき取得時効が完成したFは、甲土地の所有権移転登記を備えていなくても、Bに対して甲土地の所有権を主張することができる。"], "answer": 0, "explain": ""}, {"id": "R1-02", "year": 2019, "field": "権利関係", "q": "AがBに甲土地を売却し、Bが所有権移転登記を備えた場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["AがBとの売買契約をBの詐欺を理由に取り消した後、CがBから甲土地を買い受けて所有権移転登記を備えた場合、AC間の関係は対抗問題となり、Aは、いわゆる背信的悪意者ではないCに対して、登記なくして甲土地の返還を請求することができない。", "AがBとの売買契約をBの詐欺を理由に取り消す前に、Bの詐欺について悪意のCが、Bから甲土地を買い受けて所有権移転登記を備えていた場合、AはCに対して、甲土地の返還を請求することができる。", "Aの売却の意思表示に要素の錯誤がある場合、Aに重大な過失がなければ、Aは、Bから甲土地を買い受けたCに対して、錯誤による当該意思表示の無効を主張して、甲土地の返還を請求することができる。", "Aの売却の意思表示に要素の錯誤がある場合、Aに重大な過失があったとしても、AはBに対して、錯誤による当該意思表示の無効を主張して、甲土地の返還を請求することができる。"], "answer": 3, "explain": ""}, {"id": "R1-03", "year": 2019, "field": "権利関係", "q": "事業者ではないAが所有し居住している建物につきAB間で売買契約を締結するに当たり、Aは建物引渡しから3か月に限り瑕疵担保責任を負う旨の特約を付けたが、売買契約締結時点において当該建物の構造耐力上主要な部分に瑕疵が存在しており、Aはそのことを知っていたがBに告げず、Bはそのことを知らなかった。この場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["Bが当該瑕疵の存在を建物引渡しから1年が経過した時に知ったとしても、当該瑕疵の存在を知った時から1年以内であれば、BはAに対して瑕疵担保責任を追及することができる。", "建物の構造耐力上主要な部分の瑕疵については、契約の目的を達成できるか否かにかかわらず、Bは瑕疵を理由に売買契約を解除することができる。", "Bが瑕疵を理由にAに対して損害賠償請求をすることができるのは、瑕疵を理由に売買契約を解除することができない場合に限られる。", "AB間の売買をBと媒介契約を締結した宅地建物取引業者Cが媒介していた場合には、BはCに対して瑕疵担保責任を追及することができる。"], "answer": 0, "explain": ""}, {"id": "R1-04", "year": 2019, "field": "権利関係", "q": "不法行為に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["放火によって家屋が滅失し、火災保険契約の被保険者である家屋所有者が当該保険契約に基づく保険金請求権を取得した場合、当該家屋所有者は、加害者に対する損害賠償請求金額からこの保険金額を、いわゆる損益相殺として控除しなければならない。", "被害者は、不法行為によって損害を受けると同時に、同一の原因によって損害と同質性のある利益を既に受けた場合でも、その額を加害者の賠償すべき損害額から控除されることはない。", "第三者が債務者を教唆して、その債務の全部又は一部の履行を不能にさせたとしても、当該第三者が当該債務の債権者に対して、不法行為責任を負うことはない。", "名誉を違法に侵害された者は、損害賠償又は名誉回復のための処分を求めることができるほか、人格権としての名誉権に基づき、加害者に対し侵害行為の差止めを求めることができる。"], "answer": 3, "explain": ""}, {"id": "R1-05", "year": 2019, "field": "権利関係", "q": "次の1から4までの記述のうち、民法の規定及び判例並びに下記判決文によれば、誤っているものはどれか。\n（判決文）\n本人が無権代理行為の追認を拒絶した場合には、その後に無権代理人が本人を相続したとしても、無権代理行為が有効になるものではないと解するのが相当である。けだし、無権代理人がした行為は、本人がその追認をしなければ本人に対してその効力を生ぜず（民法113条1項）、本人が追認を拒絶すれば無権代理行為の効力が本人に及ばないことが確定し、追認拒絶の後は本人であっても追認によって無権代理行為を有効とすることができず、右追認拒絶の後に無権代理人が本人を相続したとしても、右追認拒絶の効果に何ら影響を及ぼすものではないからである。", "choices": ["本人が無権代理行為の追認を拒絶した場合、その後は本人であっても無権代理行為を追認して有効な行為とすることはできない。", "本人が追認拒絶をした後に無権代理人が本人を相続した場合と、本人が追認拒絶をする前に無権代理人が本人を相続した場合とで、法律効果は同じである。", "無権代理行為の追認は、別段の意思表示がないときは、契約の時にさかのぼってその効力を生ずる。ただし、第三者の権利を害することはできない。", "本人が無権代理人を相続した場合、当該無権代理行為は、その相続により当然には有効とならない。"], "answer": 1, "explain": ""}, {"id": "R1-06", "year": 2019, "field": "権利関係", "q": "遺産分割に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["被相続人は、遺言によって遺産分割を禁止することはできず、共同相続人は、遺産分割協議によって遺産の全部又は一部の分割をすることができる。", "共同相続人は、既に成立している遺産分割協議につき、その全部又は一部を全員の合意により解除した上、改めて遺産分割協議を成立させることができる。", "遺産に属する預貯金債権は、相続開始と同時に当然に相続分に応じて分割され、共同相続人は、その持分に応じて、単独で預貯金債権に関する権利を行使することができる。", "遺産の分割は、共同相続人の遺産分割協議が成立した時から効力を生ずるが、第三者の権利を害することはできない。"], "answer": 1, "explain": ""}, {"id": "R1-07", "year": 2019, "field": "権利関係", "q": "Aを売主、Bを買主として甲建物の売買契約が締結された場合におけるBのAに対する代金債務（以下「本件代金債務」という。）に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Bが、本件代金債務につき受領権限のないCに対して弁済した場合、Cに受領権限がないことを知らないことにつきBに過失があれば、Cが受領した代金をAに引き渡したとしても、Bの弁済は有効にならない。", "Bが、Aの代理人と称するDに対して本件代金債務を弁済した場合、Dに受領権限がないことにつきBが善意かつ無過失であれば、Bの弁済は有効となる。", "Bが、Aの相続人と称するEに対して本件代金債務を弁済した場合、Eに受領権限がないことにつきBが善意かつ無過失であれば、Bの弁済は有効となる。", "Bは、本件代金債務の履行期が過ぎた場合であっても、特段の事情がない限り、甲建物の引渡しに係る履行の提供を受けていないことを理由として、Aに対して代金の支払を拒むことができる。"], "answer": 0, "explain": ""}, {"id": "R1-08", "year": 2019, "field": "権利関係", "q": "Aを注文者、Bを請負人とする請負契約（以下「本件契約」という。）が締結された場合における次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["本件契約の目的物たる建物に重大な瑕疵があるためこれを建て替えざるを得ない場合には、AはBに対して当該建物の建替えに要する費用相当額の損害賠償を請求することができる。", "本件契約が、事務所の用に供するコンクリート造の建物の建築を目的とする場合、Bの瑕疵担保責任の存続期間を20年と定めることができる。", "本件契約の目的が建物の増築である場合、Aの失火により当該建物が焼失し増築できなくなったときは、Bは本件契約に基づく未履行部分の仕事完成債務を免れる。", "Bが仕事を完成しない間は、AはいつでもBに対して損害を賠償して本件契約を解除することができる。"], "answer": 1, "explain": ""}, {"id": "R1-09", "year": 2019, "field": "権利関係", "q": "AがBに対して金銭の支払を求めて訴えを提起した場合の時効の中断に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["訴えの提起後に当該訴えが取り下げられた場合には、特段の事情がない限り、時効中断の効力は生じない。", "訴えの提起後に当該訴えの却下の判決が確定した場合には、時効中断の効力は生じない。", "訴えの提起後に請求棄却の判決が確定した場合には、時効中断の効力は生じない。", "訴えの提起後に裁判上の和解が成立した場合には、時効中断の効力は生じない。"], "answer": 3, "explain": ""}, {"id": "R1-10", "year": 2019, "field": "権利関係", "q": "債務者Aが所有する甲土地には、債権者Bが一番抵当権（債権額2,000万円）、債権者Cが二番抵当権（債権額2,400万円）、債権者Dが三番抵当権（債権額3,000万円）をそれぞれ有しているが、BはDの利益のために抵当権の順位を譲渡した。甲土地の競売に基づく売却代金が6,000万円であった場合、Bの受ける配当額として、民法の規定によれば、正しいものはどれか。", "choices": ["600万円", "1,000万円", "1,440万円", "1,600万円"], "answer": 0, "explain": ""}, {"id": "R1-11", "year": 2019, "field": "権利関係", "q": "甲土地につき、期間を50年と定めて賃貸借契約を締結しようとする場合（以下「ケース①」という。）と、期間を15年と定めて賃貸借契約を締結しようとする場合（以下「ケース②」という。）に関する次の記述のうち、民法及び借地借家法の規定によれば、正しいものはどれか。", "choices": ["賃貸借契約が建物を所有する目的ではなく、資材置場とする目的である場合、ケース①は期間の定めのない契約になり、ケース②では期間は15年となる。", "賃貸借契約が建物の所有を目的とする場合、公正証書で契約を締結しなければ、ケース①の期間は30年となり、ケース②の期間は15年となる。", "賃貸借契約が居住の用に供する建物の所有を目的とする場合、ケース①では契約の更新がないことを書面で定めればその特約は有効であるが、ケース②では契約の更新がないことを書面で定めても無効であり、期間は30年となる。", "賃貸借契約が専ら工場の用に供する建物の所有を目的とする場合、ケース①では契約の更新がないことを公正証書で定めた場合に限りその特約は有効であるが、ケース②では契約の更新がないことを公正証書で定めても無効である。"], "answer": 2, "explain": ""}, {"id": "R1-12", "year": 2019, "field": "権利関係", "q": "AがBに対し、A所有の甲建物を3年間賃貸する旨の契約をした場合における次の記述のうち、民法及び借地借家法の規定によれば、正しいものはどれか（借地借家法第39条に定める取壊し予定の建物の賃貸借及び同法第40条に定める一時使用目的の建物の賃貸借は考慮しないものとする。）。", "choices": ["AB間の賃貸借契約について、契約の更新がない旨を定めるには、公正証書による等書面によって契約すれば足りる。", "甲建物が居住の用に供する建物である場合には、契約の更新がない旨を定めることはできない。", "AがBに対して、期間満了の3月前までに更新しない旨の通知をしなければ、従前の契約と同一の条件で契約を更新したものとみなされるが、その期間は定めがないものとなる。", "Bが適法に甲建物をCに転貸していた場合、Aは、Bとの賃貸借契約が解約の申入れによって終了するときは、特段の事情がない限り、Cにその旨の通知をしなければ、賃貸借契約の終了をCに対抗することができない。"], "answer": 3, "explain": ""}, {"id": "R1-13", "year": 2019, "field": "権利関係", "q": "建物の区分所有等に関する法律（以下この問において「法」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["専有部分が数人の共有に属するときは、共有者は、集会においてそれぞれ議決権を行使することができる。", "区分所有者の承諾を得て専有部分を占有する者は、会議の目的たる事項につき利害関係を有する場合には、集会に出席して議決権を行使することができる。", "集会においては、規約に別段の定めがある場合及び別段の決議をした場合を除いて、管理者又は集会を招集した区分所有者の1人が議長となる。", "集会の議事は、法又は規約に別段の定めがない限り、区分所有者及び議決権の各4分の3以上の多数で決する。"], "answer": 2, "explain": ""}, {"id": "R1-14", "year": 2019, "field": "権利関係", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。", "choices": ["登記の申請に係る不動産の所在地が当該申請を受けた登記所の管轄に属しないときは、登記官は、理由を付した決定で、当該申請を却下しなければならない。", "所有権の登記名義人が相互に異なる土地の合筆の登記は、することができない。", "登記官は、一筆の土地の一部が別の地目となったときであっても、職権で当該土地の分筆の登記をすることはできない。", "登記の申請をする者の委任による代理人の権限は、本人の死亡によっては、消滅しない。"], "answer": 2, "explain": ""}, {"id": "R1-15", "year": 2019, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。", "choices": ["高度地区は、用途地域内において市街地の環境を維持し、又は土地利用の増進を図るため、建築物の高さの最高限度又は最低限度を定める地区とされている。", "特定街区については、都市計画に、建築物の容積率並びに建築物の高さの最高限度及び壁面の位置の制限を定めるものとされている。", "準住居地域は、道路の沿道としての地域の特性にふさわしい業務の利便の増進を図りつつ、これと調和した住居の環境を保護するため定める地域とされている。", "特別用途地区は、用途地域が定められていない土地の区域（市街化調整区域を除く。）内において、その良好な環境の形成又は保持のため当該地域の特性に応じて合理的な土地利用が行われるよう、制限すべき特定の建築物等の用途の概要を定める地区とされている。"], "answer": 3, "explain": ""}, {"id": "R1-16", "year": 2019, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。ただし、許可を要する開発行為の面積については、条例による定めはないものとし、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["準都市計画区域において、店舗の建築を目的とした4,000m2の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "市街化区域において、農業を営む者の居住の用に供する建築物の建築を目的とした1,500m2の土地の区画形質の変更を行おうとする者は、都道府県知事の許可を受けなくてよい。", "市街化調整区域において、野球場の建設を目的とした8,000m2の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "市街化調整区域において、医療法に規定する病院の建築を目的とした1,000m2の土地の区画形質の変更を行おうとする者は、都道府県知事の許可を受けなくてよい。"], "answer": 0, "explain": ""}, {"id": "R1-17", "year": 2019, "field": "法令上の制限", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。", "choices": ["特定行政庁は、緊急の必要がある場合においては、建築基準法の規定に違反した建築物の所有者等に対して、仮に、当該建築物の使用禁止又は使用制限の命令をすることができる。", "地方公共団体は、条例で、津波、高潮、出水等による危険の著しい区域を災害危険区域として指定することができ、当該区域内における住居の用に供する建築物の建築の禁止その他建築物の建築に関する制限で災害防止上必要なものは当該条例で定めることとされている。", "防火地域内にある看板で建築物の屋上に設けるものは、その主要な部分を不燃材料で造り、又はおおわなければならない。", "共同住宅の住戸には、非常用の照明装置を設けなければならない。"], "answer": 3, "explain": ""}, {"id": "R1-18", "year": 2019, "field": "法令上の制限", "q": "建築基準法に関する次の記述のうち、正しいものはどれか。", "choices": ["第一種低層住居専用地域内においては、延べ面積の合計が60m2であって、居住の用に供する延べ面積が40m2、クリーニング取次店の用に供する延べ面積が20m2である兼用住宅は、建築してはならない。", "工業地域内においては、幼保連携型認定こども園を建築することができる。", "都市計画において定められた建蔽率の限度が10分の8とされている地域外で、かつ、防火地域内にある準耐火建築物の建蔽率については、都市計画において定められた建蔽率の数値に10分の1を加えた数値が限度となる。", "地方公共団体は、その敷地が袋路状道路にのみ接する一戸建ての住宅について、条例で、その敷地が接しなければならない道路の幅員に関して必要な制限を付加することができる。"], "answer": 1, "explain": ""}, {"id": "R1-19", "year": 2019, "field": "法令上の制限", "q": "宅地造成等規制法に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["宅地造成工事規制区域外において行われる宅地造成に関する工事については、造成主は、工事に着手する日の14日前までに都道府県知事に届け出なければならない。", "宅地造成工事規制区域内において行われる宅地造成に関する工事の許可を受けた者は、国土交通省令で定める軽微な変更を除き、当該許可に係る工事の計画の変更をしようとするときは、遅滞なくその旨を都道府県知事に届け出なければならない。", "宅地造成工事規制区域の指定の際に、当該宅地造成工事規制区域内において宅地造成工事を行っている者は、当該工事について都道府県知事の許可を受ける必要はない。", "都道府県知事は、宅地造成に伴い災害が生ずるおそれが大きい市街地又は市街地となろうとする土地の区域であって、宅地造成に関する工事について規制を行う必要があるものを、造成宅地防災区域として指定することができる。"], "answer": 2, "explain": ""}, {"id": "R1-20", "year": 2019, "field": "法令上の制限", "q": "土地区画整理法に関する次の記述のうち、誤っているものはどれか。", "choices": ["仮換地の指定があった日後、土地区画整理事業の施行による施行地区内の土地及び建物の変動に係る登記がされるまでの間は、登記の申請人が確定日付のある書類によりその指定前に登記原因が生じたことを証明した場合を除き、施行地区内の土地及び建物に関しては他の登記をすることができない。", "施行者が個人施行者、土地区画整理組合、区画整理会社、市町村、独立行政法人都市再生機構又は地方住宅供給公社であるときは、その換地計画について都道府県知事の認可を受けなければならない。", "個人施行者以外の施行者は、換地計画を定めようとする場合においては、その換地計画を2週間公衆の縦覧に供しなければならない。", "換地処分の公告があった場合においては、換地計画において定められた換地は、その公告があった日の翌日から従前の宅地とみなされ、換地計画において換地を定めなかった従前の宅地について存する権利は、その公告があった日が終了した時において消滅する。"], "answer": 0, "explain": ""}, {"id": "R1-21", "year": 2019, "field": "法令上の制限", "q": "農地に関する次の記述のうち、農地法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["耕作目的で原野を農地に転用しようとする場合、法第4条第1項の許可は不要である。", "金融機関からの資金借入れのために農地に抵当権を設定する場合、法第3条第1項の許可が必要である。", "市街化区域内の農地を自家用駐車場に転用する場合、法第4条第1項の許可が必要である。", "砂利採取法による認可を受けた採取計画に従って砂利採取のために農地を一時的に貸し付ける場合、法第5条第1項の許可は不要である。"], "answer": 0, "explain": ""}, {"id": "R1-22", "year": 2019, "field": "法令上の制限", "q": "国土利用計画法第23条の届出（以下この問において「事後届出」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["宅地建物取引業者Aが、自己の所有する市街化区域内の2,000m2の土地を、個人B、個人Cに1,000m2ずつに分割して売却した場合、B、Cは事後届出を行わなければならない。", "個人Dが所有する市街化区域内の3,000m2の土地を、個人Eが相続により取得した場合、Eは事後届出を行わなければならない。", "宅地建物取引業者Fが所有する市街化調整区域内の6,000m2の一団の土地を、宅地建物取引業者Gが一定の計画に従って、3,000m2ずつに分割して購入した場合、Gは事後届出を行わなければならない。", "甲市が所有する市街化調整区域内の12,000m2の土地を、宅地建物取引業者Hが購入した場合、Hは事後届出を行わなければならない。"], "answer": 2, "explain": ""}, {"id": "R1-23", "year": 2019, "field": "税・その他", "q": "個人が令和元年（平成31年）中に平成31年1月1日において所有期間が10年を超える居住用財産を譲渡した場合のその譲渡に係る譲渡所得の課税に関する次の記述のうち、誤っているものはどれか。", "choices": ["その譲渡について収用交換等の場合の譲渡所得等の5,000万円特別控除の適用を受ける場合であっても、その特別控除後の譲渡益について、居住用財産を譲渡した場合の軽減税率の特例の適用を受けることができる。", "居住用財産を譲渡した場合の軽減税率の特例は、その個人が平成29年において既にその特例の適用を受けている場合であっても、令和元年（平成31年）中の譲渡による譲渡益について適用を受けることができる。", "居住用財産の譲渡所得の3,000万円特別控除は、その個人がその個人と生計を一にしていない孫に譲渡した場合には、適用を受けることができない。", "その譲渡について収用等に伴い代替資産を取得した場合の課税の特例の適用を受ける場合には、その譲渡があったものとされる部分の譲渡益について、居住用財産を譲渡した場合の軽減税率の特例の適用を受けることができない。"], "answer": 1, "explain": ""}, {"id": "R1-24", "year": 2019, "field": "税・その他", "q": "固定資産税に関する次の記述のうち、地方税法の規定によれば、正しいものはどれか。", "choices": ["居住用超高層建築物（いわゆるタワーマンション）に対して課する固定資産税は、当該居住用超高層建築物に係る固定資産税額を、各専有部分の取引価格の当該居住用超高層建築物の全ての専有部分の取引価格の合計額に対する割合により按分した額を、各専有部分の所有者に対して課する。", "住宅用地のうち、小規模住宅用地に対して課する固定資産税の課税標準は、当該小規模住宅用地に係る固定資産税の課税標準となるべき価格の3分の1の額とされている。", "固定資産税の納期は、他の税目の納期と重複しないようにとの配慮から、4月、7月、12月、2月と定められており、市町村はこれと異なる納期を定めることはできない。", "固定資産税は、固定資産の所有者に対して課されるが、質権又は100年より永い存続期間の定めのある地上権が設定されている土地については、所有者ではなくその質権者又は地上権者が固定資産税の納税義務者となる。"], "answer": 3, "explain": ""}, {"id": "R1-25", "year": 2019, "field": "税・その他", "q": "地価公示法に関する次の記述のうち、正しいものはどれか。", "choices": ["都市及びその周辺の地域等において、土地の取引を行う者は、取引の対象土地から最も近傍の標準地について公示された価格を指標として取引を行うよう努めなければならない。", "標準地は、都市計画区域外や国土利用計画法の規定により指定された規制区域内からは選定されない。", "標準地の正常な価格とは、土地について、自由な取引が行われるとした場合におけるその取引（一定の場合を除く。）において通常成立すると認められる価格をいい、当該土地に関して地上権が存する場合は、この権利が存しないものとして通常成立すると認められる価格となる。", "土地鑑定委員会は、自然的及び社会的条件からみて類似の利用価値を有すると認められる地域において、土地の利用状況、環境等が特に良好と認められる一団の土地について標準地を選定する。"], "answer": 2, "explain": ""}, {"id": "R1-26", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業法に関する次の記述のうち、正しいものはどれか。", "choices": ["宅地建物取引業者は、自己の名義をもって、他人に、宅地建物取引業を営む旨の表示をさせてはならないが、宅地建物取引業を営む目的をもってする広告をさせることはできる。", "宅地建物取引業とは、宅地又は建物の売買等をする行為で業として行うものをいうが、建物の一部の売買の代理を業として行う行為は、宅地建物取引業に当たらない。", "宅地建物取引業の免許を受けていない者が営む宅地建物取引業の取引に、宅地建物取引業者が代理又は媒介として関与していれば、当該取引は無免許事業に当たらない。", "宅地建物取引業者の従業者が、当該宅地建物取引業者とは別に自己のために免許なく宅地建物取引業を営むことは、無免許事業に当たる。"], "answer": 3, "explain": ""}, {"id": "R1-27", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業法に関する次の記述のうち、正しいものはいくつあるか。なお、取引の相手方は宅地建物取引業者ではないものとする。\nア　宅地建物取引業者は、自己の所有に属しない宅地又は建物についての自ら売主となる売買契約を締結してはならないが、当該売買契約の予約を行うことはできる。\nイ　宅地建物取引業者は、自ら売主となる宅地又は建物の売買契約において、その目的物の瑕疵を担保すべき責任に関し、取引の相手方が同意した場合に限り、損害賠償の請求期間を当該宅地又は建物の引渡しの日から1年とする特約を有効に定めることができる。\nウ　宅地建物取引業者は、いかなる理由があっても、その業務上取り扱ったことについて知り得た秘密を他に漏らしてはならない。\nエ　宅地建物取引業者は、宅地建物取引業に係る契約の締結の勧誘をするに際し、その相手方に対し、利益を生ずることが確実であると誤解させるべき断定的判断を提供する行為をしてはならない。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "explain": ""}, {"id": "R1-28", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業者が建物の貸借の媒介を行う場合における宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["当該建物が住宅の品質確保の促進等に関する法律第5条第1項に規定する住宅性能評価を受けた新築住宅であるときは、その旨を説明しなければならない。", "当該建物が既存の建物であるときは、既存住宅に係る住宅の品質確保の促進等に関する法律第6条第3項に規定する建設住宅性能評価書の保存の状況について説明しなければならない。", "当該建物が既存の建物である場合、石綿使用の有無の調査結果の記録がないときは、石綿使用の有無の調査を自ら実施し、その結果について説明しなければならない。", "当該建物が建物の区分所有等に関する法律第2条第1項に規定する区分所有権の目的であるものであって、同条第3項に規定する専有部分の用途その他の利用の制限に関する規約の定めがあるときは、その内容を説明しなければならない。"], "answer": 3, "explain": ""}, {"id": "R1-29", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業法（以下この問において「法」という。）の規定に基づく監督処分及び罰則に関する次の記述のうち、正しいものはいくつあるか。\nア　宅地建物取引業者A（国土交通大臣免許）が甲県内における業務に関し、法第37条に規定する書面を交付していなかったことを理由に、甲県知事がAに対して業務停止処分をしようとするときは、あらかじめ、内閣総理大臣に協議しなければならない。\nイ　乙県知事は、宅地建物取引業者B（乙県知事免許）に対して指示処分をしようとするときは、聴聞を行わなければならず、聴聞の期日における審理は、公開により行わなければならない。\nウ　丙県知事は、宅地建物取引業者C（丙県知事免許）が免許を受けてから1年以内に事業を開始しないときは、免許を取り消さなければならない。\nエ　宅地建物取引業者D（丁県知事免許）は、法第72条第1項の規定に基づき、丁県知事から業務について必要な報告を求められたが、これを怠った。この場合、Dは50万円以下の罰金に処せられることがある。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R1-30", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、宅地建物取引業法の規定に違反するものはいくつあるか。\nア　建築基準法第6条第1項に基づき必要とされる確認を受ける前において、建築工事着手前の賃貸住宅の貸主から当該住宅の貸借の媒介を依頼され、取引態様を媒介と明示して募集広告を行った。\nイ　一団の宅地の売買について、数回に分けて広告する際に、最初に行った広告以外には取引態様の別を明示しなかった。\nウ　建物の貸借の媒介において、依頼者の依頼によらない通常の広告を行い、国土交通大臣の定める報酬限度額の媒介報酬のほか、当該広告の料金に相当する額を受領した。\nエ　建築工事着手前の分譲住宅の販売において、建築基準法第6条第1項に基づき必要とされる確認を受ける前に、取引態様を売主と明示して当該住宅の広告を行った。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "explain": ""}, {"id": "R1-31", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業者Aが、BからB所有の既存のマンションの売却に係る媒介を依頼され、Bと専任媒介契約（専属専任媒介契約ではないものとする。）を締結した。この場合における次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア　Aは、専任媒介契約の締結の日から7日以内に所定の事項を指定流通機構に登録しなければならないが、その期間の計算については、休業日数を算入しなければならない。\nイ　AがBとの間で有効期間を6月とする専任媒介契約を締結した場合、その媒介契約は無効となる。\nウ　Bが宅地建物取引業者である場合、Aは、当該専任媒介契約に係る業務の処理状況の報告をする必要はない。\nエ　AがBに対して建物状況調査を実施する者のあっせんを行う場合、建物状況調査を実施する者は建築士法第2条第1項に規定する建築士であって国土交通大臣が定める講習を修了した者でなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 0, "explain": ""}, {"id": "R1-32", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業者A（消費税課税事業者）が受け取ることのできる報酬額に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。なお、この問において報酬額に含まれる消費税等相当額は税率8％で計算するものとする。", "choices": ["宅地（代金200万円。消費税等相当額を含まない。）の売買の代理について、通常の売買の代理と比較して現地調査等の費用が8万円（消費税等相当額を含まない。）多く要した場合、売主Bと合意していた場合には、AはBから302,400円を上限として報酬を受領することができる。", "事務所（1か月の借賃108万円。消費税等相当額を含む。）の貸借の媒介について、Aは依頼者の双方から合計で108万円を上限として報酬を受領することができる。", "既存住宅の売買の媒介について、Aが売主Cに対して建物状況調査を実施する者をあっせんした場合、AはCから報酬とは別にあっせんに係る料金を受領することはできない。", "宅地（代金200万円。消費税等相当額を含まない。）の売買の媒介について、通常の売買の媒介と比較して現地調査等の費用を多く要しない場合でも、売主Dと合意していた場合には、AはDから194,400円を報酬として受領することができる。"], "answer": 3, "explain": ""}, {"id": "R1-33", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業保証協会（以下この問において「保証協会」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者で保証協会に加入した者は、その加入の日から2週間以内に、弁済業務保証金分担金を保証協会に納付しなければならない。", "保証協会の社員となった宅地建物取引業者が、保証協会に加入する前に供託していた営業保証金を取り戻すときは、還付請求権者に対する公告をしなければならない。", "保証協会の社員は、新たに事務所を設置したにもかかわらずその日から2週間以内に弁済業務保証金分担金を納付しなかったときは、保証協会の社員の地位を失う。", "還付充当金の未納により保証協会の社員の地位を失った宅地建物取引業者は、その地位を失った日から2週間以内に弁済業務保証金を供託すれば、その地位を回復する。"], "answer": 2, "explain": ""}, {"id": "R1-34", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業法（以下この問において「法」という。）第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者が自ら売主として建物の売買を行う場合、当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の額として売買代金の額の10分の2を超えない額を予定するときは、37条書面にその内容を記載しなくてよい。", "宅地建物取引業者が既存住宅の売買の媒介を行う場合、37条書面に当該建物の構造耐力上主要な部分等の状況について当事者の双方が確認した事項を記載しなければならない。", "宅地建物取引業者は、その媒介により売買契約を成立させた場合、当該宅地又は建物に係る租税その他の公課の負担に関する定めについて、37条書面にその内容を記載する必要はない。", "宅地建物取引業者は、その媒介により契約を成立させ、37条書面を作成したときは、法第35条に規定する書面に記名押印した宅地建物取引士をして、37条書面に記名押印させなければならない。"], "answer": 1, "explain": ""}, {"id": "R1-35", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業者Aが行う業務に関する次の記述のうち、宅地建物取引業法の規定に違反しないものはどれか。", "choices": ["Aは、宅地建物取引業者ではないBが所有する宅地について、Bとの間で確定測量図の交付を停止条件とする売買契約を締結した。その後、停止条件が成就する前に、Aは自ら売主として、宅地建物取引業者ではないCとの間で当該宅地の売買契約を締結した。", "Aは、その主たる事務所に従事する唯一の専任の宅地建物取引士Dが令和元年5月15日に退職したため、同年6月10日に新たな専任の宅地建物取引士Eを置いた。", "Aは、宅地建物取引業者Fから宅地の売買に関する注文を受けた際、Fに対して取引態様の別を明示しなかった。", "Aは、宅地の貸借の媒介に際し、当該宅地が都市計画法第29条の許可の申請中であることを知りつつ、賃貸借契約を成立させた。"], "answer": 3, "explain": ""}, {"id": "R1-36", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業者Aが宅地建物取引業法（以下この問において「法」という。）第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、法の規定によれば、正しいものはいくつあるか。\nア　Aは、その媒介により建築工事完了前の建物の売買契約を成立させ、当該建物を特定するために必要な表示について37条書面で交付する際、法第35条の規定に基づく重要事項の説明において使用した図書の交付により行った。\nイ　Aが自ら貸主として宅地の定期賃貸借契約を締結した場合において、借賃の支払方法についての定めがあるときは、Aは、その内容を37条書面に記載しなければならず、借主が宅地建物取引業者であっても、当該書面を交付しなければならない。\nウ　土地付建物の売主Aは、買主が金融機関から住宅ローンの承認を得られなかったときは契約を無条件で解除できるという取決めをしたが、自ら住宅ローンのあっせんをする予定がなかったので、37条書面にその取決めの内容を記載しなかった。\nエ　Aがその媒介により契約を成立させた場合において、契約の解除に関する定めがあるときは、当該契約が売買、貸借のいずれに係るものであるかを問わず、37条書面にその内容を記載しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "explain": ""}, {"id": "R1-37", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではないBとの間で締結する建築工事完了前のマンション（代金3,000万円）の売買契約に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["Aが手付金として200万円を受領しようとする場合、Aは、Bに対して書面で法第41条に定める手付金等の保全措置を講じないことを告げれば、当該手付金について保全措置を講じる必要はない。", "Aが手付金を受領している場合、Bが契約の履行に着手する前であっても、Aは、契約を解除することについて正当な理由がなければ、手付金の倍額を償還して契約を解除することができない。", "Aが150万円を手付金として受領し、さらに建築工事完了前に中間金として50万円を受領しようとする場合、Aは、手付金と中間金の合計額200万円について法第41条に定める手付金等の保全措置を講じれば、当該中間金を受領することができる。", "Aが150万円を手付金として受領し、さらに建築工事完了前に中間金として500万円を受領しようとする場合、Aは、手付金と中間金の合計額650万円について法第41条に定める手付金等の保全措置を講じたとしても、当該中間金を受領することができない。"], "answer": 2, "explain": ""}, {"id": "R1-38", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではないBとの間で宅地の売買契約を締結した場合における、宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、誤っているものはいくつあるか。\nア　Bがクーリング・オフにより売買契約を解除した場合、当該契約の解除に伴う違約金について定めがあるときは、Aは、Bに対して違約金の支払を請求することができる。\nイ　Aは、Bの指定した喫茶店で買受けの申込みを受けたが、その際クーリング・オフについて何も告げず、その3日後に、クーリング・オフについて書面で告げたうえで売買契約を締結した。この契約において、クーリング・オフにより契約を解除できる期間について買受けの申込みをした日から起算して10日間とする旨の特約を定めた場合、当該特約は無効となる。\nウ　Aが媒介を依頼した宅地建物取引業者Cの事務所でBが買受けの申込みをし、売買契約を締結した場合、Aからクーリング・オフについて何も告げられていなければ、当該契約を締結した日から起算して8日経過していてもクーリング・オフにより契約を解除することができる。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 1, "explain": ""}, {"id": "R1-39", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["既存住宅の貸借の媒介を行う場合、建物の建築及び維持保全の状況に関する書類の保存状況について説明しなければならない。", "宅地の売買の媒介を行う場合、登記された抵当権について、引渡しまでに抹消される場合は説明しなくてよい。", "宅地の貸借の媒介を行う場合、借地権の存続期間を50年とする賃貸借契約において、契約終了時における当該宅地の上の建物の取壊しに関する事項を定めようとするときは、その内容を説明しなければならない。", "建物の売買又は貸借の媒介を行う場合、当該建物が津波防災地域づくりに関する法律第53条第1項により指定された津波災害警戒区域内にあるときは、その旨を、売買の場合は説明しなければならないが、貸借の場合は説明しなくてよい。"], "answer": 2, "explain": ""}, {"id": "R1-40", "year": 2019, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["宅地建物取引業者の従業者は、取引の関係者の請求があったときは、従業者証明書を提示しなければならないが、宅地建物取引士は、重要事項の説明をするときは、請求がなくても説明の相手方に対し、宅地建物取引士証を提示しなければならない。", "宅地建物取引業者は、その業務に関する帳簿を、各取引の終了後5年間、当該宅地建物取引業者が自ら売主となる新築住宅に係るものにあっては10年間、保存しなければならない。", "宅地建物取引業者が、一団の宅地建物の分譲を案内所を設置して行う場合、その案内所が一時的かつ移動が容易な施設であるときは、当該案内所には、クーリング・オフ制度の適用がある旨等所定の事項を表示した標識を掲げなければならない。", "宅地建物取引業者が、一団の宅地建物の分譲を案内所を設置して行う場合、その案内所が契約を締結し、又は契約の申込みを受ける場所であるときは、当該案内所には、専任の宅地建物取引士を置かなければならない。"], "answer": 1, "explain": ""}, {"id": "R1-41", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明（以下この問において「重要事項説明」という。）に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["建物管理が管理会社に委託されている建物の貸借の媒介をする宅地建物取引業者は、当該建物が区分所有建物であるか否かにかかわらず、その管理会社の商号及びその主たる事務所の所在地について、借主に説明しなければならない。", "宅地建物取引業者である売主は、他の宅地建物取引業者に媒介を依頼して宅地の売買契約を締結する場合、重要事項説明の義務を負わない。", "建物の貸借の媒介において、建築基準法に規定する建蔽率及び容積率に関する制限があるときは、その概要を説明しなければならない。", "重要事項説明では、代金、交換差金又は借賃の額を説明しなければならないが、それ以外に授受される金銭の額については説明しなくてよい。"], "answer": 0, "explain": ""}, {"id": "R1-42", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業法第2条第1号に規定する宅地に関する次の記述のうち、誤っているものはどれか。", "choices": ["建物の敷地に供せられる土地は、都市計画法に規定する用途地域の内外を問わず宅地であるが、道路、公園、河川等の公共施設の用に供せられている土地は、用途地域内であれば宅地とされる。", "宅地とは、現に建物の敷地に供せられている土地に限らず、広く建物の敷地に供する目的で取引の対象とされた土地をいうものであり、その地目、現況の如何を問わない。", "都市計画法に規定する市街化調整区域内において、建物の敷地に供せられる土地は宅地である。", "都市計画法に規定する準工業地域内において、建築資材置場の用に供せられている土地は宅地である。"], "answer": 0, "explain": ""}, {"id": "R1-43", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["免許を受けようとする法人の非常勤役員が、刑法第246条（詐欺）の罪により懲役1年の刑に処せられ、その刑の執行が終わった日から5年を経過していなくても、当該法人は免許を受けることができる。", "免許を受けようとする法人の政令で定める使用人が、刑法第252条（横領）の罪により懲役1年執行猶予2年の刑に処せられ、その刑の執行猶予期間を満了している場合、その満了の日から5年を経過していなくても、当該法人は免許を受けることができる。", "免許を受けようとする法人の事務所に置く専任の宅地建物取引士が、刑法第261条（器物損壊等）の罪により罰金の刑に処せられ、その刑の執行が終わった日から5年を経過していない場合、当該法人は免許を受けることができない。", "免許を受けようとする法人の代表取締役が、刑法第231条（侮辱）の罪により拘留の刑に処せられ、その刑の執行が終わった日から5年を経過していない場合、当該法人は免許を受けることができない。"], "answer": 1, "explain": ""}, {"id": "R1-44", "year": 2019, "field": "宅建業法", "q": "宅地建物取引業法に規定する宅地建物取引士資格登録（以下この問において「登録」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["業務停止の処分に違反したとして宅地建物取引業の免許の取消しを受けた法人の政令で定める使用人であった者は、当該免許取消しの日から5年を経過しなければ、登録を受けることができない。", "宅地建物取引業者A（甲県知事免許）に勤務する宅地建物取引士（甲県知事登録）が、宅地建物取引業者B（乙県知事免許）に勤務先を変更した場合は、乙県知事に対して、遅滞なく勤務先の変更の登録を申請しなければならない。", "甲県知事登録を受けている者が、甲県から乙県に住所を変更した場合は、宅地建物取引士証の交付を受けていなくても、甲県知事に対して、遅滞なく住所の変更の登録を申請しなければならない。", "宅地建物取引士資格試験に合格した者は、宅地建物取引に関する実務の経験を有しない場合でも、合格した日から1年以内に登録を受けようとするときは、登録実務講習を受講する必要はない。"], "answer": 2, "explain": ""}, {"id": "R1-45", "year": 2019, "field": "宅建業法", "q": "特定住宅瑕疵担保責任の履行の確保等に関する法律に基づく住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結に関する次の記述のうち、誤っているものはどれか。", "choices": ["宅地建物取引業者は、自ら売主として新築住宅を販売する場合だけでなく、新築住宅の売買の媒介をする場合においても、住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う義務を負う。", "自ら売主として新築住宅を販売する宅地建物取引業者は、住宅販売瑕疵担保保証金の供託をしている場合、当該住宅の売買契約を締結するまでに、当該住宅の宅地建物取引業者ではない買主に対し、供託所の所在地等について、それらの事項を記載した書面を交付して説明しなければならない。", "自ら売主として新築住宅を宅地建物取引業者ではない買主に引き渡した宅地建物取引業者は、基準日ごとに基準日から3週間以内に、当該基準日に係る住宅販売瑕疵担保保証金の供託及び住宅販売瑕疵担保責任保険契約の締結の状況について、宅地建物取引業の免許を受けた国土交通大臣又は都道府県知事に届け出なければならない。", "住宅販売瑕疵担保責任保険契約を締結している宅地建物取引業者は、当該保険に係る新築住宅に、構造耐力上主要な部分又は雨水の浸入を防止する部分の隠れた瑕疵（構造耐力又は雨水の浸入に影響のないものを除く。）がある場合に、特定住宅販売瑕疵担保責任の履行によって生じた損害について保険金を請求することができる。"], "answer": 0, "explain": ""}, {"id": "R1-46", "year": 2019, "field": "免除科目", "q": "独立行政法人住宅金融支援機構（以下この問において「機構」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、証券化支援事業（買取型）において、中古住宅を購入するための貸付債権を買取りの対象としていない。", "機構は、証券化支援事業（買取型）において、バリアフリー性、省エネルギー性、耐震性又は耐久性・可変性に優れた住宅を取得する場合に、貸付金の利率を一定期間引き下げる制度を実施している。", "機構は、マンション管理組合や区分所有者に対するマンション共用部分の改良に必要な資金の貸付けを業務として行っている。", "機構は、災害により住宅が滅失した場合において、それに代わるべき建築物の建設又は購入に必要な資金の貸付けを業務として行っている。"], "answer": 0, "explain": ""}, {"id": "R1-47", "year": 2019, "field": "免除科目", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法（不動産の表示に関する公正競争規約を含む。）の規定によれば、正しいものはどれか。", "choices": ["土地を販売するに当たり、購入者に対し、購入後一定期間内に当該土地に建物を建築することを条件としていても、建物建築の発注先を購入者が自由に選定できることとなっていれば、当該土地の広告に「建築条件付土地」と表示する必要はない。", "新聞折込チラシにおいて新築賃貸マンションの賃料を表示するに当たり、すべての住戸の賃料を表示することがスペース上困難な場合は、標準的な1住戸1か月当たりの賃料を表示すれば、不当表示に問われることはない。", "リフォーム済みの中古住宅については、リフォーム済みである旨を必ず表示しなければならない。", "分譲住宅について、住宅の購入者から買い取って再度販売する場合、当該住宅が建築後1年未満で居住の用に供されたことがないものであるときは、広告に「新築」と表示しても、不当表示に問われることはない。"], "answer": 3, "explain": ""}, {"id": "R1-48", "year": 2019, "field": "免除科目", "q": "次の記述のうち、正しいものはどれか。", "choices": ["平成29年度法人企業統計年報（平成30年9月公表）によれば、平成29年度における全産業の経常利益は前年度に比べ11.4％増加となったが、不動産業の経常利益は13.8％減少した。", "平成31年地価公示（平成31年3月公表）によれば、平成30年1月以降の1年間の地価変動率は、全国平均では住宅地、商業地、工業地のいずれについても上昇となった。", "令和元年版国土交通白書（令和元年7月公表）によれば、平成30年3月末における宅地建物取引業者数は約20万に達している。", "建築着工統計（平成31年1月公表）によれば、平成30年の貸家の新設着工戸数は約39.6万戸となっており、7年連続の増加となった。"], "answer": 1, "explain": ""}, {"id": "R1-49", "year": 2019, "field": "免除科目", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["台地、段丘は、農地として利用され、また都市的な土地利用も多く、地盤も安定している。", "台地を刻む谷や台地上の池沼を埋め立てた所では、地盤の液状化が発生し得る。", "台地、段丘は、水はけも良く、宅地として積極的に利用されているが、自然災害に対して安全度の低い所である。", "旧河道や低湿地、海浜の埋立地では、地震による地盤の液状化対策が必要である。"], "answer": 2, "explain": ""}, {"id": "R1-50", "year": 2019, "field": "免除科目", "q": "建築物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["地震に対する建物の安全確保においては、耐震、制震、免震という考え方がある。", "制震は制振ダンパーなどの制振装置を設置し、地震等の周期に建物が共振することで起きる大きな揺れを制御する技術である。", "免震はゴムなどの免震装置を設置し、上部構造の揺れを減らす技術である。", "耐震は、建物の強度や粘り強さで地震に耐える技術であるが、既存不適格建築物の地震に対する補強には利用されていない。"], "answer": 3, "explain": ""}, {"id": "H30-01", "year": 2018, "field": "権利関係", "q": "AがBに甲土地を売却した場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["甲土地につき売買代金の支払と登記の移転がなされた後、第三者の詐欺を理由に売買契約が取り消された場合、原状回復のため、BはAに登記を移転する義務を、AはBに代金を返還する義務を負い、各義務は同時履行の関係となる。", "Aが甲土地を売却した意思表示に錯誤があったとしても、Aに重大な過失があって無効を主張することができない場合は、BもAの錯誤を理由として無効を主張することはできない。", "AB間の売買契約が仮装譲渡であり、その後BがCに甲土地を転売した場合、Cが仮装譲渡の事実を知らなければ、Aは、Cに虚偽表示による無効を対抗することができない。", "Aが第三者の詐欺によってBに甲土地を売却し、その後BがDに甲土地を転売した場合、Bが第三者の詐欺の事実を知らなかったとしても、Dが第三者の詐欺の事実を知っていれば、Aは詐欺を理由にAB間の売買契約を取り消すことができる。"], "answer": 3, "explain": ""}, {"id": "H30-02", "year": 2018, "field": "権利関係", "q": "Aが、所有する甲土地の売却に関する代理権をBに授与し、BがCとの間で、Aを売主、Cを買主とする甲土地の売買契約（以下この問において「本件契約」という。）を締結した場合における次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["Bが売買代金を着服する意図で本件契約を締結し、Cが本件契約の締結時点でこのことを知っていた場合であっても、本件契約の効果はAに帰属する。", "AがBに代理権を授与するより前にBが補助開始の審判を受けていた場合、Bは有効に代理権を取得することができない。", "BがCの代理人にもなって本件契約を成立させた場合、Aの許諾の有無にかかわらず、本件契約は無効となる。", "AがBに代理権を授与した後にBが後見開始の審判を受け、その後に本件契約が締結された場合、Bによる本件契約の締結は無権代理行為となる。"], "answer": 3, "explain": ""}, {"id": "H30-03", "year": 2018, "field": "権利関係", "q": "AとBとの間で、5か月後に実施される試験（以下この問において「本件試験」という。）にBが合格したときにはA所有の甲建物をBに贈与する旨を書面で約した（以下この問において「本件約定」という。）。この場合における次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["本件約定は、停止条件付贈与契約である。", "本件約定の後、Aの放火により甲建物が滅失し、その後にBが本件試験に合格した場合、AはBに対して損害賠償責任を負う。", "Bは、本件試験に合格したときは、本件約定の時点にさかのぼって甲建物の所有権を取得する。", "本件約定の時点でAに意思能力がなかった場合、Bは、本件試験に合格しても、本件約定に基づき甲建物の所有権を取得することはできない。"], "answer": 2, "explain": ""}, {"id": "H30-04", "year": 2018, "field": "権利関係", "q": "時効の援用に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["消滅時効完成後に主たる債務者が時効の利益を放棄した場合であっても、保証人は時効を援用することができる。", "後順位抵当権者は、先順位抵当権の被担保債権の消滅時効を援用することができる。", "詐害行為の受益者は、債権者から詐害行為取消権を行使されている場合、当該債権者の有する被保全債権について、消滅時効を援用することができる。", "債務者が時効の完成の事実を知らずに債務の承認をした場合、その後、債務者はその完成した消滅時効を援用することはできない。"], "answer": 1, "explain": ""}, {"id": "H30-05", "year": 2018, "field": "権利関係", "q": "Aは、隣人Bの留守中に台風が接近して、屋根の一部が壊れていたB宅に甚大な被害が生じる差し迫ったおそれがあったため、Bからの依頼なくB宅の屋根を修理した。この場合における次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["Aは、Bに対して、特段の事情がない限り、B宅の屋根を修理したことについて報酬を請求することができない。", "Aは、Bからの請求があったときには、いつでも、本件事務処理の状況をBに報告しなければならない。", "Aは、B宅の屋根を善良な管理者の注意をもって修理しなければならない。", "AによるB宅の屋根の修理が、Bの意思に反することなく行われた場合、AはBに対し、Aが支出した有益な費用全額の償還を請求することができる。"], "answer": 2, "explain": ""}, {"id": "H30-06", "year": 2018, "field": "権利関係", "q": "Aが所有する甲土地上にBが乙建物を建築して所有権を登記していたところ、AがBから乙建物を買い取り、その後、Aが甲土地にCのために抵当権を設定し登記した。この場合の法定地上権に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Aが乙建物の登記をA名義に移転する前に甲土地に抵当権を設定登記していた場合、甲地の抵当権が実行されたとしても、乙建物のために法定地上権は成立しない。", "Aが乙建物を取り壊して更地にしてから甲土地に抵当権を設定登記し、その後にAが甲地上に丙建物を建築していた場合、甲土地の抵当権が実行されたとしても、丙建物のために法定地上権は成立しない。", "Aが甲土地に抵当権を設定登記するのと同時に乙建物にもCのために共同抵当権を設定登記した後、乙建物を取り壊して丙建物を建築し、丙建物にCのために抵当権を設定しないまま甲土地の抵当権が実行された場合、丙建物のために法定地上権は成立しない。", "Aが甲土地に抵当権を設定登記した後、乙建物をDに譲渡した場合、甲土地の抵当権が実行されると、乙建物のために法定地上権が成立する。"], "answer": 0, "explain": ""}, {"id": "H30-07", "year": 2018, "field": "権利関係", "q": "債権譲渡に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["譲渡禁止特約のある債権の譲渡を受けた第三者が、その特約の存在を知らなかったとしても、知らなかったことにつき重大な過失があれば、当該債権を取得することはできない。", "債権の譲受人が譲渡禁止特約の存在を知っていれば、さらにその債権を譲り受けた転得者がその特約の存在を知らなかったことにつき重大な過失がなかったとしても、債務者はその転得者に対して、その特約の存在を対抗することができる。", "譲渡禁止特約に反して債権を譲渡した債権者は、債務者に譲渡の無効を主張する意思があることが明らかである等の事情がない限り、その特約の存在を理由に、譲渡の無効を主張することができない。", "譲渡禁止特約のある債権をもって質権の目的とした場合において、質権者がその特約の存在について悪意であるときは、当該質権設定は無効となる。"], "answer": 1, "explain": ""}, {"id": "H30-08", "year": 2018, "field": "権利関係", "q": "次の1から4までの記述のうち、民法の規定及び下記判決文によれば、誤っているものはどれか。\n（判決文）\n賃借人は、賃貸借契約が終了した場合には、賃借物件を原状に回復して賃貸人に返還する義務があるところ、賃貸借契約は、賃貸人による賃借物件の使用とその対価としての賃料の支払を内容とするものであり、賃借物件の損耗の発生は、賃貸借という契約の本質上当然に予定されているものである。それゆえ、建物の賃貸借においては、賃借人が社会通念上通常の使用をした場合に生ずる賃借物件の劣化又は価値の減少を意味する通常損耗に係る投下資本の減価の回収は、通常、減価償却費や修繕費等の必要経費分を賃料の中に含ませてその支払を受けることにより行われている。そうすると、建物の賃借人にその賃貸借において生ずる通常損耗についての原状回復義務を負わせるのは、賃借人に予期しない特別の負担を課すことになるから、賃借人に同義務が認められるためには、（中略）その旨の特約（以下「通常損耗補修特約」という。）が明確に合意されていることが必要であると解するのが相当である。", "choices": ["賃借物件を賃借人がどのように使用しても、賃借物件に発生する損耗による減価の回収は、賃貸人が全て賃料に含ませてその支払を受けることにより行っている。", "通常損耗とは、賃借人が社会通念上通常の使用をした場合に生ずる賃借物件の劣化又は価値の減少を意味する。", "賃借人が負担する通常損耗の範囲が賃貸借契約書に明記されておらず口頭での説明等もない場合に賃借人に通常損耗についての原状回復義務を負わせるのは、賃借人に予期しない特別の負担を課すことになる。", "賃貸借契約に賃借人が原状回復義務を負う旨が定められていても、それをもって、賃借人が賃料とは別に通常損耗の補修費を支払う義務があるとはいえない。"], "answer": 0, "explain": ""}, {"id": "H30-09", "year": 2018, "field": "権利関係", "q": "Aは、平成30年10月1日、A所有の甲土地につき、Bとの間で、代金1,000万円、支払期日を同年12月1日とする売買契約を締結した。この場合の相殺に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["BがAに対して同年12月31日を支払期日とする貸金債権を有している場合には、Bは同年12月1日に売買代金債務と当該貸金債権を対当額で相殺することができる。", "同年11月1日にAの売買代金債権がAの債権者Cにより差し押さえられても、Bは、同年11月2日から12月1日までの間にAに対する別の債権を取得した場合には、同年12月1日に売買代金債務と当該債権を対当額で相殺することができる。", "同年10月10日、BがAの自動車事故によって被害を受け、Aに対して不法行為に基づく損害賠償債権を取得した場合には、Bは売買代金債務と当該損害賠償債権を対当額で相殺することができる。", "BがAに対し同年9月30日に消滅時効の期限が到来する貸金債権を有していた場合には、Aが当該消滅時効を援用したとしても、Bは売買代金債務と当該貸金債権を対当額で相殺することができる。"], "answer": 2, "explain": ""}, {"id": "H30-10", "year": 2018, "field": "権利関係", "q": "相続に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["無権代理人が本人に無断で本人の不動産を売却した後に、単独で本人を相続した場合、本人が自ら当該不動産を売却したのと同様な法律上の効果が生じる。", "相続財産に属する不動産について、遺産分割前に単独の所有権移転登記をした共同相続人から移転登記を受けた第三取得者に対し、他の共同相続人は、自己の持分を登記なくして対抗することができる。", "連帯債務者の一人が死亡し、その相続人が数人ある場合、相続人らは被相続人の債務の分割されたものを承継し、各自その承継した範囲において、本来の債務者とともに連帯債務者となる。", "共同相続に基づく共有物の持分価格が過半数を超える相続人は、協議なくして単独で共有物を占有する他の相続人に対して、当然にその共有物の明渡しを請求することができる。"], "answer": 3, "explain": ""}, {"id": "H30-11", "year": 2018, "field": "権利関係", "q": "AとBとの間で、A所有の甲土地につき建物所有目的で賃貸借契約（以下この問において「本件契約」という。）を締結する場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。", "choices": ["本件契約が専ら事業の用に供する建物の所有を目的とする場合には、公正証書によらなければ無効となる。", "本件契約が居住用の建物の所有を目的とする場合には、借地権の存続期間を20年とし、かつ、契約の更新請求をしない旨を定めても、これらの規定は無効となる。", "本件契約において借地権の存続期間を60年と定めても、公正証書によらなければ、その期間は30年となる。", "Bは、甲土地につき借地権登記を備えなくても、Bと同姓でかつ同居している未成年の長男名義で保存登記をした建物を甲土地上に所有していれば、甲土地の所有者が替わっても、甲土地の新所有者に対し借地権を対抗することができる。"], "answer": 1, "explain": ""}, {"id": "H30-12", "year": 2018, "field": "権利関係", "q": "AとBとの間で、Aが所有する甲建物をBが5年間賃借する旨の契約を締結した場合における次の記述のうち、民法及び借地借家法の規定によれば、正しいものはどれか（借地借家法第39条に定める取壊し予定の建物の賃貸借及び同法第40条に定める一時使用目的の建物の賃貸借は考慮しないものとする。）。", "choices": ["AB間の賃貸借契約が借地借家法第38条の定期建物賃貸借で、契約の更新がない旨を定めた場合には、5年経過をもって当然に、AはBに対して、期間満了による終了を対抗することができる。", "AB間の賃貸借契約が借地借家法第38条の定期建物賃貸借で、契約の更新がない旨を定めた場合には、当該契約の期間中、Bから中途解約を申し入れることはできない。", "AB間の賃貸借契約が借地借家法第38条の定期建物賃貸借でない場合、A及びBのいずれからも期間内に更新しない旨の通知又は条件変更しなければ更新しない旨の通知がなかったときは、当該賃貸借契約が更新され、その契約は期間の定めがないものとなる。", "CがBから甲建物を適法に賃貸された転借人で、期間満了によってAB間及びBC間の賃貸借契約が終了する場合、Aの同意を得て甲建物に付加した造作について、BはAに対する買取請求権を有するが、CはAに対する買取請求権を有しない。"], "answer": 2, "explain": ""}, {"id": "H30-13", "year": 2018, "field": "権利関係", "q": "建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれか。", "choices": ["規約の設定、変更又は廃止を行う場合は、区分所有者の過半数による集会の決議によってなされなければならない。", "規約を保管する者は、利害関係人の請求があったときは、正当な理由がある場合を除いて、規約の閲覧を拒んではならず、閲覧を拒絶した場合は20万円以下の過料に処される。", "規約の保管場所は、建物内の見やすい場所に掲示しなければならない。", "占有者は、建物又はその敷地若しくは附属施設の使用方法につき、区分所有者が規約又は集会の決議に基づいて負う義務と同一の義務を負う。"], "answer": 0, "explain": ""}, {"id": "H30-14", "year": 2018, "field": "権利関係", "q": "不動産の登記に関する次の記述のうち、誤っているものはどれか。", "choices": ["登記は、法令に別段の定めがある場合を除き、当事者の申請又は官庁若しくは公署の嘱託がなければ、することができない。", "表示に関する登記は、登記官が、職権ですることができる。", "所有権の登記名義人は、建物の床面積に変更があったときは、当該変更のあった日から1月以内に、変更の登記を申請しなければならない。", "所有権の登記名義人は、その住所について変更があったときは、当該変更のあった日から1月以内に、変更の登記を申請しなければならない。"], "answer": 3, "explain": ""}, {"id": "H30-15", "year": 2018, "field": "法令上の制限", "q": "国土利用計画法第23条の届出（以下この問において「事後届出」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["事後届出に係る土地の利用目的について、甲県知事から勧告を受けた宅地建物取引業者Aがその勧告に従わないときは、甲県知事は、その旨及びその勧告の内容を公表することができる。", "乙県が所有する都市計画区域内の土地（面積6,000㎡）を買い受けた者は、売買契約を締結した日から起算して2週間以内に、事後届出を行わなければならない。", "指定都市（地方自治法に基づく指定都市をいう。）の区域以外に所在する土地について、事後届出を行うに当たっては、市町村の長を経由しないで、直接都道府県知事に届け出なければならない。", "宅地建物取引業者Bが所有する市街化区域内の土地（面積2,500㎡）について、宅地建物取引業者Cが購入する契約を締結した場合、Cは事後届出を行う必要はない。"], "answer": 0, "explain": ""}, {"id": "H30-16", "year": 2018, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。", "choices": ["田園住居地域内の農地の区域内において、土地の形質の変更を行おうとする者は、一定の場合を除き、市町村長の許可を受けなければならない。", "風致地区内における建築物の建築については、一定の基準に従い、地方公共団体の条例で、都市の風致を維持するため必要な規制をすることができる。", "市街化区域については、少なくとも用途地域を定めるものとし、市街化調整区域については、原則として用途地域を定めないものとする。", "準都市計画区域については、無秩序な市街化を防止し、計画的な市街化を図るため、都市計画に市街化区域と市街化調整区域との区分を定めなければならない。"], "answer": 3, "explain": ""}, {"id": "H30-17", "year": 2018, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。ただし、許可を要する開発行為の面積については、条例による定めはないものとし、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["非常災害のため必要な応急措置として開発行為をしようとする者は、当該開発行為が市街化調整区域内において行われるものであっても都道府県知事の許可を受けなくてよい。", "用途地域等の定めがない土地のうち開発許可を受けた開発区域内においては、開発行為に関する工事完了の公告があった後は、都道府県知事の許可を受けなければ、当該開発許可に係る予定建築物以外の建築物を新築することができない。", "都市計画区域及び準都市計画区域外の区域内において、8,000㎡の開発行為をしようとする者は、都道府県知事の許可を受けなくてよい。", "準都市計画区域内において、農業を営む者の居住の用に供する建築物の建築を目的とした1,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。"], "answer": 3, "explain": ""}, {"id": "H30-18", "year": 2018, "field": "法令上の制限", "q": "建築基準法に関する次の記述のうち、正しいものはどれか。", "choices": ["建築物の高さ31m以下の部分にある全ての階には、非常用の進入口を設けなければならない。", "防火地域内にある3階建ての木造の建築物を増築する場合、その増築に係る部分の床面積の合計が10㎡以内であれば、その工事が完了した際に、建築主事又は指定確認検査機関の完了検査を受ける必要はない。", "4階建ての事務所の用途に供する建築物の2階以上の階にあるバルコニーその他これに類するものの周囲には、安全上必要な高さが1.1m以上の手すり壁、さく又は金網を設けなければならない。", "建築基準法の改正により、現に存する建築物が改正後の規定に適合しなくなった場合、当該建築物の所有者又は管理者は速やかに当該建築物を改正後の建築基準法の規定に適合させなければならない。"], "answer": 2, "explain": ""}, {"id": "H30-19", "year": 2018, "field": "法令上の制限", "q": "建築基準法（以下この問において「法」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["田園住居地域内においては、建築物の高さは、一定の場合を除き、10m又は12mのうち当該地域に関する都市計画において定められた建築物の高さの限度を超えてはならない。", "一の敷地で、その敷地面積の40%が第二種低層住居専用地域に、60%が第一種中高層住居専用地域にある場合は、原則として、当該敷地内には大学を建築することができない。", "都市計画区域の変更等によって法第3章の規定が適用されるに至った際現に建築物が立ち並んでいる幅員2mの道で、特定行政庁の指定したものは、同章の規定における道路とみなされる。", "容積率規制を適用するに当たっては、前面道路の境界線又はその反対側の境界線からそれぞれ後退して壁面線の指定がある場合において、特定行政庁が一定の基準に適合すると認めて許可した建築物については、当該前面道路の境界線又はその反対側の境界線は、それぞれ当該壁面線にあるものとみなす。"], "answer": 1, "explain": ""}, {"id": "H30-20", "year": 2018, "field": "法令上の制限", "q": "宅地造成等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["宅地造成工事規制区域内において、過去に宅地造成に関する工事が行われ現在は造成主とは異なる者がその工事が行われた宅地を所有している場合、当該宅地の所有者は、宅地造成に伴う災害が生じないよう、その宅地を常時安全な状態に維持するように努めなければならない。", "宅地造成工事規制区域内において行われる宅地造成に関する工事について許可をする都道府県知事は、当該許可に、工事の施行に伴う災害を防止するために必要な条件を付することができる。", "宅地を宅地以外の土地にするために行う土地の形質の変更は、宅地造成に該当しない。", "宅地造成工事規制区域内において、切土であって、当該切土をする土地の面積が400㎡で、かつ、高さ1mの崖を生ずることとなるものに関する工事を行う場合には、一定の場合を除き、都道府県知事の許可を受けなければならない。"], "answer": 3, "explain": ""}, {"id": "H30-21", "year": 2018, "field": "法令上の制限", "q": "土地区画整理法に関する次の記述のうち、正しいものはどれか。", "choices": ["土地区画整理事業とは、公共施設の整備改善及び宅地の利用の増進を図るため、土地区画整理法で定めるところに従って行われる、都市計画区域内及び都市計画区域外の土地の区画形質の変更に関する事業をいう。", "土地区画整理組合の設立の認可の公告があった日以後、換地処分の公告がある日までは、施行地区内において、土地区画整理事業の施行の障害となるおそれがある建築物その他の工作物の新築を行おうとする者は、都道府県知事及び市町村長の許可を受けなければならない。", "土地区画整理事業の施行者は、仮換地を指定した場合において、従前の宅地に存する建築物を移転し、又は除却することが必要となったときは、当該建築物を移転し、又は除却することができる。", "土地区画整理事業の施行者は、仮換地を指定した場合において、当該仮換地について使用又は収益を開始することができる日を当該仮換地の効力発生の日と同一の日として定めなければならない。"], "answer": 2, "explain": ""}, {"id": "H30-22", "year": 2018, "field": "法令上の制限", "q": "農地法（以下この問において「法」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["市街化区域内の農地を宅地とする目的で権利を取得する場合は、あらかじめ農業委員会に届出をすれば法第5条の許可は不要である。", "遺産分割により農地を取得することとなった場合、法第3条第1項の許可を受ける必要がある。", "法第2条第3項の農地所有適格法人の要件を満たしていない株式会社は、耕作目的で農地を借り入れることはできない。", "雑種地を開墾し耕作している土地でも、登記簿上の地目が雑種地である場合は、法の適用を受ける農地に当たらない。"], "answer": 0, "explain": ""}, {"id": "H30-23", "year": 2018, "field": "税・その他", "q": "住宅用家屋の所有権の移転登記に係る登録免許税の税率の軽減措置に関する次の記述のうち、正しいものはどれか。", "choices": ["個人が他の個人と共有で住宅用の家屋を購入した場合、当該個人は、その住宅用の家屋の所有権の移転登記について、床面積に自己が有する共有持分の割合を乗じたものが50㎡以上でなければ、この税率の軽減措置の適用を受けることができない。", "この税率の軽減措置は、登記の対象となる住宅用の家屋の取得原因を限定しており、交換を原因として取得した住宅用の家屋について受ける所有権の移転登記には適用されない。", "所有権の移転登記に係る住宅用の家屋が耐火建築物の場合、築年数25年以内であっても、耐震基準適合証明書により一定の耐震基準を満たしていることが証明されないときは、この税率の軽減措置の適用を受けることができない。", "この税率の軽減措置の適用を受けるためには、登記の申請書に、その家屋が一定の要件を満たす住宅用の家屋であることについての税務署長の証明書を添付しなければならない。"], "answer": 1, "explain": ""}, {"id": "H30-24", "year": 2018, "field": "税・その他", "q": "不動産取得税に関する次の記述のうち、正しいものはどれか。", "choices": ["不動産取得税は、不動産の取得があった日の翌日から起算して3月以内に当該不動産が所在する都道府県に申告納付しなければならない。", "不動産取得税は不動産の取得に対して課される税であるので、家屋を改築したことにより当該家屋の価格が増加したとしても、新たな不動産の取得とはみなされないため、不動産取得税は課されない。", "相続による不動産の取得については、不動産取得税は課されない。", "一定の面積に満たない土地の取得については、不動産取得税は課されない。"], "answer": 2, "explain": ""}, {"id": "H30-25", "year": 2018, "field": "税・その他", "q": "不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、正しいものはどれか。", "choices": ["不動産の価格は、その不動産の効用が最高度に発揮される可能性に最も富む使用を前提として把握される価格を標準として形成されるが、これを最有効使用の原則という。", "収益還元法は、賃貸用不動産又は賃貸以外の事業の用に供する不動産の価格を求める場合に特に有効な手法であるが、事業の用に供さない自用の不動産の鑑定評価には適用すべきではない。", "鑑定評価の基本的な手法は、原価法、取引事例比較法及び収益還元法に大別され、実際の鑑定評価に際しては、地域分析及び個別分析により把握した対象不動産に係る市場の特性等を適切に反映した手法をいずれか1つ選択して、適用すべきである。", "限定価格とは、市場性を有する不動産について、法令等による社会的要請を背景とする鑑定評価目的の下で、正常価格の前提となる諸条件を満たさないことにより正常価格と同一の市場概念の下において形成されるであろう市場価値と乖離することとなる場合における不動産の経済価値を適正に表示する価格のことをいい、民事再生法に基づく鑑定評価目的の下で、早期売却を前提として求められる価格が例としてあげられる。"], "answer": 0, "explain": ""}, {"id": "H30-26", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["宅地の売買に関する広告をインターネットで行った場合において、当該宅地の売買契約成立後に継続して広告を掲載していたとしても、当該広告の掲載を始めた時点で当該宅地に関する売買契約が成立していなかったときは、法第32条に規定する誇大広告等の禁止に違反しない。", "販売する宅地又は建物の広告に著しく事実に相違する表示をした場合、監督処分の対象となるほか、6月以下の懲役及び100万円以下の罰金を併科されることがある。", "建築基準法第6条第1項の確認を申請中の建物については、当該建物の売買の媒介に関する広告をしてはならないが、貸借の媒介に関する広告はすることができる。", "宅地建物取引業者がその業務に関して広告をするときは、実際のものより著しく優良又は有利であると人を誤認させるような表示をしてはならないが、宅地又は建物に係る現在又は将来の利用の制限の一部を表示しないことによりそのような誤認をさせる場合は、法第32条に規定する誇大広告等の禁止に違反しない。"], "answer": 1, "explain": ""}, {"id": "H30-27", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業者Aは、Bが所有し、居住している甲住宅の売却の媒介を、また、宅地建物取引業者Cは、Dから既存住宅の購入の媒介を依頼され、それぞれ媒介契約を締結した。その後、B及びDは、それぞれA及びCの媒介により、甲住宅の売買契約（以下この問において「本件契約」という。）を締結した。この場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。なお、この問において「建物状況調査」とは、法第34条の2第1項第4号に規定する調査をいうものとする。", "choices": ["Aは、甲住宅の売却の依頼を受けた媒介業者として、本件契約が成立するまでの間に、Dに対し、建物状況調査を実施する者のあっせんの有無について確認しなければならない。", "A及びCは、本件契約が成立するまでの間に、Dに対し、甲住宅について、設計図書、点検記録その他の建物の建築及び維持保全の状況に関する書類で国土交通省令で定めるものの保存の状況及びそれぞれの書類に記載されている内容について説明しなければならない。", "CがDとの間で媒介契約を締結する2年前に、甲住宅は既に建物状況調査を受けていた。この場合において、A及びCは、本件契約が成立するまでの間に、Dに対し、建物状況調査を実施している旨及びその結果の概要について説明しなければならない。", "A及びCは、Dが宅地建物取引業者である場合であっても、法第37条に基づき交付すべき書面において、甲住宅の構造耐力上主要な部分等の状況について当事者の双方が確認した事項があるときにその記載を省略することはできない。"], "answer": 3, "explain": ""}, {"id": "H30-28", "year": 2018, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはいくつあるか。\nア　宅地建物取引業者が、買主として、造成工事完了前の宅地の売買契約を締結しようとする場合、売主が当該造成工事に関し必要な都市計画法第29条第1項の許可を申請中であっても、当該売買契約を締結することができる。\nイ　宅地建物取引業者が、買主として、宅地建物取引業者との間で宅地の売買契約を締結した場合、法第37条の規定により交付すべき書面を交付しなくてよい。\nウ　営業保証金を供託している宅地建物取引業者が、売主として、宅地建物取引業者との間で宅地の売買契約を締結しようとする場合、営業保証金を供託した供託所及びその所在地について、買主に対し説明をしなければならない。\nエ　宅地建物取引業者が、宅地の売却の依頼者と媒介契約を締結した場合、当該宅地の購入の申込みがあったときは、売却の依頼者が宅地建物取引業者であっても、遅滞なく、その旨を当該依頼者に報告しなければならない。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "explain": ""}, {"id": "H30-29", "year": 2018, "field": "宅建業法", "q": "Aは、Bとの間で、Aが所有する建物を代金2,000万円で売却する売買契約（以下この問において「本件契約」という。）を締結した。この場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定に違反しないものはどれか。", "choices": ["A及びBがともに宅地建物取引業者である場合において、Aは、本件契約の成立後、法第37条の規定により交付すべき書面を作成し、記名押印は宅地建物取引士ではない者が行い、これをBに交付した。", "A及びBがともに宅地建物取引業者である場合において、当事者の債務の不履行を理由とする契約の解除があったときの損害賠償の額を600万円とする特約を定めた。", "Aは宅地建物取引業者であるが、Bは宅地建物取引業者ではない場合において、Aは、本件契約の締結に際して、500万円の手付を受領した。", "Aは宅地建物取引業者であるが、Bは宅地建物取引業者ではない場合において、本件契約の目的物である建物の瑕疵を担保すべき責任に関し、契約の解除又は損害賠償の請求は目的物の引渡しの日から1年以内にしなければならないものとする旨の特約を定めた。"], "answer": 1, "explain": ""}, {"id": "H30-30", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業者A（消費税課税事業者）は、Bが所有する建物について、B及びCから媒介の依頼を受け、Bを貸主、Cを借主とし、1か月分の借賃を10万円（消費税等相当額を含まない。）、CからBに支払われる権利金（権利設定の対価として支払われる金銭であって返還されないものであり、消費税等相当額を含まない。）を150万円とする定期建物賃貸借契約を成立させた。この場合における次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["建物が店舗用である場合、Aは、B及びCの承諾を得たときは、B及びCの双方からそれぞれ10万8,000円の報酬を受けることができる。", "建物が居住用である場合、Aが受け取ることができる報酬の額は、CからBに支払われる権利金の額を売買に係る代金の額とみなして算出される16万2,000円が上限となる。", "建物が店舗用である場合、Aは、Bからの依頼に基づくことなく広告をした場合でも、その広告が賃貸借契約の成立に寄与したときは、報酬とは別に、その広告料金に相当する額をBに請求することができる。", "定期建物賃貸借契約の契約期間が終了した直後にAが依頼を受けてBC間の定期建物賃貸借契約の再契約を成立させた場合、Aが受け取る報酬については、宅地建物取引業法の規定が適用される。"], "answer": 3, "explain": ""}, {"id": "H30-31", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業者A（消費税課税事業者）が受け取ることのできる報酬の上限額に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["土地付中古住宅（代金500万円。消費税等相当額を含まない。）の売買について、Aが売主Bから媒介を依頼され、現地調査等の費用が通常の売買の媒介に比べ5万円（消費税等相当額を含まない。）多く要する場合、その旨をBに対し説明した上で、AがBから受け取ることができる報酬の上限額は280,800円である。", "土地付中古住宅（代金300万円。消費税等相当額を含まない。）の売買について、Aが買主Cから媒介を依頼され、現地調査等の費用が通常の売買の媒介に比べ4万円（消費税等相当額を含まない。）多く要する場合、その旨をCに対し説明した上で、AがCから受け取ることができる報酬の上限額は194,400円である。", "土地（代金350万円。消費税等相当額を含まない。）の売買について、Aが売主Dから媒介を依頼され、現地調査等の費用が通常の売買の媒介に比べ2万円（消費税等相当額を含まない。）多く要する場合、その旨をDに対し説明した上で、AがDから受け取ることができる報酬の上限額は194,400円である。", "中古住宅（1か月分の借賃15万円。消費税等相当額を含まない。）の貸借について、Aが貸主Eから媒介を依頼され、現地調査等の費用が通常の貸借の媒介に比べ3万円（消費税等相当額を含まない。）多く要する場合、その旨をEに対し説明した上で、AがEから受け取ることができる報酬の上限額は194,400円である。"], "answer": 2, "explain": ""}, {"id": "H30-32", "year": 2018, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引士が都道府県知事から指示処分を受けた場合において、宅地建物取引業者（国土交通大臣免許）の責めに帰すべき理由があるときは、国土交通大臣は、当該宅地建物取引業者に対して指示処分をすることができる。", "宅地建物取引士が不正の手段により宅地建物取引士の登録を受けた場合、その登録をした都道府県知事は、宅地建物取引士資格試験の合格の決定を取り消さなければならない。", "国土交通大臣は、すべての宅地建物取引士に対して、購入者等の利益の保護を図るため必要な指導、助言及び勧告をすることができる。", "甲県知事の登録を受けている宅地建物取引士が、乙県知事から事務の禁止の処分を受けた場合は、速やかに、宅地建物取引士証を乙県知事に提出しなければならない。"], "answer": 0, "explain": ""}, {"id": "H30-33", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業者Aは、Bから、Bが所有し居住している甲住宅の売却について媒介の依頼を受けた。この場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["Aが甲住宅について、法第34条の2第1項第4号に規定する建物状況調査の制度概要を紹介し、Bが同調査を実施する者のあっせんを希望しなかった場合、Aは、同項の規定に基づき交付すべき書面に同調査を実施する者のあっせんに関する事項を記載する必要はない。", "Aは、Bとの間で専属専任媒介契約を締結した場合、当該媒介契約締結日から7日以内（休業日を含まない。）に、指定流通機構に甲住宅の所在等を登録しなければならない。", "Aは、甲住宅の評価額についての根拠を明らかにするため周辺の取引事例の調査をした場合、当該調査の実施についてBの承諾を得ていなくても、同調査に要した費用をBに請求することができる。", "AとBの間で専任媒介契約を締結した場合、Aは、法第34条の2第1項の規定に基づき交付すべき書面に、BがA以外の宅地建物取引業者の媒介又は代理によって売買又は交換の契約を成立させたときの措置について記載しなければならない。"], "answer": 3, "explain": ""}, {"id": "H30-34", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業者が媒介により既存建物の貸借の契約を成立させた場合、宅地建物取引業法第37条の規定により、当該貸借の契約当事者に対して交付すべき書面に必ず記載しなければならない事項の組合せはどれか。\nア　瑕疵担保責任の内容\nイ　当事者の氏名（法人にあっては、その名称）及び住所\nウ　建物の引渡しの時期\nエ　建物の構造耐力上主要な部分等の状況について当事者双方が確認した事項", "choices": ["ア、イ", "イ、ウ", "イ、エ", "ウ、エ"], "answer": 1, "explain": ""}, {"id": "H30-35", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業者間の取引における宅地建物取引業法第35条に規定する重要事項の説明及び重要事項を記載した書面（以下この問において「重要事項説明書」という。）の交付に関する次の記述のうち、正しいものはどれか。", "choices": ["建物の売買においては、売主は取引の対象となる建物（昭和56年6月1日以降に新築の工事に着手したものを除く。）について耐震診断を受けなければならず、また、その診断の結果を重要事項説明書に記載しなければならない。", "建物の売買においては、その対象となる建物が未完成である場合は、重要事項説明書を交付した上で、宅地建物取引士をして説明させなければならない。", "建物の売買においては、その建物の瑕疵を担保すべき責任の履行に関し保証保険契約の締結などの措置を講ずるかどうか、また、講ずる場合はその概要を重要事項説明書に記載しなければならない。", "宅地の交換において交換契約に先立って交換差金の一部として30万円の預り金の授受がある場合、その預り金を受領しようとする者は、保全措置を講ずるかどうか、及びその措置を講ずる場合はその概要を重要事項説明書に記載しなければならない。"], "answer": 2, "explain": ""}, {"id": "H30-36", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者Aが免許の更新の申請を行った場合において、免許の有効期間の満了の日までにその申請について処分がなされないときは、Aの従前の免許は、有効期間の満了によりその効力を失う。", "甲県に事務所を設置する宅地建物取引業者B（甲県知事免許）が、乙県所在の宅地の売買の媒介をする場合、Bは国土交通大臣に免許換えの申請をしなければならない。", "宅地建物取引業を営もうとする個人Cが、懲役の刑に処せられ、その刑の執行を終えた日から5年を経過しない場合、Cは免許を受けることができない。", "いずれも宅地建物取引士ではないDとEが宅地建物取引業者F社の取締役に就任した。Dが常勤、Eが非常勤である場合、F社はDについてのみ役員の変更を免許権者に届け出る必要がある。"], "answer": 2, "explain": ""}, {"id": "H30-37", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業者である売主Aが、宅地建物取引業者Bの媒介により宅地建物取引業者ではない買主Cと新築マンションの売買契約を締結した場合において、宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、正しいものはいくつあるか。\nア　AとCの間で、クーリング・オフによる契約の解除に関し、Cは契約の解除の書面をクーリング・オフの告知の日から起算して8日以内にAに到達させなければ契約を解除することができない旨の特約を定めた場合、当該特約は無効である。\nイ　Cは、Bの事務所で買受けの申込みを行い、その3日後に、Cの自宅近くの喫茶店で売買契約を締結した場合、クーリング・オフによる契約の解除はできない。\nウ　Cは、Bからの提案によりCの自宅で買受けの申込みを行ったが、クーリング・オフについては告げられず、その10日後に、Aの事務所で売買契約を締結した場合、クーリング・オフによる契約の解除はできない。\nエ　クーリング・オフについて告げる書面には、Bの商号又は名称及び住所並びに免許証番号を記載しなければならない。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 1, "explain": ""}, {"id": "H30-38", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業者である売主は、宅地建物取引業者ではない買主との間で、戸建住宅の売買契約（所有権の登記は当該住宅の引渡し時に行うものとする。）を締結した。この場合における宅地建物取引業法第41条又は第41条の2の規定に基づく手付金等の保全措置（以下この問において「保全措置」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["当該住宅が建築工事の完了後で、売買代金が3,000万円であった場合、売主は、買主から手付金200万円を受領した後、当該住宅を引き渡す前に中間金300万円を受領するためには、手付金200万円と合わせて保全措置を講じた後でなければ、その中間金を受領することができない。", "当該住宅が建築工事の完了前で、売買代金が2,500万円であった場合、売主は、当該住宅を引き渡す前に買主から保全措置を講じないで手付金150万円を受領することができる。", "当該住宅が建築工事の完了前で、売主が買主から保全措置が必要となる額の手付金を受領する場合、売主は、事前に、国土交通大臣が指定する指定保管機関と手付金等寄託契約を締結し、かつ、当該契約を証する書面を買主に交付した後でなければ、買主からその手付金を受領することができない。", "当該住宅が建築工事の完了前で、売主が買主から保全措置が必要となる額の手付金等を受領する場合において売主が銀行との間で締結する保証委託契約に基づく保証契約は、建築工事の完了までの間を保証期間とするものでなければならない。"], "answer": 0, "explain": ""}, {"id": "H30-39", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業者が建物の貸借の媒介を行う場合における宅地建物取引業法（以下この問において「法」という。）第35条に規定する重要事項の説明に関する次の記述のうち、誤っているものはどれか。なお、特に断りのない限り、当該建物を借りようとする者は宅地建物取引業者ではないものとする。", "choices": ["当該建物を借りようとする者が宅地建物取引業者であるときは、貸借の契約が成立するまでの間に重要事項を記載した書面を交付しなければならないが、その内容を宅地建物取引士に説明させる必要はない。", "当該建物が既存の住宅であるときは、法第34条の2第1項第4号に規定する建物状況調査を実施しているかどうか、及びこれを実施している場合におけるその結果の概要を説明しなければならない。", "台所、浴室、便所その他当該建物の設備の整備の状況について説明しなければならない。", "宅地建物取引士は、テレビ会議等のITを活用して重要事項の説明を行うときは、相手方の承諾があれば宅地建物取引士証の提示を省略することができる。"], "answer": 3, "explain": ""}, {"id": "H30-40", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業者Aが行う業務に関する次の記述のうち、宅地建物取引業法の規定に違反するものはいくつあるか。\nア　Aは、自ら売主として、建物の売買契約を締結するに際し、買主が手付金を持ち合わせていなかったため手付金の分割払いを提案し、買主はこれに応じた。\nイ　Aは、建物の販売に際し、勧誘の相手方から値引きの要求があったため、広告に表示した販売価格から100万円値引きすることを告げて勧誘し、売買契約を締結した。\nウ　Aは、土地の売買の媒介に際し重要事項の説明の前に、宅地建物取引士ではないAの従業者をして媒介の相手方に対し、当該土地の交通等の利便の状況について説明させた。\nエ　Aは、投資用マンションの販売に際し、電話で勧誘を行ったところ、勧誘の相手方から「購入の意思がないので二度と電話をかけないように」と言われたことから、電話での勧誘を諦め、当該相手方の自宅を訪問して勧誘した。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "explain": ""}, {"id": "H30-41", "year": 2018, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業の免許を要する業務が含まれるものはどれか。", "choices": ["A社は、所有する土地を10区画にほぼ均等に区分したうえで、それぞれの区画に戸建住宅を建築し、複数の者に貸し付けた。", "B社は、所有するビルの一部にコンビニエンスストアや食堂など複数のテナントの出店を募集し、その募集広告を自社のホームページに掲載したほか、多数の事業者に案内を行った結果、出店事業者が決まった。", "C社は賃貸マンションの管理業者であるが、複数の貸主から管理を委託されている物件について、入居者の募集、貸主を代理して行う賃貸借契約の締結、入居者からの苦情・要望の受付、入居者が退去した後の清掃などを行っている。", "D社は、多数の顧客から、顧客が所有している土地に住宅や商業用ビルなどの建物を建設することを請け負って、その対価を得ている。"], "answer": 2, "explain": ""}, {"id": "H30-42", "year": 2018, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引士が死亡した場合、その相続人は、死亡した日から30日以内に、その旨を当該宅地建物取引士の登録をしている都道府県知事に届け出なければならない。", "甲県知事の登録を受けている宅地建物取引士は、乙県に所在する宅地建物取引業者の事務所の業務に従事しようとするときは、乙県知事に対し登録の移転の申請をし、乙県知事の登録を受けなければならない。", "宅地建物取引士は、事務禁止の処分を受けたときは宅地建物取引士証をその交付を受けた都道府県知事に提出しなくてよいが、登録消除の処分を受けたときは返納しなければならない。", "宅地建物取引士は、法第37条に規定する書面を交付する際、取引の関係者から請求があったときは、専任の宅地建物取引士であるか否かにかかわらず宅地建物取引士証を提示しなければならない。"], "answer": 3, "explain": ""}, {"id": "H30-43", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業法に規定する営業保証金に関する次の記述のうち、正しいものはどれか。", "choices": ["宅地建物取引業者は、免許を受けた日から3月以内に営業保証金を供託した旨の届出を行わなかったことにより国土交通大臣又は都道府県知事の催告を受けた場合、当該催告が到達した日から1月以内に届出をしないときは、免許を取り消されることがある。", "宅地建物取引業者に委託している家賃収納代行業務により生じた債権を有する者は、宅地建物取引業者が供託した営業保証金について、その債権の弁済を受けることができる。", "宅地建物取引業者は、宅地建物取引業の開始後1週間以内に、供託物受入れの記載のある供託書の写しを添附して、営業保証金を供託した旨を免許を受けた国土交通大臣又は都道府県知事に届け出なければならない。", "宅地建物取引業者は、新たに事務所を2か所増設するための営業保証金の供託について国債証券と地方債証券を充てる場合、地方債証券の額面金額が800万円であるときは、額面金額が200万円の国債証券が必要となる。"], "answer": 0, "explain": ""}, {"id": "H30-44", "year": 2018, "field": "宅建業法", "q": "宅地建物取引業保証協会（以下この問において「保証協会」という。）の社員である宅地建物取引業者Aに関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["Aは、保証協会の社員の地位を失った場合、Aとの宅地建物取引業に関する取引により生じた債権に関し権利を有する者に対し、6月以内に申し出るべき旨の公告をしなければならない。", "保証協会は、Aの取引の相手方から宅地建物取引業に係る取引に関する苦情を受けた場合は、Aに対し、文書又は口頭による説明を求めることができる。", "Aは、保証協会の社員の地位を失った場合において、保証協会に弁済業務保証金分担金として150万円の納付をしていたときは、全ての事務所で営業を継続するためには、1週間以内に主たる事務所の最寄りの供託所に営業保証金として1,500万円を供託しなければならない。", "Aは、その一部の事務所を廃止したときは、保証協会が弁済業務保証金の還付請求権者に対し、一定期間内に申し出るべき旨の公告をした後でなければ、弁済業務保証金分担金の返還を受けることができない。"], "answer": 1, "explain": ""}, {"id": "H30-45", "year": 2018, "field": "宅建業法", "q": "特定住宅瑕疵担保責任の履行の確保等に関する法律に基づく住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結に関する次の記述のうち、正しいものはどれか。", "choices": ["宅地建物取引業者は、自ら売主として新築住宅を販売する場合及び新築住宅の売買の媒介をする場合において、住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う義務を負う。", "自ら売主として新築住宅を宅地建物取引業者でない買主に引き渡した宅地建物取引業者は、その住宅を引き渡した日から3週間以内に、住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結の状況について、宅地建物取引業の免許を受けた国土交通大臣又は都道府県知事に届け出なければならない。", "自ら売主として新築住宅を宅地建物取引業者でない買主に引き渡した宅地建物取引業者は、基準日に係る住宅販売瑕疵担保保証金の供託及び住宅販売瑕疵担保責任保険契約の締結の状況について届出をしなければ、当該基準日の翌日から起算して50日を経過した日以後においては、新たに自ら売主となる新築住宅の売買契約を締結することができない。", "住宅販売瑕疵担保責任保険契約を締結している宅地建物取引業者は、当該住宅を引き渡した時から10年間、住宅の構造耐力上主要な部分の瑕疵によって生じた損害についてのみ保険金を請求することができる。"], "answer": 2, "explain": ""}, {"id": "H30-46", "year": 2018, "field": "免除科目", "q": "独立行政法人住宅金融支援機構（以下この問において「機構」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、住宅の建設又は購入に必要な資金の貸付けに係る金融機関の貸付債権の譲受けを業務として行っているが、当該住宅の建設又は購入に付随する土地又は借地権の取得に必要な資金の貸付けに係る金融機関の貸付債権については、譲受けの対象としていない。", "機構は、金融機関による住宅資金の供給を支援するため、金融機関が貸し付けた住宅ローンについて、住宅融資保険を引き受けている。", "機構は、証券化支援事業（買取型）において、MBS（資産担保証券）を発行することにより、債券市場（投資家）から資金を調達している。", "機構は、高齢者の家庭に適した良好な居住性能及び居住環境を有する住宅とすることを主たる目的とする住宅の改良（高齢者が自ら居住する住宅について行うものに限る。）に必要な資金の貸付けを業務として行っている。"], "answer": 0, "explain": ""}, {"id": "H30-47", "year": 2018, "field": "免除科目", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法（不動産の表示に関する公正競争規約を含む。）の規定によれば、正しいものはどれか。", "choices": ["新築分譲住宅について、価格Aで販売を開始してから3か月以上経過したため、価格Aから価格Bに値下げをすることとし、価格Aと価格Bを併記して、値下げをした旨を表示する場合、値下げ金額が明確になっていれば、価格Aの公表時期や値下げの時期を表示する必要はない。", "土地上に古家が存在する場合に、当該古家が、住宅として使用することが可能な状態と認められる場合であっても、古家がある旨を表示すれば、売地と表示して販売しても不当表示に問われることはない。", "新築分譲マンションの広告において、当該マンションの完成図を掲載する際に、敷地内にある電柱及び電線を消去する加工を施した場合であっても、当該マンションの外観を消費者に対し明確に示すためであれば、不当表示に問われることはない。", "複数の売買物件を1枚の広告に掲載するに当たり、取引態様が複数混在している場合には、広告の下部にまとめて表示すれば、どの物件がどの取引態様かを明示していなくても不当表示に問われることはない。"], "answer": 1, "explain": ""}, {"id": "H30-48", "year": 2018, "field": "免除科目", "q": "次の記述のうち、正しいものはどれか。", "choices": ["建築着工統計（平成30年1月公表）によれば、平成29年の新設住宅着工戸数は前年比0.3%の増加だったが、新設住宅のうち、分譲住宅の着工戸数は前年比1.9%の減少となった。", "平成28年度法人企業統計年報（平成29年9月公表）によれば、平成28年度における全産業の売上高は前年度に比べ1.7%増加したが、不動産業の売上高は9.1%減少した。", "平成30年地価公示（平成30年3月公表）によれば、平成29年1月以降の1年間の地価変動率は、住宅地の全国平均では、昨年の横ばいから10年ぶりに上昇に転じた。", "平成30年版土地白書（平成30年6月公表）によれば、土地取引について、売買による所有権移転登記の件数でその動向を見ると、平成29年の全国の土地取引件数は132万件となり、5年連続で減少した。"], "answer": 2, "explain": ""}, {"id": "H30-49", "year": 2018, "field": "免除科目", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["山麓の地形の中で、地すべりによってできた地形は一見なだらかで、水はけもよく、住宅地として好適のように見えるが、末端の急斜面部等は斜面崩壊の危険度が高い。", "台地の上の浅い谷は、豪雨時には一時的に浸水することがあり、現地に入っても気付かないことが多いが、住宅地としては注意を要する。", "大都市の大部分は低地に立地しているが、この数千年の間に形成され、かつては湿地や旧河道であった地域が多く、地震災害に対して脆弱で、また洪水、高潮、津波等の災害の危険度も高い。", "低地の中で特に災害の危険度の高い所は、扇状地の中の微高地、自然堤防、廃川敷となった旧天井川等であり、比較的危険度の低い所が沿岸部の標高の低いデルタ地域、旧河道等である。"], "answer": 3, "explain": ""}, {"id": "H30-50", "year": 2018, "field": "免除科目", "q": "建築物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["木造建物を造る際には、強度や耐久性において、できるだけ乾燥している木材を使用するのが好ましい。", "集成木材構造は、集成木材で骨組を構成したもので、大規模な建物にも使用されている。", "鉄骨構造は、不燃構造であり、耐火材料による耐火被覆がなくても耐火構造にすることができる。", "鉄筋コンクリート構造は、耐久性を高めるためには、中性化の防止やコンクリートのひび割れ防止の注意が必要である。"], "answer": 2, "explain": ""}, {"id": "H29-01", "year": 2017, "field": "権利関係", "q": "代理に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["売買契約を締結する権限を与えられた代理人は、特段の事情がない限り、相手方からその売買契約を取り消す旨の意思表示を受領する権限を有する。", "委任による代理人は、本人の許諾を得たときのほか、やむを得ない事由があるときにも、復代理人を選任することができる。", "復代理人が委任事務を処理するに当たり金銭を受領し、これを代理人に引き渡したときは、特段の事情がない限り、代理人に対する受領物引渡義務は消滅するが、本人に対する受領物引渡義務は消滅しない。", "夫婦の一方は、個別に代理権の授権がなくとも、日常家事に関する事項について、他の一方を代理して法律行為をすることができる。"], "answer": 2, "explain": ""}, {"id": "H29-02", "year": 2017, "field": "権利関係", "q": "所有権の移転又は取得に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["Aの所有する甲土地をBが時効取得した場合、Bが甲土地の所有権を取得するのは、取得時効の完成時である。", "Aを売主、Bを買主としてCの所有する乙建物の売買契約が締結された場合、BがAの無権利について善意無過失であれば、AB間で売買契約が成立した時点で、Bは乙建物の所有権を取得する。", "Aを売主、Bを買主として、丙土地の売買契約が締結され、代金の完済までは丙土地の所有権は移転しないとの特約が付された場合であっても、当該売買契約締結の時点で丙土地の所有権はBに移転する。", "AがBに丁土地を売却したが、AがBの強迫を理由に売買契約を取り消した場合、丁土地の所有権はAに復帰し、初めからBに移転しなかったことになる。"], "answer": 3, "explain": ""}, {"id": "H29-03", "year": 2017, "field": "権利関係", "q": "次の1から4までの記述のうち、民法の規定及び下記判決文によれば、誤っているものはどれか。\n（判決文）\n共有者の一部の者から共有者の協議に基づかないで共有物を占有使用することを承認された第三者は、その者の占有使用を承認しなかった共有者に対して共有物を排他的に占有する権原を主張することはできないが、現にする占有がこれを承認した共有者の持分に基づくものと認められる限度で共有物を占有使用する権原を有するので、第三者の占有使用を承認しなかった共有者は右第三者に対して当然には共有物の明渡しを請求することはできないと解するのが相当である。", "choices": ["共有者は、他の共有者との協議に基づかないで当然に共有物を排他的に占有する権原を有するものではない。", "AとBが共有する建物につき、AB間で協議することなくAがCと使用貸借契約を締結した場合、Bは当然にはCに対して当該建物の明渡しを請求することはできない。", "DとEが共有する建物につき、DE間で協議することなくDがFと使用貸借契約を締結した場合、Fは、使用貸借契約を承認しなかったEに対して当該建物全体を排他的に占有する権原を主張することができる。", "GとHが共有する建物につき、Gがその持分を放棄した場合は、その持分はHに帰属する。"], "answer": 2, "explain": ""}, {"id": "H29-04", "year": 2017, "field": "権利関係", "q": "次の記述のうち、平成29年4月1日現在施行されている民法の条文に規定されているものはどれか。", "choices": ["権利についての協議を行う旨の合意が書面でされたときは、その合意があった時から1年を経過した時までは、時効は完成しない旨", "他の土地に囲まれて公道に通じない土地の所有者は、公道に至るため、その土地を囲んでいる他の土地を通行することができる旨", "売主は、買主に対し、登記、登録その他の売買の目的である権利の移転についての対抗要件を備えさせる義務を負う旨", "賃借人の原状回復義務の対象となる損傷からは、通常の使用及び収益によって生じた賃借物の損耗並びに賃借物の経年劣化を除く旨"], "answer": 1, "explain": ""}, {"id": "H29-05", "year": 2017, "field": "権利関係", "q": "Aは、中古自動車を売却するため、Bに売買の媒介を依頼し、報酬として売買代金の3％を支払うことを約した。Bの媒介によりAは当該自動車をCに100万円で売却した。この場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["Bが報酬を得て売買の媒介を行っているので、CはAから当該自動車の引渡しを受ける前に、100万円をAに支払わなければならない。", "当該自動車に隠れた瑕疵があった場合には、CはAに対しても、Bに対しても、瑕疵担保責任を追及することができる。", "売買契約が締結された際に、Cが解約手付として手付金10万円をAに支払っている場合には、Aはいつでも20万円を償還して売買契約を解除することができる。", "売買契約締結時には当該自動車がAの所有物ではなく、Aの父親の所有物であったとしても、AC間の売買契約は有効に成立する。"], "answer": 3, "explain": ""}, {"id": "H29-06", "year": 2017, "field": "権利関係", "q": "Aが死亡し、相続人がBとCの2名であった場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["①BがAの配偶者でCがAの子である場合と、②BとCがいずれもAの子である場合とでは、Bの法定相続分は①の方が大きい。", "Aの死亡後、いずれもAの子であるBとCとの間の遺産分割協議が成立しないうちにBが死亡したときは、Bに配偶者Dと子Eがいる場合であっても、Aの遺産分割についてはEが代襲相続人として分割協議を行う。", "遺産分割協議が成立するまでの間に遺産である不動産から賃料債権が生じていて、BとCがその相続分に応じて当該賃料債権を分割単独債権として確定的に取得している場合、遺産分割協議で当該不動産をBが取得することになっても、Cが既に取得した賃料債権につき清算する必要はない。", "Bが自己のために相続の開始があったことを知った時から3か月以内に家庭裁判所に対して、相続によって得た財産の限度においてのみAの債務及び遺贈を弁済すべきことを留保して相続を承認する限定承認をする旨を申述すれば、Cも限定承認をする旨を申述したとみなされる。"], "answer": 2, "explain": ""}, {"id": "H29-07", "year": 2017, "field": "権利関係", "q": "請負契約に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["請負契約が請負人の責めに帰すべき事由によって中途で終了し、請負人が施工済みの部分に相当する報酬に限ってその支払を請求することができる場合、注文者が請負人に請求できるのは、注文者が残工事の施工に要した費用のうち、請負人の未施工部分に相当する請負代金額を超える額に限られる。", "請負契約が注文者の責めに帰すべき事由によって中途で終了した場合、請負人は、残債務を免れるとともに、注文者に請負代金全額を請求できるが、自己の債務を免れたことによる利益を注文者に償還しなければならない。", "請負契約の目的物に瑕疵がある場合、注文者は、請負人から瑕疵の修補に代わる損害の賠償を受けていなくとも、特別の事情がない限り、報酬全額を支払わなければならない。", "請負人が瑕疵担保責任を負わない旨の特約をしたときであっても、知りながら告げなかった事実については、その責任を免れることはできない。"], "answer": 2, "explain": ""}, {"id": "H29-08", "year": 2017, "field": "権利関係", "q": "A、B、Cの3人がDに対して900万円の連帯債務を負っている場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、A、B、Cの負担部分は等しいものとする。", "choices": ["DがAに対して履行の請求をした場合、B及びCがそのことを知らなければ、B及びCについては、その効力が生じない。", "Aが、Dに対する債務と、Dに対して有する200万円の債権を対当額で相殺する旨の意思表示をDにした場合、B及びCのDに対する連帯債務も200万円が消滅する。", "Bのために時効が完成した場合、A及びCのDに対する連帯債務も時効によって全部消滅する。", "CがDに対して100万円を弁済した場合は、Cの負担部分の範囲内であるから、Cは、A及びBに対して求償することはできない。"], "answer": 1, "explain": ""}, {"id": "H29-09", "year": 2017, "field": "権利関係", "q": "1億2,000万円の財産を有するAが死亡した。Aには、配偶者はなく、子B、C、Dがおり、Bには子Eが、Cには子Fがいる。Bは相続を放棄した。また、Cは生前のAを強迫して遺言作成を妨害したため、相続人となることができない。この場合における法定相続分に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["Dが4,000万円、Eが4,000万円、Fが4,000万円となる。", "Dが1億2,000万円となる。", "Dが6,000万円、Fが6,000万円となる。", "Dが6,000万円、Eが6,000万円となる。"], "answer": 2, "explain": ""}, {"id": "H29-10", "year": 2017, "field": "権利関係", "q": "①不動産質権と②抵当権に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["①では、被担保債権の利息のうち、満期となった最後の2年分についてのみ担保されるが、②では、設定行為に別段の定めがない限り、被担保債権の利息は担保されない。", "①は、10年を超える存続期間を定めたときであっても、その期間は10年となるのに対し、②は、存続期間に関する制限はない。", "①は、目的物の引渡しが効力の発生要件であるのに対し、②は、目的物の引渡しは効力の発生要件ではない。", "①も②も不動産に関する物権であり、登記を備えなければ第三者に対抗することができない。"], "answer": 0, "explain": ""}, {"id": "H29-11", "year": 2017, "field": "権利関係", "q": "A所有の甲土地につき、平成29年10月1日にBとの間で賃貸借契約（以下「本件契約」という。）が締結された場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。", "choices": ["Aが甲土地につき、本件契約とは別に、平成29年9月1日にCとの間で建物所有を目的として賃貸借契約を締結していた場合、本件契約が資材置場として更地で利用することを目的とするものであるときは、本件契約よりもCとの契約が優先する。", "賃借権の存続期間を10年と定めた場合、本件契約が居住の用に供する建物を所有することを目的とするものであるときは存続期間が30年となるのに対し、本件契約が資材置場として更地で利用することを目的とするものであるときは存続期間は10年である。", "本件契約が建物所有を目的として存続期間60年とし、賃料につき3年ごとに1％ずつ増額する旨を公正証書で定めたものである場合、社会情勢の変化により賃料が不相当となったときであっても、AもBも期間満了まで賃料の増減額請求をすることができない。", "本件契約が建物所有を目的としている場合、契約の更新がなく、建物の買取りの請求をしないこととする旨を定めるには、AはあらかじめBに対してその旨を記載した書面を交付して説明しなければならない。"], "answer": 1, "explain": ""}, {"id": "H29-12", "year": 2017, "field": "権利関係", "q": "Aが所有する甲建物をBに対して3年間賃貸する旨の契約をした場合における次の記述のうち、借地借家法の規定によれば、正しいものはどれか。", "choices": ["AがBに対し、甲建物の賃貸借契約の期間満了の1年前に更新をしない旨の通知をしていれば、AB間の賃貸借契約は期間満了によって当然に終了し、更新されない。", "Aが甲建物の賃貸借契約の解約の申入れをした場合には申入れ日から3月で賃貸借契約が終了する旨を定めた特約は、Bがあらかじめ同意していれば、有効となる。", "Cが甲建物を適法に転借している場合、AB間の賃貸借契約が期間満了によって終了するときに、Cがその旨をBから聞かされていれば、AはCに対して、賃貸借契約の期間満了による終了を対抗することができる。", "AB間の賃貸借契約が借地借家法第38条の定期建物賃貸借で、契約の更新がない旨を定めるものである場合、当該契約前にAがBに契約の更新がなく期間の満了により終了する旨を記載した書面を交付して説明しなければ、契約の更新がない旨の約定は無効となる。"], "answer": 3, "explain": ""}, {"id": "H29-13", "year": 2017, "field": "権利関係", "q": "建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれか。", "choices": ["管理者は、少なくとも毎年1回集会を招集しなければならない。", "区分所有者の5分の1以上で議決権の5分の1以上を有するものは、管理者に対し、会議の目的たる事項を示して、集会の招集を請求することができるが、この定数は規約で減ずることはできない。", "集会の招集の通知は、区分所有者が管理者に対して通知を受け取る場所をあらかじめ通知した場合には、管理者はその場所にあててすれば足りる。", "集会は、区分所有者全員の同意があれば、招集の手続を経ないで開くことができる。"], "answer": 1, "explain": ""}, {"id": "H29-14", "year": 2017, "field": "権利関係", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。", "choices": ["建物の名称があるときは、その名称も当該建物の表示に関する登記の登記事項となる。", "地上権の設定の登記をする場合において、地上権の存続期間の定めがあるときは、その定めも登記事項となる。", "賃借権の設定の登記をする場合において、敷金があるときであっても、その旨は登記事項とならない。", "事業用定期借地権として借地借家法第23条第1項の定めのある賃借権の設定の登記をする場合、その定めも登記事項となる。"], "answer": 2, "explain": ""}, {"id": "H29-15", "year": 2017, "field": "法令上の制限", "q": "農地に関する次の記述のうち、農地法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["市街化区域内の農地を耕作のために借り入れる場合、あらかじめ農業委員会に届出をすれば、法第3条第1項の許可を受ける必要はない。", "市街化調整区域内の4ヘクタールを超える農地について、これを転用するために所有権を取得する場合、農林水産大臣の許可を受ける必要がある。", "銀行から500万円を借り入れるために農地に抵当権を設定する場合、法第3条第1項又は第5条第1項の許可を受ける必要がある。", "相続により農地の所有権を取得した者は、遅滞なく、その農地の存する市町村の農業委員会にその旨を届け出なければならない。"], "answer": 3, "explain": ""}, {"id": "H29-16", "year": 2017, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、正しいものの組合せはどれか。\nア　都市計画施設の区域又は市街地開発事業の施行区域内において建築物の建築をしようとする者は、一定の場合を除き、都道府県知事（市の区域内にあっては、当該市の長）の許可を受けなければならない。\nイ　地区整備計画が定められている地区計画の区域内において、建築物の建築を行おうとする者は、都道府県知事（市の区域内にあっては、当該市の長）の許可を受けなければならない。\nウ　都市計画事業の認可の告示があった後、当該認可に係る事業地内において、当該都市計画事業の施行の障害となるおそれがある土地の形質の変更を行おうとする者は、都道府県知事（市の区域内にあっては、当該市の長）の許可を受けなければならない。\nエ　都市計画事業の認可の告示があった後、当該認可に係る事業地内の土地建物等を有償で譲り渡そうとする者は、当該事業の施行者の許可を受けなければならない。", "choices": ["ア、ウ", "ア、エ", "イ、ウ", "イ、エ"], "answer": 0, "explain": ""}, {"id": "H29-17", "year": 2017, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。ただし、許可を要する開発行為の面積について、条例による定めはないものとし、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["準都市計画区域内において、工場の建築の用に供する目的で1,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "市街化区域内において、農業を営む者の居住の用に供する建築物の建築の用に供する目的で1,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "都市計画区域及び準都市計画区域外の区域内において、変電所の建築の用に供する目的で1,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "区域区分の定めのない都市計画区域内において、遊園地の建設の用に供する目的で3,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。"], "answer": 1, "explain": ""}, {"id": "H29-18", "year": 2017, "field": "法令上の制限", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。", "choices": ["鉄筋コンクリート造であって、階数が2の住宅を新築する場合において、特定行政庁が、安全上、防火上及び避難上支障がないと認めたときは、検査済証の交付を受ける前においても、仮に、当該建築物を使用することができる。", "長屋の各戸の界壁は、小屋裏又は天井裏に達するものとしなければならない。", "下水道法に規定する処理区域内においては、便所は、汚水管が公共下水道に連結された水洗便所としなければならない。", "ホテルの用途に供する建築物を共同住宅（その用途に供する部分の床面積の合計が300㎡）に用途変更する場合、建築確認は不要である。"], "answer": 3, "explain": ""}, {"id": "H29-19", "year": 2017, "field": "法令上の制限", "q": "建築基準法（以下この問において「法」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["都市計画区域又は準都市計画区域内における用途地域の指定のない区域内の建築物の建ぺい率の上限値は、原則として、法で定めた数値のうち、特定行政庁が土地利用の状況等を考慮し当該区域を区分して都道府県都市計画審議会の議を経て定めるものとなる。", "第二種中高層住居専用地域内では、原則として、ホテル又は旅館を建築することができる。", "幅員4m以上であり、法が施行された時点又は都市計画区域若しくは準都市計画区域に入った時点で現に存在する道は、特定行政庁の指定がない限り、法上の道路とはならない。", "建築物の前面道路の幅員により制限される容積率について、前面道路が2つ以上ある場合には、これらの前面道路の幅員の最小の数値（12m未満の場合に限る。）を用いて算定する。"], "answer": 0, "explain": ""}, {"id": "H29-20", "year": 2017, "field": "法令上の制限", "q": "宅地造成等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["都道府県知事は、宅地造成工事規制区域内の宅地で、宅地造成に伴う災害の防止のため必要な擁壁が設置されていないために、これを放置するときは、宅地造成に伴う災害の発生のおそれが大きいと認められる場合、一定の限度のもとに、当該宅地の所有者、管理者又は占有者に対して、擁壁の設置を命ずることができる。", "都道府県知事は、宅地造成工事規制区域内の宅地において行われている工事の状況について、その工事が宅地造成に関する工事であるか否かにかかわらず、当該宅地の所有者、管理者又は占有者に対して報告を求めることができる。", "都道府県知事は、一定の場合には都道府県（指定都市、中核市又は施行時特例市の区域にあっては、それぞれ指定都市、中核市又は施行時特例市）の規則で、宅地造成工事規制区域内において行われる宅地造成に関する工事の技術的基準を強化することができる。", "宅地造成工事規制区域内において、政令で定める技術的基準を満たす地表水等を排除するための排水施設の除却工事を行おうとする場合は、一定の場合を除き、都道府県知事への届出が必要となるが、当該技術的基準を満たす必要のない地表水等を排除するための排水施設を除却する工事を行おうとする場合は、都道府県知事に届け出る必要はない。"], "answer": 3, "explain": ""}, {"id": "H29-21", "year": 2017, "field": "法令上の制限", "q": "土地区画整理法に関する次の記述のうち、誤っているものはどれか。なお、この問において「組合」とは、土地区画整理組合をいう。", "choices": ["組合は、事業の完成により解散しようとする場合においては、都道府県知事の認可を受けなければならない。", "施行地区内の宅地について組合員の有する所有権の全部又は一部を承継した者がある場合においては、その組合員がその所有権の全部又は一部について組合に対して有する権利義務は、その承継した者に移転する。", "組合を設立しようとする者は、事業計画の決定に先立って組合を設立する必要があると認める場合においては、7人以上共同して、定款及び事業基本方針を定め、その組合の設立について都道府県知事の認可を受けることができる。", "組合が施行する土地区画整理事業に係る施行地区内の宅地について借地権のみを有する者は、その組合の組合員とはならない。"], "answer": 3, "explain": ""}, {"id": "H29-22", "year": 2017, "field": "法令上の制限", "q": "次の記述のうち、正しいものはどれか。", "choices": ["津波防災地域づくりに関する法律によれば、津波防護施設区域内において土地の掘削をしようとする者は、一定の場合を除き、津波防護施設管理者の許可を受けなければならない。", "国土利用計画法によれば、市街化区域内の3,000㎡の土地を贈与により取得した者は、2週間以内に、都道府県知事（地方自治法に基づく指定都市にあっては、当該指定都市の長）に届け出なければならない。", "景観法によれば、景観計画区域内において建築物の新築、増築、改築又は移転をした者は、工事着手後30日以内に、その旨を景観行政団体の長に届け出なければならない。", "道路法によれば、道路の区域が決定された後道路の供用が開始されるまでの間であっても、道路管理者が当該区域についての土地に関する権原を取得する前であれば、道路管理者の許可を受けずに、当該区域内において工作物を新築することができる。"], "answer": 0, "explain": ""}, {"id": "H29-23", "year": 2017, "field": "税・その他", "q": "所得税法に関する次の記述のうち、正しいものはどれか。", "choices": ["個人が台風により主として保養の用に供する目的で所有する別荘について受けた損失の金額（保険金等により補てんされる部分の金額を除く。）は、その損失を受けた日の属する年分又はその翌年分の譲渡所得の金額の計算上控除される。", "建物の所有を目的とする土地の賃借権の設定の対価として支払を受ける権利金の金額が、その土地の価額の10分の5に相当する金額を超えるときは、不動産所得として課税される。", "譲渡所得とは資産の譲渡による所得をいうので、不動産業者である個人が営利を目的として継続的に行っている土地の譲渡による所得は、譲渡所得として課税される。", "個人が相続（限定承認に係るものを除く。）により取得した譲渡所得の基因となる資産を譲渡した場合における譲渡所得の金額の計算については、その資産をその相続の時における価額に相当する金額により取得したものとして計算される。"], "answer": 0, "explain": ""}, {"id": "H29-24", "year": 2017, "field": "税・その他", "q": "固定資産税に関する次の記述のうち、正しいものはどれか。", "choices": ["固定資産税は、固定資産が賃借されている場合、所有者ではなく当該固定資産の賃借人に対して課税される。", "家屋に対して課する固定資産税の納税者が、その納付すべき当該年度の固定資産税に係る家屋について家屋課税台帳等に登録された価格と当該家屋が所在する市町村内の他の家屋の価格とを比較することができるよう、当該納税者は、家屋価格等縦覧帳簿をいつでも縦覧することができる。", "固定資産税の納税者は、その納付すべき当該年度の固定資産課税に係る固定資産について、固定資産課税台帳に登録された価格について不服があるときは、一定の場合を除いて、文書をもって、固定資産評価審査委員会に審査の申出をすることができる。", "平成29年1月1日現在において更地であっても住宅の建設が予定されている土地においては、市町村長が固定資産課税台帳に当該土地の価格を登録した旨の公示をするまでに当該住宅の敷地の用に供された場合には、当該土地に係る平成29年度の固定資産税について、住宅用地に対する課税標準の特例が適用される。"], "answer": 2, "explain": ""}, {"id": "H29-25", "year": 2017, "field": "税・その他", "q": "地価公示法に関する次の記述のうち、正しいものはどれか。", "choices": ["土地鑑定委員会は、標準地の単位面積当たりの価格及び当該標準地の前回の公示価格からの変化率等一定の事項を官報により公示しなければならないとされている。", "土地鑑定委員会は、公示区域内の標準地について、毎年2回、2人以上の不動産鑑定士の鑑定評価を求め、その結果を審査し、必要な調整を行って、一定の基準日における当該標準地の単位面積当たりの正常な価格を判定し、これを公示するものとされている。", "標準地は、土地鑑定委員会が、自然的及び社会的条件からみて類似の利用価値を有すると認められる地域において、土地の利用状況、環境等が通常であると認められる一団の土地について選定するものとされている。", "土地の取引を行なう者は、取引の対象となる土地が標準地である場合には、当該標準地について公示された価格により取引を行なう義務を有する。"], "answer": 2, "explain": ""}, {"id": "H29-26", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業者A（消費税課税事業者）は貸主Bから建物の貸借の媒介の依頼を受け、宅地建物取引業者C（消費税課税事業者）は借主Dから建物の貸借の媒介の依頼を受け、BとDの間での賃貸借契約を成立させた。この場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。なお、1か月分の借賃は9万円（消費税等相当額を含まない。）である。", "choices": ["建物を店舗として貸借する場合、当該賃貸借契約において200万円の権利金（権利設定の対価として支払われる金銭であって返還されないものをいい、消費税等相当額を含まない。）の授受があるときは、A及びCが受領できる報酬の限度額の合計は216,000円である。", "AがBから48,600円の報酬を受領し、CがDから48,600円の報酬を受領した場合、AはBの依頼によって行った広告の料金に相当する額を別途受領することができない。", "Cは、Dから報酬をその限度額まで受領できるほかに、法第35条の規定に基づく重要事項の説明を行った対価として、報酬を受領することができる。", "建物を居住用として貸借する場合、当該賃貸借契約において100万円の保証金（Dの退去時にDに全額返還されるものとする。）の授受があるときは、A及びCが受領できる報酬の限度額の合計は108,000円である。"], "answer": 0, "explain": ""}, {"id": "H29-27", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として宅地建物取引業者でない買主Bとの間で締結した宅地の売買契約に関する次の記述のうち、宅地建物取引業法及び民法の規定によれば、正しいものはいくつあるか。\nア　売買契約において、瑕疵担保責任を負う期間を引渡しの日から2年間とする特約を定めた場合、その特約は無効となる。\nイ　売買契約において、売主の責めに帰すべき事由による瑕疵についてのみ引渡しの日から1年間担保責任を負うという特約を定めた場合、その特約は無効となる。\nウ　Aが瑕疵担保責任を負う期間内においては、損害賠償の請求をすることはできるが、契約を解除することはできないとする特約を定めた場合、その特約は有効である。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "explain": ""}, {"id": "H29-28", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業者Aが行う業務に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定に違反しないものはいくつあるか。\nア　Aは、法第49条に規定されている業務に関する帳簿について、業務上知り得た秘密が含まれているため、当該帳簿の閉鎖後、遅滞なく、専門業者に委託して廃棄した。\nイ　Aは、宅地の売却を希望するBと専任代理契約を締結した。Aは、Bの要望を踏まえ、当該代理契約に指定流通機構に登録しない旨の特約を付したため、その登録をしなかった。\nウ　Aの従業者Cは、投資用マンションの販売において、勧誘に先立ちAの名称を告げず、自己の氏名及び契約締結の勧誘が目的であることを告げたうえで勧誘を行ったが、相手方から関心がない旨の意思表示があったので、勧誘の継続を断念した。\nエ　Aは、自ら売主として新築マンションを分譲するに当たり、売買契約の締結に際して買主から手付を受領した。その後、当該契約の当事者の双方が契約の履行に着手する前に、Aは、手付を買主に返還して、契約を一方的に解除した。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 3, "explain": ""}, {"id": "H29-29", "year": 2017, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者A（甲県知事免許）は、マンション管理業に関し、不正又は著しく不当な行為をしたとして、マンションの管理の適正化の推進に関する法律に基づき、国土交通大臣から業務の停止を命じられた。この場合、Aは、甲県知事から法に基づく指示処分を受けることがある。", "国土交通大臣は、宅地建物取引業者B（乙県知事免許）の事務所の所在地を確知できない場合、その旨を官報及び乙県の公報で公告し、その公告の日から30日を経過してもBから申出がないときは、Bの免許を取り消すことができる。", "国土交通大臣は、宅地建物取引業者C（国土交通大臣免許）に対し、法第35条の規定に基づく重要事項の説明を行わなかったことを理由に業務停止を命じた場合は、遅滞なく、その旨を内閣総理大臣に通知しなければならない。", "宅地建物取引業者D（丙県知事免許）は、法第72条第1項に基づく丙県職員による事務所への立入検査を拒んだ。この場合、Dは、50万円以下の罰金に処せられることがある。"], "answer": 3, "explain": ""}, {"id": "H29-30", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業法（以下この問において「法」という。）の規定に関する次の記述のうち、誤っているものはどれか。なお、この問において「登録」とは、宅地建物取引士の登録をいうものとする。", "choices": ["宅地建物取引士A（甲県知事登録）が、甲県から乙県に住所を変更したときは、乙県知事に対し、登録の移転の申請をすることができる。", "宅地建物取引業者B（甲県知事免許）が、乙県に所在する1棟のマンション（150戸）を分譲するため、現地に案内所を設置し契約の申込みを受けるときは、甲県知事及び乙県知事に、その業務を開始する日の10日前までに、法第50条第2項の規定に基づく届出をしなければならない。", "宅地建物取引士資格試験合格後18月を経過したC（甲県知事登録）が、甲県知事から宅地建物取引士証の交付を受けようとする場合は、甲県知事が指定する講習を交付の申請前6月以内に受講しなければならない。", "宅地建物取引業者D社（甲県知事免許）が、合併により消滅したときは、その日から30日以内に、D社を代表する役員であった者が、その旨を甲県知事に届け出なければならない。"], "answer": 0, "explain": ""}, {"id": "H29-31", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者でないBとの間でマンション（代金3,000万円）の売買契約を締結しようとする場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはいくつあるか。\nア　Bは自ら指定した自宅においてマンションの買受けの申込みをした場合においても、法第37条の2の規定に基づき、書面により買受けの申込みの撤回を行うことができる。\nイ　BがAに対し、法第37条の2の規定に基づき、書面により買受けの申込みの撤回を行った場合、その効力は、当該書面をAが受け取った時に生じることとなる。\nウ　Aは、Bとの間で、当事者の債務不履行を理由とする契約解除に伴う違約金について300万円とする特約を定めた場合、加えて、損害賠償の予定額を600万円とする特約を定めることができる。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 3, "explain": ""}, {"id": "H29-32", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業法に規定する営業保証金に関する次の記述のうち、誤っているものはどれか。", "choices": ["宅地建物取引業者は、主たる事務所を移転したことにより、その最寄りの供託所が変更となった場合において、金銭のみをもって営業保証金を供託しているときは、従前の供託所から営業保証金を取り戻した後、移転後の最寄りの供託所に供託しなければならない。", "宅地建物取引業者は、事業の開始後新たに事務所を設置するため営業保証金を供託したときは、供託物受入れの記載のある供託書の写しを添附して、その旨を免許を受けた国土交通大臣又は都道府県知事に届け出なければならない。", "宅地建物取引業者は、一部の事務所を廃止し営業保証金を取り戻そうとする場合には、供託した営業保証金につき還付を請求する権利を有する者に対し、6月以上の期間を定めて申し出るべき旨の公告をしなければならない。", "宅地建物取引業者は、営業保証金の還付があったために営業保証金に不足が生じたときは、国土交通大臣又は都道府県知事から不足額を供託すべき旨の通知書の送付を受けた日から2週間以内に、不足額を供託しなければならない。"], "answer": 0, "explain": ""}, {"id": "H29-33", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["宅地の売買の媒介を行う場合、売買の各当事者すなわち売主及び買主に対して、書面を交付して説明しなければならない。", "宅地の売買の媒介を行う場合、代金に関する金銭の貸借のあっせんの内容及び当該あっせんに係る金銭の貸借が成立しないときの措置について、説明しなければならない。", "建物の貸借の媒介を行う場合、私道に関する負担について、説明しなければならない。", "建物の売買の媒介を行う場合、天災その他不可抗力による損害の負担に関する定めがあるときは、その内容について、説明しなければならない。"], "answer": 1, "explain": ""}, {"id": "H29-34", "year": 2017, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、誤っているものはどれか。", "choices": ["宅地建物取引業者が、自ら売主として、宅地及び建物の売買の契約を締結するに際し、手付金について、当初提示した金額を減額することにより、買主に対し売買契約の締結を誘引し、その契約を締結させることは、法に違反しない。", "宅地建物取引業者が、アンケート調査をすることを装って電話をし、その目的がマンションの売買の勧誘であることを告げずに勧誘をする行為は、法に違反する。", "宅地建物取引業者が、宅地及び建物の売買の媒介を行うに際し、媒介報酬について、買主の要望を受けて分割受領に応じることにより、契約の締結を誘引する行為は、法に違反する。", "宅地建物取引業者が、手付金について信用の供与をすることにより、宅地及び建物の売買契約の締結を誘引する行為を行った場合、監督処分の対象となるほか、罰則の適用を受けることがある。"], "answer": 2, "explain": ""}, {"id": "H29-35", "year": 2017, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者は、自ら貸主として締結した建物の賃貸借契約について、法第49条に規定されている業務に関する帳簿に、法及び国土交通省令で定められた事項を記載しなければならない。", "宅地建物取引業者は、その業務に関する帳簿を、一括して主たる事務所に備えれば、従たる事務所に備えておく必要はない。", "宅地建物取引業者は、その業務に関する帳簿に報酬の額を記載することが義務付けられており、違反した場合は指示処分の対象となる。", "宅地建物取引業者は、その業務に従事する者であっても、一時的に事務の補助のために雇用した者については、従業者名簿に記載する必要がない。"], "answer": 2, "explain": ""}, {"id": "H29-36", "year": 2017, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、この問において「免許」とは、宅地建物取引業の免許をいう。", "choices": ["宅地建物取引業者Aは、免許の更新を申請したが、免許権者である甲県知事の申請に対する処分がなされないまま、免許の有効期間が満了した。この場合、Aは、当該処分がなされるまで、宅地建物取引業を営むことができない。", "Bは、新たに宅地建物取引業を営むため免許の申請を行った。この場合、Bは、免許の申請から免許を受けるまでの間に、宅地建物取引業を営む旨の広告を行い、取引する物件及び顧客を募ることができる。", "宅地建物取引業者Cは、宅地又は建物の売買に関連し、兼業として、新たに不動産管理業を営むこととした。この場合、Cは兼業で不動産管理業を営む旨を、免許権者である国土交通大臣又は都道府県知事に届け出なければならない。", "宅地建物取引業者である法人Dが、宅地建物取引業者でない法人Eに吸収合併されたことにより消滅した場合、一般承継人であるEは、Dが締結した宅地又は建物の契約に基づく取引を結了する目的の範囲内において宅地建物取引業者とみなされる。"], "answer": 3, "explain": ""}, {"id": "H29-37", "year": 2017, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引士は、取引の関係者から請求があったときは、物件の買受けの申込みの前であっても宅地建物取引士証を提示しなければならないが、このときに提示した場合、後日、法第35条に規定する重要事項の説明をする際は、宅地建物取引士証を提示しなくてもよい。", "甲県知事の登録を受けている宅地建物取引士Aは、乙県に主たる事務所を置く宅地建物取引業者Bの専任の宅地建物取引士となる場合、乙県知事に登録を移転しなければならない。", "宅地建物取引士の登録を受けるには、宅地建物取引士資格試験に合格した者で、2年以上の実務の経験を有するもの又は国土交通大臣がその実務の経験を有するものと同等以上の能力を有すると認めたものであり、法で定める事由に該当しないことが必要である。", "宅地建物取引士は、取引の関係者から請求があったときは、従業者証明書を提示しなければならないが、法第35条に規定する重要事項の説明をする際は、宅地建物取引士証の提示が義務付けられているため、宅地建物取引士証の提示をもって、従業者証明書の提示に代えることができる。"], "answer": 2, "explain": ""}, {"id": "H29-38", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業者Aが、宅地建物取引業法（以下この問において「法」という。）第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、法の規定に違反しないものはどれか。", "choices": ["Aは、売主を代理して宅地の売買契約を締結した際、買主にのみ37条書面を交付した。", "Aは、自ら売主となる宅地の売買契約において、手付金等を受領するにもかかわらず、37条書面に手付金等の保全措置の内容を記載しなかった。", "Aは、媒介により宅地の売買契約を成立させた場合において、契約の解除に関する定めがあるにもかかわらず、37条書面にその内容を記載しなかった。", "Aは、自ら売主となる宅地の売買契約において瑕疵担保責任に関する特約を定めたが、買主が宅地建物取引業者であり、瑕疵担保責任に関する特約を自由に定めることができるため、37条書面にその内容を記載しなかった。"], "answer": 1, "explain": ""}, {"id": "H29-39", "year": 2017, "field": "宅建業法", "q": "営業保証金を供託している宅地建物取引業者Aと宅地建物取引業保証協会（以下この問において「保証協会」という。）の社員である宅地建物取引業者Bに関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア　A（国土交通大臣免許）は、甲県内にある主たる事務所とは別に、乙県内に新たに従たる事務所を設置したときは、営業保証金をその従たる事務所の最寄りの供託所に供託しなければならない。\nイ　Aは、平成29年5月1日に、Bに手付金500万円を支払い、宅地の売買契約を締結した。宅地の引渡しの前にBが失踪し、宅地の引渡しを受けることができなくなったときは、Aは、手付金について、弁済業務保証金から弁済を受けることができる。\nウ　Bは、保証協会の社員の地位を失ったときは、その地位を失った日から1週間以内に、営業保証金を供託しなければならない。\nエ　Bの取引に関して弁済業務保証金の還付があったときは、Bは、保証協会から当該還付額に相当する額の還付充当金を納付すべき旨の通知を受けた日から2週間以内に、還付充当金を保証協会に納付しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "explain": ""}, {"id": "H29-40", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業法（以下この問において「法」という。）第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、法の規定に違反しないものはどれか。", "choices": ["宅地建物取引業者Aは、中古マンションの売買の媒介において、当該マンションの代金の支払の時期及び引渡しの時期について、重要事項説明書に記載して説明を行ったので、37条書面には記載しなかった。", "宅地建物取引業者である売主Bは、宅地建物取引業者Cの媒介により
