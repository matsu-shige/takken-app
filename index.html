、宅地建物取引業者ではない買主Dと宅地の売買契約を締結した。Bは、Cと共同で作成した37条書面にCの宅地建物取引士の記名押印がなされていたため、その書面に、Bの宅地建物取引士をして記名押印させなかった。", "売主である宅地建物取引業者Eの宅地建物取引士Fは、宅地建物取引業者ではない買主Gに37条書面を交付する際、Gから求められなかったので、宅地建物取引士証をGに提示せずに当該書面を交付した。", "宅地建物取引業者Hは、宅地建物取引業者ではない売主Iから中古住宅を購入する契約を締結したが、Iが売主であるためIに37条書面を交付しなかった。"], "answer": 2, "explain": ""}, {"id": "H29-41", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、誤っているものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["区分所有建物の売買の媒介を行う場合、当該1棟の建物及びその敷地の管理が委託されているときは、その委託を受けている者の氏名（法人にあっては、その商号又は名称）及び住所（法人にあっては、その主たる事務所の所在地）を説明しなければならない。", "土地の売買の媒介を行う場合、移転登記の申請の時期の定めがあるときは、その内容を説明しなければならない。", "住宅の売買の媒介を行う場合、宅地内のガス配管設備等に関して、当該住宅の売買後においても当該ガス配管設備等の所有権が家庭用プロパンガス販売業者にあるものとするときは、その旨を説明する必要がある。", "中古マンションの売買の媒介を行う場合、当該マンションの計画的な維持修繕のための費用の積立てを行う旨の規約の定めがあるときは、その内容及び既に積み立てられている額について説明しなければならない。"], "answer": 1, "explain": ""}, {"id": "H29-42", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア　宅地の販売広告において、宅地の将来の環境について、著しく事実に相違する表示をしてはならない。\nイ　宅地又は建物に係る広告の表示項目の中に、取引物件に係る現在又は将来の利用の制限があるが、この制限には、都市計画法に基づく利用制限等の公法上の制限だけではなく、借地権の有無等の私法上の制限も含まれる。\nウ　顧客を集めるために売る意思のない条件の良い物件を広告することにより他の物件を販売しようとした場合、取引の相手方が実際に誤認したか否か、あるいは損害を受けたか否かにかかわらず、監督処分の対象となる。\nエ　建物の売却について代理を依頼されて広告を行う場合、取引態様として、代理であることを明示しなければならないが、その後、当該物件の購入の注文を受けたとき、広告を行った時点と取引態様に変更がない場合でも、遅滞なく、その注文者に対し取引態様を明らかにしなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "explain": ""}, {"id": "H29-43", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業者Aが、BからB所有の中古マンションの売却の依頼を受け、Bと専任媒介契約（専属専任媒介契約ではない媒介契約）を締結した場合に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはいくつあるか。\nア　Aは、2週間に1回以上当該専任媒介契約に係る業務の処理状況をBに報告しなければならないが、これに加え、当該中古マンションについて購入の申込みがあったときは、遅滞なく、その旨をBに報告しなければならない。\nイ　当該専任媒介契約の有効期間は、3月を超えることができず、また、依頼者の更新しない旨の申出がなければ自動更新とする旨の特約も認められない。ただし、Bが宅地建物取引業者である場合は、AとBの合意により、自動更新とすることができる。\nウ　Aは、当該専任媒介契約の締結の日から7日（ただし、Aの休業日は含まない。）以内に所定の事項を指定流通機構に登録しなければならず、また、法第50条の6に規定する登録を証する書面を遅滞なくBに提示しなければならない。\nエ　当該専任媒介契約に係る通常の広告費用はAの負担であるが、指定流通機構への情報登録及びBがAに特別に依頼した広告に係る費用については、成約したか否かにかかわらず、国土交通大臣の定める報酬の限度額を超えてその費用をBに請求することができる。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 0, "explain": ""}, {"id": "H29-44", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者A社が免許を受けていないB社との合併により消滅する場合、存続会社であるB社はA社の免許を承継することができる。", "個人である宅地建物取引業者Cがその事業を法人化するため、新たに株式会社Dを設立しその代表取締役に就任する場合、D社はCの免許を承継することができる。", "個人である宅地建物取引業者E（甲県知事免許）が死亡した場合、その相続人は、Eの死亡を知った日から30日以内に、その旨を甲県知事に届け出なければならず、免許はその届出があった日に失効する。", "宅地建物取引業者F社（乙県知事免許）が株主総会の決議により解散することとなった場合、その清算人は、当該解散の日から30日以内に、その旨を乙県知事に届け出なければならない。"], "answer": 3, "explain": ""}, {"id": "H29-45", "year": 2017, "field": "宅建業法", "q": "宅地建物取引業者Aが自ら売主として、宅地建物取引業者でない買主Bに新築住宅を販売する場合における次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。", "choices": ["Aは、住宅販売瑕疵担保保証金の供託をする場合、Bに対し、当該住宅を引き渡すまでに、供託所の所在地等について記載した書面を交付して説明しなければならない。", "自ら売主として新築住宅をBに引き渡したAが、住宅販売瑕疵担保保証金を供託する場合、その住宅の床面積が55㎡以下であるときは、新築住宅の合計戸数の算定に当たって、床面積55㎡以下の住宅2戸をもって1戸と数えることになる。", "Aは、基準日に係る住宅販売瑕疵担保保証金の供託及び住宅販売瑕疵担保責任保険契約の締結の状況についての届出をしなければ、当該基準日から1月を経過した日以後においては、新たに自ら売主となる新築住宅の売買契約を締結してはならない。", "Aは、住宅販売瑕疵担保責任保険契約の締結をした場合、当該住宅を引き渡した時から10年間、当該住宅の給水設備又はガス設備の瑕疵によって生じた損害について保険金の支払を受けることができる。"], "answer": 1, "explain": ""}, {"id": "H29-46", "year": 2017, "field": "免除科目", "q": "独立行政法人住宅金融支援機構（以下この問において「機構」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、団体信用生命保険業務として、貸付けを受けた者が死亡した場合のみならず、重度障害となった場合においても、支払われる生命保険の保険金を当該貸付けに係る債務の弁済に充当することができる。", "機構は、直接融資業務において、高齢者の死亡時に一括償還をする方法により貸付金の償還を受けるときは、当該貸付金の貸付けのために設定された抵当権の効力の及ぶ範囲を超えて、弁済の請求をしないことができる。", "証券化支援業務（買取型）に係る貸付金の利率は、貸付けに必要な資金の調達に係る金利その他の事情を勘案して機構が定めるため、どの金融機関においても同一の利率が適用される。", "証券化支援業務（買取型）において、機構による譲受けの対象となる住宅の購入に必要な資金の貸付けに係る金融機関の貸付債権には、当該住宅の購入に付随する改良に必要な資金も含まれる。"], "answer": 2, "explain": ""}, {"id": "H29-47", "year": 2017, "field": "免除科目", "q": "宅地建物取引業者がインターネット不動産情報サイトにおいて行った広告表示に関する次の記述のうち、不当景品類及び不当表示防止法（不動産の表示に関する公正競争規約を含む。）の規定によれば、正しいものはどれか。", "choices": ["物件の所有者に媒介を依頼された宅地建物取引業者Aから入手した当該物件に関する情報を、宅地建物取引業者Bが、そのままインターネット不動産情報サイトに表示し広告を行っていれば、仮に入手した物件に関する情報が間違っていたとしても不当表示に問われることはない。", "新築の建売住宅について、建築中で外装が完成していなかったため、当該建売住宅と規模、外観等は同一ではないが同じ施工業者が他の地域で手掛けた建売住宅の外観写真を、施工例である旨を明記して掲載した。この広告表示が不当表示に問われることはない。", "取引しようとする賃貸物件から最寄りの甲駅までの徒歩所要時間を表示するため、当該物件から甲駅までの道路距離を80mで除して算出したところ5.25分であったので、1分未満を四捨五入して「甲駅から5分」と表示した。この広告表示が不当表示に問われることはない。", "新築分譲マンションについて、パンフレットには当該マンションの全戸数の専有面積を表示したが、インターネット広告には当該マンションの全戸数の専有面積のうち、最小面積及び最大面積のみを表示した。この広告表示が不当表示に問われることはない。"], "answer": 3, "explain": ""}, {"id": "H29-48", "year": 2017, "field": "免除科目", "q": "次の記述のうち、正しいものはどれか。", "choices": ["平成29年地価公示（平成29年3月公表）によれば、住宅地の公示地価の全国平均は、9年連続で下落した。", "建築着工統計（平成29年1月公表）によれば、平成28年の持家の新設着工戸数は約29.2万戸となり、3年ぶりに増加に転じた。", "平成29年版土地白書（平成29年5月公表）によれば、土地取引について、売買による所有権移転登記の件数でその動向を見ると、平成28年の全国の土地取引件数は129万件となり、2年連続の減少となった。", "平成27年度法人企業統計年報（平成28年9月公表）によれば、平成27年度における不動産業の経常利益は約4兆3,000億円となっており、前年度比7.5％増となった。"], "answer": 1, "explain": ""}, {"id": "H29-49", "year": 2017, "field": "免除科目", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["扇状地は、山地から河川により運ばれてきた砂礫等が堆積して形成された地盤である。", "三角州は、河川の河口付近に見られる軟弱な地盤である。", "台地は、一般に地盤が安定しており、低地に比べ、自然災害に対して安全度は高い。", "埋立地は、一般に海面に対して比高を持ち、干拓地に比べ、水害に対して危険である。"], "answer": 3, "explain": ""}, {"id": "H29-50", "year": 2017, "field": "免除科目", "q": "建物の構造と材料に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["木材の強度は、含水率が小さい状態の方が低くなる。", "鉄筋は、炭素含有量が多いほど、引張強度が増大する傾向がある。", "常温、常圧において、鉄筋と普通コンクリートを比較すると、熱膨張率はほぼ等しい。", "鉄筋コンクリート構造は、耐火性、耐久性があり、耐震性、耐風性にも優れた構造である。"], "answer": 0, "explain": ""}, {"id": "H28-01", "year": 2016, "field": "権利関係", "q": "次の記述のうち、民法の条文に規定されているものはどれか。", "choices": ["利息を生ずべき債権について別段の意思表示がないときは、その利率は、年3％とする旨", "賃貸人は、賃借人が賃貸借に基づく金銭債務を履行しないときは、敷金をその債務の弁済に充てることができる旨", "免責的債務引受は、債権者と引受人となる者との契約によってすることができる旨", "契約により当事者の一方が第三者に対してある給付をすることを約したときは、その第三者は、債務者に対して直接にその給付を請求する権利を有する旨"], "answer": 3, "explain": ""}, {"id": "H28-02", "year": 2016, "field": "権利関係", "q": "制限行為能力者に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["古着の仕入販売に関する営業を許された未成年者は、成年者と同一の行為能力を有するので、法定代理人の同意を得ないで、自己が居住するために建物を第三者から購入したとしても、その法定代理人は当該売買契約を取り消すことができない。", "被保佐人が、不動産を売却する場合には、保佐人の同意が必要であるが、贈与の申し出を拒絶する場合には、保佐人の同意は不要である。", "成年後見人が、成年被後見人に代わって、成年被後見人が居住している建物を売却する際、後見監督人がいる場合には、後見監督人の許可があれば足り、家庭裁判所の許可は不要である。", "被補助人が、補助人の同意を得なければならない行為について、同意を得ていないにもかかわらず、詐術を用いて相手方に補助人の同意を得たと信じさせていたときは、被補助人は当該行為を取り消すことができない。"], "answer": 3, "explain": ""}, {"id": "H28-03", "year": 2016, "field": "権利関係", "q": "AがA所有の甲土地をBに売却した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["Aが甲土地をBに売却する前にCにも売却していた場合、Cは所有権移転登記を備えていなくても、Bに対して甲土地の所有権を主張することができる。", "AがBの詐欺を理由に甲土地の売却の意思表示を取り消しても、取消しより前にBが甲土地をDに売却し、Dが所有権移転登記を備えた場合には、DがBの詐欺の事実を知っていたか否かにかかわらず、AはDに対して甲土地の所有権を主張することができない。", "Aから甲土地を購入したBは、所有権移転登記を備えていなかった。Eがこれに乗じてBに高値で売りつけて利益を得る目的でAから甲土地を購入し所有権移転登記を備えた場合、EはBに対して甲土地の所有権を主張することができない。", "AB間の売買契約が、Bの意思表示の動機に錯誤があって締結されたものである場合、Bが所有権移転登記を備えていても、AはBの錯誤を理由にAB間の売買契約を取り消すことができる。"], "answer": 2, "explain": ""}, {"id": "H28-04", "year": 2016, "field": "権利関係", "q": "Aは、A所有の甲土地にBから借り入れた3,000万円の担保として抵当権を設定した。この場合における次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Aが甲土地に抵当権を設定した当時、甲土地上にA所有の建物があり、当該建物をAがCに売却した後、Bの抵当権が実行されてDが甲土地を競落した場合、DはCに対して、甲土地の明渡しを求めることはできない。", "甲土地上の建物が火災によって焼失してしまったが、当該建物に火災保険が付されていた場合、Bは、甲土地の抵当権に基づき、この火災保険契約に基づく損害保険金を請求することができる。", "AがEから500万円を借り入れ、これを担保するために甲土地にEを抵当権者とする第2順位の抵当権を設定した場合、BとEが抵当権の順位を変更することに合意すれば、Aの同意がなくても、甲土地の抵当権の順位を変更することができる。", "Bの抵当権設定後、Aが第三者であるFに甲土地を売却した場合、FはBに対して、民法第383条所定の書面を送付して抵当権の消滅を請求することができる。"], "answer": 1, "explain": ""}, {"id": "H28-05", "year": 2016, "field": "権利関係", "q": "Aが、Bに対する債権をCに譲渡した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["AのBに対する債権に譲渡禁止の特約があり、Cがその特約の存在を知りながら債権の譲渡を受けていれば、Cからさらに債権の譲渡を受けた転得者Dがその特約の存在を知らなかったことにつき重大な過失がない場合でも、BはDに対して特約の存在を対抗することができる。", "AがBに債権譲渡の通知を発送し、その通知がBに到達していなかった場合には、Bが異議をとどめない承諾をしても、BはCに対して当該債権に係る債務の弁済を拒否することができる。", "AのBに対する債権に譲渡禁止の特約がなく、Cに譲渡された時点ではまだ発生していない将来の取引に関する債権であった場合、その取引の種類、金額、期間などにより当該債権が特定されていたときは、特段の事情がない限り、AからCへの債権譲渡は有効である。", "Aに対し弁済期が到来した貸金債権を有していたBは、Aから債権譲渡の通知を受けるまでに、異議をとどめない承諾をせず、相殺の意思表示もしていなかった。その後、Bは、Cから支払請求を受けた際に、Aに対する貸金債権との相殺の意思表示をしたとしても、Cに対抗することはできない。"], "answer": 2, "explain": ""}, {"id": "H28-06", "year": 2016, "field": "権利関係", "q": "Aを売主、Bを買主とする甲土地の売買契約（以下この問において「本件契約」という。）が締結された場合の売主の担保責任に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Bが、甲土地がCの所有物であることを知りながら本件契約を締結した場合、Aが甲土地の所有権を取得してBに移転することができないときは、BはAに対して、損害賠償を請求することができない。", "Bが、甲土地がCの所有物であることを知りながら本件契約を締結した場合、Aが甲土地の所有権を取得してBに移転することができないときは、Bは、本件契約を解除することができる。", "Bが、A所有の甲土地が抵当権の目的となっていることを知りながら本件契約を締結した場合、当該抵当権の実行によってBが甲土地の所有権を失い損害を受けたとしても、BはAに対して、損害賠償を請求することができない。", "Bが、A所有の甲土地が抵当権の目的となっていることを知りながら本件契約を締結した場合、当該抵当権の実行によってBが甲土地の所有権を失ったときは、Bは、本件契約を解除することができる。"], "answer": 2, "explain": ""}, {"id": "H28-07", "year": 2016, "field": "権利関係", "q": "AがBから賃借する甲建物に、運送会社Cに雇用されているDが居眠り運転するトラックが突っ込んで甲建物の一部が損壊した場合（以下「本件事故」という。）に関する次の記述のうち、民法の規定及び判例によれば、正しいものはいくつあるか。なお、DはCの業務として運転をしていたものとする。\nア　AはBに対し、甲建物の滅失した部分の割合に応じ、賃料の減額を請求することができる。\nイ　Aは、甲建物の残りの部分だけでは賃借した目的を達することができない場合、Bとの賃貸借契約を解除することができる。\nウ　Cは、使用者責任に基づき、Bに対して本件事故から生じた損害を賠償した場合、Dに対して求償することができるが、その範囲が信義則上相当と認められる限度に制限される場合がある。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 2, "explain": ""}, {"id": "H28-08", "year": 2016, "field": "権利関係", "q": "AがBに甲建物を月額10万円で賃貸し、BがAの承諾を得て甲建物をCに適法に月額15万円で転貸している場合における次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Aは、Bの賃料の不払いを理由に甲建物の賃貸借契約を解除するには、Cに対して、賃料支払の催告をして甲建物の賃料を支払う機会を与えなければならない。", "BがAに対して甲建物の賃料を支払期日になっても支払わない場合、AはCに対して、賃料10万円をAに直接支払うよう請求することができる。", "AがBの債務不履行を理由に甲建物の賃貸借契約を解除した場合、CのBに対する賃料の不払いがなくても、AはCに対して、甲建物の明渡しを求めることができる。", "AがBとの間で甲建物の賃貸借契約を合意解除した場合、AはCに対して、Bとの合意解除に基づいて、当然には甲建物の明渡しを求めることができない。"], "answer": 0, "explain": ""}, {"id": "H28-09", "year": 2016, "field": "権利関係", "q": "次の1から4までの記述のうち、民法の規定及び下記判決文によれば、誤っているものはどれか。\n（判決文）\n契約の一方当事者が、当該契約の締結に先立ち、信義則上の説明義務に違反して、当該契約を締結するか否かに関する判断に影響を及ぼすべき情報を相手方に提供しなかった場合には、上記一方当事者は、相手方が当該契約を締結したことにより被った損害につき、不法行為による賠償責任を負うことがあるのは格別、当該契約上の債務の不履行による賠償責任を負うことはないというべきである。（中略）上記のような場合の損害賠償請求権は不法行為により発生したものである（略）。", "choices": ["信義則上の説明義務に違反して、当該契約を締結するか否かに関する判断に影響を及ぼすべき情報を買主に提供しなかった売主に対する買主の損害賠償請求権は、買主が損害及び加害者を知った時から3年間行使しないときは、時効により消滅する。", "信義則上の説明義務に違反して、当該契約を締結するか否かに関する判断に影響を及ぼすべき情報を買主に提供しなかった売主に対する買主の損害賠償請求権は、損害を被っていることを買主が知らない場合でも、売買契約から10年間行使しないときは、時効により消滅する。", "買主に対して債権を有している売主は、信義則上の説明義務に違反して、当該契約を締結するか否かに関する判断に影響を及ぼすべき情報を買主に提供しなかった売主に対する買主の損害賠償請求権を受働債権とする相殺をもって、買主に対抗することができない。", "売主が信義則上の説明義務に違反して、当該契約を締結するか否かに関する判断に影響を及ぼすべき情報を買主に提供しなかった場合、買主は、売主に対して、この説明義務違反を理由に、売買契約上の債務不履行責任を追及することはできない。"], "answer": 1, "explain": ""}, {"id": "H28-10", "year": 2016, "field": "権利関係", "q": "甲建物を所有するAが死亡し、相続人がそれぞれAの子であるB及びCの2名である場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Bが甲建物を不法占拠するDに対し明渡しを求めたとしても、Bは単純承認をしたものとはみなされない。", "Cが甲建物の賃借人Eに対し相続財産である未払賃料の支払いを求め、これを収受領得したときは、Cは単純承認をしたものとみなされる。", "Cが単純承認をしたときは、Bは限定承認をすることができない。", "Bが自己のために相続の開始があったことを知らない場合であっても、相続の開始から3か月が経過したときは、Bは単純承認をしたものとみなされる。"], "answer": 3, "explain": ""}, {"id": "H28-11", "year": 2016, "field": "権利関係", "q": "Aが居住用の甲建物を所有する目的で、期間30年と定めてBから乙土地を賃借した場合に関する次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。なお、Aは借地権登記を備えていないものとする。", "choices": ["Aが甲建物を所有していても、建物保存登記をAの子C名義で備えている場合には、Bから乙土地を購入して所有権移転登記を備えたDに対して、Aは借地権を対抗することができない。", "Aが甲建物を所有していても、登記上の建物の所在地番、床面積等が少しでも実際のものと相違している場合には、建物の同一性が否定されるようなものでなくても、Bから乙土地を購入して所有権移転登記を備えたEに対して、Aは借地権を対抗することができない。", "AB間の賃貸借契約を公正証書で行えば、当該契約の更新がなく期間満了により終了し、終了時にはAが甲建物を収去すべき旨を有効に規定することができる。", "Aが地代を支払わなかったことを理由としてBが乙土地の賃貸借契約を解除した場合、契約に特段の定めがないときは、Bは甲建物を時価で買い取らなければならない。"], "answer": 0, "explain": ""}, {"id": "H28-12", "year": 2016, "field": "権利関係", "q": "AはBと、B所有の甲建物につき、居住を目的として、期間3年、賃料月額20万円と定めて賃貸借契約(以下この問において「本件契約」という。)を締結した。この場合における次の記述のうち、借地借家法の規定及び判例によれば、誤っているものはどれか。", "choices": ["AもBも相手方に対し、本件契約の期間満了前に何らの通知もしなかった場合、従前の契約と同一の条件で契約を更新したものとみなされるが、その期間は定めがないものとなる。", "BがAに対し、本件契約の解約を申し入れる場合、甲建物の明渡しの条件として、一定額以上の財産上の給付を申し出たときは、Bの解約の申入れに正当事由があるとみなされる。", "甲建物の適法な転借人であるCが、Bの同意を得て甲建物に造作を付加した場合、期間満了により本件契約が終了するときは、CはBに対してその造作を時価で買い取るよう請求することができる。", "本件契約が借地借家法第38条の定期建物賃貸借で、契約の更新がない旨を定めた場合でも、BはAに対し、同条所定の通知期間内に、期間満了により本件契約が終了する旨の通知をしなければ、期間3年での終了をAに対抗することができない。"], "answer": 1, "explain": ""}, {"id": "H28-13", "year": 2016, "field": "権利関係", "q": "建物の区分所有等に関する法律に関する次の記述のうち、正しいものはどれか。", "choices": ["管理者は、集会において、毎年2回一定の時期に、その事務に関する報告をしなければならない。", "管理者は、規約に特別の定めがあるときは、共用部分を所有することができる。", "管理者は、自然人であるか法人であるかを問わないが、区分所有者でなければならない。", "各共有者の共用部分の持分は、規約で別段の定めをしない限り、共有者数で等分することとされている。"], "answer": 1, "explain": ""}, {"id": "H28-14", "year": 2016, "field": "権利関係", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。", "choices": ["新築した建物又は区分建物以外の表題登記がない建物の所有権を取得した者は、その所有権の取得の日から1月以内に、所有権の保存の登記を申請しなければならない。", "登記することができる権利には、抵当権及び賃借権が含まれる。", "建物が滅失したときは、表題部所有者又は所有権の登記名義人は、その滅失の日から1月以内に、当該建物の滅失の登記を申請しなければならない。", "区分建物の所有権の保存の登記は、表題部所有者から所有権を取得した者も、申請することができる。"], "answer": 0, "explain": ""}, {"id": "H28-15", "year": 2016, "field": "法令上の制限", "q": "国土利用計画法第23条に規定する届出(以下この問において「事後届出」という。)に関する次の記述のうち、正しいものはどれか。", "choices": ["市街化区域内の土地(面積2,500m²)を購入する契約を締結した者は、その契約を締結した日から起算して3週間以内に事後届出を行わなければならない。", "Aが所有する監視区域内の土地(面積10,000m²)をBが購入する契約を締結した場合、A及びBは事後届出を行わなければならない。", "都市計画区域外に所在し、一団の土地である甲土地(面積6,000m²)と乙土地(面積5,000m²)を購入する契約を締結した者は、事後届出を行わなければならない。", "市街化区域内の甲土地(面積3,000m²)を購入する契約を締結した者が、その契約締結の1月後に甲土地と一団の土地である乙土地(面積4,000m²)を購入することとしている場合においては、甲土地の事後届出は、乙土地の契約締結後に乙土地の事後届出と併せて行うことができる。"], "answer": 2, "explain": ""}, {"id": "H28-16", "year": 2016, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。", "choices": ["市街地開発事業等予定区域に係る市街地開発事業又は都市施設に関する都市計画には、施行予定者をも定めなければならない。", "準都市計画区域については、都市計画に準防火地域を定めることができる。", "高度利用地区は、用途地域内において市街地の環境を維持し、又は土地利用の増進を図るため、建築物の高さの最高限度又は最低限度を定める地区である。", "地区計画については、都市計画に、地区計画の種類、名称、位置、区域及び面積並びに建築物の建ぺい率及び容積率の最高限度を定めなければならない。"], "answer": 0, "explain": ""}, {"id": "H28-17", "year": 2016, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["開発許可を受けた者は、開発行為に関する工事を廃止するときは、都道府県知事の許可を受けなければならない。", "二以上の都府県にまたがる開発行為は、国土交通大臣の許可を受けなければならない。", "開発許可を受けた者から当該開発区域内の土地の所有権を取得した者は、都道府県知事の承認を受けることなく、当該開発許可を受けた者が有していた当該開発許可に基づく地位を承継することができる。", "都道府県知事は、用途地域の定められていない土地の区域における開発行為について開発許可をする場合において必要があると認めるときは、当該開発区域内の土地について、建築物の敷地、構造及び設備に関する制限を定めることができる。"], "answer": 3, "explain": ""}, {"id": "H28-18", "year": 2016, "field": "法令上の制限", "q": "建築基準法に関する次の記述のうち、正しいものはどれか。", "choices": ["防火地域にある建築物で、外壁が耐火構造のものについては、その外壁を隣地境界線に接して設けることができる。", "高さ30mの建築物には、原則として非常用の昇降機を設けなければならない。", "準防火地域内においては、延べ面積が2,000m²の共同住宅は準耐火建築物としなければならない。", "延べ面積が1,000m²を超える耐火建築物は、防火上有効な構造の防火壁によって有効に区画し、かつ、各区画の床面積の合計をそれぞれ1,000m²以内としなければならない。"], "answer": 0, "explain": ""}, {"id": "H28-19", "year": 2016, "field": "法令上の制限", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。", "choices": ["特定行政庁が許可した場合、第一種低層住居専用地域内においても飲食店を建築することができる。", "前面道路の幅員による容積率制限は、前面道路の幅員が12m以上ある場合は適用されない。", "公園内にある建築物で特定行政庁が安全上、防火上及び衛生上支障がないと認めて許可したものについては、建ぺい率の制限は適用されない。", "第一種住居地域内における建築物の外壁又はこれに代わる柱の面から敷地境界線までの距離は、当該地域に関する都市計画においてその限度が定められた場合には、当該限度以上でなければならない。"], "answer": 3, "explain": ""}, {"id": "H28-20", "year": 2016, "field": "法令上の制限", "q": "宅地造成等規制法(以下この問において「法」という。)に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["宅地造成工事規制区域外に盛土によって造成された一団の造成宅地の区域において、造成された盛土の高さが5m未満の場合は、都道府県知事は、当該区域を造成宅地防災区域として指定することができない。", "宅地造成工事規制区域内において、切土又は盛土をする土地の面積が600m²である場合、その土地における排水施設は、政令で定める資格を有する者によって設計される必要はない。", "宅地造成工事規制区域内の宅地において、高さが2mを超える擁壁を除却する工事を行おうとする者は、一定の場合を除き、その工事に着手する日の14日前までにその旨を都道府県知事に届け出なければならない。", "宅地造成工事規制区域内において、宅地以外の土地を宅地に転用した者は、一定の場合を除き、その転用した日から14日以内にその旨を都道府県知事に届け出なければならない。"], "answer": 0, "explain": ""}, {"id": "H28-21", "year": 2016, "field": "法令上の制限", "q": "土地区画整理法に関する次の記述のうち、誤っているものはどれか。", "choices": ["施行者は、換地処分を行う前において、換地計画に基づき換地処分を行うため必要がある場合においては、施行地区内の宅地について仮換地を指定することができる。", "仮換地が指定された場合においては、従前の宅地について権原に基づき使用し、又は収益することができる者は、仮換地の指定の効力発生の日から換地処分の公告がある日まで、仮換地について、従前の宅地について有する権利の内容である使用又は収益と同じ使用又は収益をすることができる。", "施行者は、仮換地を指定した場合において、特別の事情があるときは、その仮換地について使用又は収益を開始することができる日を仮換地の指定の効力発生日と別に定めることができる。", "土地区画整理組合の設立の認可の公告があった日後、換地処分の公告がある日までは、施行地区内において、土地区画整理事業の施行の障害となるおそれがある土地の形質の変更を行おうとする者は、当該土地区画整理組合の許可を受けなければならない。"], "answer": 3, "explain": ""}, {"id": "H28-22", "year": 2016, "field": "法令上の制限", "q": "農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、正しいものはどれか。", "choices": ["相続により農地を取得する場合は、法第3条第1項の許可を要しないが、相続人に該当しない者に対する特定遺贈により農地を取得する場合も、同項の許可を受ける必要はない。", "法第2条第3項の農地所有適格法人の要件を満たしていない株式会社は、耕作目的で農地を借り入れることはできない。", "法第3条第1項又は法第5条第1項の許可が必要な農地の売買について、これらの許可を受けずに売買契約を締結しても、その所有権の移転の効力は生じない。", "農業者が、市街化調整区域内の耕作しておらず遊休化している自己の農地を、自己の住宅用地に転用する場合、あらかじめ農業委員会へ届出をすれば、法第4条第1項の許可を受ける必要がない。"], "answer": 2, "explain": ""}, {"id": "H28-23", "year": 2016, "field": "税・その他", "q": "印紙税に関する次の記述のうち、正しいものはどれか。", "choices": ["印紙税の課税文書である不動産譲渡契約書を作成したが、印紙税を納付せず、その事実が税務調査により判明した場合は、納付しなかった印紙税額と納付しなかった印紙税額の10%に相当する金額の合計額が過怠税として徴収される。", "「Aの所有する甲土地(価額3,000万円)とBの所有する乙土地(価額3,500万円)を交換する」旨の土地交換契約書を作成した場合、印紙税の課税標準となる当該契約書の記載金額は3,500万円である。", "「Aの所有する甲土地(価額3,000万円)をBに贈与する」旨の贈与契約書を作成した場合、印紙税の課税標準となる当該契約書の記載金額は、3,000万円である。", "売上代金に係る金銭の受取書(領収書)は記載された受取金額が3万円未満の場合、印紙税が課されないことから、不動産売買の仲介手数料として、現金48,600円(消費税及び地方消費税を含む。)を受け取り、それを受領した旨の領収書を作成した場合、受取金額に応じた印紙税が課される。"], "answer": 1, "explain": ""}, {"id": "H28-24", "year": 2016, "field": "税・その他", "q": "不動産取得税に関する次の記述のうち、正しいものはどれか。", "choices": ["家屋が新築された日から3年を経過して、なお、当該家屋について最初の使用又は譲渡が行われない場合においては、当該家屋が新築された日から3年を経過した日において家屋の取得がなされたものとみなし、当該家屋の所有者を取得者とみなして、これに対して不動産取得税を課する。", "不動産取得税は、不動産の取得に対して課される税であるので、法人の合併により不動産を取得した場合にも、不動産取得税は課される。", "平成28年4月に取得した床面積240m²である新築住宅に係る不動産取得税の課税標準の算定については、当該新築住宅の価格から1,200万円が控除される。", "平成28年4月に個人が取得した住宅及び住宅用地に係る不動産取得税の税率は3%であるが、住宅用以外の家屋及びその土地に係る不動産取得税の税率は4%である。"], "answer": 2, "explain": ""}, {"id": "H28-25", "year": 2016, "field": "税・その他", "q": "不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、正しいものはどれか。", "choices": ["不動産の鑑定評価によって求める価格は、基本的には正常価格であるが、市場性を有しない不動産については、鑑定評価の依頼目的及び条件に応じて限定価格、特定価格又は特殊価格を求める場合がある。", "同一需給圏とは、一般に対象不動産と代替関係が成立して、その価格の形成について相互に影響を及ぼすような関係にある他の不動産の存する圏域をいうが、不動産の種類、性格及び規模に応じた需要者の選好性によって、その地域的範囲は狭められる場合もあれば、広域的に形成される場合もある。", "鑑定評価の各手法の適用に当たって必要とされる取引事例等については、取引等の事情が正常なものと認められるものから選択すべきであり、売り急ぎ、買い進み等の特殊な事情が存在する事例を用いてはならない。", "収益還元法は、対象不動産が将来生み出すであろうと期待される純収益の現在価値の総和を求めることにより対象不動産の試算価格を求める手法であるが、市場における土地の取引価格の上昇が著しいときは、その価格と収益価格との乖離が増大するものであるため、この手法の適用は避けるべきである。"], "answer": 1, "explain": ""}, {"id": "H28-26", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業者A(甲県知事免許)に対する監督処分に関する次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはどれか。", "choices": ["Aは、自らが売主となった分譲マンションの売買において、法第35条に規定する重要事項の説明を行わなかった。この場合、Aは、甲県知事から業務停止を命じられることがある。", "Aは、乙県内で宅地建物取引業に関する業務において、著しく不当な行為を行った。この場合、乙県知事は、Aに対し、業務停止を命ずることはできない。", "Aは、甲県知事から指示処分を受けたが、その指示処分に従わなかった。この場合、甲県知事は、Aに対し、1年を超える期間を定めて、業務停止を命ずることができる。", "Aは、自ら所有している物件について、直接賃借人Bと賃貸借契約を締結するに当たり、法第35条に規定する重要事項の説明を行わなかった。この場合、Aは、甲県知事から業務停止を命じられることがある。"], "answer": 0, "explain": ""}, {"id": "H28-27", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業者AがBからB所有の宅地の売却に係る媒介を依頼された場合における次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはどれか。なお、この問において一般媒介契約とは、専任媒介契約でない媒介契約をいう。", "choices": ["AがBと一般媒介契約を締結した場合、当該一般媒介契約が国土交通大臣が定める標準媒介契約約款に基づくものであるか否かの別を、法第34条の2第1項に規定する書面に記載する必要はない。", "AがBと専任媒介契約を締結した場合、当該宅地の売買契約が成立しても、当該宅地の引渡しが完了していなければ、売買契約が成立した旨を指定流通機構に通知する必要はない。", "AがBと一般媒介契約を締結した場合、当該宅地の売買の媒介を担当するAの宅地建物取引士は、法第34条の2第1項に規定する書面に記名押印する必要はない。", "Aは、Bとの間で締結した媒介契約が一般媒介契約であるか、専任媒介契約であるかを問わず、法第34条の2第1項に規定する書面に売買すべき価額を記載する必要はない。"], "answer": 2, "explain": ""}, {"id": "H28-28", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者でないBとの間でマンション(代金4,000万円)の売買契約を締結した場合に関する次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定に違反するものの組合せはどれか。\nア Aは、建築工事完了前のマンションの売買契約を締結する際に、Bから手付金200万円を受領し、さらに建築工事中に200万円を中間金として受領した後、当該手付金と中間金について法第41条に定める保全措置を講じた。\nイ Aは、建築工事完了後のマンションの売買契約を締結する際に、法第41条の2に定める保全措置を講じることなくBから手付金400万円を受領した。\nウ Aは、建築工事完了前のマンションの売買契約を締結する際に、Bから手付金500万円を受領したが、Bに当該手付金500万円を償還して、契約を一方的に解除した。\nエ Aは、建築工事完了後のマンションの売買契約を締結する際に、当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の予定額を1,000万円とする特約を定めた。", "choices": ["ア、ウ", "イ、ウ", "ア、イ、エ", "ア、ウ、エ"], "answer": 3, "explain": ""}, {"id": "H28-29", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業者Aの業務に関する次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定に違反するものの組合せはどれか。\nア Aは、マンションを分譲するに際して案内所を設置したが、売買契約の締結をせず、かつ、契約の申込みの受付も行わない案内所であったので、当該案内所に法第50条第1項に規定する標識を掲示しなかった。\nイ Aは、建物の売買の媒介に際し、買主に対して手付の貸付けを行う旨を告げて契約の締結を勧誘したが、売買は成立しなかった。\nウ Aは、法第49条の規定によりその事務所ごとに備えるべきこととされている業務に関する帳簿について、取引関係者から閲覧の請求を受けたが、閲覧に供さなかった。\nエ Aは、自ら売主となるマンションの割賦販売の契約について、宅地建物取引業者でない買主から賦払金が支払期日までに支払われなかったので、直ちに賦払金の支払の遅延を理由として契約を解除した。", "choices": ["ア、イ", "ア、ウ", "ア、イ、エ", "イ、ウ、エ"], "answer": 2, "explain": ""}, {"id": "H28-30", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業法第35条に規定する重要事項の説明及び同法第37条の規定により交付すべき書面(以下この問において「37条書面」という。)に関する次の記述のうち、正しいものはどれか。", "choices": ["宅地建物取引業者は、建物の貸借の媒介における重要事項の説明において、借賃の額並びにその支払の時期及び方法について説明するとともに、37条書面に記載しなければならない。", "宅地建物取引士は、重要事項の説明をする際に、相手方から求められない場合は、宅地建物取引士証を提示しなくてもよい。", "宅地建物取引業者は、37条書面を交付する際に、相手方の同意があった場合は、書面に代えて、電磁的記録で交付することができる。", "宅地建物取引業者は、宅地建物取引士をして37条書面に記名押印させなければならないが、当該書面の交付は宅地建物取引士でない従業者に行わせることができる。"], "answer": 3, "explain": ""}, {"id": "H28-31", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業保証協会(以下この問において「保証協会」という。)の社員である宅地建物取引業者に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["保証協会に加入することは宅地建物取引業者の任意であり、一の保証協会の社員となった後に、宅地建物取引業に関し取引をした者の保護を目的として、重ねて他の保証協会の社員となることができる。", "保証協会に加入している宅地建物取引業者(甲県知事免許)は、甲県の区域内に新たに支店を設置した場合、その設置した日から1月以内に当該保証協会に追加の弁済業務保証金分担金を納付しないときは、社員の地位を失う。", "保証協会から還付充当金の納付の通知を受けた社員は、その通知を受けた日から2週間以内に、その通知された額の還付充当金を主たる事務所の最寄りの供託所に供託しなければならない。", "150万円の弁済業務保証金分担金を保証協会に納付して当該保証協会の社員となった者と宅地建物取引業に関し取引をした者は、その取引により生じた債権に関し、2,500万円を限度として、当該保証協会が供託した弁済業務保証金から弁済を受ける権利を有する。"], "answer": 3, "explain": ""}, {"id": "H28-32", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業者A（甲県知事免許）がその業務に関して広告を行った場合における次の記述のうち、宅地建物取引業法の規定に違反しないものはどれか。", "choices": ["Aは、宅地の造成に当たり、工事に必要とされる許可等の処分があった宅地について、当該処分があったことを明示して、工事完了前に、当該宅地の販売に関する広告を行った。", "Aは、自ら売主として新築マンションを分譲するに当たり、建築基準法第6条第1項の確認の申請中であったため、「建築確認申請済」と明示して、当該建物の販売に関する広告を行い、建築確認を受けた後に売買契約を締結した。", "Aは、中古の建物の売買において、当該建物の所有者Bから媒介の依頼を受け、取引態様の別を明示せずに自社ホームページに広告を掲載したが、広告を見た者からの問い合わせはなく、契約成立には至らなかった。", "Aは、甲県知事から業務の全部の停止を命じられ、その停止の期間中に未完成の土地付建物の販売に関する広告を行ったが、当該土地付建物の売買の契約は当該期間の経過後に締結した。"], "answer": 0, "explain": ""}, {"id": "H28-33", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業者が売買等の媒介に関して受けることができる報酬についての次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはいくつあるか。\nア　宅地建物取引業者が媒介する物件の売買について、売主があらかじめ受取額を定め、実際の売却額との差額を当該宅地建物取引業者が受け取る場合は、媒介に係る報酬の限度額の適用を受けない。\nイ　宅地建物取引業者は、媒介に係る報酬の限度額の他に、依頼者の依頼によらない通常の広告の料金に相当する額を報酬に合算して、依頼者から受け取ることができる。\nウ　居住用の建物の貸借の媒介に係る報酬の額は、借賃の1月分の1.08倍に相当する額以内であるが、権利金の授受がある場合は、当該権利金の額を売買に係る代金の額とみなして算定することができる。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 2, "explain": ""}, {"id": "H28-34", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業法（以下この問において「法」という。）第47条及び第47条の2に規定されている業務に関する禁止事項に関する次の記述のうち、誤っているものはどれか。なお、Aは宅地建物取引業者である。", "choices": ["Aが、賃貸アパートの媒介に当たり、入居申込者が無収入であることを知っており、入居申込書の収入欄に「年収700万円」とあるのは虚偽の記載であることを認識したまま、その事実を告げずに貸主に提出した行為は法に違反する。", "Aが、分譲マンションの購入を勧誘するに際し、うわさをもとに「3年後には間違いなく徒歩5分の距離に新しく私鉄の駅ができる」と告げた場合、そのような計画はなかったとしても、故意にだましたわけではないので法には違反しない。", "Aは、建売住宅の売買の相手方である買主から手付放棄による契約の解除の通知を受けたとしても、すでに所有権の移転登記を行い引渡しも済んでいる場合は、そのことを理由に当該契約の解除を拒むことができる。", "Aが、宅地の売買契約締結の勧誘に当たり、相手方が手付金の手持ちがないため契約締結を迷っていることを知り、手付金の分割払いを持ちかけたことは、契約締結に至らなかったとしても法に違反する。"], "answer": 1, "explain": ""}, {"id": "H28-35", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["個人である宅地建物取引業者A（甲県知事免許）が、免許の更新の申請を怠り、その有効期間が満了した場合、Aは、遅滞なく、甲県知事に免許証を返納しなければならない。", "法人である宅地建物取引業者B（乙県知事免許）が、乙県知事から業務の停止を命じられた場合、Bは、免許の更新の申請を行っても、その業務の停止の期間中は免許の更新を受けることができない。", "法人である宅地建物取引業者C（国土交通大臣免許）について破産手続開始の決定があった場合、その日から30日以内に、Cを代表する役員Dは、その旨を主たる事務所の所在地を管轄する都道府県知事を経由して国土交通大臣に届け出なければならない。", "個人である宅地建物取引業者E（丙県知事免許）が死亡した場合、Eの一般承継人Fがその旨を丙県知事に届け出た後であっても、Fは、Eが生前締結した売買契約に基づく取引を結了する目的の範囲内においては、なお宅地建物取引業者とみなされる。"], "answer": 3, "explain": ""}, {"id": "H28-36", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはいくつあるか。\nア　区分所有権の目的である建物の売買の媒介を行う場合、当該建物が借地借家法第22条に規定する定期借地権の設定された土地の上に存するときは、当該定期借地権が登記されたものであるか否かにかかわらず、当該定期借地権の内容について説明しなければならない。\nイ　宅地の貸借の媒介を行う場合、当該宅地が流通業務市街地の整備に関する法律第4条に規定する流通業務地区にあるときは、同法第5条第1項の規定による制限の概要について説明しなければならない。\nウ　建物の売買の媒介を行う場合、当該建物の売買代金の額並びにその支払の時期及び方法について説明する義務はないが、売買代金以外に授受される金銭があるときは、当該金銭の額及び授受の目的について説明しなければならない。\nエ　建物の貸借の媒介を行う場合、当該建物が建築工事の完了前であるときは、必要に応じ当該建物に係る図面を交付した上で、当該建築工事の完了時における当該建物の主要構造部、内装及び外装の構造又は仕上げ並びに設備の設置及び構造について説明しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "explain": ""}, {"id": "H28-37", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業法（以下この問において「法」という。）の規定に関する次の記述のうち、正しいものはいくつあるか。\nア　宅地建物取引業者A（甲県知事免許）が乙県内に新たに支店を設置して宅地建物取引業を営んでいる場合において、免許換えの申請を怠っていることが判明したときは、Aは、甲県知事から業務停止の処分を受けることがある。\nイ　宅地建物取引業者Bが自ら売主として宅地の売買契約を成立させた後、当該宅地の引渡しの前に免許の有効期間が満了したときは、Bは、当該契約に基づく取引を結了する目的の範囲内においては、宅地建物取引業者として当該取引に係る業務を行うことができる。\nウ　Cが免許の申請前5年以内に宅地建物取引業に関し不正又は著しく不当な行為をした場合には、その行為について刑に処せられていなかったとしても、Cは免許を受けることができない。\nエ　宅地建物取引業者D（甲県知事免許）が乙県内に新たに支店を設置して宅地建物取引業を営むため、国土交通大臣に免許換えの申請を行っているときは、Dは、甲県知事免許業者として、取引の相手方等に対し、法第35条に規定する重要事項を記載した書面及び法第37条の規定により交付すべき書面を交付することができない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "explain": ""}, {"id": "H28-38", "year": 2016, "field": "宅建業法", "q": "宅地建物取引士資格登録（以下この問において「登録」という。）又は宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア　宅地建物取引士（甲県知事登録）が、乙県で宅地建物取引業に従事することとなったため乙県知事に登録の移転の申請をしたときは、移転後新たに5年を有効期間とする宅地建物取引士証の交付を受けることができる。\nイ　宅地建物取引士は、取引の関係者から宅地建物取引士証の提示を求められたときは、宅地建物取引士証を提示しなければならないが、従業者証明書の提示を求められたときは、宅地建物取引業者の代表取締役である宅地建物取引士は、当該証明書がないので提示をしなくてよい。\nウ　宅地建物取引士が家庭裁判所から後見を開始する旨の審判を受けたときは、その後見人は、3月以内に、その旨を登録をしている都道府県知事に届け出なければならない。\nエ　宅地建物取引士の氏名等が登載されている宅地建物取引士資格登録簿は一般の閲覧に供されることはないが、専任の宅地建物取引士は、その氏名が宅地建物取引業者名簿に登載され、当該名簿が一般の閲覧に供される。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "explain": ""}, {"id": "H28-39", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業者が媒介により区分所有建物の貸借の契約を成立させた場合に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。なお、この問において「重要事項説明書」とは法第35条の規定により交付すべき書面をいい、「37条書面」とは法第37条の規定により交付すべき書面をいうものとする。", "choices": ["専有部分の用途その他の利用の制限に関する規約において、ペットの飼育が禁止されている場合は、重要事項説明書にその旨記載し内容を説明したときも、37条書面に記載しなければならない。", "契約の解除について定めがある場合は、重要事項説明書にその旨記載し内容を説明したときも、37条書面に記載しなければならない。", "借賃の支払方法が定められていても、貸主及び借主の承諾を得たときは、37条書面に記載しなくてよい。", "天災その他不可抗力による損害の負担に関して定めなかった場合には、その旨を37条書面に記載しなければならない。"], "answer": 1, "explain": ""}, {"id": "H28-40", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業者A（甲県知事免許）は、甲県に本店と支店を設け、営業保証金として1,000万円の金銭と額面金額500万円の国債証券を供託し、営業している。この場合に関する次の記述のうち宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["Aは、本店を移転したため、その最寄りの供託所が変更した場合は、遅滞なく、移転後の本店の最寄りの供託所に新たに営業保証金を供託しなければならない。", "Aは、営業保証金が還付され、営業保証金の不足額を供託したときは、供託書の写しを添附して、30日以内にその旨を甲県知事に届け出なければならない。", "本店でAと宅地建物取引業に関する取引をした者は、その取引により生じた債権に関し、1,000万円を限度としてAからその債権の弁済を受ける権利を有する。", "Aは、本店を移転したため、その最寄りの供託所が変更した場合において、従前の営業保証金を取りもどすときは、営業保証金の還付を請求する権利を有する者に対し、一定期間内に申し出るべき旨の公告をしなければならない。"], "answer": 0, "explain": ""}, {"id": "H28-41", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業者Aが行う業務に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["Aは、宅地建物取引業者Bから宅地の売却についての依頼を受けた場合、媒介契約を締結したときは媒介契約の内容を記載した書面を交付しなければならないが、代理契約を締結したときは代理契約の内容を記載した書面を交付する必要はない。", "Aは、自ら売主として宅地の売買契約を締結したときは、相手方に対して、遅滞なく、法第37条の規定による書面を交付するとともに、その内容について宅地建物取引士をして説明させなければならない。", "Aは、宅地建物取引業者でないCが所有する宅地について、自らを売主、宅地建物取引業者Dを買主とする売買契約を締結することができる。", "Aは、宅地建物取引業者でないEから宅地の売却についての依頼を受け、専属専任媒介契約を締結したときは、当該宅地について法で規定されている事項を、契約締結の日から休業日数を含め5日以内に指定流通機構へ登録する義務がある。"], "answer": 2, "explain": ""}, {"id": "H28-42", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業法（以下この問において「法」という。）第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、正しいものはどれか。なお、Aは宅地建物取引業者（消費税課税事業者）である。", "choices": ["Aは、宅地建物取引業者Bと宅地建物取引業者Cの間で締結される宅地の売買契約の媒介においては、37条書面に引渡しの時期を記載しなくてもよい。", "Aは、自ら売主として土地付建物の売買契約を締結したときは、37条書面に代金の額を記載しなければならないが、消費税等相当額については記載しなくてもよい。", "Aは、自ら売主として、宅地建物取引業者Dの媒介により、宅地建物取引業者Eと宅地の売買契約を締結した。Dが宅地建物取引士をして37条書面に記名押印させている場合、Aは宅地建物取引士をして当該書面に記名押印させる必要はない。", "Aは、貸主Fと借主Gの間で締結される建物賃貸借契約について、Fの代理として契約を成立させたときは、FとGに対して37条書面を交付しなければならない。"], "answer": 3, "explain": ""}, {"id": "H28-43", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者でないBと建築工事完了前のマンション（代金3,000万円）の売買契約を締結した場合、宅地建物取引業法第41条の規定に基づく手付金等の保全措置（以下この問において「保全措置」という。）に関する次の記述のうち、正しいものはいくつあるか。\nア　Aが、Bから手付金600万円を受領する場合において、その手付金の保全措置を講じていないときは、Bは、この手付金の支払を拒否することができる。\nイ　Aが、保全措置を講じて、Bから手付金300万円を受領した場合、Bから媒介を依頼されていた宅地建物取引業者Cは、Bから媒介報酬を受領するに当たり、Aと同様、あらかじめ保全措置を講じなければ媒介報酬を受領することができない。\nウ　Aは、Bから手付金150万円を保全措置を講じないで受領し、その後引渡し前に、中間金350万円を受領する場合は、すでに受領した手付金と中間金の合計額500万円について保全措置を講じなければならない。\nエ　Aは、保全措置を講じないで、Bから手付金150万円を受領した場合、その後、建築工事が完了しBに引き渡す前に中間金150万円を受領するときは、建物についてBへの所有権移転の登記がなされるまで、保全措置を講じる必要がない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "explain": ""}, {"id": "H28-44", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者でないBと宅地の売買契約を締結した場合、宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフについてAがBに告げるときに交付すべき書面の内容に関する次の記述のうち、誤っているものはどれか。", "choices": ["Aについては、その商号又は名称及び住所並びに免許証番号、Bについては、その氏名（法人の場合、その商号又は名称）及び住所が記載されていなければならない。", "Bは、クーリング・オフについて告げられた日から起算して8日を経過するまでの間は、代金の全部を支払った場合を除き、書面によりクーリング・オフによる契約の解除を行うことができることが記載されていなければならない。", "クーリング・オフによる契約の解除は、Bが当該契約の解除を行う旨を記載した書面を発した時にその効力を生ずることが記載されていなければならない。", "Bがクーリング・オフによる契約の解除を行った場合、Aは、それに伴う損害賠償又は違約金の支払をBに請求することができないこと、また、売買契約の締結に際し、手付金その他の金銭が支払われているときは、遅滞なくその全額をBに返還することが記載されていなければならない。"], "answer": 1, "explain": ""}, {"id": "H28-45", "year": 2016, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者でないBに新築住宅を販売する場合における次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。", "choices": ["Aは、住宅販売瑕疵担保保証金を供託する場合、当該住宅の床面積が100㎡以下であるときは、新築住宅の合計戸数の算定に当たって、2戸をもって1戸と数えることになる。", "Aは、当該住宅をBに引き渡した日から3週間以内に、住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結の状況について、宅地建物取引業の免許を受けた国土交通大臣又は都道府県知事に届け出なければならない。", "Aは、住宅販売瑕疵担保保証金の供託をする場合、Bに対し、当該住宅の売買契約を締結するまでに、供託所の所在地等について記載した書面を交付して説明しなければならない。", "Aは、住宅瑕疵担保責任保険法人と住宅販売瑕疵担保責任保険契約の締結をした場合、Bが住宅の引渡しを受けた時から10年以内に当該住宅を転売したときは、住宅瑕疵担保責任保険法人にその旨を申し出て、当該保険契約の解除をしなければならない。"], "answer": 2, "explain": ""}, {"id": "H28-46", "year": 2016, "field": "免除科目", "q": "独立行政法人住宅金融支援機構（以下この問において「機構」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、子どもを育成する家庭又は高齢者の家庭に適した良好な居住性能及び居住環境を有する賃貸住宅の建設又は改良に必要な資金の貸付けを業務として行っている。", "機構は、証券化支援事業（買取型）において、債務者又は債務者の親族が居住する住宅のみならず、賃貸住宅の建設又は購入に必要な資金の貸付けに係る金融機関の貸付債権についても譲受けの対象としている。", "機構は、証券化支援事業（買取型）において、バリアフリー性、省エネルギー性、耐震性、耐久性・可変性に優れた住宅を取得する場合に、貸付金の利率を一定期間引き下げる制度を実施している。", "機構は、マンション管理組合や区分所有者に対するマンション共用部分の改良に必要な資金の貸付けを業務として行っている。"], "answer": 1, "explain": ""}, {"id": "H28-47", "year": 2016, "field": "免除科目", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法（不動産の表示に関する公正競争規約を含む。）の規定によれば、正しいものはどれか。", "choices": ["インターネット上に掲載した賃貸物件の広告について、掲載直前に契約済みとなったとしても、消費者からの問合せに対し既に契約済みであり取引できない旨を説明すれば、その時点で消費者の誤認は払拭されるため、不当表示に問われることはない。", "宅地の造成及び建物の建築が禁止されており、宅地の造成及び建物の建築が可能となる予定がない市街化調整区域内の土地を販売する際の新聞折込広告においては、当該土地が市街化調整区域内に所在する旨を16ポイント以上の大きさの文字で表示すれば、宅地の造成や建物の建築ができない旨まで表示する必要はない。", "半径300m以内に小学校及び市役所が所在している中古住宅の販売広告においては、当該住宅からの道路距離の表示を省略して、「小学校、市役所近し」と表示すればよい。", "近くに新駅の設置が予定されている分譲住宅の販売広告を行うに当たり、当該鉄道事業者が新駅設置及びその予定時期を公表している場合、広告の中に新駅設置の予定時期を明示して表示してもよい。"], "answer": 3, "explain": ""}, {"id": "H28-48", "year": 2016, "field": "免除科目", "q": "次の記述のうち、正しいものはどれか。", "choices": ["平成28年地価公示（平成28年3月公表）によれば、平成27年1月以降の1年間の地価は、全国平均では、住宅地はわずかに下落しているものの下落幅は縮小しており、全用途平均では昨年までの下落から上昇に転じた。", "平成28年版土地白書（平成28年5月公表）によれば、平成26年の住宅地、工業用地等の宅地は、全国で約193万ヘクタールあり、近年、減少傾向にある。", "建築着工統計（平成28年1月公表）によれば、分譲住宅の着工戸数は、消費税増税の影響を受け、マンション、一戸建住宅ともに平成26年から2年連続で前年に比べ減少している。", "平成27年度国土交通白書（平成28年6月公表）によれば、平成27年3月末時点の宅地建物取引業者数は122,685業者となっており、前年3月末時点に比べ減少した。"], "answer": 0, "explain": ""}, {"id": "H28-49", "year": 2016, "field": "免除科目", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["豪雨による深層崩壊は、山体岩盤の深い所に亀裂が生じ、巨大な岩塊が滑落し、山間の集落などに甚大な被害を及ぼす。", "花崗岩が風化してできた、まさ土地帯においては、近年発生した土石流災害によりその危険性が再認識された。", "山麓や火山麓の地形の中で、土石流や土砂崩壊による堆積でできた地形は危険性が低く、住宅地として好適である。", "丘陵地や台地の縁辺部の崖崩れについては、山腹で傾斜角が25度を超えると急激に崩壊地が増加する。"], "answer": 2, "explain": ""}, {"id": "H28-50", "year": 2016, "field": "免除科目", "q": "建築物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["鉄骨造は、自重が大きく、靱性が小さいことから、大空間の建築や高層建築にはあまり使用されない。", "鉄筋コンクリート造においては、骨組の形式はラーメン式の構造が一般に用いられる。", "鉄骨鉄筋コンクリート造は、鉄筋コンクリート造にさらに強度と靱性を高めた構造である。", "ブロック造を耐震的な構造にするためには、鉄筋コンクリートの布基礎及び臥梁により壁体の底部と頂部を固めることが必要である。"], "answer": 0, "explain": ""}]</script>

    q:"宅地建物取引業者A（甲県知事免許）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",
    choices:[
      "Aが乙県内に新たに事務所を設置して事業を行う場合、甲県知事の免許のままでよい。",
      "Aが免許を受けてから1年以内に事業を開始せず、又は引き続いて1年以上事業を休止したときは、免許を取り消されることがある。",
      "Aは、その事務所ごとに従業者5名に対して1名以上の割合で成年者である専任の宅地建物取引士を置けばよい。",
      "Aが免許の更新を申請したが、有効期間満了までに処分がなされないときは、従前の免許は当然に失効する。"
    ],
    answer:1,
    explain:"正しいのは2。1年以上の事業休止等は免許取消事由（業法66条）。\n1は誤り：複数県に事務所を置くと国土交通大臣免許が必要。\n3は誤り：専任取引士は業務従事者「5名に1名以上」ではなく、事務所の従業者数に対し5分の1以上。\n4は誤り：処分がなされるまで従前の免許は有効。"
  }
];

/* ---------------- storage helpers ---------------- */
function loadSeed(){
  try{
    const el = document.getElementById('seedData');
    const v = JSON.parse(el.textContent);
    if(Array.isArray(v) && v.length) return v;
  }catch(e){}
  return SAMPLE.slice();
}
function loadQuestions(){
  try{ const v = JSON.parse(localStorage.getItem(LS_Q)); if(Array.isArray(v)&&v.length) return v; }catch(e){}
  return loadSeed();
}
function saveQuestions(qs){ localStorage.setItem(LS_Q, JSON.stringify(qs)); }
function loadStats(){
  try{ return JSON.parse(localStorage.getItem(LS_S)) || {hist:{}}; }catch(e){ return {hist:{}}; }
}
function saveStats(s){ localStorage.setItem(LS_S, JSON.stringify(s)); }

let QUESTIONS = loadQuestions();
let STATS = loadStats();           // { hist: { [id]: {a:回答数, c:正解数, last:0|1} } }

/* ---------------- derived ---------------- */
function fields(){ return [...new Set(QUESTIONS.map(q=>q.field).filter(Boolean))]; }
function years(){ return [...new Set(QUESTIONS.map(q=>q.year).filter(y=>y&&y>0))].sort((a,b)=>b-a); }
function wrongIds(){ return Object.keys(STATS.hist).filter(id=>STATS.hist[id] && STATS.hist[id].last===0); }
function totals(){
  let a=0,c=0; Object.values(STATS.hist).forEach(h=>{a+=h.a||0; c+=h.c||0;});
  return {answered:a, correct:c, wrong:wrongIds().length};
}

/* ---------------- app state ---------------- */
let session = null; // {list:[q...], i:0, mode:'quiz'|'review'}
let filter = { field:null, year:null };

/* ---------------- render ---------------- */
const view = document.getElementById('view');

function renderHome(){
  session = null;
  const t = totals();
  const rate = t.answered ? Math.round(t.correct/t.answered*100) : 0;
  const fchips = fields().map(f=>`<span class="chip ${filter.field===f?'on':''}" data-f="${esc(f)}">${esc(f)}</span>`).join('');
  const ychips = years().map(y=>`<span class="chip ${filter.year===y?'on':''}" data-y="${y}">${y}</span>`).join('');
  const pool = filteredPool();
  const wrongN = wrongIds().length;

  view.innerHTML = `
    <div class="card">
      <h2>学習状況</h2>
      <div class="stats">
        <div class="stat"><div class="n accent">${QUESTIONS.length}</div><div class="l">登録問題</div></div>
        <div class="stat"><div class="n ${rate>=70?'ok':''}">${rate}%</div><div class="l">正答率</div></div>
        <div class="stat"><div class="n ${wrongN?'ng':''}">${wrongN}</div><div class="l">要復習</div></div>
      </div>
      <div class="substat">解答 ${t.answered} 回 / 正解 ${t.correct} 回</div>
    </div>

    ${needsBackupHint() ? `
    <div class="card" style="border-color:var(--accent-soft);background:var(--accent-soft)">
      <div class="hint" style="margin:0 0 10px;color:var(--accent-strong)">前回のバックアップから進んでいます。学習記録をファイルに保存しておきましょう。</div>
      <button class="primary" id="hintBackup" style="margin:0">今すぐバックアップ</button>
    </div>` : ''}

    <div class="card">
      <h2>出題を絞る（任意）</h2>
      ${fchips ? `<div class="chips">${fchips}</div>`:''}
      ${ychips ? `<div class="chips" style="margin-top:8px">${ychips}</div>`:''}
      ${(filter.field||filter.year)?`<div><span class="clearlink" id="clearFilter">対象 ${pool.length} 問 · 絞り込み解除</span></div>`:''}
    </div>

    <button class="modebtn" id="mQuiz">
      <span class="mark">Q</span>
      <span class="grow"><div class="ttl">4択の過去問演習</div><div class="sub">${filter.field||filter.year?'絞り込み中':'全問題'}からランダム出題</div></span>
      <span class="cnt">${pool.length}問</span>
    </button>

    <button class="modebtn" id="mReview" ${wrongN?'':'disabled'}>
      <span class="mark">R</span>
      <span class="grow"><div class="ttl">間違えた問題の復習</div><div class="sub">${wrongN?'直近で不正解だった問題だけ':'まだありません'}</div></span>
      <span class="cnt">${wrongN}問</span>
    </button>

    <button class="modebtn" id="mBrowse">
      <span class="mark">L</span>
      <span class="grow"><div class="ttl">全問題を一覧で確認</div><div class="sub">正解付きで通し読み（校正・見直し用）</div></span>
      <span class="cnt">${pool.length}問</span>
    </button>

    ${QUESTIONS.length && QUESTIONS[0].year===0 ? `<div class="card"><div class="hint" style="margin:0">DATA から、過去問JSONを取り込めます。いまはサンプル問題のみです。</div></div>`:''}
  `;

  view.querySelectorAll('.chip[data-f]').forEach(el=>el.onclick=()=>{ filter.field = filter.field===el.dataset.f?null:el.dataset.f; renderHome(); });
  view.querySelectorAll('.chip[data-y]').forEach(el=>el.onclick=()=>{ const y=+el.dataset.y; filter.year = filter.year===y?null:y; renderHome(); });
  const cf = document.getElementById('clearFilter'); if(cf) cf.onclick=(e)=>{e.preventDefault(); filter={field:null,year:null}; renderHome();};
  document.getElementById('mQuiz').onclick=()=>startSession('quiz');
  const mr=document.getElementById('mReview'); if(!mr.disabled) mr.onclick=()=>startSession('review');
  document.getElementById('mBrowse').onclick=renderBrowse;
  const hb = document.getElementById('hintBackup'); if(hb) hb.onclick=downloadBackup;
}

function filteredPool(){
  return QUESTIONS.filter(q=>{
    if(filter.field && q.field!==filter.field) return false;
    if(filter.year && q.year!==filter.year) return false;
    return true;
  });
}

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function startSession(mode){
  let list;
  if(mode==='review'){
    const set = new Set(wrongIds());
    list = shuffle(QUESTIONS.filter(q=>set.has(q.id)));
  }else{
    list = shuffle(filteredPool());
  }
  if(!list.length){ toast('対象の問題がありません'); return; }
  session = { list, i:0, mode, answered:false, picked:null, sessionCorrect:0 };
  renderQuiz();
}

/* ---- 問題文の中の「ア　イ　ウ　エ　オ」個数問題形式を、独立ブロックとして分離 ---- */
function renderStem(qtext){
  const parts = qtext.split(/\n(?=[アイウエオ]　)/);
  const intro = parts[0];
  const items = parts.slice(1).map(chunk=>({
    label: chunk[0],
    text: chunk.slice(2).trim()
  }));
  let html = `<div class="stem-intro">${esc(intro)}</div>`;
  if(items.length){
    html += '<div class="stem-items">' + items.map(it=>
      `<div class="stem-item"><span class="lbl">${esc(it.label)}</span><span class="tx">${esc(it.text)}</span></div>`
    ).join('') + '</div>';
  }
  return html;
}

/* ---- 全問題を一覧で確認（校正・見直し用） ---- */
function renderBrowse(){
  session = null;
  const pool = filteredPool().slice().sort((a,b)=> a.id.localeCompare(b.id));
  view.innerHTML = `
    <div class="qmeta">
      <span class="badge">一覧</span>
      <span class="spacer"></span>
      <span>${pool.length}問</span>
    </div>
    <div id="browseList"></div>
    <button class="ghost" id="backHome">ホームへ戻る</button>
  `;
  const list = document.getElementById('browseList');
  pool.forEach(q=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="qmeta" style="margin-bottom:12px">
        <span class="badge">問${q.id.split('-')[1]}</span>
        ${q.field?`<span class="badge">${esc(q.field)}</span>`:''}
        ${q.year>0?`<span class="badge">${q.year}</span>`:''}
        <span class="spacer"></span>
        <span>正解 ${q.answer+1}</span>
      </div>
      ${renderStem(q.q)}
      ${q.choices.map((c,i)=>`
        <div class="choice locked ${i===q.answer?'correct':''}">
          <span class="k">${i+1}</span><span>${esc(c)}</span>
        </div>`).join('')}
      ${q.explain?`<div class="explain"><div class="verdict ok">解説</div>${esc(q.explain)}</div>`:''}
    `;
    list.appendChild(card);
  });
  document.getElementById('backHome').onclick = renderHome;
}

function renderQuiz(){
  const s = session; const q = s.list[s.i];
  const pct = Math.round(s.i/s.list.length*100);
  view.innerHTML = `
    <div class="card">
      <div class="qmeta">
        <span class="badge" id="btnHome" style="cursor:pointer">← ホーム</span>
        <span class="badge">${s.mode==='review'?'復習':'演習'}</span>
        ${q.field?`<span class="badge">${esc(q.field)}</span>`:''}
        ${q.year>0?`<span class="badge">${q.year}</span>`:''}
        <span class="spacer"></span>
        <span>${s.i+1} / ${s.list.length}</span>
      </div>
      <div class="progress"><i style="width:${pct}%"></i></div>
      ${renderStem(q.q)}
      <div id="choices"></div>
      <div id="feedback"></div>
    </div>
  `;
  document.getElementById('btnHome').onclick = ()=>{
    if(confirm('演習を中断してホームに戻りますか？')) renderHome();
  };
  const cbox = document.getElementById('choices');
  q.choices.forEach((c,idx)=>{
    const b = document.createElement('button');
    b.className = 'choice';
    b.innerHTML = `<span class="k">${idx+1}</span><span>${esc(c)}</span>`;
    b.onclick = ()=>pick(idx,b);
    cbox.appendChild(b);
  });
}

function pick(idx, btn){
  const s = session; if(s.answered) return;
  s.answered = true; s.picked = idx;
  const q = s.list[s.i];
  const correct = idx===q.answer;
  if(correct) s.sessionCorrect++;

  const h = STATS.hist[q.id] || {a:0,c:0,last:1};
  h.a++; if(correct) h.c++; h.last = correct?1:0;
  STATS.hist[q.id] = h; saveStats(STATS);

  const btns = document.querySelectorAll('.choice');
  btns.forEach((b,i)=>{
    b.classList.add('locked'); b.onclick=null;
    if(i===q.answer) b.classList.add('correct');
    if(i===idx && !correct) b.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  fb.innerHTML = `
    <div class="explain">
      <div class="verdict ${correct?'ok':'ng'}">${correct?'正解':'不正解'} — 正解は ${q.answer+1}</div>
      ${q.explain?esc(q.explain):'<span class="muted">解説は未登録です。</span>'}
    </div>
    <button class="primary" id="next">${s.i+1<s.list.length?'次の問題':'結果を見る'}</button>
    <button class="ghost" id="quit">中断してホームへ</button>
  `;
  document.getElementById('next').onclick = next;
  document.getElementById('quit').onclick = renderHome;
  fb.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function next(){
  const s = session;
  if(s.i+1 < s.list.length){ s.i++; s.answered=false; s.picked=null; renderQuiz(); }
  else renderResult();
}

function renderResult(){
  const s = session;
  const n = s.list.length, c = s.sessionCorrect;
  const rate = Math.round(c/n*100);
  const stillWrong = wrongIds().length;
  view.innerHTML = `
    <div class="card center">
      <h2 style="text-align:center">${s.mode==='review'?'復習':'演習'}結果</h2>
      <div class="big" style="color:${rate>=70?'var(--ok)':'var(--ng)'}">${rate}%</div>
      <div class="muted" style="font-size:13px;margin-top:4px">${n}問中 ${c}問 正解</div>
      <div style="height:16px"></div>
      <button class="primary" id="again">もう一度（同じモード）</button>
      <button class="ghost" id="home">ホームへ（要復習 ${stillWrong}問）</button>
    </div>
  `;
  document.getElementById('again').onclick=()=>startSession(s.mode);
  document.getElementById('home').onclick=renderHome;
}

/* ---------------- data import modal ---------------- */
function openData(){
  const example = `[
  {
    "id": "2023-01",
    "year": 2023,
    "field": "宅建業法",
    "q": "問題文……",
    "choices": ["選択肢1","選択肢2","選択肢3","選択肢4"],
    "answer": 2,
    "explain": "解説……"
  }
]`;
  document.getElementById('modalBody').innerHTML = `
    <h2>問題データの取り込み</h2>
    <div class="hint">JSON配列を貼り付けて追加します。answer は 0〜3（1番目=0）。現在の登録: ${QUESTIONS.length}問</div>
    <textarea id="jsonIn" placeholder='${esc(example)}'></textarea>
    <div class="row" style="margin-top:10px">
      <button class="ghost" id="doMerge">追加で取り込む</button>
      <button class="primary" id="doReplace">丸ごと置き換え</button>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="ghost" id="doExport">今のデータを書き出す</button>
      <button class="ghost" id="doClose">閉じる</button>
    </div>
  `;
  document.getElementById('doClose').onclick=closeModal;
  document.getElementById('doMerge').onclick=()=>importJSON(false);
  document.getElementById('doReplace').onclick=()=>importJSON(true);
  document.getElementById('doExport').onclick=exportJSON;
  showModal();
}

function validateQ(o){
  return o && typeof o.q==='string' && Array.isArray(o.choices) && o.choices.length>=2
    && Number.isInteger(o.answer) && o.answer>=0 && o.answer<o.choices.length;
}

function importJSON(replace){
  const raw = document.getElementById('jsonIn').value.trim();
  if(!raw){ toast('JSONが空です'); return; }
  let data;
  try{ data = JSON.parse(raw); }catch(e){ toast('JSONの形式エラー: '+e.message); return; }
  if(!Array.isArray(data)) data=[data];
  const clean=[]; let bad=0;
  data.forEach((o,i)=>{
    if(!validateQ(o)){ bad++; return; }
    clean.push({
      id: o.id || ('q'+Date.now()+'-'+i),
      year: Number(o.year)||0,
      field: o.field||'',
      q: o.q,
      choices: o.choices.map(String),
      answer: o.answer,
      explain: o.explain||''
    });
  });
  if(!clean.length){ toast('有効な問題がありません'); return; }

  if(replace){
    QUESTIONS = clean;
  }else{
    const byId = {}; QUESTIONS.forEach(q=>byId[q.id]=q);
    clean.forEach(q=>byId[q.id]=q);
    QUESTIONS = Object.values(byId);
  }
  saveQuestions(QUESTIONS);
  closeModal();
  toast(`${clean.length}問を取り込みました${bad?`（${bad}件スキップ）`:''}`);
  renderHome();
}

function exportJSON(){
  const txt = JSON.stringify(QUESTIONS,null,2);
  navigator.clipboard?.writeText(txt).then(
    ()=>toast('クリップボードにコピーしました'),
    ()=>{ document.getElementById('jsonIn').value=txt; toast('下の欄に書き出しました'); }
  );
}

/* ---------------- reset / backup ---------------- */
const LS_LASTBK = "takken_lastbackup_v1";

function backupFilename(){
  const d = new Date();
  const p = n=>String(n).padStart(2,'0');
  return `takken-backup-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}.json`;
}

function downloadBackup(){
  const txt = JSON.stringify({v:1, stats:STATS}, null, 1);
  const blob = new Blob([txt], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = backupFilename();
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  localStorage.setItem(LS_LASTBK, String(totals().answered));
  toast('ダウンロードフォルダに保存しました: ' + a.download);
}

function restoreFromFile(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const obj = JSON.parse(reader.result);
      if(!obj || !obj.stats || typeof obj.stats!=='object') throw new Error('形式が違います');
      STATS = obj.stats; saveStats(STATS);
      localStorage.setItem(LS_LASTBK, String(totals().answered));
      closeModal(); toast('学習記録を復元しました'); renderHome();
    }catch(e){ toast('読み込みに失敗しました: '+e.message); }
  };
  reader.readAsText(file);
}

function needsBackupHint(){
  const last = Number(localStorage.getItem(LS_LASTBK) || 0);
  return totals().answered - last >= 15;
}

function openReset(){
  document.getElementById('modalBody').innerHTML = `
    <h2>学習記録のバックアップ</h2>
    <div class="hint">端末やブラウザのデータが消えても復元できるよう、ファイルとしてPCに保存します。問題データはアプリに内蔵されているため対象外です。</div>
    <button class="primary" id="bkExport">ファイルに保存する</button>
    <button class="ghost" id="bkImportBtn">ファイルから復元する</button>
    <input type="file" id="bkFile" accept="application/json" style="display:none">

    <h2 style="margin-top:26px">設定</h2>
    <div class="hint">学習記録（正誤・要復習）を消します。問題データは残ります。</div>
    <button class="ghost" id="rStats">学習記録だけリセット</button>
    <div class="hint" style="margin-top:16px">問題データも含めて初期サンプルに戻します。</div>
    <button class="ghost" id="rAll" style="border-color:var(--ng);color:var(--ng)">すべて初期化</button>
    <button class="primary" id="rClose" style="margin-top:14px">閉じる</button>
  `;
  document.getElementById('rClose').onclick=closeModal;
  document.getElementById('rStats').onclick=()=>{
    if(confirm('学習記録をリセットします。よろしいですか？')){
      STATS={hist:{}}; saveStats(STATS); closeModal(); toast('学習記録をリセットしました'); renderHome();
    }
  };
  document.getElementById('rAll').onclick=()=>{
    if(confirm('問題データも含めてすべて初期化します。よろしいですか？')){
      localStorage.removeItem(LS_Q); localStorage.removeItem(LS_S);
      QUESTIONS=loadQuestions(); STATS=loadStats(); closeModal(); toast('初期化しました'); renderHome();
    }
  };
  document.getElementById('bkExport').onclick=downloadBackup;
  const fileInput = document.getElementById('bkFile');
  document.getElementById('bkImportBtn').onclick=()=>fileInput.click();
  fileInput.onchange=()=>{ if(fileInput.files[0]) restoreFromFile(fileInput.files[0]); };
  showModal();
}

/* ---------------- ui utils ---------------- */
const modal = document.getElementById('modal');
function showModal(){ modal.classList.add('on'); }
function closeModal(){ modal.classList.remove('on'); }
modal.onclick=(e)=>{ if(e.target===modal) closeModal(); };
document.getElementById('btnData').onclick=openData;
document.getElementById('btnReset').onclick=openReset;
document.querySelectorAll('#themeToggle button').forEach(b=>{
  b.onclick=()=>applyTheme(b.dataset.t);
});

let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('on'),2200);
}
function esc(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ---------------- go ---------------- */
renderHome();
</script>
