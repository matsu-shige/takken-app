の廃業に相当の理由がなかった場合、当該公示の日の40日前にD社の取締役を退任したEは、当該届出から5年経過しなければ、免許を申請しても免許を受けることができない。\nウ　営業に関し成年者と同一の行為能力を有しない未成年者であるFの法定代理人であるGが、刑法第206条（現場助勢）の罪により罰金の刑に処せられていた場合、その刑の執行が終わった日から5年を経過していなくても、Fは免許を申請すれば免許を受けることができる。\nエ　H社の政令で定める使用人Jは、裁判所へJ自身の破産申し立てを行った後、H社を退任し、裁判所から破産手続の開始決定を受けるまでの間に、新たにK社の政令で定める使用人に就任した。その後、Jが復権を得た場合、その日から5年を経過しなくても、K社が免許を申請すれば、免許を受けることができる。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R7-35", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者A（甲県知事免許）の営業保証金に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、Aは宅地建物取引業保証協会の社員ではないものとする。", "choices": ["免許の有効期間満了の際、Aが営業保証金を取り戻そうとする場合には、供託した営業保証金につき還付を受ける権利を有する者に対し、6か月を下らない一定期間内に申し出るべき旨を官報に公告しなければならない。", "Aが営業保証金を供託する場合において、金銭と有価証券を併用して供託することができるが、従たる事務所を設置したときの営業保証金については、金銭のみをもって供託しなければならない。", "Aは、事業の開始後新たに乙県に従たる事務所を設置したときは、従たる事務所の最寄りの供託所に営業保証金を供託し、その供託物受入の記載のある供託書の写しを添付して、その旨を甲県知事に届け出なければならない。", "Aの設置した支店においてAと宅地建物取引業に関する取引をした者は、その取引により生じた債権に関し、500万円を限度としてその債権の弁済を受ける権利を有する。"], "answer": 0, "explain": ""}, {"id": "R7-36", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者Aの業務に関する次の記述のうち、宅地建物取引業法の規定によれば、禁止されているものはいくつあるか。\nア　Aの従業者は、電話によりBに投資用マンションの購入の勧誘を行った際、Bから「Aから購入する意思は一切無いので、今後電話を含め勧誘はしないでほしい。」と告げられたが、その翌日、Bに対し、再度の勧誘を行った。\nイ　建物の購入希望者から「契約の締結についてしばらく考えさせてほしい。」という申し出があったので、Aの従業者は、他に買い手がいないにもかかわらず、「他に買い手がいるので、今日中しか契約の締結はできない。」と当該購入希望者に告げた。\nウ　Aの従業者は、建物の購入希望者に対して、長時間にわたり契約の締結をするための勧誘を行い、当該購入希望者を困惑させた。\nエ　建物の売買を媒介しているAの従業者は、手持ち資金がない購入希望者に対して「手付金は当社が貸し付けるので後から返してくれれば構わない。」と告げて、契約の締結を誘引したが、契約には至らなかった。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "explain": ""}, {"id": "R7-37", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["建物の貸借の媒介を行う場合、当該建物が都市計画法の準防火地域内にあり、建築基準法第61条第1項に基づく建物の構造に係る制限があるときは、その概要を説明しなければならない。", "マンションの分譲を行う場合、建物の区分所有等に関する法律第2条第3項に規定する専用部分の用途その他の利用の制限に関する規約の定めが案の段階であるときは、説明する必要はない。", "建物の貸借の媒介を行う場合、借賃以外に授受される金銭の額、授受の目的及び保管方法を説明しなければならない。", "鉄筋コンクリート造の既存の共同住宅の販売を行う場合、宅地建物取引業法第34条の2第1項第4号に規定する建物状況調査を1年6か月前に実施したときは、建物状況調査を実施したこと、その結果の概要について説明しなくてはならない。"], "answer": 3, "explain": ""}, {"id": "R7-38", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者Aが行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはいくつあるか。\nア　Aは、宅地又は建物の売買に関する広告をする際に取引態様の別を明示した場合、当該広告を見た者から売買に関する注文を受けたときは、改めて取引態様の別を明示する必要はない。\nイ　Aは、宅地の売買に関する広告をするに当たり、当該宅地の形質について、実際のものよりも著しく優良であると人を誤認させる表示をした場合、当該宅地に関する注文がなく、売買が成立しなかったときであっても、監督処分及び罰則の対象となる。\nウ　Aは、複数の区画がある宅地の売買について、数回に分けて広告をする予定でいる場合、最初に行う広告に取引態様の別を明示すれば足り、それ以降は明示する必要はない。\nエ　Aは、建物の貸借の媒介において、依頼者の依頼によらない広告をした場合、国土交通大臣の定める報酬限度額となる媒介報酬のほか、当該広告の料金に相当する額を受領できる。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R7-39", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者Aが、BからB所有の中古住宅の売却について媒介の依頼を受けた場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["AがBとの間で専属専任媒介契約を締結し、Bから「売り出し中であることを秘密にしておきたいので指定流通機構への登録はしないでほしい」旨の申出があった場合、Aは、そのことを理由に登録をしなかったとしても法に違反しない。", "Aは、Bとの間で有効期間を1か月とする専属専任媒介契約を締結する際、「Bが媒介契約を更新する旨を申し出ない場合は、有効期間満了により自動更新するものとする」旨の特約は有効である。", "AがBと一般媒介契約を締結したときは、法第34条の2第1項の規定に基づき交付すべき書面に、宅地建物取引士をして記名させなければならない。", "AがBとの間で専属専任媒介契約を締結した場合、Aは、当該中古住宅の取引の申込みの受付に関する状況を指定流通機構に登録しなければならない。"], "answer": 3, "explain": ""}, {"id": "R7-40", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者Bの媒介により、宅地建物取引業者ではない買主Cとの間で宅地の売買契約を締結した場合、宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、正しいものはいくつあるか。\nア　Cは、Bの事務所で買受けの申込みを行い、その3日後に、Cの自宅近くの喫茶店で売買契約を締結した場合、クーリング・オフによる契約の解除はできない。\nイ　AとCの間で、クーリング・オフによる契約の解除に関し、Cは契約の解除の書面をクーリング・オフの告知の日から起算して8日以内にAに到達させなければ契約を解除することができない旨の特約を定めた場合、当該特約は無効である。\nウ　Cは、Bからの提案によりCの自宅で買受けの申込みを行ったが、クーリング・オフについては告げられず、その10日後に、Aの事務所で売買契約を締結した場合、クーリング・オフによる契約の解除はできない。\nエ　クーリング・オフについてCに告げる書面には、Aの商号又は名称及び住所並びに免許証番号を記載しなければならないが、Bの商号又は名称及び住所並びに免許証番号の記載は必要ない。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 2, "explain": ""}, {"id": "R7-41", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者A（甲県知事免許）が免許を受けてから1年以内に事業を開始しないときは、甲県知事は免許を取り消さなければならない。", "宅地建物取引業者B（甲県知事免許）が株主総会の決議により解散した場合、Bを代表する役員であった者は、その旨を当該解散の日から60日以内に甲県知事に届け出なければならない。", "宅地建物取引業者ではないCが甲県に本店を、乙県に支店をそれぞれ有する場合で、乙県の支店のみで新たに宅地建物取引業を営もうとするときは、Cは乙県知事の免許を受けなければならない。", "宅地建物取引業者D（甲県知事免許）は、甲県の事務所を廃止し、乙県内で新たに事務所を設置して宅地建物取引業を営もうとする場合、甲県知事へ廃業の届出を行うとともに、乙県知事への免許換えの申請を行わなければならない。"], "answer": 0, "explain": ""}, {"id": "R7-42", "year": 2025, "field": "宅建業法", "q": "宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、この問において、宅地建物取引士は、事務の禁止の処分を受けていないものとする。\nア　二つ以上の都道府県において宅地建物取引士資格試験に合格した者は、当該試験を行った都道府県のうち試験日が遅い都道府県知事の登録以外を受けることができない。\nイ　宅地建物取引士は、その登録している勤務先の名称に変更があった場合、登録を受けている都道府県知事に、変更の登録の申請とあわせて、宅地建物取引士証の書換え交付を申請しなければならない。\nウ　宅地建物取引士は、宅地建物取引士証が効力を失ったときは、速やかに、宅地建物取引士証をその交付を受けた都道府県知事に返納しなければならない。\nエ　宅地建物取引士は、登録を受けている都道府県知事の管轄する都道府県以外の都道府県に所在する宅地建物取引業者の事務所の業務に従事しているときは、登録の移転の申請をすることができる。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "explain": ""}, {"id": "R7-43", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。\nア　自らを委託者とする宅地又は建物に係る信託の受益権の売主となる場合、相手方に金融商品取引法第2条第10項に規定する目論見書を交付し、宅地建物取引業法第35条第3項の規定に基づき説明すべき事項のすべてが当該目論見書に記載されているときは、重要事項説明書の交付及び説明を省略することができる。\nイ　建物の貸借の媒介を行う場合、当該建物が建築工事の完了前のものであるときは、その完了時における当該建物の主要構造部、内装及び外装の構造又は仕上げ並びに設備の設置及び構造について説明しなければならない。\nウ　建物の貸借の媒介を行う場合、敷金その他いかなる名義をもって授受されるかを問わず、契約終了時において精算することとされている金銭の精算に関する事項を説明しなければならない。\nエ　宅地の売買の媒介を行う場合、当該宅地が津波防災地域づくりに関する法律第21条第1項により指定された津波防護施設区域内にあるときは、同法第23条第1項の規定による制限の概要について説明しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "explain": ""}, {"id": "R7-44", "year": 2025, "field": "宅建業法", "q": "宅地建物取引業者は、犯罪による収益の移転防止に関する法律第2条第2項の特定事業者に該当するが、宅地建物取引業者Aの行為に関する次の記述のうち、同法に違反するものはどれか。", "choices": ["Aは、土地付建物の売買を行うに際して、当該売買契約の相手方である買主が自然人であったので、氏名、住居、生年月日、取引を行う目的及び職業について、確認した。", "Aは、価額が5,000万円の土地付建物の売買を行ったとき、直ちに、一定の方法により、当該売買契約の相手方である買主の確認記録を検索するための事項、当該取引の期日及び内容その他の事項に関する記録を作成して保存していたが、当該取引の行われた日から5年経過したので、当年度末に当該記録を廃棄した。", "Aは、土地付建物の売買契約の相手方である買主から収受した代金について犯罪により得た収益であるとの疑いがあったので、速やかに、所定の事項を行政庁に届け出た。", "Aは、取引時確認、取引記録等の保存、疑わしい取引の届出等の措置を的確に行うため、顧客と実際に接する営業担当者に対する教育訓練を実施した。"], "answer": 1, "explain": ""}, {"id": "R7-45", "year": 2025, "field": "宅建業法", "q": "特定住宅瑕疵担保責任の履行の確保等に関する法律に基づく住宅販売瑕疵担保保証金（以下この問において「保証金」という。）の供託又は住宅販売瑕疵担保責任保険契約（以下この問において「保険契約」という。）の締結に関する次の記述のうち、正しいものはどれか。", "choices": ["宅地建物取引業者は、基準日から3週間を経過する日までの間において、当該基準日前15年間に自ら売主となる売買契約に基づき宅地建物取引業者ではない買主に引き渡した新築住宅（保険契約に係る新築住宅を除く。）について、保証金の供託をしていなければならない。", "宅地建物取引業者は、自ら売主となる売買契約に基づき新築住宅を引き渡す場合だけでなく、新築住宅の売買の媒介をする場合においても、保証金の供託又は保険契約の締結をしなければならない。", "保険契約を締結している宅地建物取引業者は、新築住宅を引き渡した時から10年間、構造耐力上主要な部分の瑕疵によって生じた損害についてのみ当該保険契約に係る保険金を請求することができる。", "保険契約を締結している宅地建物取引業者及び当該業者が売主となっている新築住宅の買主は、指定住宅紛争処理機関に特別住宅紛争処理の申請をすることにより、当該新築住宅の売買契約に関する宅地建物取引業者と買主との間の紛争について、あっせん、調停又は仲裁を受けることができる。"], "answer": 3, "explain": ""}, {"id": "R7-46", "year": 2025, "field": "免除科目", "q": "独立行政法人住宅金融支援機構（以下この問において「機構」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、災害により住宅が滅失した場合におけるその住宅に代わるべき住宅の建設又は購入に係る貸付金について、一定の元金返済の据置期間を設けることができる。", "機構は、証券化支援事業（買取型）において、債務者又は債務者の親族が居住する住宅のみならず、賃貸住宅の建設又は購入に必要な資金の貸付けに係る金融機関の貸付債権についても譲受けの対象としている。", "機構は、高齢者が自ら居住する住宅に対して行うバリアフリー工事に係る貸付けについて、貸付金の償還を高齢者の死亡時に一括して行うという制度を設けている。", "機構は、市街地の土地の合理的な利用に寄与する一定の建築物の建設に必要な資金の貸付けを業務として行っている。"], "answer": 1, "explain": ""}, {"id": "R7-47", "year": 2025, "field": "免除科目", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法（不動産の表示に関する公正競争規約を含む。）の規定によれば、正しいものはどれか。", "choices": ["団地（一団の宅地又は建物をいう。）と駅との間の道路距離は、取引する区画のうち駅から最も近い区画（マンション及びアパートにあっては、駅から最も近い建物の出入口）を起点として算出した数値又は駅から最も遠い区画（マンション及びアパートにあっては、駅から最も遠い建物の出入口）を起点として算出した数値のいずれかを表示しなければならない。", "新築分譲マンションを販売するに当たり、住戸により管理費の額が異なる場合であって、その全ての住宅の管理費を表示することが困難であるときは、最高額のみで表示することができる。", "物件の近くに新設される予定の駅等又はバスの停留所については、当該路線の運行主体が公表していれば、現に利用できるものではなくても新設予定時期を明示して表示することができる。", "道路距離80mにつき1分間を要するものとして、賃貸物件から最寄りの駅までの徒歩による所要時間を算出したところ15分50秒であった。この場合、当該所要時間を15分と表示してよい。"], "answer": 2, "explain": ""}, {"id": "R7-48", "year": 2025, "field": "免除科目", "q": "次の記述のうち、正しいものはどれか。", "choices": ["年次別法人企業統計調査（令和5年度。令和6年9月公表）によれば、令和5年度における不動産業の営業利益は7兆円を超えているが、前年度に比べ減少した。", "建築着工統計調査報告（令和6年計。令和7年1月公表）によれば、令和6年の新設住宅着工戸数は、持家、分譲住宅のいずれにおいても前年に比べ減少した。", "令和7年地価公示（令和7年3月公表）によれば、令和6年1月以降の1年間の地価変動率は、三大都市圏平均では住宅地、商業地ともに上昇となったものの、地方圏平均では住宅地、商業地ともに下落となった。", "令和7年版土地白書（令和7年5月公表）によれば、土地取引について、売買による所有権の移転登記の件数でその動向を見ると、令和6年の全国の土地取引件数は200万件を超えており、前年に比べ大きく増加した。"], "answer": 1, "explain": ""}, {"id": "R7-49", "year": 2025, "field": "免除科目", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["川沿いの低地に堆積している川が運んだ土砂は、重い構造物を支持できる。", "砂州や砂丘には、粒径のそろった砂が堆積しており、地下水位が浅い箇所では、液状化しやすくなる。", "丘陵地は、山地ほど斜面の勾配がきつくなく、山地に比べ斜面崩壊は生じ難いといえる。", "台地は低地より古い時代に形成された地盤であり、一般に構造物を支持できる強度を有している。"], "answer": 0, "explain": ""}, {"id": "R7-50", "year": 2025, "field": "免除科目", "q": "建物の構造と材料に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["鋼材の素材の鋼は、鉄や炭素などの成分を含んでおり、炭素量が多いものほど、軟質で強度が小さい。", "鋼材は、熱に弱く、さびやすいので、耐火や防錆の処理を施す必要がある。", "鋼材は、強度が高く、粘りがあり、比較的小さな断面部材で荷重に耐えることができる。", "鋼材の素材の鋼の密度は、木材やコンクリートに比べて大きい。"], "answer": 0, "explain": ""}, {"id": "R4-01", "year": 2022, "field": "権利関係", "q": "次の1から4までの記述のうち、民法の規定、判例及び下記判決文によれば、正しいものはどれか。\n（判決文）\n所有者甲から乙が不動産を買い受け、その登記が未了の間に、丙が当該不動産を甲から二重に買い受け、更に丙から転得者丁が買い受けて登記を完了した場合に、たとい丙が背信的悪意者に当たるとしても、丁は、乙に対する関係で丁自身が背信的悪意者と評価されるのでない限り、当該不動産の所有権取得をもって乙に対抗することができるものと解するのが相当である。", "choices": ["所有者AからBが不動産を買い受け、その登記が未了の間に、Cが当該不動産をAから二重に買い受けて登記を完了した場合、Cは、自らが背信的悪意者に該当するときであっても、当該不動産の所有権取得をもってBに対抗することができる。", "所有者AからBが不動産を買い受け、その登記が未了の間に、背信的悪意者ではないCが当該不動産をAから二重に買い受けた場合、先に買い受けたBは登記が未了であっても当該不動産の所有権取得をもってCに対抗することができる。", "所有者AからBが不動産を買い受け、その登記が未了の間に、背信的悪意者であるCが当該不動産をAから二重に買い受け、更にCから転得者Dが買い受けて登記を完了した場合、DもBに対する関係で背信的悪意者に該当するときには、Dは当該不動産の所有権取得をもってBに対抗することができない。", "所有者AからBが不動産を買い受け、その登記が未了の間に、Cが当該不動産をAから二重に買い受け登記を完了した場合、Cが背信的悪意者に該当しなくてもBが登記未了であることにつき悪意であるときには、Cは当該不動産の所有権取得をもってBに対抗することができない。"], "answer": 2, "explain": ""}, {"id": "R4-02", "year": 2022, "field": "権利関係", "q": "相続に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["被相続人の生前においては、相続人は、家庭裁判所の許可を受けることにより、遺留分を放棄することができる。", "家庭裁判所への相続放棄の申述は、被相続人の生前には行うことができない。", "相続人が遺留分の放棄について家庭裁判所の許可を受けると、当該相続人は、被相続人の遺産を相続する権利を失う。", "相続人が被相続人の兄弟姉妹である場合、当該相続人には遺留分がない。"], "answer": 2, "explain": ""}, {"id": "R4-03", "year": 2022, "field": "権利関係", "q": "制限行為能力者に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["成年後見人は、後見監督人がいる場合には、後見監督人の同意を得なければ、成年被後見人の法律行為を取り消すことができない。", "相続の放棄は相手方のない単独行為であるから、成年後見人が成年被後見人に代わってこれを行っても、利益相反行為となることはない。", "成年後見人は成年被後見人の法定代理人である一方、保佐人は被保佐人の行為に対する同意権と取消権を有するが、代理権が付与されることはない。", "令和4年4月1日からは、成年年齢が18歳となったため、18歳の者は、年齢を理由とする後見人の欠格事由に該当しない。"], "answer": 3, "explain": ""}, {"id": "R4-04", "year": 2022, "field": "権利関係", "q": "A所有の甲土地にBのCに対する債務を担保するためにCの抵当権（以下この問において「本件抵当権」という。）が設定され、その旨の登記がなされた場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["Aから甲土地を買い受けたDが、Cの請求に応じてその代価を弁済したときは、本件抵当権はDのために消滅する。", "Cに対抗することができない賃貸借により甲土地を競売手続の開始前から使用するEは、甲土地の競売における買受人Fの買受けの時から6か月を経過するまでは、甲土地をFに引き渡すことを要しない。", "本件抵当権設定登記後に、甲土地上に乙建物が築造された場合、Cが本件抵当権の実行として競売を申し立てるときには、甲土地とともに乙建物の競売も申し立てなければならない。", "BがAから甲土地を買い受けた場合、Bは抵当不動産の第三取得者として、本件抵当権について、Cに対して抵当権消滅請求をすることができる。"], "answer": 0, "explain": ""}, {"id": "R4-05", "year": 2022, "field": "権利関係", "q": "期間の計算に関する次の記述のうち、民法の規定によれば、正しいものはどれか。なお、明記された日付は、日曜日、国民の祝日に関する法律に規定する休日その他の休日には当たらないものとする。", "choices": ["令和4年10月17日午前10時に、引渡日を契約締結日から1年後とする不動産の売買契約を締結した場合、令和5年10月16日が引渡日である。", "令和4年8月31日午前10時に、弁済期限を契約締結日から1か月後とする金銭消費貸借契約を締結した場合、令和4年9月30日の終了をもって弁済期限となる。", "期間の末日が日曜日、国民の祝日に関する法律に規定する休日その他の休日に当たるときは、その日に取引をしない慣習がある場合に限り、期間はその前日に満了する。", "令和4年5月30日午前10時に、代金の支払期限を契約締結日から1か月後とする動産の売買契約を締結した場合、令和4年7月1日の終了をもって支払期限となる。"], "answer": 1, "explain": ""}, {"id": "R4-06", "year": 2022, "field": "権利関係", "q": "Aを貸主、Bを借主として、A所有の甲土地につき、資材置場とする目的で期間を2年として、AB間で、①賃貸借契約を締結した場合と、②使用貸借契約を締結した場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["Aは、甲土地をBに引き渡す前であれば、①では口頭での契約の場合に限り自由に解除できるのに対し、②では書面で契約を締結している場合も自由に解除できる。", "Bは、①ではAの承諾がなければ甲土地を適法に転貸することはできないが、②ではAの承諾がなくても甲土地を適法に転貸することができる。", "Bは、①では期間内に解約する権利を留保しているときには期間内に解約の申入れをし解約することができ、②では期間内に解除する権利を留保していなくてもいつでも解除することができる。", "甲土地について契約の本旨に反するBの使用によって生じた損害がある場合に、Aが損害賠償を請求するときは、①では甲土地の返還を受けた時から5年以内に請求しなければならないのに対し、②では甲土地の返還を受けた時から1年以内に請求しなければならない。"], "answer": 2, "explain": ""}, {"id": "R4-07", "year": 2022, "field": "権利関係", "q": "不在者Aが、家庭裁判所から失踪宣告を受けた。Aを単独相続したBは相続財産である甲土地をCに売却（以下この問において「本件売買契約」という。）して登記も移転したが、その後、生存していたAの請求によって当該失踪宣告が取り消された。本件売買契約当時に、Aの生存について、（ア）Bが善意でCが善意、（イ）Bが悪意でCが善意、（ウ）Bが善意でCが悪意、（エ）Bが悪意でCが悪意、の4つの場合があり得るが、これらのうち、民法の規定及び判例によれば、Cが本件売買契約に基づき取得した甲土地の所有権をAに対抗できる場合を全て掲げたものとして正しいものはどれか。", "choices": ["(ア)、(イ)、(ウ)", "(ア)、(イ)", "(ア)、(ウ)", "(ア)"], "answer": 3, "explain": ""}, {"id": "R4-08", "year": 2022, "field": "権利関係", "q": "AがB所有の甲土地を建物所有目的でなく利用するための権原が、①地上権である場合と②賃借権である場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、AもBも対抗要件を備えているものとする。", "choices": ["①でも②でも、特約がなくても、BはAに対して、甲土地の使用及び収益に必要な修繕をする義務を負う。", "CがBに無断でAから当該権原を譲り受け、甲土地を使用しているときは、①でも②でも、BはCに対して、甲土地の明渡しを請求することができる。", "①では、Aは当該権原を目的とする抵当権を設定することができるが、②では、Aは当該権原を目的とする抵当権を設定することはできない。", "Dが甲土地を不法占拠してAの土地利用を妨害している場合、①では、Aは当該権原に基づく妨害排除請求権を行使してDの妨害の排除を求めることができるが、②では、AはDの妨害の排除を求めることはできない。"], "answer": 2, "explain": ""}, {"id": "R4-09", "year": 2022, "field": "権利関係", "q": "辞任に関する次の記述のうち、民法の規定によれば、正しいものはいくつあるか。\nア 委任によって代理権を授与された者は、報酬を受ける約束をしている場合であっても、いつでも委任契約を解除して代理権を消滅させて、代理人を辞することができる。\nイ 親権者は、やむを得ない事由があるときは、法務局に届出を行うことによって、親権を辞することができる。\nウ 後見人は、正当な事由があるときは、後見監督人の許可を得て、その任務を辞することができる。\nエ 遺言執行者は、正当な事由があるときは、相続人の許可を得て、その任務を辞することができる。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 0, "explain": ""}, {"id": "R4-10", "year": 2022, "field": "権利関係", "q": "AはBに対し、自己所有の甲土地を売却し、代金と引換えにBに甲土地を引き渡したが、その後にCに対しても甲土地を売却し、代金と引換えにCに甲土地の所有権登記を移転した。この場合におけるBによる甲土地の所有権の時効取得に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["Bが甲土地をDに賃貸し、引き渡したときは、Bは甲土地の占有を失うので、甲土地の所有権を時効取得することはできない。", "Bが、時効の完成前に甲土地の占有をEに奪われたとしても、Eに対して占有回収の訴えを提起して占有を回復した場合には、Eに占有を奪われていた期間も時効期間に算入される。", "Bが、甲土地の引渡しを受けた時点で所有の意思を有していたとしても、AC間の売買及びCに対する登記の移転を知ったときは、その時点で所有の意思が認められなくなるので、Bは甲土地を時効により取得することはできない。", "Bが甲土地の所有権を時効取得した場合、Bは登記を備えなければ、その所有権を時効完成時において所有者であったCに対抗することはできない。"], "answer": 1, "explain": ""}, {"id": "R4-11", "year": 2022, "field": "権利関係", "q": "建物の所有を目的とする土地の賃貸借契約（定期借地権及び一時使用目的の借地権となる契約を除く。）に関する次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。", "choices": ["借地権の存続期間が満了する前に建物の滅失があった場合において、借地権者が借地権の残存期間を超えて存続すべき建物を築造したときは、その建物を築造することにつき借地権設定者の承諾がない場合でも、借地権の期間の延長の効果が生ずる。", "転借地権が設定されている場合において、転借地上の建物が滅失したときは、転借地権は消滅し、転借地権者（転借人）は建物を再築することができない。", "借地上の建物が滅失し、借地権設定者の承諾を得て借地権者が新たに建物を築造するに当たり、借地権設定者が存続期間満了の際における借地の返還確保の目的で、残存期間を超えて存続する建物を築造しない旨の特約を借地権者と結んだとしても、この特約は無効である。", "借地上の建物所有者が借地権設定者に建物買取請求権を適法に行使した場合、買取代金の支払があるまでは建物の引渡しを拒み得るとともに、これに基づく敷地の占有についても、賃料相当額を支払う必要はない。"], "answer": 2, "explain": ""}, {"id": "R4-12", "year": 2022, "field": "権利関係", "q": "Aは、B所有の甲建物（床面積100m²）につき、居住を目的として、期間2年、賃料月額10万円と定めた賃貸借契約（以下この問において「本件契約」という。）をBと締結してその日に引渡しを受けた。この場合における次の記述のうち、民法及び借地借家法の規定並びに判例によれば、誤っているものはどれか。", "choices": ["BはAに対して、本件契約締結前に、契約の更新がなく、期間の満了により賃貸借が終了する旨を記載した賃貸借契約書を交付して説明すれば、本件契約を借地借家法第38条に規定する定期建物賃貸借契約として締結することができる。", "本件契約が借地借家法第38条に規定する定期建物賃貸借契約であるか否かにかかわらず、Aは、甲建物の引渡しを受けてから1年後に甲建物をBから購入したCに対して、賃借人であることを主張できる。", "本件契約が借地借家法第38条に規定する定期建物賃貸借契約である場合、Aの中途解約を禁止する特約があっても、やむを得ない事情によって甲建物を自己の生活の本拠として使用することが困難になったときは、Aは本件契約の解約の申入れをすることができる。", "AがBに対して敷金を差し入れている場合、本件契約が期間満了で終了するに当たり、Bは甲建物の返還を受けるまでは、Aに対して敷金を返還する必要はない。"], "answer": 0, "explain": ""}, {"id": "R4-13", "year": 2022, "field": "権利関係", "q": "建物の区分所有等に関する法律（以下この問において「法」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["管理者は、規約により、その職務に関し、区分所有者のために、原告又は被告となったときは、その旨を各区分所有者に通知しなくてよい。", "管理者がないときは、区分所有者の5分の1以上で議決権の5分の1以上を有するものは、集会を招集することができる。ただし、この定数は、規約で減ずることができる。", "集会において、管理者の選任を行う場合、規約に別段の定めがない限り、区分所有者及び議決権の各過半数で決する。", "管理組合（法第3条に規定する区分所有者の団体をいう。）は、区分所有者及び議決権の各4分の3以上の多数による集会の決議で法人となる旨並びにその名称及び事務所を定め、かつ、その主たる事務所の所在地において登記をすることによって法人となる。"], "answer": 0, "explain": ""}, {"id": "R4-14", "year": 2022, "field": "権利関係", "q": "不動産の登記に関する次の記述のうち、誤っているものはどれか。", "choices": ["所有権の移転の登記の申請をする場合には、申請人は、法令に別段の定めがある場合を除き、その申請情報と併せて登記原因を証する情報を提供しなければならない。", "所有権の移転の登記の申請をする場合において、当該申請を登記の申請の代理を業とすることができる代理人によってするときは、登記識別情報を提供することができないことにつき正当な理由があるとみなされるため、登記義務者の登記識別情報を提供することを要しない。", "所有権の移転の登記の申請をする場合において、登記権利者が登記識別情報の通知を希望しない旨の申出をしたときは、当該登記に係る登記識別情報は通知されない。", "所有権の移転の登記の申請をする場合において、その登記が完了した際に交付される登記完了証を送付の方法により交付することを求めるときは、その旨及び送付先の住所を申請情報の内容としなければならない。"], "answer": 1, "explain": ""}, {"id": "R4-15", "year": 2022, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。", "choices": ["市街化区域については、都市計画に、少なくとも用途地域を定めるものとされている。", "準都市計画区域については、都市計画に、特別用途地区を定めることができる。", "高度地区については、都市計画に、建築物の容積率の最高限度又は最低限度を定めるものとされている。", "工業地域は、主として工業の利便を増進するため定める地域とされている。"], "answer": 2, "explain": ""}, {"id": "R4-16", "year": 2022, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。ただし、この問において条例による特別の定めはないものとし、「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["市街化区域内において、市街地再開発事業の施行として行う1haの開発行為を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "区域区分が定められていない都市計画区域内において、博物館法に規定する博物館の建築を目的とした8,000m²の開発行為を行おうとする者は、都道府県知事の許可を受けなくてよい。", "自己の業務の用に供する施設の建築の用に供する目的で行う開発行為にあっては、開発区域内に土砂災害警戒区域等における土砂災害防止対策の推進に関する法律に規定する土砂災害警戒区域内の土地を含んではならない。", "市街化調整区域内における開発行為について、当該開発行為が開発区域の周辺における市街化を促進するおそれがあるかどうかにかかわらず、都道府県知事は、開発審査会の議を経て開発許可をすることができる。"], "answer": 1, "explain": ""}, {"id": "R4-17", "year": 2022, "field": "法令上の制限", "q": "建築基準法（以下この問において「法」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["法の改正により、現に存する建築物が改正後の法の規定に適合しなくなった場合には、当該建築物は違反建築物となり、速やかに改正後の法の規定に適合させなければならない。", "延べ面積が500m²を超える建築物について、大規模な修繕をしようとする場合、都市計画区域外であれば建築確認を受ける必要はない。", "地方公共団体は、条例で、建築物の敷地、構造又は建築設備に関して安全上、防火上又は衛生上必要な制限を附加することができる。", "地方公共団体が、条例で、津波、高潮、出水等による危険の著しい区域を災害危険区域として指定した場合には、災害危険区域内における住居の用に供する建築物の建築は一律に禁止されることとなる。"], "answer": 2, "explain": ""}, {"id": "R4-18", "year": 2022, "field": "法令上の制限", "q": "次の記述のうち、建築基準法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["第一種低層住居専用地域内においては、神社、寺院、教会を建築することはできない。", "その敷地内に一定の空地を有し、かつ、その敷地面積が一定規模以上である建築物で、特定行政庁が交通上、安全上、防火上及び衛生上支障がなく、かつ、その建蔽率、容積率及び各部分の高さについて総合的な配慮がなされていることにより市街地の環境の整備改善に資すると認めて許可したものの建蔽率、容積率又は各部分の高さは、その許可の範囲内において、関係規定による限度を超えるものとすることができる。", "法第3章の規定が適用されるに至った際、現に建築物が立ち並んでいる幅員1.8m未満の道で、あらかじめ、建築審査会の同意を得て特定行政庁が指定したものは、同章の規定における道路とみなされる。", "第一種住居地域内においては、建築物の高さは、10m又は12mのうち当該地域に関する都市計画において定められた建築物の高さの限度を超えてはならない。"], "answer": 2, "explain": ""}, {"id": "R4-19", "year": 2022, "field": "法令上の制限", "q": "宅地造成等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["宅地造成工事規制区域内において、雨水その他の地表水又は地下水を排除するための排水施設の除却工事を行おうとする場合は、一定の場合を除き、都道府県知事への届出が必要となる。", "宅地造成工事規制区域内において、森林を宅地にするために行う切土であって、高さ3mの崖を生ずることとなるものに関する工事については、造成主は、都市計画法第29条第1項又は第2項の許可を受けて行われる当該許可の内容に適合した工事を除き、工事に着手する前に、都道府県知事の許可を受けなければならない。", "宅地造成工事規制区域内で過去に宅地造成に関する工事が行われ、現在は造成主とは異なる者がその工事が行われた宅地を所有している場合において、当該宅地の所有者は宅地造成に伴う災害が生じないよう、その宅地を常時安全な状態に維持するよう努めなければならない。", "宅地造成工事規制区域外に盛土によって造成された一団の造成宅地の区域において、造成された盛土の高さが5m未満の場合は、都道府県知事は、当該区域を造成宅地防災区域として指定することができない。"], "answer": 3, "explain": ""}, {"id": "R4-20", "year": 2022, "field": "法令上の制限", "q": "次の記述のうち、土地区画整理法の規定及び判例によれば、誤っているものはどれか。", "choices": ["土地区画整理組合の設立の認可の公告があった日以後、換地処分の公告がある日までは、施行地区内において、土地区画整理事業の施行の障害となるおそれがある建築物の新築を行おうとする者は、土地区画整理組合の許可を受けなければならない。", "土地区画整理組合は、定款に別段の定めがある場合においては、換地計画に係る区域の全部について工事が完了する以前においても換地処分をすることができる。", "仮換地を指定したことにより、使用し、又は収益することができる者のなくなった従前の宅地については、当該宅地を使用し、又は収益することができる者のなくなった時から換地処分の公告がある日までは、施行者が当該宅地を管理する。", "清算金の徴収又は交付に関する権利義務は、換地処分の公告によって換地についての所有権が確定することと併せて、施行者と換地処分時点の換地所有者との間に確定的に発生するものであり、換地処分後に行われた当該換地の所有権の移転に伴い当然に移転する性質を有するものではない。"], "answer": 0, "explain": ""}, {"id": "R4-21", "year": 2022, "field": "法令上の制限", "q": "農地に関する次の記述のうち、農地法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["農地の賃貸借及び使用貸借は、その登記がなくても農地の引渡しがあったときは、これをもってその後にその農地について所有権を取得した第三者に対抗することができる。", "法第2条第3項の農地所有適格法人の要件を満たしていない株式会社は、耕作目的で農地を借り入れることはできない。", "法第4条第1項、第5条第1項の違反について原状回復等の措置に係る命令の対象となる者（違反転用者等）には、当該規定に違反した者又はその一般承継人は含まれるが、当該違反に係る土地について工事を請け負った者は含まれない。", "法の適用については、土地の面積は、登記簿の地積によることとしているが、登記簿の地積が著しく事実と相違する場合及び登記簿の地積がない場合には、実測に基づき農業委員会が認定したところによる。"], "answer": 3, "explain": ""}, {"id": "R4-22", "year": 2022, "field": "法令上の制限", "q": "国土利用計画法第23条の届出（以下この問において「事後届出」という。）に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市にあってはその長をいうものとする。", "choices": ["都市計画区域外において、A市が所有する面積15,000m²の土地を宅地建物取引業者Bが購入した場合、Bは事後届出を行わなければならない。", "事後届出において、土地売買等の契約に係る土地の土地に関する権利の移転又は設定の対価の額については届出事項ではない。", "市街化区域を除く都市計画区域内において、一団の土地である甲土地（C所有、面積3,500m²）と乙土地（D所有、面積2,500m²）を宅地建物取引業者Eが購入した場合、Eは事後届出を行わなければならない。", "都道府県知事は、土地利用審査会の意見を聴いて、事後届出をした者に対し、当該事後届出に係る土地の利用目的について必要な変更をすべきことを勧告することができ、勧告を受けた者がその勧告に従わない場合、その勧告に反する土地売買等の契約を取り消すことができる。"], "answer": 2, "explain": ""}, {"id": "R4-23", "year": 2022, "field": "税・その他", "q": "印紙税に関する次の記述のうち、正しいものはどれか。なお、以下の覚書又は契約書はいずれも書面により作成されたものとする。", "choices": ["土地を8,000万円で譲渡することを証した覚書を売主Aと買主Bが作成した場合、本契約書を後日作成することを文書上で明らかにしていれば、当該覚書には印紙税が課されない。", "一の契約書に甲土地の譲渡契約（譲渡金額6,000万円）と、乙建物の譲渡契約（譲渡金額3,000万円）をそれぞれ区分して記載した場合、印紙税の課税標準となる当該契約書の記載金額は、6,000万円である。", "当初作成した土地の賃貸借契約書において「契約期間は5年とする」旨の記載がされていた契約期間を変更するために、「契約期間は10年とする」旨を記載した覚書を貸主Cと借主Dが作成した場合、当該覚書には印紙税が課される。", "駐車場経営者Eと車両所有者Fが、Fの所有する車両を駐車場としての設備のある土地の特定の区画に駐車させる旨の賃貸借契約書を作成した場合、土地の賃借権の設定に関する契約書として印紙税が課される。"], "answer": 2, "explain": ""}, {"id": "R4-24", "year": 2022, "field": "税・その他", "q": "固定資産税に関する次の記述のうち、正しいものはどれか。", "choices": ["固定資産税の徴収については、特別徴収の方法によらなければならない。", "土地価格等縦覧帳簿及び家屋価格等縦覧帳簿の縦覧期間は、毎年4月1日から、4月20日又は当該年度の最初の納期限の日のいずれか遅い日以後の日までの間である。", "固定資産税の賦課期日は、市町村の条例で定めることとされている。", "固定資産税は、固定資産の所有者に課するのが原則であるが、固定資産が賃借されている場合は、当該固定資産の賃借権者に対して課される。"], "answer": 1, "explain": ""}, {"id": "R4-25", "year": 2022, "field": "税・その他", "q": "地価公示法に関する次の記述のうち、誤っているものはどれか。", "choices": ["土地鑑定委員会は、標準地の正常な価格を判定したときは、標準地の単位面積当たりの価格のほか、当該標準地の地積及び形状についても官報で公示しなければならない。", "正常な価格とは、土地について、自由な取引が行われるとした場合におけるその取引（一定の場合を除く。）において通常成立すると認められる価格をいい、当該土地に建物がある場合には、当該建物が存するものとして通常成立すると認められる価格をいう。", "公示区域内の土地について鑑定評価を行う場合において、当該土地の正常な価格を求めるときは、公示価格を規準とする必要があり、その際には、当該土地とこれに類似する利用価値を有すると認められる1又は2以上の標準地との位置、地積、環境等の土地の客観的価値に作用する諸要因についての比較を行い、その結果に基づき、当該標準地の公示価格と当該土地の価格との間に均衡を保たせる必要がある。", "公示区域とは、都市計画法第4条第2項に規定する都市計画区域その他の土地取引が相当程度見込まれるものとして国土交通省令で定める区域のうち、国土利用計画法第12条第1項の規定により指定された規制区域を除いた区域をいう。"], "answer": 1, "explain": ""}, {"id": "R4-26", "year": 2022, "field": "宅建業法", "q": "宅地建物取引業法第3条第1項に規定する事務所（以下この問において「事務所」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["事務所とは、契約締結権限を有する者を置き、継続的に業務を行うことができる施設を有する場所を指すものであるが、商業登記簿に登載されていない営業所又は支店は事務所には該当しない。", "宅地建物取引業を営まず他の兼業業務のみを営んでいる支店は、事務所には該当しない。", "宅地建物取引業者は、主たる事務所については、免許証、標識及び国土交通大臣が定めた報酬の額を掲げ、従業者名簿及び帳簿を備え付ける義務を負う。", "宅地建物取引業者は、その事務所ごとに一定の数の成年者である専任の宅地建物取引士を置かなければならないが、既存の事務所がこれを満たさなくなった場合は、30日以内に必要な措置を執らなければならない。"], "answer": 1, "explain": ""}, {"id": "R4-27", "year": 2022, "field": "宅建業法", "q": "宅地建物取引業者A（消費税課税事業者）が受け取ることができる報酬についての次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["Aが、Bから売買の媒介を依頼され、Bからの特別の依頼に基づき、遠隔地への現地調査を実施した。その際、当該調査に要する特別の費用について、Bが負担することを事前に承諾していたので、Aは媒介報酬とは別に、当該調査に要した特別の費用相当額を受領することができる。", "Aが、居住用建物について、貸主Bから貸借の媒介を依頼され、この媒介が使用貸借に係るものである場合は、当該建物の通常の借賃をもとに報酬の限度額が定まるが、その算定に当たっては、不動産鑑定業者の鑑定評価を求めなければならない。", "Aが居住用建物の貸主B及び借主Cの双方から媒介の依頼を受けるに当たって、依頼者の一方から受けることのできる報酬の額は、借賃の1か月分の0.55倍に相当する金額以内である。ただし、媒介の依頼を受けるに当たって、依頼者から承諾を得ている場合はこの限りではなく、双方から受けることのできる報酬の合計額は借賃の1か月分の1.1倍に相当する金額を超えてもよい。", "Aは、土地付建物について、売主Bから媒介を依頼され、代金300万円（消費税等相当額を含み、土地代金は80万円である。）で契約を成立させた。現地調査等の費用については、通常の売買の媒介に比べ5万円（消費税等相当額を含まない。）多く要する旨、Bに対して説明し、合意の上、媒介契約を締結した。この場合、AがBから受領できる報酬の限度額は20万200円である。"], "answer": 0, "explain": ""}, {"id": "R4-28", "year": 2022, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。", "choices": ["宅地建物取引業者が、宅地建物取引業者ではない個人から媒介業者の仲介なしに土地付建物を購入する場合、買主である宅地建物取引業者は重要事項説明書を作成しなくても宅地建物取引業法違反とはならない。", "宅地建物取引業者が、重要事項説明書を作成する際、調査不足のため、重要事項説明書に記載された内容が事実と異なるものとなったが、意図的に事実と異なる内容を記載したものではないため、宅地建物取引業法違反とはならない。", "宅地建物取引業者は、土地売買の媒介を行う場合、宅地建物取引業者ではない売主に対して契約が成立する前までの間に、宅地建物取引士をして重要事項説明書を交付して説明をさせなければならない。", "宅地又は建物の取引は権利関係や法令上の制限など取引条件に関する事項が複雑で多岐にわたるため、重要事項説明書は、宅地又は建物の取引の専門的知識を有する宅地建物取引士が作成しなければならない。"], "answer": 0, "explain": ""}, {"id": "R4-29", "year": 2022, "field": "宅建業法", "q": "宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["宅地建物取引士は、禁錮以上の刑に処せられた場合、刑に処せられた日から30日以内に、その旨を宅地建物取引士の登録を受けた都道府県知事に届け出なければならない。", "宅地建物取引士は、業務に関して事務禁止の処分を受けた場合、速やかに、宅地建物取引士証をその交付を受けた都道府県知事に提出しなければならず、これを怠った場合には罰則の適用を受けることがある。", "宅地建物取引士は、有効期間の満了日が到来する宅地建物取引士証を更新する場合、国土交通大臣が指定する講習を受講しなければならず、また、当該宅地建物取引士証の有効期間は5年である。", "宅地建物取引士は、宅地建物取引士の信用を害するような行為をしてはならず、信用を害するような行為には、宅地建物取引士の職務に必ずしも直接関係しない行為や私的な行為も含まれる。"], "answer": 2, "explain": ""}, {"id": "R4-30", "year": 2022, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）及び犯罪による収益の移転防止に関する法律の規定によれば、正しいものはいくつあるか。\nア 法第35条第2項の規定による割賦販売とは、代金の全部又は一部について、目的物の引渡し後6か月以上の期間にわたり、かつ、2回以上に分割して受領することを条件として販売することをいう。\nイ 犯罪による収益の移転防止に関する法律において、宅地建物取引業のうち、宅地若しくは建物の売買契約の締結又はその代理若しくは媒介が特定取引として規定されている。\nウ 宅地建物取引業者は、その従業者に対し、その業務を適正に実施させるため、必要な教育を行うよう努めなければならないと法に定められている。\nエ 宅地建物取引業者の使用人その他の従業者は、正当な理由がある場合でなければ、宅地建物取引業の業務を補助したことについて知り得た秘密を他に漏らしてはならないと法に定められている。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 2, "explain": ""}, {"id": "R4-31", "year": 2022, "field": "宅建業法", "q": "宅地建物取引業者Aが、BからB所有の土地付建物の売却について媒介の依頼を受けた場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["Aが、Bと一般媒介契約を締結した場合、AがBに対し当該土地付建物の価額について意見を述べるために行った価額の査定に要した費用をBに請求することはできない。", "Aは、Bとの間で締結した媒介契約が一般媒介契約である場合には、専任媒介契約の場合とは異なり、法第34条の2第1項の規定に基づく書面に、売買すべき価額を記載する必要はない。", "Aが、Bとの間で締結した専任媒介契約については、Bからの申出により更新することができ、その後の有効期間については、更新の時から3か月を超える内容に定めることができる。", "Aが、当該土地付建物の購入の媒介をCから依頼され、Cとの間で一般媒介契約を締結した場合、Aは、買主であるCに対しては、必ずしも法第34条の2第1項の規定に基づく書面を交付しなくともよい。"], "answer": 0, "explain": ""}, {"id": "R4-32", "year": 2022, "field": "宅建業法", "q": "宅地建物取引業法第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["宅地建物取引業者である売主Aは、宅地建物取引業者であるBの媒介により、宅地建物取引業者ではないCと宅地の売買契約を令和4年4月1日に締結した。AとBが共同で作成した37条書面にBの宅地建物取引士の記名押印がなされていれば、Aは37条書面にAの宅地建物取引士をして記名押印をさせる必要はない。", "宅地建物取引士は、37条書面を交付する際、買主から請求があったときは、宅地建物取引士証を提示しなければならない。", "宅地建物取引業者である売主Dと宅地建物取引業者ではないEとの建物の売買契約において、手付金の保全措置を講ずる場合、Dはその保全措置の概要を、重要事項説明書に記載し説明する必要があるが、37条書面には記載する必要はない。", "宅地建物取引業者である売主と宅地建物取引業者ではない個人との建物の売買において、建物の品質に関して契約の内容に適合しない場合におけるその不適合を担保すべき責任について特約を定めたときは、37条書面にその内容を記載しなければならない。"], "answer": 0, "explain": ""}, {"id": "R4-33", "year": 2022, "field": "宅建業法", "q": "宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア 宅地建物取引士資格試験は未成年者でも受験することができるが、宅地建物取引士の登録は成年に達するまでいかなる場合にも受けることができない。\nイ 甲県知事登録の宅地建物取引士が、宅地建物取引業者（乙県知事免許）の専任の宅地建物取引士に就任するためには、宅地建物取引士の登録を乙県に移転しなければならない。\nウ 丙県知事登録の宅地建物取引士が、事務の禁止の処分を受けた場合、丁県に所在する宅地建物取引業者の事務所の業務に従事しようとするときでも、その禁止の期間が満了するまで、宅地建物取引士の登録の移転を丁県知事に申請することができない。\nエ 戊県知事登録の宅地建物取引士が、己県へ登録の移転の申請とともに宅地建物取引士証の交付を申請した場合、己県知事が宅地建物取引士証を交付するときは、戊県で交付された宅地建物取引士証の有効期間が経過するまでの期間を有効期間とする宅地建物取引士証を交付しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "explain": ""}, {"id": "R4-34", "year": 2022, "field": "宅建業法", "q": "宅地建物取引業者が建物の売買の媒介の際に行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、誤っているものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["当該建物が既存の建物であるときは、宅地建物取引業法第34条の2第1項第4号に規定する建物状況調査を過去1年以内に実施しているかどうか、及びこれを実施している場合におけるその結果の概要を説明しなければならない。", "当該建物が宅地造成等規制法の規定により指定された造成宅地防災区域内にあるときは、その旨を説明しなければならない。", "当該建物について、石綿の使用の有無の調査の結果が記録されているときは、その内容を説明しなければならない。", "当該建物（昭和56年5月31日以前に新築の工事に着手したもの）が指定確認検査機関、建築士、登録住宅性能評価機関又は地方公共団体による耐震診断を受けたものであるときは、その旨を説明しなければならない。"], "answer": 3, "explain": ""}, {"id": "R4-35", "year": 2022, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者の従業者である宅地建物取引士は、取引の関係者から事務所で従業者証明書の提示を求められたときは、この証明書に代えて従業者名簿又は宅地建物取引士証を提示することで足りる。", "宅地建物取引業者Aが所有する甲建物を法人Bに売却するに当たり、Bが宅地建物取引業者であるか否かにかかわらず、AはBに対し、宅地建物取引士をして、法第35条の規定に基づく書面を交付し説明をさせなければならない。", "法人Cが所有する乙建物の個人Dへの賃貸を宅地建物取引業者Eが媒介し、当該賃貸借契約が成立したときは、EはDに対し、宅地建物取引士をして、法第35条の規定に基づく書面を交付し説明をさせなければならない。", "宅地建物取引業者Fが所有する丙宅地を法人Gに売却する契約を締結したとき、Gが宅地建物取引業者であるか否かにかかわらず、FはGに対し、法第37条の規定に基づく書面を交付しなければならない。"], "answer": 3, "explain": ""}, {"id": "R4-36", "year": 2022, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["建物の売買の媒介を行う場合、当該建物が既存の住宅であるときは当該建物の検査済証（宅地建物取引業法施行規則第16条の2の3第2号に定めるもの）の保存の状況について説明しなければならず、当該検査済証が存在しない場合はその旨を説明しなければならない。", "宅地の売買の媒介を行う場合、売買代金の額並びにその支払の時期及び方法について説明しなければならない。", "建物の貸借の媒介を行う場合、当該建物が、水防法施行規則第11条第1号の規定により市町村（特別区を含む。）の長が提供する図面にその位置が表示されている場合には、当該図面が存在していることを説明すれば足りる。", "自ら売主となって建物の売買契約を締結する場合、当該建物の引渡しの時期について説明しなければならない。"], "answer": 0, "explain": ""}, {"id": "R4-37", "year": 2022, "field": "宅建業法", "q": "宅地建物取引業者Aがその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはいくつあるか。\nア Aが未完成の建売住宅を販売する場合、建築基準法第6条第1項に基づく確認を受けた後、同項の変更の確認の申請書を提出している期間においては、変更の確認を受ける予定であることを表示し、かつ、当初の確認内容を合わせて表示すれば、変更の確認の内容を広告することができる。\nイ Aが新築住宅の売買に関する広告をインターネットで行った場合、実際のものより著しく優良又は有利であると人を誤認させるような表示を行ったが、当該広告について問合せや申込みがなかったときは、法第32条に定める誇大広告等の禁止の規定に違反しない。\nウ Aが一団の宅地の販売について、数回に分けて広告をするときは、そのたびごとに広告へ取引態様の別を明示しなければならず、当該広告を見た者から売買に関する注文を受けたときも、改めて取引態様の別を明示しなければならない。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 1, "explain": ""}, {"id": "R4-38", "year": 2022, "field": "宅建業法", "q": "宅地建物取引業者が自ら売主となる宅地の売買契約について、買受けの申込みを喫茶店で行った場合における宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、正しいものはどれか。", "choices": ["買受けの申込みをした者が、売買契約締結後、当該宅地の引渡しを受けた場合、クーリング・オフによる当該売買契約の解除を行うことができない。", "買受けの申込みをした者が宅地建物取引業者であった場合、クーリング・オフについて告げられていなくても、申込みを行った日から起算して8日を経過するまでは、書面により買受けの申込みの撤回をすることができる。", "売主業者の申出により、買受けの申込みをした者の勤務先で売買契約を行った場合、クーリング・オフによる当該売買契約の解除を行うことはできない。", "クーリング・オフによる売買契約の解除がなされた場合において、宅地建物取引業者は、買受けの申込みをした者に対し、速やかに、当該売買契約の締結に際し受領した手付金その他の金銭を返還しなければならない。"], "answer": 3, "explain": ""}, {"id": "R4-39", "year": 2022, "field": "宅建業法", "q": "宅地建物取引業保証協会（以下この問において「保証協会」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["保証協会は、弁済業務保証金について弁済を受ける権利を有する者から認証申出書の提出があり、認証に係る事務を処理する場合には、各月ごとに、認証申出書に記載された取引が成立した時期の順序に従ってしなければならない。", "保証協会は、当該保証協会の社員から弁済業務保証金分担金の納付を受けたときは、その納付を受けた額に相当する額の弁済業務保証金を当該社員の主たる事務所の最寄りの供託所に供託しなければならない。", "保証協会の社員が弁済業務保証金分担金を納付した後に、新たに事務所を設置したときは、その日から2週間以内に保証協会に納付すべき弁済業務保証金分担金について、国債証券をもって充てることができる。", "宅地建物取引業者と宅地の売買契約を締結した買主（宅地建物取引業者ではない。）は、当該宅地建物取引業者が保証協会の社員となる前にその取引により生じた債権に関し、当該保証協会が供託した弁済業務保証金について弁済を受ける権利を有する。"], "answer": 3, "explain": ""}, {"id": "R4-40", "year": 2022, "field": "宅建業法", "q": "建物の貸借の媒介を行う宅地建物取引業者が、その取引の相手方（宅地建物取引業者を除く。）に対して、次のアからエの発言に続けて宅地建物取引業法第35条の規定に基づく重要事項の説明を行った場合のうち、宅地建物取引業法の規定に違反しないものはいくつあるか。\nア 本日は重要事項の説明を行うためにお電話しました。お客様はIT環境をお持ちでなく映像を見ることができないとのことですので、宅地建物取引士である私が記名押印した重要事項説明書は現在お住まいの住所に郵送いたしました。このお電話にて重要事項の説明をさせていただきますので、お手元でご覧いただきながらお聞き願います。\nイ 建物の貸主が宅地建物取引業者で、代表者が宅地建物取引士であり建物の事情に詳しいことから、その代表者が作成し、記名押印した重要事項説明書がこちらになります。当社の宅地建物取引士は同席しますが、説明は貸主の代表者が担当します。\nウ この物件の担当である弊社の宅地建物取引士が本日急用のため対応できなくなりましたが、せっかくお越しいただきましたので、重要事項説明書にある宅地建物取引士欄を訂正の上、宅地建物取引士である私が記名押印をし、代わりに説明をいたします。私の宅地建物取引士証をお見せします。\nエ 本日はお客様のご希望ですので、テレビ会議を用いて重要事項の説明を行います。当社の側の音声は聞こえていますでしょうか。十分に聞き取れたとのお返事、こちらにも聞こえました。では、説明を担当する私の宅地建物取引士証をお示ししますので、画面上でご確認をいただき、私の名前を読み上げていただけますでしょうか。そうです、読み方も間違いありません。それでは、双方音声・映像ともやりとりできる状況ですので、説明を始めます。事前にお送りした私が記名押印した重要事項説明書をお手元にご用意ください。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "explain": ""}, {"id": "R4-41", "year": 2022, "field": "宅建業法", "q": "営業保証金及び宅地建物取引業保証協会（以下この問において「保証協会」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはいくつあるか。\nア 宅地建物取引業者の代表者が、その業務に関し刑法第222条（脅迫）の罪により懲役の刑に処せられたことを理由に宅地建物取引業の免許を取り消された場合、当該宅地建物取引業者であった者は、当該刑の執行を終わった日から5年間は供託した営業保証金を取り戻すことができない。\nイ 営業保証金の還付により、営業保証金が政令で定める額に不足することとなったため、国土交通大臣又は都道府県知事から不足額を供託すべき旨の通知書の送付を受けた宅地建物取引業者は、その送付を受けた日から2週間以内にその不足額を供託しなければならない。\nウ 保証協会の社員は、自らが取り扱った宅地建物取引業に係る取引の相手方から当該取引に関する苦情について解決の申出が保証協会にあり、保証協会から関係する資料の提出を求められたときは、正当な理由がある場合でなければ、これを拒んではならない。\nエ 保証協会の社員と宅地建物取引業に関し取引をした者は、その取引により生じた債権に関し、当該社員が納付した弁済業務保証金の額に相当する額の範囲内において弁済を受ける権利を有する。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "explain": ""}, {"id": "R4-42", "year": 2022, "field": "宅建業法", "q": "宅地建物取引業者Aが、BからB所有の宅地の売却を依頼され、Bと専属専任媒介契約（以下この問において「本件媒介契約」という。）を締結した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["AはBに対して、契約の相手方を探索するために行った措置など本件媒介契約に係る業務の処理状況を2週間に1回以上報告しなければならない。", "AがBに対し当該宅地の価額又は評価額について意見を述べるときは、その根拠を明らかにしなければならないが、根拠の明示は口頭でも書面を用いてもどちらでもよい。", "本件媒介契約の有効期間について、あらかじめBからの書面による申出があるときは、3か月を超える期間を定めることができる。", "Aは所定の事項を指定流通機構に登録した場合、Bから引渡しの依頼がなければ、その登録を証する書面をBに引き渡さなくてもよい。"], "answer": 1, "explain": ""}, {"id": "R4-43", "year": 2022, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として行う売買契約に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。なお、買主は宅地建物取引業者ではないものとする。", "choices": ["Aが、宅地又は建物の売買契約に際して手付を受領した場合、その手付がいかなる性質のものであっても、Aが契約の履行に着手するまでの間、買主はその手付を放棄して契約の解除をすることができる。", "Aが、土地付建物の売買契約を締結する場合において、買主との間で、「売主は、売買物件の引渡しの日から1年間に限り当該物件の種類又は品質に関して契約の内容に適合しない場合におけるその不適合を担保する責任を負う」とする旨の特約を設けることができる。", "販売代金2,500万円の宅地について、Aが売買契約の締結を行い、損害賠償の額の予定及び違約金の定めをする場合、その合計額を500万円と設定することができる。", "Aが建物の割賦販売を行った場合、当該建物を買主に引き渡し、かつ、代金の額の10分の3を超える額の支払を受けた後は、担保の目的で当該建物を譲り受けてはならない。"], "answer": 1, "explain": ""}, {"id": "R4-44", "year": 2022, "field": "宅建業法", "q": "宅地建物取引業法（以下この問において「法」という。）第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、宅地建物取引業者Aが法の規定に違反するものはどれか。", "choices": ["Aは、自ら売主として宅地建物取引業者ではないBとの間で宅地の売買契約を締結した。この際、当該買主の代理として宅地建物取引業者Cが関与していたことから、37条書面をBに加え、Cにも交付した。", "Aは、その媒介により建物の貸借の契約を成立させ、37条書面を借主に交付するに当たり、37条書面に記名した宅地建物取引士が不在であったことから、宅地建物取引士ではないAの従業員に書面を交付させた。", "Aは、その媒介により借主Dと建物の貸借の契約を成立させた。この際、借賃以外の金銭の授受に関する定めがあるので、その額や当該金銭の授受の時期だけでなく、当該金銭の授受の目的についても37条書面に記載し、Dに交付した。", "Aは、自ら売主として宅地建物取引業者Eの媒介により、宅地建物取引業者Fと宅地の売買契約を締結した。37条書面については、A、E、Fの三者で内容を確認した上で各自作成し、交付せずにそれぞれ自ら作成した書類を保管した。"], "answer": 3, "explain": ""}, {"id": "R4-45", "year": 2022, "field": "宅建業法", "q": "特定住宅瑕疵担保責任の履行の確保等に関する法律に基づく住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結に関する次の記述のうち、正しいものはどれか。", "choices": ["宅地建物取引業者は、自ら売主として宅地建物取引業者である買主との間で新築住宅の売買契約を締結し、その住宅を引き渡す場合、住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う義務を負う。", "住宅販売瑕疵担保責任保険契約は、新築住宅の引渡し時から10年以上有効でなければならないが、当該新築住宅の買主の承諾があれば、当該保険契約に係る保険期間を5年間に短縮することができる。", "自ら売主として新築住宅を販売する宅地建物取引業者は、基準日から3週間を経過する日までの間において、当該基準日前10年間に自ら売主となる売買契約に基づき宅地建物取引業者ではない買主に引き渡した新築住宅（住宅販売瑕疵担保責任保険契約に係る新築住宅を除く。）について、住宅販売瑕疵担保保証金の供託をしていなければならない。", "宅地建物取引業者が住宅販売瑕疵担保保証金の供託をし、その額が、基準日において、販売新築住宅の合計戸数を基礎として算定する基準額を超えることとなった場合、宅地建物取引業の免許を受けた国土交通大臣又は都道府県知事の承認がなくても、その超過額を取り戻すことができる。"], "answer": 2, "explain": ""}, {"id": "R4-46", "year": 2022, "field": "免除科目", "q": "独立行政法人住宅金融支援機構（以下この問において「機構」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、住宅の建設又は購入に必要な資金の貸付けに係る金融機関の貸付債権の譲受けを業務として行っているが、当該住宅の建設又は購入に付随する土地又は借地権の取得に必要な資金については、譲受けの対象としていない。", "機構は、団体信用生命保険業務において、貸付けを受けた者が死亡した場合のみならず、重度障害となった場合においても、支払われる生命保険の保険金を当該貸付けに係る債務の弁済に充当することができる。", "証券化支援事業（買取型）において、機構による譲受けの対象となる貸付債権の償還方法には、元利均等の方法であるものに加え、元金均等の方法であるものもある。", "機構は、証券化支援事業（買取型）において、MBS（資産担保証券）を発行することにより、債券市場（投資家）から資金を調達している。"], "answer": 0, "explain": ""}, {"id": "R4-47", "year": 2022, "field": "免除科目", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法（不動産の表示に関する公正競争規約を含む。）の規定によれば、正しいものはどれか。", "choices": ["物件からスーパーマーケット等の商業施設までの徒歩所要時間は、道路距離80mにつき1分間を要するものとして算出し、1分未満の端数が生じたときは、端数を切り捨てて表示しなければならない。", "インターネット上に掲載した賃貸物件の広告について、掲載直前に契約済みとなっていたとしても、消費者からの問合せに対して既に契約済みであり取引できない旨を説明すれば、不当表示に問われることはない。", "マンションの管理費について、住戸により管理費の額が異なる場合において、その全ての住宅の管理費を示すことが困難であるときは、最高額のみを表示すればよい。", "建築条件付土地の取引の広告においては、当該条件の内容、当該条件が成就しなかったときの措置の内容だけでなく、そもそも当該取引の対象が土地であることも明らかにして表示しなければならない。"], "answer": 3, "explain": ""}, {"id": "R4-49", "year": 2022, "field": "免除科目", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["台地の上の浅い谷は、豪雨時には一時的に浸水することがあり、注意を要する。", "低地は、一般に洪水や地震などに対して強く、防災的見地から住宅地として好ましい。", "埋立地は、平均海面に対し4〜5mの比高があり護岸が強固であれば、住宅地としても利用が可能である。", "国土交通省が運営するハザードマップポータルサイトでは、洪水、土砂災害、高潮、津波のリスク情報などを地図や写真に重ねて表示できる。"], "answer": 1, "explain": ""}, {"id": "R4-50", "year": 2022, "field": "免除科目", "q": "建築物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["木構造は、主要構造を木質系材料で構成するものであり、在来軸組構法での主要構造は、一般に軸組、小屋組、床組からなる。", "在来軸組構法の軸組は、通常、水平材である土台、桁、胴差と、垂直材の柱及び耐力壁からなる。", "小屋組は、屋根の骨組であり、小屋梁、小屋束、母屋、垂木等の部材を組み合わせた和小屋と、陸梁、束、方杖等の部材で形成するトラス構造の洋小屋がある。", "軸組に仕上げを施した壁には、真壁と大壁があり、真壁のみで構成する洋風構造と、大壁のみで構成する和風構造があるが、これらを併用する場合はない。"], "answer": 3, "explain": ""}, {"id": "R3-01", "year": 2021, "field": "権利関係", "q": "次の1から4までの記述のうち、民法の規定、判例及び下記判決文によれば、正しいものはどれか。\n(判決文)\n賃貸人は、特別の約定のないかぎり、賃借人から家屋明渡を受けた後に前記の敷金残額を返還すれば足りるものと解すべく、したがつて、家屋明渡債務と敷金返還債務とは同時履行の関係にたつものではないと解するのが相当であり、このことは、賃貸借の終了原因が解除(解約)による場合であつても異なるところはないと解すべきである。", "choices": ["賃借人の家屋明渡債務が賃貸人の敷金返還債務に対し先履行の関係に立つと解すべき場合、賃借人は賃貸人に対し敷金返還請求権をもって家屋につき留置権を取得する余地はない。", "賃貸借の終了に伴う賃借人の家屋明渡債務と賃貸人の敷金返還債務とは、1個の双務契約によって生じた対価的債務の関係にあるものといえる。", "賃貸借における敷金は、賃貸借の終了時点までに生じた債権を担保するものであって、賃貸人は、賃貸借終了後賃借人の家屋の明渡しまでに生じた債権を敷金から控除することはできない。", "賃貸借の終了に伴う賃借人の家屋明渡債務と賃貸人の敷金返還債務の間に同時履行の関係を肯定することは、家屋の明渡しまでに賃貸人が取得する一切の債権を担保することを目的とする敷金の性質にも適合する。"], "answer": 0, "explain": ""}, {"id": "R3-02", "year": 2021, "field": "権利関係", "q": "債務者A、B、Cの3名が、令和3年7月1日に、内部的な負担部分の割合は等しいものとして合意した上で、債権者Dに対して300万円の連帯債務を負った場合に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["DがAに対して裁判上の請求を行ったとしても、特段の合意がなければ、BとCがDに対して負う債務の消滅時効の完成には影響しない。", "BがDに対して300万円の債権を有している場合、Bが相殺を援用しない間に300万円の支払の請求を受けたCは、BのDに対する債権で相殺する旨の意思表示をすることができる。", "DがCに対して債務を免除した場合でも、特段の合意がなければ、DはAに対してもBに対しても、弁済期が到来した300万円全額の支払を請求することができる。", "AとDとの間に更改があったときは、300万円の債権は、全ての連帯債務者の利益のために消滅する。"], "answer": 1, "explain": ""}, {"id": "R3-03", "year": 2021, "field": "権利関係", "q": "個人として事業を営むAが死亡した場合に関する次の記述のうち、民法の規定によれば、誤っているものはいくつあるか。なお、いずれの契約も令和3年7月1日付けで締結されたものとする。\nア AがBとの間でB所有建物の清掃に関する準委任契約を締結していた場合、Aの相続人は、Bとの間で特段の合意をしなくても、当該準委任契約に基づく清掃業務を行う義務を負う。\nイ AがA所有の建物について賃借人Cとの間で賃貸借契約を締結している期間中にAが死亡した場合、Aの相続人は、Cに賃貸借契約を継続するか否かを相当の期間を定めて催告し、期間内に返答がなければ賃貸借契約をAの死亡を理由に解除することができる。\nウ AがA所有の土地について買主Dとの間で売買契約を締結し、当該土地の引渡しと残代金決済の前にAが死亡した場合、当該売買契約は原始的に履行が不能となって無効となる。\nエ AがE所有の建物について貸主Eとの間で使用貸借契約を締結していた場合、Aの相続人は、Eとの間で特段の合意をしなくても、当該使用貸借契約の借主の地位を相続して当該建物を使用することができる。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "explain": ""}, {"id": "R3-04", "year": 2021, "field": "権利関係", "q": "被相続人Aの配偶者Bが、A所有の建物に相続開始の時に居住していたため、遺産分割協議によって配偶者居住権を取得した場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["遺産分割協議でBの配偶者居住権の存続期間を20年と定めた場合、存続期間が満了した時点で配偶者居住権は消滅し、配偶者居住権の延長や更新はできない。", "Bは、配偶者居住権の存続期間内であれば、居住している建物の所有者の承諾を得ることなく、第三者に当該建物を賃貸することができる。", "配偶者居住権の存続期間中にBが死亡した場合、Bの相続人CはBの有していた配偶者居住権を相続する。", "Bが配偶者居住権に基づいて居住している建物が第三者Dに売却された場合、Bは、配偶者居住権の登記がなくてもDに対抗することができる。"], "answer": 0, "explain": ""}, {"id": "R3-05", "year": 2021, "field": "権利関係", "q": "次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["令和3年4月1日において18歳の者は成年であるので、その時点で、携帯電話サービスの契約や不動産の賃貸借契約を1人で締結することができる。", "養育費は、子供が未成熟であって経済的に自立することを期待することができない期間を対象として支払われるものであるから、子供が成年に達したときは、当然に養育費の支払義務が終了する。", "営業を許された未成年者が、その営業に関するか否かにかかわらず、第三者から法定代理人の同意なく負担付贈与を受けた場合には、法定代理人は当該行為を取り消すことができない。", "意思能力を有しないときに行った不動産の売買契約は、後見開始の審判を受けているか否かにかかわらず効力を有しない。"], "answer": 3, "explain": ""}, {"id": "R3-06", "year": 2021, "field": "権利関係", "q": "売買代金債権(以下この問において「債権」という。)の譲渡(令和3年7月1日に譲渡契約が行われたもの)に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["譲渡制限の意思表示がされた債権が譲渡された場合、当該債権譲渡の効力は妨げられないが、債務者は、その債権の全額に相当する金銭を供託することができる。", "債権が譲渡された場合、その意思表示の時に債権が現に発生していないときは、譲受人は、その後に発生した債権を取得できない。", "譲渡制限の意思表示がされた債権の譲受人が、その意思表示がされていたことを知っていたときは、債務者は、その債務の履行を拒むことができ、かつ、譲渡人に対する弁済その他の債務を消滅させる事由をもって譲受人に対抗することができる。", "債権の譲渡は、譲渡人が債務者に通知し、又は債務者が承諾をしなければ、債務者その他の第三者に対抗することができず、その譲渡の通知又は承諾は、確定日付のある証書によってしなければ、債務者以外の第三者に対抗することができない。"], "answer": 1, "explain": ""}, {"id": "R3-07", "year": 2021, "field": "権利関係", "q": "Aを売主、Bを買主として、A所有の甲自動車を50万円で売却する契約(以下この問において「本件契約」という。)が令和3年7月1日に締結された場合に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["Bが甲自動車の引渡しを受けたが、甲自動車のエンジンに契約の内容に適合しない欠陥があることが判明した場合、BはAに対して、甲自動車の修理を請求することができる。", "Bが甲自動車の引渡しを受けたが、甲自動車に契約の内容に適合しない修理不能な損傷があることが判明した場合、BはAに対して、売買代金の減額を請求することができる。", "Bが引渡しを受けた甲自動車が故障を起こしたときは、修理が可能か否かにかかわらず、BはAに対して、修理を請求することなく、本件契約の解除をすることができる。", "甲自動車について、第三者CがA所有ではなくC所有の自動車であると主張しており、Bが所有権を取得できないおそれがある場合、Aが相当の担保を供したときを除き、BはAに対して、売買代金の支払を拒絶することができる。"], "answer": 2, "explain": ""}, {"id": "R3-08", "year": 2021, "field": "権利関係", "q": "Aが1人で居住する甲建物の保存に瑕疵があったため、令和3年7月1日に甲建物の壁が崩れて通行人Bがケガをした場合(以下この問において「本件事故」という。)における次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["Aが甲建物をCから賃借している場合、Aは甲建物の保存の瑕疵による損害の発生の防止に必要な注意をしなかったとしても、Bに対して不法行為責任を負わない。", "Aが甲建物を所有している場合、Aは甲建物の保存の瑕疵による損害の発生の防止に必要な注意をしたとしても、Bに対して不法行為責任を負う。", "本件事故について、AのBに対する不法行為責任が成立する場合、BのAに対する損害賠償請求権は、B又はBの法定代理人が損害又は加害者を知らないときでも、本件事故の時から20年間行使しないときには時効により消滅する。", "本件事故について、AのBに対する不法行為責任が成立する場合、BのAに対する損害賠償請求権は、B又はBの法定代理人が損害及び加害者を知った時から5年間行使しないときには時効により消滅する。"], "answer": 0, "explain": ""}, {"id": "R3-09", "year": 2021, "field": "権利関係", "q": "Aには死亡した夫Bとの間に子Cがおり、Dには離婚した前妻Eとの間に子F及び子Gがいる。Fの親権はEが有し、Gの親権はDが有している。AとDが婚姻した後にDが令和3年7月1日に死亡した場合における法定相続分として、民法の規定によれば、正しいものはどれか。", "choices": ["Aが2分の1、Fが4分の1、Gが4分の1", "Aが2分の1、Cが6分の1、Fが6分の1、Gが6分の1", "Aが2分の1、Gが2分の1", "Aが2分の1、Cが4分の1、Gが4分の1"], "answer": 0, "explain": ""}, {"id": "R3-10", "year": 2021, "field": "権利関係", "q": "AとBとの間で、Aを売主、Bを買主とする、等価値の美術品甲又は乙のいずれか選択によって定められる美術品の売買契約(以下この問において「本件契約」という。)が令和3年7月1日に締結された場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["本件契約において、給付の目的を甲にするか乙にするかについて、第三者Cを選択権者とする合意がなされた場合、Cが選択をすることができないときは、選択権はBに移転する。", "本件契約において、給付の目的を甲にするか乙にするかについて、Aを選択権者とする合意がなされた後に、Aの失火により甲が全焼したときは、給付の目的物は乙となる。", "本件契約において、給付の目的を甲にするか乙にするかについての選択権に関する特段の合意がない場合、Bが選択権者となる。", "本件契約において、給付の目的を甲にするか乙にするかについて、第三者Dを選択権者とする合意がなされた場合、Dが選択権を行使するときは、AとBの両者に対して意思表示をしなければならない。"], "answer": 1, "explain": ""}, {"id": "R3-11", "year": 2021, "field": "権利関係", "q": "Aは、所有している甲土地につき、Bとの間で建物所有を目的とする賃貸借契約(以下この問において「借地契約」という。)を締結する予定であるが、期間が満了した時点で、確実に借地契約が終了するようにしたい。この場合に関する次の記述のうち、借地借家法の規定によれば、誤っているものはどれか。", "choices": ["事業の用に供する建物を所有する目的とし、期間を60年と定める場合には、契約の更新や建物の築造による存続期間の延長がない旨を書面で合意すれば、公正証書で合意しなくても、その旨を借地契約に定めることができる。", "居住の用に供する建物を所有することを目的とする場合には、公正証書によって借地契約を締結するときであっても、期間を20年とし契約の更新や建物の築造による存続期間の延長がない旨を借地契約に定めることはできない。", "居住の用に供する建物を所有することを目的とする場合には、借地契約を書面で行えば、借地権を消滅させるため、借地権の設定から20年が経過した日に甲土地上の建物の所有権を相当の対価でBからAに移転する旨の特約を有効に定めることができる。", "借地契約がBの臨時設備の設置その他一時使用のためになされることが明らかである場合には、期間を5年と定め、契約の更新や建物の築造による存続期間の延長がない旨を借地契約に定めることができる。"], "answer": 2, "explain": ""}, {"id": "R3-12", "year": 2021, "field": "権利関係", "q": "Aを賃貸人、Bを賃借人とする甲建物の賃貸借契約(以下この問において「本件契約」という。)が令和3年7月1日に締結された場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。", "choices": ["本件契約について期間の定めをしなかった場合、AはBに対して、いつでも解約の申入れをすることができ、本件契約は、解約の申入れの日から3月を経過することによって終了する。", "甲建物がBに引き渡された後、甲建物の所有権がAからCに移転した場合、本件契約の敷金は、他に特段の合意がない限り、BのAに対する未払賃料債務に充当され、残額がCに承継される。", "甲建物が適法にBからDに転貸されている場合、AがDに対して本件契約が期間満了によって終了する旨の通知をしたときは、建物の転貸借は、その通知がされた日から3月を経過することによって終了する。", "本件契約が借地借家法第38条の定期建物賃貸借契約で、期間を5年、契約の更新がない旨を定めた場合、Aは、期間満了の1年前から6月前までの間に、Bに対し賃貸借が終了する旨の通知をしなければ、従前の契約と同一条件で契約を更新したものとみなされる。"], "answer": 1, "explain": ""}, {"id": "R3-13", "year": 2021, "field": "権利関係", "q": "建物の区分所有等に関する法律(以下この問において「法」という。)に関する次の記述のうち、誤っているものはどれか。", "choices": ["法又は規約により集会において決議をすべき場合において、区分所有者が1人でも反対するときは、集会を開催せずに書面によって決議をすることはできない。", "形状又は効用の著しい変更を伴う共用部分の変更については、区分所有者及び議決権の各4分の3以上の多数による集会の決議で決するものであるが、規約でこの区分所有者の定数を過半数まで減ずることができる。", "敷地利用権が数人で有する所有権その他の権利である場合には、規約に別段の定めがあるときを除いて、区分所有者は、その有する専有部分とその専有部分に係る敷地利用権とを分離して処分することができない。", "各共有者の共用部分の持分は、規約に別段の定めがある場合を除いて、その有する専有部分の床面積の割合によるが、この床面積は壁その他の区画の中心線で囲まれた部分の水平投影面積である。"], "answer": 3, "explain": ""}, {"id": "R3-14", "year": 2021, "field": "権利関係", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、正しいものはどれか。", "choices": ["所有権の登記の抹消は、所有権の移転の登記がある場合においても、所有権の登記名義人が単独で申請することができる。", "登記の申請をする者の委任による代理人の権限は、本人の死亡によって消滅する。", "法人の合併による権利の移転の登記は、登記権利者が単独で申請することができる。", "信託の登記は、受託者が単独で申請することができない。"], "answer": 2, "explain": ""}, {"id": "R3-15", "year": 2021, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。", "choices": ["地区計画については、都市計画に、当該地区計画の目標を定めるよう努めるものとされている。", "地区計画については、都市計画に、区域の面積を定めるよう努めるものとされている。", "地区整備計画においては、市街化区域と市街化調整区域との区分の決定の有無を定めることができる。", "地区整備計画においては、建築物の建蔽率の最高限度を定めることができる。"], "answer": 2, "explain": ""}, {"id": "R3-16", "year": 2021, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。ただし、許可を要する開発行為の面積については、条例による定めはないものとし、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["市街化区域において、都市公園法に規定する公園施設である建築物の建築を目的とした5,000m²の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "首都圏整備法に規定する既成市街地内にある市街化区域において、住宅の建築を目的とした800m²の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "準都市計画区域において、商業施設の建築を目的とした2,000m²の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "区域区分が定められていない都市計画区域において、土地区画整理事業の施行として行う8,000m²の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。"], "answer": 1, "explain": ""}, {"id": "R3-17", "year": 2021, "field": "法令上の制限", "q": "建築基準法に関する次の記述のうち、正しいものはどれか。", "choices": ["居室の内装の仕上げには、ホルムアルデヒドを発散させる建築材料を使用することが認められていない。", "4階建ての共同住宅の敷地内には、避難階に設けた屋外への出口から道又は公園、広場その他の空地に通ずる幅員が2m以上の通路を設けなければならない。", "防火地域又は準防火地域内にある建築物で、外壁が防火構造であるものについては、その外壁を隣地境界線に接して設けることができる。", "建築主は、3階建ての木造の共同住宅を新築する場合において、特定行政庁が、安全上、防火上及び避難上支障がないと認めたときは、検査済証の交付を受ける前においても、仮に、当該共同住宅を使用することができる。"], "answer": 3, "explain": ""}, {"id": "R3-18", "year": 2021, "field": "法令上の制限", "q": "次の記述のうち、建築基準法の規定によれば、誤っているものはどれか。", "choices": ["都市計画により建蔽率の限度が10分の6と定められている近隣商業地域において、準防火地域内にある耐火建築物で、街区の角にある敷地又はこれに準ずる敷地で特定行政庁が指定するものの内にある建築物については、建蔽率の限度が10分の8となる。", "市町村は、集落地区計画の区域において、用途地域における用途の制限を補完し、当該区域の特性にふさわしい土地利用の増進等の目的を達成するため必要と認める場合においては、国土交通大臣の承認を得て、当該区域における用途制限を緩和することができる。", "居住環境向上用途誘導地区内においては、公益上必要な一定の建築物を除き、建築物の建蔽率は、居住環境向上用途誘導地区に関する都市計画において建築物の建蔽率の最高限度が定められたときは、当該最高限度以下でなければならない。", "都市計画区域内のごみ焼却場の用途に供する建築物について、特定行政庁が建築基準法第51条に規定する都市計画審議会の議を経てその敷地の位置が都市計画上支障がないと認めて許可した場合においては、都市計画においてその敷地の位置が決定しているものでなくても、新築することができる。"], "answer": 1, "explain": ""}, {"id": "R3-19", "year": 2021, "field": "法令上の制限", "q": "宅地造成等規制法(以下この問において「法」という。)に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["宅地造成工事規制区域内において、宅地を造成するために切土をする土地の面積が500m²であって盛土を生じない場合、切土をした部分に生じる崖の高さが1.5mであれば、都道府県知事の法第8条第1項本文の工事の許可は不要である。", "都道府県知事は、法第8条第1項本文の工事の許可の申請があった場合においては、遅滞なく、文書をもって許可又は不許可の処分を申請者に通知しなければならない。", "都道府県知事は、一定の場合には都道府県(地方自治法に基づく指定都市、中核市又は施行時特例市の区域にあっては、それぞれ指定都市、中核市又は施行時特例市)の規則で、宅地造成工事規制区域内において行われる宅地造成に関する工事の技術的基準を強化し、又は付加することができる。", "都道府県知事は、関係市町村長の意見を聴いて、宅地造成工事規制区域内で、宅地造成に伴う災害で相当数の居住者その他の者に危害を生ずるものの発生のおそれが大きい一団の造成宅地の区域であって一定の基準に該当するものを、造成宅地防災区域として指定することができる。"], "answer": 3, "explain": ""}, {"id": "R3-20", "year": 2021, "field": "法令上の制限", "q": "土地区画整理法に関する次の記述のうち、誤っているものはどれか。", "choices": ["換地計画において参加組合員に対して与えるべきものとして定められた宅地は、換地処分の公告があった日の翌日において、当該宅地の所有者となるべきものとして換地計画において定められた参加組合員が取得する。", "換地計画において換地を定める場合においては、換地及び従前の宅地の位置、地積、土質、水利、利用状況、環境等が照応するように定めなければならない。", "土地区画整理組合の設立の認可の公告があった日後、換地処分の公告がある日までは、施行地区内において、土地区画整理事業の施行の障害となるおそれがある土地の形質の変更を行おうとする者は、当該土地区画整理組合の許可を受けなければならない。", "土地区画整理組合の組合員は、組合員の3分の1以上の連署をもって、その代表者から理由を記載した書面を土地区画整理組合に提出して、理事又は監事の解任を請求することができる。"], "answer": 2, "explain": ""}, {"id": "R3-21", "year": 2021, "field": "法令上の制限", "q": "農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、誤っているものはどれか。", "choices": ["遺産分割によって農地を取得する場合には、法第3条第1項の許可は不要であるが、農業委員会への届出が必要である。", "法第3条第1項の許可を受けなければならない場合の売買については、その許可を受けずに農地の売買契約を締結しても、所有権移転の効力は生じない。", "砂利採取法第16条の認可を受けて市街化調整区域内の農地を砂利採取のために一時的に借り受ける場合には、法第5条第1項の許可は不要である。", "都道府県が市街化調整区域内の農地を取得して病院を建設する場合には、都道府県知事(法第4条第1項に規定する指定市町村の区域内にあってはその長)との協議が成立すれば、法第5条第1項の許可があったものとみなされる。"], "answer": 2, "explain": ""}, {"id": "R3-22", "year": 2021, "field": "法令上の制限", "q": "国土利用計画法第23条の届出(以下この問において「事後届出」という。)に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市にあってはその長をいうものとする。", "choices": ["土地売買等の契約を締結した場合には、当事者のうち当該契約による権利取得者は、その契約を締結した日の翌日から起算して3週間以内に、事後届出を行わなければならない。", "都道府県知事は、事後届出をした者に対し、その届出に係る土地に関する権利の移転若しくは設定後における土地の利用目的又は土地に関する権利の移転若しくは設定の対価の額について、当該土地を含む周辺の地域の適正かつ合理的な土地利用を図るために必要な助言をすることができる。", "事後届出が必要な土地売買等の契約を締結したにもかかわらず、所定の期間内に当該届出をしなかった者は、都道府県知事からの勧告を受けるが、罰則の適用はない。", "宅地建物取引業者Aが所有する準都市計画区域内の20,000m²の土地について、10,000m²をB市に、10,000m²を宅地建物取引業者Cに売却する契約を締結した場合、B市は事後届出を行う必要はないが、Cは一定の場合を除き事後届出を行う必要がある。"], "answer": 3, "explain": ""}, {"id": "R3-23", "year": 2021, "field": "税・その他", "q": "所得税法に関する次の記述のうち、正しいものはどれか。", "choices": ["譲渡所得の特別控除額(50万円)は、譲渡益のうち、まず、資産の取得の日以後5年以内にされた譲渡による所得で政令で定めるものに該当しないものに係る部分の金額から控除し、なお控除しきれない特別控除額がある場合には、それ以外の譲渡による所得に係る部分の金額から控除する。", "譲渡所得の金額の計算上、資産の譲渡に係る総収入金額から控除する資産の取得費には、その資産の取得時に支出した購入代金や購入手数料の金額は含まれるが、その資産の取得後に支出した設備費及び改良費の額は含まれない。", "建物の全部の所有を目的とする土地の賃借権の設定の対価として支払を受ける権利金の金額が、その土地の価額の10分の5に相当する金額を超えるときは、不動産所得として課税される。", "居住者がその取得の日以後5年以内に固定資産を譲渡した場合には、譲渡益から譲渡所得の特別控除額(50万円)を控除した後の譲渡所得の金額の2分の1に相当する金額が課税標準とされる。"], "answer": 0, "explain": ""}, {"id": "R3-24", "year": 2021, "field": "税・その他", "q": "不動産取得税に関する次の記述のうち、正しいものはどれか。", "choices": ["平成28年に新築された既存住宅(床面積210m²)を個人が自己の居住のために取得した場合、当該取得に係る不動産取得税の課税標準の算定については、当該住宅の価格から1,200万円が控除される。", "家屋が新築された日から3年を経過して、なお、当該家屋について最初の使用又は譲渡が行われない場合においては、当該家屋が新築された日から3年を経過した日において家屋の取得がなされたものとみなし、当該家屋の所有者を取得者とみなして、これに対して不動産取得税を課する。", "不動産取得税は、不動産の取得があった日の翌日から起算して2か月以内に当該不動産の所在する都道府県に申告納付しなければならない。", "不動産取得税は、不動産を取得するという比較的担税力のある機会に相当の税負担を求める観点から創設されたものであるが、不動産取得税の税率は4%を超えることができない。"], "answer": 0, "explain": ""}, {"id": "R3-25", "year": 2021, "field": "税・その他", "q": "不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、誤っているものはどれか。", "choices": ["不動産鑑定士の通常の調査の範囲では、対象不動産の価格への影響の程度を判断するための事実の確認が困難な特定の価格形成要因がある場合、鑑定評価書の利用者の利益を害するおそれがないと判断されるときに限り、当該価格形成要因について調査の範囲に係る条件を設定することができる。", "対象不動産を価格時点において再調達することを想定した場合において必要とされる適正な原価の総額を再調達原価というが、建設資材、工法等の変遷により、対象不動産の再調達原価を求めることが困難な場合には、対象不動産と同等の有用性を持つものに置き換えて求めた原価を再調達原価とみなすものとする。", "取引事例等に係る取引が特殊な事情を含み、これが当該取引事例等に係る価格等に影響を及ぼしている場合に、適切に補正することを時点修正という。", "不動産の鑑定評価によって求める賃料は、一般的には正常賃料又は継続賃料であるが、鑑定評価の依頼目的に対応した条件により限定賃料を求めることができる場合がある。"], "answer": 2, "explain": ""}, {"id": "R3-26", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として宅地建物取引業者ではない買主Bに対し建物の売却を行う場合における宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。", "choices": ["Aは、Bに対し、専任の宅地建物取引士をして説明をさせなければならない。", "Aは、Bに対し、代金以外に授受される金銭の額だけでなく、当該金銭の授受の目的についても説明しなければならない。", "Aは、Bに対し、建物の上に存する登記された権利の種類及び内容だけでなく、移転登記の申請の時期についても説明しなければならない。", "Aは、Bに対し、売買の対象となる建物の引渡しの時期について説明しなければならない。"], "answer": 1, "explain": ""}, {"id": "R3-27", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業の免許(以下この問において「免許」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["個人Aが不正の手段により免許を受けた後、免許を取り消され、その取消しの日から5年を経過した場合、その間に免許を受けることができない事由に該当することがなかったとしても、Aは再び免許を受けることはできない。", "免許を受けようとする個人Bが破産手続開始の決定を受けた後に復権を得た場合においても、Bは免許を受けることができない。", "免許を受けようとするC社の役員Dが刑法第211条(業務上過失致死傷等)の罪により地方裁判所で懲役1年の判決を言い渡された場合、当該判決に対してDが高等裁判所に控訴し裁判が係属中であっても、C社は免許を受けることができない。", "免許を受けようとするE社の役員に、宅地建物取引業法の規定に違反したことにより罰金の刑に処せられた者がいる場合、その刑の執行が終わって5年を経過しなければ、E社は免許を受けることができない。"], "answer": 3, "explain": ""}, {"id": "R3-28", "year": 2021, "field": "宅建業法", "q": "宅地建物取引士の登録(以下この問において「登録」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引士A(甲県知事登録)が、乙県に所在する宅地建物取引業者の事務所の業務に従事することとなったときは、Aは甲県知事を経由せずに、直接乙県知事に対して登録の移転を申請しなければならない。", "甲県知事の登録を受けているが宅地建物取引士証の交付を受けていないBが、宅地建物取引士としてすべき事務を行った場合、情状のいかんを問わず、甲県知事はBの登録を消除しなければならない。", "宅地建物取引士C(甲県知事登録)は、宅地建物取引業者D社を退職し、宅地建物取引業者E社に再就職したが、CはD社及びE社のいずれにおいても専任の宅地建物取引士ではないので、勤務先の変更の登録を申請しなくてもよい。", "甲県で宅地建物取引士資格試験を受け、合格したFは、乙県に転勤することとなったとしても、登録は甲県知事に申請しなければならない。"], "answer": 3, "explain": ""}, {"id": "R3-29", "year": 2021, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者は、その事務所ごとに従業者の氏名、従業者証明書番号その他国土交通省令で定める事項を記載した従業者名簿を備えなければならず、当該名簿を最終の記載をした日から5年間保存しなければならない。", "宅地建物取引業者は、一団の宅地の分譲を行う案内所において宅地の売買の契約の締結を行わない場合、その案内所には国土交通省令で定める標識を掲示しなくてもよい。", "宅地建物取引業者が、一団の宅地の分譲を行う案内所において宅地の売買の契約の締結を行う場合、その案内所には国土交通大臣が定めた報酬の額を掲示しなければならない。", "宅地建物取引業者は、事務所以外の継続的に業務を行うことができる施設を有する場所であっても、契約(予約を含む。)を締結せず、かつ、その申込みを受けない場合、当該場所に専任の宅地建物取引士を置く必要はない。"], "answer": 3, "explain": ""}, {"id": "R3-30", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア 宅地の販売広告において、宅地に対する将来の利用の制限について、著しく事実に相違する表示をしてはならない。\nイ 建物の貸借の媒介において広告を行った場合には、依頼者の依頼の有無にかかわらず、報酬の限度額を超えて、当該広告の料金に相当する額を受領することができる。\nウ 複数の区画がある宅地の売買について、数回に分けて広告するときは、最初に行う広告に取引態様の別を明示すれば足り、それ以降は明示する必要はない。\nエ 賃貸マンションの貸借に係る媒介の依頼を受け、媒介契約を締結した場合であっても、当該賃貸マンションが建築確認申請中であるときは広告をすることができない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "explain": ""}, {"id": "R3-31", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業保証協会(以下この問において「保証協会」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["保証協会は、当該保証協会の社員である宅地建物取引業者が社員となる前に当該宅地建物取引業者と宅地建物取引業に関し取引をした者の有するその取引により生じた債権に関し弁済業務保証金の還付が行われることにより弁済業務の円滑な運営に支障を生ずるおそれがあると認めるときは、当該社員に対し、担保の提供を求めることができる。", "保証協会の社員である宅地建物取引業者は、取引の相手方から宅地建物取引業に係る取引に関する苦情について解決の申出が当該保証協会になされ、その解決のために当該保証協会から資料の提出の求めがあったときは、正当な理由がある場合でなければ、これを拒んではならない。", "保証協会の社員である宅地建物取引業者は、当該宅地建物取引業者と宅地建物取引業に関し取引をした者の有するその取引により生じた債権に関し弁済業務保証金の還付がなされたときは、その日から2週間以内に還付充当金を保証協会に納付しなければならない。", "還付充当金の未納により保証協会の社員がその地位を失ったときは、保証協会は、直ちにその旨を当該社員であった宅地建物取引業者が免許を受けた国土交通大臣又は都道府県知事に報告しなければならない。"], "answer": 2, "explain": ""}, {"id": "R3-32", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業の免許(以下この問において「免許」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、いずれの場合も、その行為を業として営むものとする。", "choices": ["A社が、都市計画法に規定する用途地域外の土地であって、ソーラーパネルを設置するための土地の売買を媒介しようとする場合、免許は必要ない。", "B社が、土地区画整理事業の換地処分により取得した換地を住宅用地として分譲しようとする場合、免許は必要ない。", "農業協同組合Cが、組合員が所有する宅地の売却の代理をする場合、免許は必要ない。", "D社が、地方公共団体が定住促進策としてその所有する土地について住宅を建築しようとする個人に売却する取引の媒介をしようとする場合、免許は必要ない。"], "answer": 0, "explain": ""}, {"id": "R3-33", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業法第35条に規定する重要事項の説明における水防法施行規則第11条第1号の規定により市町村(特別区を含む。以下この問において同じ。)の長が提供する図面(以下この問において「水害ハザードマップ」という。)に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["宅地建物取引業者は、市町村が、取引の対象となる宅地又は建物の位置を含む水害ハザードマップを作成せず、又は印刷物の配布若しくはホームページ等への掲載等をしていないことを確認できた場合は、重要事項説明書にその旨記載し、重要事項説明の際に提示すべき水害ハザードマップが存在しない旨を説明すればよい。", "宅地建物取引業者は、市町村が取引の対象となる宅地又は建物の位置を含む「洪水」、「雨水出水(内水)」、「高潮」の水害ハザードマップを作成している場合、重要事項説明の際にいずれか1種類の水害ハザードマップを提示すればよい。", "宅地建物取引業者は、市町村が取引の対象となる宅地又は建物の位置を含む水害ハザードマップを作成している場合、売買又は交換の媒介のときは重要事項説明の際に水害ハザードマップを提示しなければならないが、貸借の媒介のときはその必要はない。", "宅地建物取引業者は、市町村が取引の対象となる宅地又は建物の位置を含む水害ハザードマップを作成している場合、重要事項説明書に水害ハザードマップを添付すれば足りる。"], "answer": 0, "explain": ""}, {"id": "R3-34", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業法の規定に基づく営業保証金に関する次の記述のうち、正しいものはどれか。", "choices": ["国土交通大臣から免許を受けた宅地建物取引業者が、営業保証金を主たる事務所のもよりの供託所に供託した場合、当該供託所から国土交通大臣にその旨が通知されるため、当該宅地建物取引業者は国土交通大臣にその旨を届け出る必要はない。", "宅地建物取引業者と宅地建物取引業に関し取引をした者は、その取引により生じた債権に関し、当該宅地建物取引業者が供託した営業保証金について、その債権の弁済を受ける権利を有するが、取引をした者が宅地建物取引業者に該当する場合は、その権利を有しない。", "営業保証金は、金銭による供託のほか、有価証券をもって供託することができるが、金銭と有価証券とを併用して供託することはできない。", "有価証券を営業保証金に充てる場合における当該有価証券の価額は、国債証券の場合はその額面金額の100分の90、地方債証券の場合はその額面金額の100分の80である。"], "answer": 1, "explain": ""}, {"id": "R3-35", "year": 2021, "field": "宅建業法", "q": "宅地建物取引士の登録(以下この問において「登録」という。)及び宅地建物取引士証に関する次の記述のうち、正しいものはいくつあるか。\nア 宅地建物取引士(甲県知事登録)が事務禁止処分を受けた場合、宅地建物取引士証を甲県知事に速やかに提出しなければならず、速やかに提出しなかったときは10万円以下の過料に処せられることがある。\nイ 宅地建物取引士(甲県知事登録)が宅地建物取引士としての事務禁止処分を受け、その禁止の期間中に本人の申請により登録が消除された場合は、その者が乙県で宅地建物取引士資格試験に合格したとしても、当該期間が満了していないときは、乙県知事の登録を受けることができない。\nウ 宅地建物取引士(甲県知事登録)が甲県から乙県に住所を変更したときは、乙県知事に対し、登録の移転の申請をすることができる。\nエ 宅地建物取引士(甲県知事登録)が本籍を変更した場合、遅滞なく、甲県知事に変更の登録を申請しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R3-36", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、同法の規定に少なくとも説明しなければならない事項として掲げられていないものはどれか。", "choices": ["建物の貸借の媒介を行う場合における、「都市計画法第29条第1項の規定に基づく制限」", "建物の貸借の媒介を行う場合における、「当該建物について、石綿の使用の有無の調査の結果が記録されているときは、その内容」", "建物の貸借の媒介を行う場合における、「台所、浴室、便所その他の当該建物の設備の整備の状況」", "宅地の貸借の媒介を行う場合における、「敷金その他いかなる名義をもって授受されるかを問わず、契約終了時において精算することとされている金銭の精算に関する事項」"], "answer": 0, "explain": ""}, {"id": "R3-37", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業法第35条の規定に基づく重要事項の説明及び同法第37条の規定により交付すべき書面(以下この問において「37条書面」という。)に関する次の記述のうち、正しいものはどれか。", "choices": ["宅地建物取引業者は、媒介により区分所有建物の賃貸借契約を成立させた場合、専有部分の用途その他の利用の制限に関する規約においてペットの飼育が禁止されているときは、その旨を重要事項説明書に記載して説明し、37条書面にも記載しなければならない。", "宅地建物取引業者は、自ら売主となる土地付建物の売買契約において、宅地建物取引業者ではない買主から保全措置を講ずる必要のない金額の手付金を受領する場合、手付金の保全措置を講じないことを、重要事項説明書に記載して説明し、37条書面にも記載しなければならない。", "宅地建物取引業者は、媒介により建物の敷地に供せられる土地の売買契約を成立させた場合において、当該売買代金以外の金銭の授受に関する定めがあるときは、その額並びに当該金銭の授受の時期及び目的を37条書面に記載しなければならない。", "宅地建物取引業者は、自ら売主となる土地付建物の売買契約及び自ら貸主となる土地付建物の賃貸借契約のいずれにおいても、37条書面を作成し、その取引の相手方に交付しなければならない。"], "answer": 2, "explain": ""}, {"id": "R3-38", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業者Aが、宅地建物取引業者Bから B所有の建物の売却を依頼され、Bと一般媒介契約(以下この問において「本件契約」という。)を締結した場合に関する次の記述のうち、宅地建物取引業法の規定に違反しないものはいくつあるか。\nア 本件契約を締結する際に、Bから有効期間を6か月としたい旨の申出があったが、AとBが協議して、有効期間を3か月とした。\nイ 当該物件に係る買受けの申込みはなかったが、AはBに対し本件契約に係る業務の処理状況の報告を口頭により14日に1回以上の頻度で行った。\nウ Aは本件契約を締結した後、所定の事項を遅滞なく指定流通機構に登録したが、その登録を証する書面を、登録してから14日後にBに交付した。\nエ 本件契約締結後、1年を経過しても当該物件を売却できなかったため、Bは売却をあきらめ、当該物件を賃貸することにした。そこでBはAと当該物件の貸借に係る一般媒介契約を締結したが、当該契約の有効期間を定めなかった。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "explain": ""}, {"id": "R3-39", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者Bの媒介により、宅地建物取引業者ではないCを買主とするマンションの売買契約を締結した場合における宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフについて告げるときに交付すべき書面(以下この問において「告知書面」という。)に関する次の記述のうち、正しいものはどれか。", "choices": ["告知書面には、クーリング・オフによる買受けの申込みの撤回又は売買契約の解除があったときは、Aは、その買受けの申込みの撤回又は売買契約の解除に伴う損害賠償又は違約金の支払を請求することができないことを記載しなければならない。", "告知書面には、クーリング・オフについて告げられた日から起算して8日を経過するまでの間は、Cが当該マンションの引渡しを受け又は代金の全部を支払った場合を除き、書面によりクーリング・オフによる買受けの申込みの撤回又は売買契約の解除を行うことができることを記載しなければならない。", "告知書面には、Cがクーリング・オフによる売買契約の解除をするときは、その旨を記載した書面がAに到達した時点で、その効力が発生することを記載しなければならない。", "告知書面には、A及びBの商号又は名称及び住所並びに免許証番号を記載しなければならない。"], "answer": 0, "explain": ""}, {"id": "R3-40", "year": 2021, "field": "宅建業法", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者は、その業務に関する帳簿を備え、取引のあったつど、その年月日、その取引に係る宅地又は建物の所在及び面積その他国土交通省令で定める事項を記載しなければならないが、支店及び案内所には備え付ける必要はない。", "成年である宅地建物取引業者は、宅地建物取引業の業務に関し行った行為について、行為能力の制限を理由に取り消すことができる。", "宅地建物取引業者は、一団の宅地建物の分譲をする場合における当該宅地又は建物の所在する場所に国土交通省令で定める標識を掲示しなければならない。", "宅地建物取引業者は、業務上取り扱ったことについて知り得た秘密に関し、税務署の職員から質問検査権の規定に基づき質問を受けたときであっても、回答してはならない。"], "answer": 2, "explain": ""}, {"id": "R3-41", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業者Aが行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、この問において「37条書面」とは、同法第37条の規定により交付すべき書面をいうものとする。\nア Aが自ら売主として建物を売却する場合、宅地建物取引業者Bに当該売却の媒介を依頼したときは、Bは宅地建物取引士をして37条書面に記名押印させなければならず、Aも宅地建物取引士をして37条書面に記名押印させなければならない。\nイ Aが自ら売主として建物を売却する場合、当該売買契約に際し、買主から支払われる手付金の額が売買代金の5%未満であるときは、当該手付金の額の記載があれば、授受の時期については37条書面に記載しなくてもよい。\nウ Aが売主を代理して建物を売却する場合、買主が宅地建物取引業者であるときは、37条書面を交付しなくてもよい。\nエ Aが売主を代理して抵当権が設定されている建物を売却する場合、当該抵当権の内容について37条書面に記載しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 0, "explain": ""}, {"id": "R3-42", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として宅地建物取引業者ではないBを買主とする土地付建物の売買契約(代金3,200万円)を締結する場合に関する次の記述のうち、民法及び宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["割賦販売の契約を締結し、当該土地付建物を引き渡した場合、Aは、Bから800万円の賦払金の支払を受けるまでに、当該土地付建物に係る所有権の移転登記をしなければならない。", "当該土地付建物の工事の完了前に契約を締結した場合、Aは、宅地建物取引業法第41条に定める手付金等の保全措置を講じなくても手付金100万円、中間金60万円を受領することができる。", "当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の予定額を400万円とし、かつ、違約金の額を240万円とする特約を定めた場合、当該特約は無効となる。", "当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の予定額を定めていない場合、債務の不履行による損害賠償の請求額は売買代金の額の10分の2を超えてはならない。"], "answer": 1, "explain": ""}, {"id": "R3-43", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業者の業務に関する次の記述のうち、宅地建物取引業法の規定に違反するものはいくつあるか。\nア マンションの販売に際して、買主が手付として必要な額を持ち合わせていなかったため、手付を分割受領することにより、契約の締結を誘引した。\nイ 宅地の売買に際して、相手方が「契約の締結をするかどうか明日まで考えさせてほしい」と申し出たのに対し、事実を歪めて「明日では契約締結できなくなるので、今日しか待てない」と告げた。\nウ マンション販売の勧誘を電話で行った際に、勧誘に先立って電話口で宅地建物取引業者の商号又は名称を名乗らずに勧誘を行った。\nエ 建物の貸借の媒介に際して、賃貸借契約の申込みをした者がその撤回を申し出たが、物件案内等に経費がかかったため、預り金を返還しなかった。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "explain": ""}, {"id": "R3-44", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業者A(消費税課税事業者)が受け取ることができる報酬額についての次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["居住の用に供する建物(1か月の借賃20万円。消費税等相当額を含まない。)の貸借であって100万円の権利金の授受があるものの媒介をする場合、依頼者双方から受領する報酬の合計額は11万円を超えてはならない。", "宅地(代金1,000万円。消費税等相当額を含まない。)の売買について、売主から代理の依頼を受け、買主から媒介の依頼を受け、売買契約を成立させて買主から303,000円の報酬を受領する場合、売主からは489,000円を上限として報酬を受領することができる。", "宅地(代金300万円。消費税等相当額を含まない。)の売買の媒介について、通常の媒介と比較して現地調査等の費用が6万円(消費税等相当額を含まない。)多く要した場合、依頼者双方から合計で44万円を上限として報酬を受領することができる。", "店舗兼住宅(1か月の借賃20万円。消費税等相当額を含まない。)の貸借の媒介をする場合、依頼者の一方から受領する報酬は11万円を超えてはならない。"], "answer": 1, "explain": ""}, {"id": "R3-45", "year": 2021, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として宅地建物取引業者ではない買主Bに新築住宅を販売する場合における次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。", "choices": ["Bが建設業者である場合、Aは、Bに引き渡した新築住宅について、住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う義務を負わない。", "Aが住宅販売瑕疵担保責任保険契約を締結する場合、当該契約は、BがAから当該新築住宅の引渡しを受けた時から2年以上の期間にわたって有効なものでなければならない。", "Aが住宅販売瑕疵担保責任保険契約を締結した場合、A及びBは、指定住宅紛争処理機関に特別住宅紛争処理の申請をすることにより、当該新築住宅の瑕疵に関するAとBとの間の紛争について、あっせん、調停又は仲裁を受けることができる。", "AB間の新築住宅の売買契約において、当該新築住宅の構造耐力上主要な部分に瑕疵があってもAが瑕疵担保責任を負わない旨の特約があった場合、住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う義務はない。"], "answer": 2, "explain": ""}, {"id": "R3-46", "year": 2021, "field": "免除科目", "q": "独立行政法人住宅金融支援機構(以下この問において「機構」という。)に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、証券化支援事業(買取型)において、賃貸住宅の購入に必要な資金の貸付けに係る金融機関の貸付債権を譲受けの対象としている。", "機構は、市街地の土地の合理的な利用に寄与する一定の建築物の建設に必要な資金の貸付けを業務として行っている。", "機構は、証券化支援事業(買取型)において、省エネルギー性に優れた住宅を取得する場合について、貸付金の利率を一定期間引き下げる制度を設けている。", "機構は、経済事情の変動に伴い、貸付けを受けた者の住宅ローンの元利金の支払が著しく困難になった場合に、償還期間の延長等の貸付条件の変更を行っている。"], "answer": 0, "explain": ""}, {"id": "R3-47", "year": 2021, "field": "免除科目", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。", "choices": ["住宅の居室の広さを畳数で表示する場合には、畳1枚当たりの広さにかかわらず、実際に当該居室に敷かれている畳の数を表示しなければならない。", "団地(一団の宅地又は建物をいう。)と駅との間の距離は、駅から最も近い当該団地内の地点を起点又は着点として算出した数値を表示しなければならず、当該団地を数区に区分して取引するときは各区分ごとに距離を算出して表示しなければならない。", "新築分譲マンションを完成予想図により表示する場合、完成予想図である旨を表示すれば、緑豊かな環境であることを訴求するために周囲に存在しない公園等を表示することができる。", "新築分譲住宅の販売に当たって行う二重価格表示は、実際に過去において販売価格として公表していた価格を比較対照価格として用いて行うのであれば、値下げの時期から1年以内の期間は表示することができる。"], "answer": 1, "explain": ""}, {"id": "R3-48", "year": 2021, "field": "免除科目", "q": "次の記述のうち、正しいものはどれか。", "choices": ["建築着工統計(令和3年1月公表)によれば、令和2年1月から令和2年12月までの新設住宅着工戸数は約81.5万戸となり、4年ぶりに増加に転じた。", "令和3年版土地白書(令和3年6月公表)によれば、土地取引について、売買による所有権移転登記の件数でその動向を見ると、令和2年の全国の土地取引件数は約128万件となり、5年連続の増加となっている。", "令和3年地価公示(令和3年3月公表)によれば、令和2年1月以降の1年間の地価の変動を見ると、全国平均の用途別では、住宅地及び商業地は下落に転じたが、工業地は5年連続の上昇となっている。", "年次別法人企業統計調査(令和元年度。令和2年10月公表)によれば、令和元年度における不動産業の営業利益は約5兆円を超え、前年度を上回った。"], "answer": 2, "explain": ""}, {"id": "R3-49", "year": 2021, "field": "免除科目", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["森林は、木材資源としても重要で、水源涵養、洪水防止等の大きな役割を担っている。", "活動度の高い火山の火山麓では、火山活動に伴う災害にも留意する必要がある。", "林相は良好でも、破砕帯や崖錐等の上の杉の植林地は、豪雨に際して崩壊することがある。", "崖錐や小河川の出口で堆積物の多い所等は、土石流の危険が少ない。"], "answer": 3, "explain": ""}, {"id": "R3-50", "year": 2021, "field": "免除科目", "q": "建物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["鉄骨構造は、主要構造の構造形式にトラス、ラーメン、アーチ等が用いられ、高層建築の骨組に適している。", "鉄骨構造の床は既製気泡コンクリート板、プレキャストコンクリート板等でつくられる。", "鉄骨構造は、耐火被覆や鋼材の加工性の問題があり、現在は住宅、店舗等の建物には用いられていない。", "鉄骨構造は、工場、体育館、倉庫等の単層で大空間の建物に利用されている。"], "answer": 2, "explain": ""}, {"id": "R2-01", "year": 2020, "field": "権利関係", "q": "Aが購入した甲土地が他の土地に囲まれて公道に通じない土地であった場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["甲土地が共有物の分割によって公道に通じない土地となっていた場合には、Aは公道に至るために他の分割者の所有地を、償金を支払うことなく通行することができる。", "Aは公道に至るため甲土地を囲んでいる土地を通行する権利を有するところ、Aが自動車を所有していても、自動車による通行権が認められることはない。", "Aが、甲土地を囲んでいる土地の一部である乙土地を公道に出るための通路にする目的で賃借した後、甲土地をBに売却した場合には、乙土地の賃借権は甲土地の所有権に従たるものとして甲土地の所有権とともにBに移転する。", "Cが甲土地を囲む土地の所有権を時効により取得した場合には、AはCが時効取得した土地を公道に至るために通行することができなくなる。"], "answer": 0, "explain": ""}, {"id": "R2-02", "year": 2020, "field": "権利関係", "q": "令和2年7月1日に下記ケース①及びケース②の保証契約を締結した場合に関する次の1から4までの記述のうち、民法の規定によれば、正しいものはどれか。\n(ケース①)　個人Aが金融機関Bから事業資金として1,000万円を借り入れ、CがBとの間で当該債務に係る保証契約を締結した場合\n(ケース②)　個人Aが建物所有者Dと居住目的の建物賃貸借契約を締結し、EがDとの間で当該賃貸借契約に基づくAの一切の債務に係る保証契約を締結した場合", "choices": ["ケース①の保証契約は、口頭による合意でも有効であるが、ケース②の保証契約は、書面でしなければ効力を生じない。", "ケース①の保証契約は、Cが個人でも法人でも極度額を定める必要はないが、ケース②の保証契約は、Eが個人でも法人でも極度額を定めなければ効力を生じない。", "ケース①及びケース②の保証契約がいずれも連帯保証契約である場合、BがCに債務の履行を請求したときはCは催告の抗弁を主張することができるが、DがEに債務の履行を請求したときはEは催告の抗弁を主張することができない。", "保証人が保証契約締結の日前1箇月以内に公正証書で保証債務を履行する意思を表示していない場合、ケース①のCがAの事業に関与しない個人であるときはケース①の保証契約は効力を生じないが、ケース②の保証契約は有効である。"], "answer": 3, "explain": ""}, {"id": "R2-03", "year": 2020, "field": "権利関係", "q": "次の1から4までの契約に関する記述のうち、民法の規定及び下記判決文によれば、誤っているものはどれか。なお、これらの契約は令和2年4月1日以降に締結されたものとする。\n(判決文)\n法律が債務の不履行による契約の解除を認める趣意は、契約の要素をなす債務の履行がないために、該契約をなした目的を達することができない場合を救済するためであり、当事者が契約をなした主たる目的の達成に必須的でない附随的義務の履行を怠ったに過ぎないような場合には、特段の事情の存しない限り、相手方は当該契約を解除することができないものと解するのが相当である。", "choices": ["土地の売買契約において、売主が負担した当該土地の税金相当額を買主が償還する付随的義務が定められ、買主が売買代金を支払っただけで税金相当額を償還しなかった場合、特段の事情がない限り、売主は当該売買契約の解除をすることができない。", "債務者が債務を履行しない場合であっても、債務不履行について債務者の責めに帰すべき事由がないときは付随的義務の不履行となり、特段の事情がない限り、債権者は契約の解除をすることができない。", "債務不履行に対して債権者が相当の期間を定めて履行を催告してその期間内に履行がなされない場合であっても、催告期間が経過した時における債務不履行がその契約及び取引上の社会通念に照らして軽微であるときは、債権者は契約の解除をすることができない。", "債務者が債務を履行しない場合であって、債務者がその債務の全部の履行を拒絶する意思を明確に表示したときは、債権者は、相当の期間を定めてその履行を催告することなく、直ちに契約の解除をすることができる。"], "answer": 1, "explain": ""}, {"id": "R2-04", "year": 2020, "field": "権利関係", "q": "建物の賃貸借契約が期間満了により終了した場合における次の記述のうち、民法の規定によれば、正しいものはどれか。なお、賃貸借契約は、令和2年7月1日付けで締結され、原状回復義務について特段の合意はないものとする。", "choices": ["賃借人は、賃借物を受け取った後にこれに生じた損傷がある場合、通常の使用及び収益によって生じた損耗も含めてその損傷を原状に復する義務を負う。", "賃借人は、賃借物を受け取った後にこれに生じた損傷がある場合、賃借人の帰責事由の有無にかかわらず、その損傷を原状に復する義務を負う。", "賃借人から敷金の返還請求を受けた賃貸人は、賃貸物の返還を受けるまでは、これを拒むことができる。", "賃借人は、未払賃料債務がある場合、賃貸人に対し、敷金をその債務の弁済に充てるよう請求することができる。"], "answer": 2, "explain": ""}, {"id": "R2-05", "year": 2020, "field": "権利関係", "q": "AとBとの間で令和2年7月1日に締結された委任契約において、委任者Aが受任者Bに対して報酬を支払うこととされていた場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["Aの責めに帰すべき事由によって履行の途中で委任が終了した場合、Bは報酬全額をAに対して請求することができるが、自己の債務を免れたことによって得た利益をAに償還しなければならない。", "Bは、契約の本旨に従い、自己の財産に対するのと同一の注意をもって委任事務を処理しなければならない。", "Bの責めに帰すべき事由によって履行の途中で委任が終了した場合、BはAに対して報酬を請求することができない。", "Bが死亡した場合、Bの相続人は、急迫の事情の有無にかかわらず、受任者の地位を承継して委任事務を処理しなければならない。"], "answer": 0, "explain": ""}, {"id": "R2-06", "year": 2020, "field": "権利関係", "q": "AとBとの間で令和2年7月1日に締結された売買契約に関する次の記述のうち、民法の規定によれば、売買契約締結後、AがBに対し、錯誤による取消しができるものはどれか。", "choices": ["Aは、自己所有の自動車を100万円で売却するつもりであったが、重大な過失によりBに対し「10万円で売却する」と言ってしまい、Bが過失なく「Aは本当に10万円で売るつもりだ」と信じて購入を申し込み、AB間に売買契約が成立した場合", "Aは、自己所有の時価100万円の壺を10万円程度であると思い込み、Bに対し「手元にお金がないので、10万円で売却したい」と言ったところ、BはAの言葉を信じ「それなら10万円で購入する」と言って、AB間に売買契約が成立した場合", "Aは、自己所有の時価100万円の名匠の絵画を贋作だと思い込み、Bに対し「贋作であるので、10万円で売却する」と言ったところ、Bも同様に贋作だと思い込み「贋作なら10万円で購入する」と言って、AB間に売買契約が成立した場合", "Aは、自己所有の腕時計を100万円で外国人Bに売却する際、当日の正しい為替レート（1ドル100円）を重大な過失により1ドル125円で計算して「8,000ドルで売却する」と言ってしまい、Aの錯誤について過失なく知らなかったBが「8,000ドルなら買いたい」と言って、AB間に売買契約が成立した場合"], "answer": 2, "explain": ""}, {"id": "R2-07", "year": 2020, "field": "権利関係", "q": "保証に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。なお、保証契約は令和2年4月1日以降に締結されたものとする。", "choices": ["特定物売買における売主の保証人は、特に反対の意思表示がない限り、売主の債務不履行により契約が解除された場合には、原状回復義務である既払代金の返還義務についても保証する責任がある。", "主たる債務の目的が保証契約の締結後に加重されたときは、保証人の負担も加重され、主たる債務者が時効の利益を放棄すれば、その効力は連帯保証人に及ぶ。", "委託を受けた保証人が主たる債務の弁済期前に債務の弁済をしたが、主たる債務者が当該保証人からの求償に対して、当該弁済日以前に相殺の原因を有していたことを主張するときは、保証人は、債権者に対し、その相殺によって消滅すべきであった債務の履行を請求することができる。", "委託を受けた保証人は、履行の請求を受けた場合だけでなく、履行の請求を受けずに自発的に債務の消滅行為をする場合であっても、あらかじめ主たる債務者に通知をしなければ、同人に対する求償が制限されることがある。"], "answer": 1, "explain": ""}, {"id": "R2-08", "year": 2020, "field": "権利関係", "q": "相続（令和2年7月1日に相続の開始があったもの）に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["相続回復の請求権は、相続人又はその法定代理人が相続権を侵害された事実を知った時から5年間行使しないときは、時効によって消滅する。", "被相続人の子が相続開始以前に死亡したときは、その者の子がこれを代襲して相続人となるが、さらに代襲者も死亡していたときは、代襲者の子が相続人となることはない。", "被相続人に相続人となる子及びその代襲相続人がおらず、被相続人の直系尊属が相続人となる場合には、被相続人の兄弟姉妹が相続人となることはない。", "被相続人の兄弟姉妹が相続人となるべき場合であっても、相続開始以前に兄弟姉妹及びその子がいずれも死亡していたときは、その者の子（兄弟姉妹の孫）が相続人となることはない。"], "answer": 1, "explain": ""}, {"id": "R2-09", "year": 2020, "field": "権利関係", "q": "Aがその所有する甲建物について、Bとの間で、①Aを売主、Bを買主とする売買契約を締結した場合と、②Aを贈与者、Bを受贈者とする負担付贈与契約を締結した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、これらの契約は、令和2年7月1日に締結され、担保責任に関する特約はないものとする。", "choices": ["①の契約において、Bが手付を交付し、履行期の到来後に代金支払の準備をしてAに履行の催告をした場合、Aは、手付の倍額を現実に提供して契約の解除をすることができる。", "②の契約が書面によらずになされた場合、Aは、甲建物の引渡し及び所有権移転登記の両方が終わるまでは、書面によらないことを理由に契約の解除をすることができる。", "②の契約については、Aは、その負担の限度において、売主と同じく担保責任を負う。", "①の契約については、Bの債務不履行を理由としてAに解除権が発生する場合があるが、②の契約については、Bの負担の不履行を理由としてAに解除権が発生することはない。"], "answer": 2, "explain": ""}, {"id": "R2-10", "year": 2020, "field": "権利関係", "q": "Aが甲土地を所有している場合の時効に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Bが甲土地を所有の意思をもって平穏かつ公然に17年間占有した後、CがBを相続し甲土地を所有の意思をもって平穏かつ公然に3年間占有した場合、Cは甲土地の所有権を時効取得することができる。", "Dが、所有者と称するEから、Eが無権利者であることについて善意無過失で甲土地を買い受け、所有の意思をもって平穏かつ公然に3年間占有した後、甲土地がAの所有であることに気付いた場合、そのままさらに7年間甲土地の占有を継続したとしても、Dは、甲土地の所有権を時効取得することはできない。", "Dが、所有者と称するEから、Eが無権利者であることについて善意無過失で甲土地を買い受け、所有の意思をもって平穏かつ公然に3年間占有した後、甲土地がAの所有であることを知っているFに売却し、Fが所有の意思をもって平穏かつ公然に甲土地を7年間占有した場合、Fは甲土地の所有権を時効取得することができる。", "Aが甲土地を使用しないで20年以上放置していたとしても、Aの有する甲土地の所有権が消滅時効にかかることはない。"], "answer": 1, "explain": ""}, {"id": "R2-11", "year": 2020, "field": "権利関係", "q": "A所有の甲土地につき、令和2年7月1日にBとの間で居住の用に供する建物の所有を目的として存続期間30年の約定で賃貸借契約（以下この問において「本件契約」という。）が締結された場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。", "choices": ["Bは、借地権の登記をしていなくても、甲土地の引渡しを受けていれば、甲土地を令和2年7月2日に購入したCに対して借地権を主張することができる。", "本件契約で「一定期間は借賃の額の増減を行わない」旨を定めた場合には、甲土地の借賃が近傍類似の土地の借賃と比較して不相当となったときであっても、当該期間中は、AもBも借賃の増減を請求することができない。", "本件契約で「Bの債務不履行により賃貸借契約が解除された場合には、BはAに対して建物買取請求権を行使することができない」旨を定めても、この合意は無効となる。", "AとBとが期間満了に当たり本件契約を最初に更新する場合、更新後の存続期間を15年と定めても、20年となる。"], "answer": 3, "explain": ""}, {"id": "R2-12", "year": 2020, "field": "権利関係", "q": "AとBとの間でA所有の甲建物をBに対して、居住の用を目的として、期間2年、賃料月額10万円で賃貸する旨の賃貸借契約（以下この問において「本件契約」という。）を締結し、Bが甲建物の引渡しを受けた場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、誤っているものはどれか。", "choices": ["AがCに甲建物を売却した場合、Bは、それまでに契約期間中の賃料全額をAに前払いしていたことを、Cに対抗することができる。", "本件契約が借地借家法第38条の定期建物賃貸借契約であって、賃料改定に関する特約がない場合、経済事情の変動により賃料が不相当となったときは、AはBに対し、賃料増額請求をすることができる。", "本件契約が借地借家法第38条の定期建物賃貸借契約である場合、Aは、転勤、療養、親族の介護その他のやむを得ない事情があれば、Bに対し、解約を申し入れ、申入れの日から1月を経過することによって、本件契約を終了させることができる。", "本件契約が借地借家法第38条の定期建物賃貸借契約であって、造作買取請求に関する特約がない場合、期間満了で本件契約が終了するときに、Bは、Aの同意を得て甲建物に付加した造作について買取請求をすることができる。"], "answer": 2, "explain": ""}, {"id": "R2-13", "year": 2020, "field": "権利関係", "q": "建物の区分所有等に関する法律に関する次の記述のうち、正しいものはどれか。", "choices": ["共用部分の変更（その形状又は効用の著しい変更を伴わないものを除く。）は、区分所有者及び議決権の各4分の3以上の多数による集会の決議で決めるが、この区分所有者の定数は、規約で2分の1以上の多数まで減ずることができる。", "共用部分の管理に係る費用については、規約に別段の定めがない限り、共有者で等分する。", "共用部分の保存行為をするには、規約に別段の定めがない限り、集会の決議で決める必要があり、各共有者ですることはできない。", "一部共用部分は、これを共用すべき区分所有者の共有に属するが、規約で別段の定めをすることにより、区分所有者全員の共有に属するとすることもできる。"], "answer": 3, "explain": ""}, {"id": "R2-14", "year": 2020, "field": "権利関係", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、正しいものはどれか。", "choices": ["敷地権付き区分建物の表題部所有者から所有権を取得した者は、当該敷地権の登記名義人の承諾を得なければ、当該区分建物に係る所有権の保存の登記を申請することができない。", "所有権に関する仮登記に基づく本登記は、登記上の利害関係を有する第三者がある場合であっても、その承諾を得ることなく、申請することができる。", "債権者Aが債務者Bに代位して所有権の登記名義人CからBへの所有権の移転の登記を申請した場合において、当該登記を完了したときは、登記官は、Aに対し、当該登記に係る登記識別情報を通知しなければならない。", "配偶者居住権は、登記することができる権利に含まれない。"], "answer": 0, "explain": ""}, {"id": "R2-15", "year": 2020, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。", "choices": ["地区計画については、都市計画に、地区施設及び地区整備計画を定めるよう努めるものとされている。", "都市計画事業の認可の告示があった後に当該認可に係る事業地内の土地建物等を有償で譲り渡そうとする者は、施行者の許可を受けなければならない。", "第二種住居地域は、中高層住宅に係る良好な住居の環境を保護するため定める地域とされている。", "市街化調整区域における地区計画は、市街化区域における市街化の状況等を勘案して、地区計画の区域の周辺における市街化を促進することがない等当該都市計画区域における計画的な市街化を図る上で支障がないように定めることとされている。"], "answer": 3, "explain": ""}, {"id": "R2-16", "year": 2020, "field": "法令上の制限", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["開発許可を申請しようとする者は、あらかじめ、開発行為又は開発行為に関する工事により設置される公共施設を管理することとなる者と協議しなければならない。", "都市計画事業の施行として行う建築物の新築であっても、市街化調整区域のうち開発許可を受けた開発区域以外の区域内においては、都道府県知事の許可を受けなければ、建築物の新築をすることができない。", "開発許可を受けた開発行為により公共施設が設置されたときは、その公共施設は、工事完了の公告の日の翌日において、原則としてその公共施設の存する市町村の管理に属するものとされている。", "開発許可を受けた者から当該開発区域内の土地の所有権を取得した者は、都道府県知事の承認を受けて、当該開発許可を受けた者が有していた当該開発許可に基づく地位を承継することができる。"], "answer": 1, "explain": ""}, {"id": "R2-17", "year": 2020, "field": "法令上の制限", "q": "建築基準法に関する次の記述のうち、正しいものはどれか。", "choices": ["階数が2で延べ面積が200m²の鉄骨造の共同住宅の大規模の修繕をしようとする場合、建築主は、当該工事に着手する前に、確認済証の交付を受けなければならない。", "居室の天井の高さは、一室で天井の高さの異なる部分がある場合、室の床面から天井の最も低い部分までの高さを2.1m以上としなければならない。", "延べ面積が1,000m²を超える準耐火建築物は、防火上有効な構造の防火壁又は防火床によって有効に区画し、かつ、各区画の床面積の合計をそれぞれ1,000m²以内としなければならない。", "高さ30mの建築物には、非常用の昇降機を設けなければならない。"], "answer": 0, "explain": ""}, {"id": "R2-18", "year": 2020, "field": "法令上の制限", "q": "建築基準法に関する次の記述のうち、正しいものはどれか。", "choices": ["公衆便所及び巡査派出所については、特定行政庁の許可を得ないで、道路に突き出して建築することができる。", "近隣商業地域内において、客席の部分の床面積の合計が200m²以上の映画館は建築することができない。", "建築物の容積率の算定の基礎となる延べ面積には、老人ホームの共用の廊下又は階段の用に供する部分の床面積は、算入しないものとされている。", "日影による中高層の建築物の高さの制限に係る日影時間の測定は、夏至日の真太陽時の午前8時から午後4時までの間について行われる。"], "answer": 2, "explain": ""}, {"id": "R2-19", "year": 2020, "field": "法令上の制限", "q": "宅地造成等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["土地の占有者又は所有者は、都道府県知事又はその命じた者若しくは委任した者が、宅地造成工事規制区域の指定のために当該土地に立ち入って測量又は調査を行う場合、正当な理由がない限り、立入りを拒み、又は妨げてはならない。", "宅地を宅地以外の土地にするために行う土地の形質の変更は、宅地造成に該当しない。", "宅地造成工事規制区域内において、宅地以外の土地を宅地に転用する者は、宅地造成に関する工事を行わない場合でも、都道府県知事の許可を受けなければならない。", "宅地造成に関する工事の許可を受けた者が、工事施行者を変更する場合には、遅滞なくその旨を都道府県知事に届け出ればよく、改めて許可を受ける必要はない。"], "answer": 2, "explain": ""}, {"id": "R2-20", "year": 2020, "field": "法令上の制限", "q": "土地区画整理組合（以下この問において「組合」という。）に関する次の記述のうち、土地区画整理法の規定によれば、正しいものはどれか。", "choices": ["組合の設立認可を申請しようとする者は、施行地区となるべき区域内の宅地について借地権を有するすべての者の3分の2以上の同意を得なければならないが、未登記の借地権を有する者の同意を得る必要はない。", "組合の総会の会議は、定款に特別な定めがある場合を除くほか、組合員の半数以上が出席しなければ開くことができない。", "組合が賦課金を徴収する場合、賦課金の額は、組合員が施行地区内に有する宅地又は借地の地積等にかかわらず一律に定めなければならない。", "組合の施行する土地区画整理事業に参加することを希望する者のうち、当該土地区画整理事業に参加するのに必要な資力及び信用を有する者であって定款で定められたものは、参加組合員として組合員となる。"], "answer": 1, "explain": ""}, {"id": "R2-21", "year": 2020, "field": "法令上の制限", "q": "農地に関する次の記述のうち、農地法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["法第3条第1項の許可が必要な農地の売買については、この許可を受けずに売買契約を締結しても所有権移転の効力は生じない。", "市街化区域内の自己の農地を駐車場に転用する場合には、農地転用した後に農業委員会に届け出ればよい。", "相続により農地を取得することとなった場合には、法第3条第1項の許可を受ける必要がある。", "農地に抵当権を設定する場合には、法第3条第1項の許可を受ける必要がある。"], "answer": 0, "explain": ""}, {"id": "R2-22", "year": 2020, "field": "法令上の制限", "q": "国土利用計画法第23条の届出（以下この問において「事後届出」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["Aが所有する市街化区域内の1,500m²の土地をBが購入した場合には、Bは事後届出を行う必要はないが、Cが所有する市街化調整区域内の6,000m²の土地についてDと売買に係る予約契約を締結した場合には、Dは事後届出を行う必要がある。", "Eが所有する市街化区域内の2,000m²の土地をFが購入した場合、Fは当該土地の所有権移転登記を完了した日から起算して2週間以内に事後届出を行う必要がある。", "Gが所有する都市計画区域外の15,000m²の土地をHに贈与した場合、Hは事後届出を行う必要がある。", "Iが所有する都市計画区域外の10,000m²の土地とJが所有する市街化調整区域内の10,000m²の土地を交換した場合、I及びJは事後届出を行う必要はない。"], "answer": 0, "explain": ""}, {"id": "R2-23", "year": 2020, "field": "税・その他", "q": "印紙税に関する次の記述のうち、正しいものはどれか。", "choices": ["「建物の電気工事に係る請負代金は1,100万円（うち消費税額及び地方消費税額100万円）とする」旨を記載した工事請負契約書について、印紙税の課税標準となる当該契約書の記載金額は1,100万円である。", "「Aの所有する土地（価額5,000万円）とBの所有する土地（価額4,000万円）とを交換する」旨の土地交換契約書を作成した場合、印紙税の課税標準となる当該契約書の記載金額は4,000万円である。", "国を売主、株式会社Cを買主とする土地の売買契約において、共同で売買契約書を2通作成し、国とC社がそれぞれ1通ずつ保存することとした場合、C社が保存する契約書には印紙税は課されない。", "「契約期間は10年間、賃料は月額10万円、権利金の額は100万円とする」旨が記載された土地の賃貸借契約書は、記載金額1,300万円の土地の賃借権の設定に関する契約書として印紙税が課される。"], "answer": 2, "explain": ""}, {"id": "R2-24", "year": 2020, "field": "税・その他", "q": "不動産取得税に関する次の記述のうち、正しいものはどれか。", "choices": ["令和2年4月に個人が取得した住宅及び住宅用地に係る不動産取得税の税率は3%であるが、住宅用以外の土地に係る不動産取得税の税率は4%である。", "一定の面積に満たない土地の取得に対しては、狭小な不動産の取得者に対する税負担の排除の観点から、不動産取得税を課することができない。", "不動産取得税は、不動産の取得に対して課される税であるので、家屋を改築したことにより、当該家屋の価格が増加したとしても、不動産取得税は課されない。", "共有物の分割による不動産の取得については、当該不動産の取得者の分割前の当該共有物に係る持分の割合を超えない部分の取得であれば、不動産取得税は課されない。"], "answer": 3, "explain": ""}, {"id": "R2-25", "year": 2020, "field": "税・その他", "q": "不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、誤っているものはどれか。", "choices": ["不動産の価格は、その不動産の効用が最高度に発揮される可能性に最も富む使用を前提として把握される価格を標準として形成されるが、不動産についての現実の使用方法は当該不動産が十分な効用を発揮していない場合があることに留意すべきである。", "対象建築物に関する工事が完了していない場合でも、当該工事の完了を前提として鑑定評価を行うことがある。", "特殊価格とは、一般的に市場性を有しない不動産について、その利用現況等を前提とした不動産の経済価値を適正に表示する価格をいい、例としては、文化財の指定を受けた建造物について、その保存等に主眼をおいた鑑定評価を行う場合において求められる価格があげられる。", "原価法は、対象不動産が建物及びその敷地である場合において、再調達原価の把握及び減価修正を適切に行うことができるときに有効な手法であるが、対象不動産が土地のみである場合には、この手法を適用することはできない。"], "answer": 3, "explain": ""}, {"id": "R2-26", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者A社（甲県知事免許）が宅地建物取引業者ではないB社との合併により消滅した場合には、B社は、A社が消滅した日から30日以内にA社を合併した旨を甲県知事に届け出れば、A社が受けていた免許を承継することができる。", "信託業法第3条の免許を受けた信託会社が宅地建物取引業を営もうとする場合には、国土交通大臣の免許を受けなければならない。", "個人Cが、転売目的で競売により取得した宅地を多数の区画に分割し、宅地建物取引業者Dに販売代理を依頼して、不特定多数の者に分譲する事業を行おうとする場合には、免許を受けなければならない。", "宅地建物取引業者E（乙県知事免許）は、乙県内に2以上の事務所を設置してその事業を営もうとする場合には、国土交通大臣に免許換えの申請をしなければならない。"], "answer": 2, "explain": ""}, {"id": "R2-27", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア　建物の売却について代理を依頼されて広告を行う場合、取引態様として、代理であることを明示しなければならないが、その後、当該物件の購入の注文を受けたときは、広告を行った時点と取引態様に変更がない場合を除き、遅滞なく、その注文者に対し取引態様を明らかにしなければならない。\nイ　広告をするに当たり、実際のものよりも著しく優良又は有利であると人を誤認させるような表示をしてはならないが、誤認させる方法には限定がなく、宅地又は建物に係る現在又は将来の利用の制限の一部を表示しないことにより誤認させることも禁止されている。\nウ　複数の区画がある宅地の売買について、数回に分けて広告をする場合は、広告の都度取引態様の別を明示しなければならない。\nエ　宅地の造成又は建物の建築に関する工事の完了前においては、当該工事に必要な都市計画法に基づく開発許可、建築基準法に基づく建築確認その他法令に基づく許可等の申請をした後でなければ、当該工事に係る宅地又は建物の売買その他の業務に関する広告をしてはならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "explain": ""}, {"id": "R2-28", "year": 2020, "field": "宅建業法", "q": "宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引士資格試験に合格した者は、合格した日から10年以内に登録の申請をしなければ、その合格は無効となる。", "宅地建物取引士証の有効期間の更新の申請は、有効期間満了の90日前から30日前までにする必要がある。", "宅地建物取引士は、重要事項の説明をするときは説明の相手方からの請求の有無にかかわらず宅地建物取引士証を提示しなければならず、また、取引の関係者から請求があったときにも宅地建物取引士証を提示しなければならない。", "甲県知事の登録を受けている宅地建物取引士が、乙県知事に登録の移転を申請するときは、乙県知事が指定する講習を受講しなければならない。"], "answer": 2, "explain": ""}, {"id": "R2-29", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者Aが、BからB所有の住宅の売却の媒介を依頼された場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはいくつあるか。\nア　Aは、Bとの間で専任媒介契約を締結し、所定の事項を指定流通機構に登録したときは、その登録を証する書面を遅滞なくBに引き渡さなければならない。\nイ　Aは、Bとの間で媒介契約を締結したときは、当該契約が国土交通大臣が定める標準媒介契約約款に基づくものであるか否かの別を、法第34条の2第1項の規定に基づき交付すべき書面に記載しなければならない。\nウ　Aは、Bとの間で専任媒介契約を締結するときは、Bの要望に基づく場合を除き、当該契約の有効期間について、有効期間満了時に自動的に更新する旨の特約をすることはできない。\nエ　Aは、Bとの間で専属専任媒介契約を締結したときは、Bに対し、当該契約に係る業務の処理状況を1週間に1回以上報告しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "explain": ""}, {"id": "R2-30", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者A及び宅地建物取引業者B（ともに消費税課税事業者）が受領する報酬に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、借賃には消費税等相当額を含まないものとする。", "choices": ["Aは売主から代理の依頼を、Bは買主から媒介の依頼を、それぞれ受けて、代金5,000万円の宅地の売買契約を成立させた場合、Aは売主から343万2,000円、Bは買主から171万6,000円、合計で514万8,000円の報酬を受けることができる。", "Aが単独で行う居住用建物の貸借の媒介に関して、Aが依頼者の一方から受けることができる報酬の上限額は、当該媒介の依頼者から報酬請求時までに承諾を得ている場合には、借賃の1.1か月分である。", "Aが単独で貸主と借主の双方から店舗用建物の貸借の媒介の依頼を受け、1か月の借賃25万円、権利金330万円（権利設定の対価として支払われるもので、返還されないものをいい、消費税等相当額を含む。）の賃貸借契約を成立させた場合、Aが依頼者の一方から受けることができる報酬の上限額は、30万8,000円である。", "Aが単独で行う事務所用建物の貸借の媒介に関し、Aが受ける報酬の合計額が借賃の1.1か月分以内であれば、Aは依頼者の双方からどのような割合で報酬を受けてもよく、また、依頼者の一方のみから報酬を受けることもできる。"], "answer": 3, "explain": ""}, {"id": "R2-31", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["建物の売買の媒介だけでなく建物の貸借の媒介を行う場合においても、損害賠償額の予定又は違約金に関する事項について、説明しなければならない。", "建物の売買の媒介を行う場合、当該建物について、石綿の使用の有無の調査の結果が記録されているか照会を行ったにもかかわらず、その存在の有無が分からないときは、宅地建物取引業者自らが石綿の使用の有無の調査を実施し、その結果を説明しなければならない。", "建物の売買の媒介を行う場合、当該建物が既存の住宅であるときは、建物状況調査を実施しているかどうかを説明しなければならないが、実施している場合その結果の概要を説明する必要はない。", "区分所有建物の売買の媒介を行う場合、建物の区分所有等に関する法律第2条第3項に規定する専有部分の用途その他の利用の制限に関する規約の定めがあるときは、その内容を説明しなければならないが、区分所有建物の貸借の媒介を行う場合は、説明しなくてよい。"], "answer": 0, "explain": ""}, {"id": "R2-32", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではないBとの間で建物の売買契約を締結する場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["AB間の建物の売買契約において、Bが当該契約の履行に着手した後においては、Aは、契約の締結に際してBから受領した手付金の倍額をBに現実に提供したとしても、契約を解除することはできない。", "AB間の建物の売買契約における「法第37条の2の規定に基づくクーリング・オフによる契約の解除の際に、当該契約の締結に際しAがBから受領した手付金は返還しない」旨の特約は有効である。", "AB間の建物の割賦販売の契約において、Bからの賦払金が当初設定していた支払期日までに支払われなかった場合、Aは直ちに賦払金の支払の遅滞を理由として当該契約を解除することができる。", "AB間で工事の完了前に当該工事に係る建物（代金5,000万円）の売買契約を締結する場合、Aは、法第41条に定める手付金等の保全措置を講じた後でなければ、Bから200万円の手付金を受領してはならない。"], "answer": 0, "explain": ""}, {"id": "R2-33", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者Aが宅地建物取引業法第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["Aが媒介により建物の貸借の契約を成立させたときは、37条書面に借賃の額並びにその支払の時期及び方法を記載しなければならず、また、当該書面を契約の各当事者に交付しなければならない。", "Aが媒介により宅地の貸借の契約を成立させた場合において、当該宅地の引渡しの時期について重要事項説明書に記載して説明を行ったときは、その内容を37条書面に記載する必要はない。", "Aが自ら売主として宅地建物取引業者である買主と建物の売買契約を締結した場合、37条書面に宅地建物取引士をして記名押印させる必要はない。", "Aが自ら売主として宅地の売買契約を締結した場合、代金についての金銭の貸借のあっせんに関する定めがある場合における当該あっせんに係る金銭の貸借が成立しないときの措置については、37条書面に記載する必要はない。"], "answer": 0, "explain": ""}, {"id": "R2-34", "year": 2020, "field": "宅建業法", "q": "宅地建物取引士の登録（以下この問において「登録」という。）及び宅地建物取引士証に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["甲県で宅地建物取引士資格試験に合格した後1年以上登録の申請をしていなかった者が宅地建物取引業者（乙県知事免許）に勤務することとなったときは、乙県知事あてに登録の申請をしなければならない。", "登録を受けている者は、住所に変更があっても、登録を受けている都道府県知事に変更の登録を申請する必要はない。", "宅地建物取引士は、従事先として登録している宅地建物取引業者の事務所の所在地に変更があったときは、登録を受けている都道府県知事に変更の登録を申請しなければならない。", "丙県知事の登録を受けている宅地建物取引士が、丁県知事への登録の移転の申請とともに宅地建物取引士証の交付の申請をした場合は、丁県知事から、移転前の宅地建物取引士証の有効期間が経過するまでの期間を有効期間とする新たな宅地建物取引士証が交付される。"], "answer": 3, "explain": ""}, {"id": "R2-35", "year": 2020, "field": "宅建業法", "q": "宅地建物取引業者A（甲県知事免許）の営業保証金に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["Aから建設工事を請け負った建設業者は、Aに対する請負代金債権について、営業継続中のAが供託している営業保証金から弁済を受ける権利を有する。", "Aが甲県内に新たに支店を設置したときは、本店の最寄りの供託所に政令で定める額の営業保証金を供託すれば、当該支店での事業を開始することができる。", "Aは、営業保証金の還付により、営業保証金の額が政令で定める額に不足することとなったときは、甲県知事から不足額を供託すべき旨の通知書の送付を受けた日から2週間以内にその不足額を供託しなければならない。", "Aが甲県内に本店及び2つの支店を設置して宅地建物取引業を営もうとする場合、供託すべき営業保証金の合計額は1,200万円である。"], "answer": 2, "expl
